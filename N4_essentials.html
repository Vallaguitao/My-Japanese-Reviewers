<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N4 Kanji Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f4; /* Tailwind stone-100 */
            touch-action: manipulation; /* Prevent double-tap zoom on mobile */
        }
        .kanji-font {
            font-family: 'Noto Serif JP', serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            cursor: pointer;
        }
        .btn-option {
            transition: all 0.2s ease-in-out;
        }
        .btn-option:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body class="text-stone-800 min-h-screen flex flex-col">

    <div class="flex-grow flex flex-col items-center justify-center p-4 max-w-lg mx-auto w-full">
        
        <!-- Header / Stats -->
        <div class="w-full flex justify-between items-end mb-6 px-2">
            <div>
                <h1 class="text-2xl font-bold text-rose-700">N4 Kanji</h1>
                <p class="text-sm text-stone-500 font-medium" id="progressText">Learned: 0 / 120</p>
            </div>
            <div class="text-right">
                <div class="text-3xl font-bold tracking-tighter" id="scoreText">0</div>
                <div class="text-xs font-semibold text-stone-400 uppercase tracking-wider">Streak</div>
            </div>
        </div>

        <!-- Canvas Container -->
        <div class="relative w-full aspect-square mb-6">
            <canvas id="kanjiCanvas"></canvas>
            
            <!-- Overlay for showing readings after guessing -->
            <div id="readingOverlay" class="absolute bottom-3 left-0 w-full flex justify-center opacity-0 transition-opacity duration-300 pointer-events-none px-4">
                <div class="bg-stone-800/90 text-white px-6 py-3 rounded-2xl text-sm font-medium backdrop-blur-sm shadow-xl flex flex-col items-center gap-1 w-full max-w-xs">
                    <span id="readingText" class="text-rose-200 font-bold tracking-wide"></span>
                    <div class="w-full h-px bg-stone-600/50 my-0.5"></div>
                    <span id="exampleText" class="text-stone-200 text-xs text-center leading-relaxed"></span>
                </div>
            </div>
        </div>

        <!-- Controls / Multiple Choice -->
        <div id="optionsContainer" class="grid grid-cols-2 gap-3 w-full">
            <button class="btn-option bg-white border-2 border-stone-200 hover:border-rose-400 text-stone-700 font-semibold py-4 px-3 rounded-xl shadow-sm text-sm" onclick="checkAnswer(0)" id="btn0">Option 1</button>
            <button class="btn-option bg-white border-2 border-stone-200 hover:border-rose-400 text-stone-700 font-semibold py-4 px-3 rounded-xl shadow-sm text-sm" onclick="checkAnswer(1)" id="btn1">Option 2</button>
            <button class="btn-option bg-white border-2 border-stone-200 hover:border-rose-400 text-stone-700 font-semibold py-4 px-3 rounded-xl shadow-sm text-sm" onclick="checkAnswer(2)" id="btn2">Option 3</button>
            <button class="btn-option bg-white border-2 border-stone-200 hover:border-rose-400 text-stone-700 font-semibold py-4 px-3 rounded-xl shadow-sm text-sm" onclick="checkAnswer(3)" id="btn3">Option 4</button>
        </div>

        <button id="nextBtn" class="hidden mt-6 bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform transform hover:-translate-y-1 w-full" onclick="nextKanji()">
            Next Kanji ➔
        </button>

        let canvas = document.getElementById('kanjiCanvas');
        let ctx = canvas.getContext('2d');
        
        let currentKanjiObj = null;
        let currentOptions = [];
        let correctIndex = -1;
        let streak = 0;
        let seenKanji = new Set();
        let isAnimating = false;
        let answered = false;

        // Particle System for Canvas
        let particles = [];
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 6 + 2;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                // Add slight gravity
                this.vy += 0.2; 
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function resizeCanvas() {
            // Make internal resolution match CSS display size for sharpness
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            drawStatic(); // Redraw static content on resize
        }

        window.addEventListener('resize', resizeCanvas);

        function drawStatic(textColor = '#1c1917', offsetX = 0) {
            if (!currentKanjiObj) return;

            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Inner Border (Traditional Japanese styling)
            const margin = 20 * window.devicePixelRatio;
            ctx.strokeStyle = '#e7e5e4';
            ctx.lineWidth = 2 * window.devicePixelRatio;
            ctx.strokeRect(margin, margin, canvas.width - margin*2, canvas.height - margin*2);

            // Draw Kanji
            const fontSize = Math.min(canvas.width, canvas.height) * 0.5;
            ctx.font = `${fontSize}px "Noto Serif JP", serif`;
            ctx.fillStyle = textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.fillText(currentKanjiObj.k, (canvas.width / 2) + offsetX, canvas.height / 2);
        }

        function animate() {
            if (!isAnimating) return;
            
            drawStatic(); // Draw background and kanji

            // Draw and update particles
            let activeParticles = false;
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw(ctx);
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    activeParticles = true;
                }
            }

            if (activeParticles) {
                requestAnimationFrame(animate);
            } else {
                isAnimating = false;
                drawStatic();
            }
        }

        function createExplosion(x, y, isCorrect) {
            particles = [];
            const colors = isCorrect ? ['#10b981', '#34d399', '#059669', '#fbbf24'] : ['#ef4444', '#f87171', '#991b1b', '#6b7280'];
            for (let i = 0; i < 40; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, color));
            }
            isAnimating = true;
            animate();
        }

        function getUniqueRandomKanji(excludeList = []) {
            let available = kanjiData.filter(k => !excludeList.includes(k.k));
            if (available.length === 0) return kanjiData[Math.floor(Math.random() * kanjiData.length)];
            return available[Math.floor(Math.random() * available.length)];
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function nextKanji() {
            answered = false;
            
            // Hide next button, show options
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('optionsContainer').classList.remove('hidden');
            
            // Hide reading overlay
            const overlay = document.getElementById('readingOverlay');
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0');

            // Reset button styles
            for(let i=0; i<4; i++) {
                let btn = document.getElementById('btn' + i);
                btn.className = "btn-option bg-white border-2 border-stone-200 hover:border-rose-400 text-stone-700 font-semibold py-4 px-3 rounded-xl shadow-sm text-sm";
                btn.disabled = false;
            }

            // Pick a kanji
            currentKanjiObj = getUniqueRandomKanji();
            seenKanji.add(currentKanjiObj.k);

            // Generate options
            let wrongOptions = [];
            while(wrongOptions.length < 3) {
                let randomK = getUniqueRandomKanji([currentKanjiObj.k, ...wrongOptions.map(o => o.k)]);
                wrongOptions.push(randomK);
            }

            currentOptions = [
                { text: currentKanjiObj.m, isCorrect: true },
                { text: wrongOptions[0].m, isCorrect: false },
                { text: wrongOptions[1].m, isCorrect: false },
                { text: wrongOptions[2].m, isCorrect: false }
            ];

            shuffleArray(currentOptions);

            // Update UI
            for(let i=0; i<4; i++) {
                document.getElementById('btn' + i).innerText = currentOptions[i].text;
                if(currentOptions[i].isCorrect) correctIndex = i;
            }

            document.getElementById('progressText').innerText = `Learned: ${seenKanji.size} / ${kanjiData.length}`;

            drawStatic();
        }

        function checkAnswer(selectedIndex) {
            if (answered) return;
            answered = true;

            const isCorrect = selectedIndex === correctIndex;
            const btn = document.getElementById('btn' + selectedIndex);
            const correctBtn = document.getElementById('btn' + correctIndex);

            // Disable all buttons
            for(let i=0; i<4; i++) {
                document.getElementById('btn' + i).disabled = true;
            }

            // Show Reading Overlay
            const overlay = document.getElementById('readingOverlay');
            const readingText = document.getElementById('readingText');
            const exampleText = document.getElementById('exampleText');
            readingText.innerText = currentKanjiObj.r;
            exampleText.innerText = currentKanjiObj.ex || '';
            overlay.classList.remove('opacity-0');
            overlay.classList.add('opacity-100');

            if (isCorrect) {
                streak++;
                document.getElementById('scoreText').innerText = streak;
                
                // Style correct button
                btn.classList.remove('border-stone-200', 'text-stone-700');
                btn.classList.add('bg-emerald-50', 'border-emerald-500', 'text-emerald-700');
                
                // Canvas visual feedback
                drawStatic('#059669'); // Draw kanji in green
                createExplosion(canvas.width / 2, canvas.height / 2, true);

            } else {
                streak = 0;
                document.getElementById('scoreText').innerText = streak;
                
                // Style wrong button
                btn.classList.remove('border-stone-200', 'text-stone-700');
                btn.classList.add('bg-rose-50', 'border-rose-500', 'text-rose-700');
                
                // Highlight correct button
                correctBtn.classList.remove('border-stone-200');
                correctBtn.classList.add('border-emerald-500', 'text-emerald-700');

                // Canvas visual feedback (Shake effect logic inside drawStatic via timeout loop)
                shakeCanvas();
                createExplosion(canvas.width / 2, canvas.height / 2, false);
            }

            // Show Next Button
            setTimeout(() => {
                document.getElementById('nextBtn').classList.remove('hidden');
                document.getElementById('optionsContainer').classList.add('hidden');
            }, 600); // Small delay to let user see the correct answer
        }

        function shakeCanvas() {
            let shakeCount = 0;
            let shakeInterval = setInterval(() => {
                let offset = (Math.random() - 0.5) * 20 * window.devicePixelRatio;
                drawStatic('#e11d48', offset); // Draw in red with offset
                shakeCount++;
                if (shakeCount > 10) {
                    clearInterval(shakeInterval);
                    drawStatic('#e11d48', 0); // Reset position
                }
            }, 30);
        }

        // Initialize
        window.onload = () => {
            resizeCanvas();
            nextKanji();
        };

    </script>
</body>
</html>
