<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Japanese Reviewers | Compact Study Directory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f8f3ea;
      --panel: #fffdf8;
      --panel-strong: #fff8ef;
      --ink: #18202f;
      --muted: #667085;
      --line: rgba(24, 32, 47, 0.12);
      --red: #a9342a;
      --red-soft: #f4ddd8;
      --indigo: #263a63;
      --shadow: 0 22px 70px rgba(24, 32, 47, 0.10);
      --radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans JP", "Outfit", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(169, 52, 42, 0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(38, 58, 99, 0.04), transparent 34rem),
        var(--paper);
      background-size: 44px 44px, auto, auto;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .sr-only,
    .skip-link:not(:focus) {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .skip-link:focus {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 20;
      padding: 0.75rem 1rem;
      background: var(--ink);
      color: white;
      border-radius: var(--radius);
    }

    .app-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark,
    .category-mark {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--red);
      font-weight: 800;
    }

    .eyebrow,
    .rail-heading span,
    .group-heading p {
      margin: 0;
      font-family: "Outfit", sans-serif;
      color: var(--red);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1, h2, h3, p { overflow-wrap: anywhere; }

    h1 {
      margin: 0;
      font-family: "Outfit", sans-serif;
      font-size: 1.55rem;
      line-height: 1.1;
    }

    .search-box {
      flex: 0 1 390px;
    }

    .search-box input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 14px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 12px 40px rgba(24, 32, 47, 0.06);
    }

    .directory-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .category-rail,
    .directory-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 248, 0.92);
      box-shadow: var(--shadow);
    }

    .category-rail {
      position: sticky;
      top: 16px;
      padding: 16px;
    }

    .rail-heading {
      display: grid;
      gap: 4px;
      margin-bottom: 14px;
    }

    .category-nav {
      display: grid;
      gap: 8px;
    }

    .category-link {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 62px;
      padding: 9px;
      border: 1px solid transparent;
      border-radius: var(--radius);
    }

    .category-link:hover,
    .category-link.active {
      border-color: rgba(169, 52, 42, 0.26);
      background: var(--red-soft);
    }

    .category-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .category-copy strong {
      font-family: "Outfit", sans-serif;
      font-size: 0.96rem;
    }

    .category-copy small,
    .group-heading span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .directory-panel {
      position: relative;
      min-height: 620px;
      padding: 22px;
      overflow: hidden;
    }

    .panel-heading {
      position: relative;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-heading::after {
      content: attr(data-watermark);
      position: absolute;
      right: 10px;
      top: -40px;
      color: rgba(169, 52, 42, 0.07);
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      pointer-events: none;
    }

    .panel-heading h2 {
      position: relative;
      z-index: 1;
      margin: 4px 0 0;
      font-family: "Outfit", sans-serif;
      font-size: 2rem;
      line-height: 1.1;
    }

    .count-pill,
    .clear-search,
    .show-more,
    .show-less,
    .open-link {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border: 1px solid rgba(169, 52, 42, 0.28);
      border-radius: var(--radius);
      padding: 0 12px;
      background: var(--panel-strong);
      color: var(--red);
      font-family: "Outfit", sans-serif;
      font-weight: 700;
    }

    .clear-search,
    .show-more,
    .show-less {
      cursor: pointer;
    }

    .group-stack {
      display: grid;
      gap: 14px;
    }

    .resource-group {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.58);
      overflow: hidden;
    }

    .group-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(38, 58, 99, 0.04);
      border-bottom: 1px solid var(--line);
    }

    .group-heading h3 {
      margin: 4px 0 0;
      font-size: 1.02rem;
    }

    .resource-list {
      display: grid;
      gap: 0;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .resource-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 140px auto;
      gap: 16px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
    }

    .resource-row:last-child {
      border-bottom: 0;
    }

    .level-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 10px;
      font-size: 0.76rem;
      font-weight: 700;
      border-radius: 6px;
      font-family: "Outfit", sans-serif;
      text-transform: uppercase;
      white-space: nowrap;
      justify-self: start;
      border: 1px solid transparent;
    }

    .level-badge.n5 {
      background-color: var(--red-soft);
      color: var(--red);
      border-color: rgba(169, 52, 42, 0.15);
    }

    .level-badge.n4 {
      background-color: #e8edf5;
      color: var(--indigo);
      border-color: rgba(38, 58, 99, 0.15);
    }

    .level-badge.n4-n5 {
      background-color: #f3e8ff;
      color: #6b21a8;
      border-color: rgba(107, 33, 168, 0.15);
    }

    .level-badge.other {
      background-color: #f3f4f6;
      color: #374151;
      border-color: rgba(55, 65, 81, 0.15);
    }

    .resource-title {
      font-weight: 700;
      line-height: 1.4;
    }

    .resource-title {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .resource-title:hover {
      color: var(--red);
    }

    .show-more,
    .show-less {
      margin: 12px 16px 16px;
    }

    .empty-state {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.5);
    }

    .noscript-panel {
      padding: 20px;
    }

    @media (max-width: 820px) {
      .app-shell {
        width: min(100% - 20px, 680px);
        padding: 18px 0;
      }

      .site-header {
        align-items: stretch;
        flex-direction: column;
      }

      .search-box {
        flex-basis: auto;
      }

      .directory-layout {
        grid-template-columns: 1fr;
      }

      .category-rail {
        position: static;
        overflow-x: auto;
      }

      .category-nav {
        grid-auto-flow: column;
        grid-auto-columns: minmax(188px, 1fr);
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .directory-panel {
        min-height: 520px;
        padding: 16px;
      }

      .panel-heading,
      .group-heading {
        align-items: flex-start;
        flex-direction: column;
      }

      .panel-heading::after {
        top: -16px;
        font-size: 5.5rem;
      }

      .resource-row {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px 16px;
      }

      .resource-title {
        grid-column: 1;
        grid-row: 1;
      }

      .level-badge {
        grid-column: 1;
        grid-row: 2;
      }

      .open-link {
        grid-column: 2;
        grid-row: 1 / span 2;
        justify-self: end;
        align-self: center;
      }
    }
  </style>
</head>

            items: [

            ]
          }
        ]
      },
      {
        id: 'specialized-lessons',
        name: 'Specialized Lessons',
        jp: '専',
        subtitle: 'Focused lesson guides',
        watermark: '専',
        groups: [
          {
            name: 'Special Guides',
            matchPath: 'Specialized-Lessons/',
            items: [
              { title: 'Special Katakana - Extended Sounds', path: 'Specialized-Lessons/Katakana-special-sounds.html' },
              { title: '動詞の活用 - Verb Conjugation Master Guide', path: 'Specialized-Lessons/Verb_Conjugation_Lesson.html' }
            ]

    function lessonNumber(path) {
      const match = path.match(/(?:Lesson_|vocabulary)(\d+)/i);
      return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
    }

    function sortItems(items) {
      return [...items].sort((a, b) => {
        const lessonDelta = lessonNumber(a.path) - lessonNumber(b.path);
        if (lessonDelta !== 0) return lessonDelta;
        return a.title.localeCompare(b.title, 'en');
      });
    }

    RESOURCE_CATEGORIES.forEach(category => {
      category.groups.forEach(group => {
        group.items = sortItems(group.items);
      });
    });

    const state = {
      activeCategory: DEFAULT_CATEGORY,
      query: '',
      expandedGroups: new Set()
    };

    const nav = document.getElementById('category-nav');
    const panel = document.getElementById('directory-panel');
    const searchInput = document.getElementById('resource-search');

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function allItems() {
      return RESOURCE_CATEGORIES.flatMap(category =>
        category.groups.flatMap(group =>
          group.items.map(item => ({
            ...item,
            categoryId: category.id,
            categoryName: category.name,
            groupName: group.name,
            jp: category.jp
          }))
        )
      );
    }

    function getCategory(id) {
      return RESOURCE_CATEGORIES.find(category => category.id === id) || RESOURCE_CATEGORIES.find(category => category.id === DEFAULT_CATEGORY);
    }

    function groupKey(categoryId, groupName) {
      return `${categoryId}:${groupName}`;
    }

    function renderNav() {
      nav.innerHTML = RESOURCE_CATEGORIES.map(category => {
        const count = category.groups.reduce((sum, group) => sum + group.items.length, 0);
        const active = category.id === state.activeCategory && !state.query;
        return `
          <a class="category-link${active ? ' active' : ''}" href="#${category.id}" data-category="${category.id}">
            <span class="category-mark" aria-hidden="true">${escapeHtml(category.jp)}</span>
            <span class="category-copy">
              <strong>${escapeHtml(category.name)}</strong>
              <small>${count} resources</small>
            </span>
          </a>
        `;
      }).join('');
    }

    function renderRows(items) {
      return items.map(item => {
        const titleParts = item.title.split(' | ');
        const mainTitle = titleParts[0];
        const levelSuffix = titleParts[1] || '';
        
        let badgeHtml = '';
        if (levelSuffix) {
          let lvlClass = 'other';
          const lvlLower = levelSuffix.toLowerCase();
          if (lvlLower.includes('n5') && lvlLower.includes('n4')) {
            lvlClass = 'n4-n5';
          } else if (lvlLower.includes('n5')) {
            lvlClass = 'n5';
          } else if (lvlLower.includes('n4')) {
            lvlClass = 'n4';
          }
          badgeHtml = `<span class="level-badge ${lvlClass}">${escapeHtml(levelSuffix)}</span>`;
        }

        return `
          <li class="resource-row">
            <a class="resource-title" href="${escapeHtml(item.path)}">
              ${escapeHtml(mainTitle)}
            </a>
            ${badgeHtml}
            <a class="open-link" href="${escapeHtml(item.path)}" aria-label="Open ${escapeHtml(mainTitle)}">Open</a>
          </li>
        `;
      }).join('');
    }

    function renderGroup(category, group) {
      const key = groupKey(category.id, group.name);
      const isDense = group.items.length > PREVIEW_LIMIT;
      const isExpanded = state.expandedGroups.has(key);
      const visibleItems = isDense && !isExpanded ? group.items.slice(0, PREVIEW_LIMIT) : group.items;
      const hiddenCount = group.items.length - visibleItems.length;

      return `
        <section class="resource-group">
          <div class="group-heading">
            <div>
              <p>${escapeHtml(category.name)}</p>
              <h3>${escapeHtml(group.name)}</h3>
            </div>
            <span>${group.items.length} files</span>
          </div>
          <ul class="resource-list">
            ${renderRows(visibleItems)}
          </ul>
          ${isDense ? (isExpanded ? `<button class="show-less" type="button" data-group-collapse="${escapeHtml(key)}">Show less</button>` : `<button class="show-more" type="button" data-group="${escapeHtml(key)}">Show all ${group.items.length}</button>`) : ''}
        </section>
      `;
    }

    function renderCategory() {
      const category = getCategory(state.activeCategory);
      const count = category.groups.reduce((sum, group) => sum + group.items.length, 0);
      panel.innerHTML = `
        <div class="panel-heading" data-watermark="${escapeHtml(category.watermark)}">
          <div>
            <p class="eyebrow">${escapeHtml(category.jp)} ${escapeHtml(category.subtitle)}</p>
            <h2>${escapeHtml(category.name)}</h2>
          </div>
          <span class="count-pill">${count} resources</span>
        </div>
        <div class="group-stack">
          ${category.groups.map(group => renderGroup(category, group)).join('')}
        </div>
      `;
    }

    function renderSearch() {
      const query = state.query.toLowerCase();
      const results = allItems().filter(item => {
        return [item.title, item.path, item.categoryName, item.groupName]
          .join(' ')
          .toLowerCase()
          .includes(query);
      });

      panel.innerHTML = `
        <div class="panel-heading" data-watermark="探">
          <div>
            <p class="eyebrow">検索 Search results</p>
            <h2>${results.length} match${results.length === 1 ? '' : 'es'}</h2>
          </div>
          <button class="clear-search" type="button">Clear</button>
        </div>
        ${results.length ? `<ul class="resource-list search-results">${renderRows(results)}</ul>` : '<p class="empty-state">No matching resources found.</p>'}
      `;
    }

    function render() {
      renderNav();
      if (state.query) {
        renderSearch();
      } else {
        renderCategory();
      }
    }

    function setActiveCategory(categoryId, updateHash = true) {
      state.activeCategory = getCategory(categoryId).id;
      state.query = '';
      searchInput.value = '';
      if (updateHash) {
        history.replaceState(null, '', `#${state.activeCategory}`);
      }
      render();
    }

    function initializeFromHash() {
      const hash = window.location.hash.replace('#', '');
      state.activeCategory = getCategory(hash || DEFAULT_CATEGORY).id;
    }

    nav.addEventListener('click', event => {
      const link = event.target.closest('[data-category]');
      if (!link) return;
      event.preventDefault();
      setActiveCategory(link.dataset.category);
    });

    panel.addEventListener('click', event => {
      const expandButton = event.target.closest('[data-group]');
      if (expandButton) {
        state.expandedGroups.add(expandButton.dataset.group);
        render();
        return;
      }

      const collapseButton = event.target.closest('[data-group-collapse]');
      if (collapseButton) {
        state.expandedGroups.delete(collapseButton.dataset.groupCollapse);
        render();
        return;
      }

      const clearButton = event.target.closest('.clear-search');
      if (clearButton) {
        state.query = '';
        searchInput.value = '';
        render();
      }
    });

    searchInput.addEventListener('input', event => {
      state.query = event.target.value.trim();
      render();
    });

    window.addEventListener('hashchange', () => {
      initializeFromHash();
      state.query = '';
      searchInput.value = '';
      render();
    });

    initializeFromHash();
    render();
  </script>
