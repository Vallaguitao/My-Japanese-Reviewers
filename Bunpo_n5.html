<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの日本語 N5 — Bunpo Reviewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1525;
            --surface: #2d2438;
            --primary: #b088f9;
            --primary-hover: #c4a6fb;
            --text-main: #e8e0f0;
            --text-muted: #a095b5;
            --correct: #4ade80;
            --wrong: #f87171;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
              radial-gradient(circle at 20% 30%, rgba(176, 136, 249, 0.07) 0%, transparent 50%),
              radial-gradient(circle at 80% 70%, rgba(232, 180, 200, 0.07) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Start Screen --- */
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; color: var(--primary); margin-bottom: 5px; font-weight: 800; }
        .header p { color: var(--text-muted); font-size: 0.95rem; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: border 0.3s;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #1a1525;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn:active { transform: scale(0.98); }

        /* --- Quiz Screen --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .options {
            display: flex;
            flex-direction: column; /* Vertical layout requirement */
            gap: 12px;
        }

        .option {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.05);
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        
        .option .prefix {
            font-weight: 700;
            color: var(--primary);
            margin-right: 15px;
            width: 20px;
        }

        .option:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        .option.correct {
            background: rgba(74, 222, 128, 0.1);
            border-color: var(--correct);
            color: var(--correct);
        }

        .option.wrong {
            background: rgba(248, 113, 113, 0.1);
            border-color: var(--wrong);
            color: var(--wrong);
        }

        .next-btn-container {
            margin-top: 30px;
            display: none;
        }

        /* --- Result Screen --- */
        .result-header { text-align: center; margin-bottom: 30px; }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 6px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 auto 20px;
            color: var(--primary);
        }
        
        .breakdown {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 20px;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .breakdown-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .breakdown-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .breakdown-item.correct .status { color: var(--correct); }
        .breakdown-item.wrong .status { color: var(--wrong); }
        
        .email-status { text-align: center; margin-bottom: 20px; font-size: 0.85rem; color: var(--text-muted); }
        .email-status.success { color: var(--correct); }
        .email-status.error { color: var(--wrong); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <div class="header">
            <h1>みんなの日本語 N5</h1>
            <p>文法 (Bunpo) Reviewer</p>
        </div>
        
        <div class="input-group">
            <label for="student-name">Student Name</label>
            <input type="text" id="student-name" placeholder="Enter your name" autocomplete="off">
        </div>

        <div class="input-group">
            <label for="quiz-set">Select Level</label>
            <select id="quiz-set">
                <option value="level1">Mix Level 1: Fundamentals</option>
                <option value="level2">Mix Level 2: Application</option>
                <option value="level3">Mix Level 3: Complex & Nuance</option>
            </select>
        </div>

        <button class="btn" onclick="startQuiz()">Start Exam</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="screen">
        <div class="top-bar">
            <span id="question-counter">Question 1/10</span>
            <span id="set-title">Mix Level 1</span>
        </div>
        
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>

        <div id="question-text" class="question"></div>

        <div id="options-container" class="options">
            <!-- Options injected here via JS -->
        </div>

        <div class="next-btn-container" id="next-btn-container">
            <button class="btn" onclick="nextQuestion()">Next Question</button>
        </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="screen">
        <div class="result-header">
            <h2>Exam Complete!</h2>
            <p id="result-name"></p>
        </div>

        <div class="score-circle" id="score-display">10/10</div>

        <div id="email-status" class="email-status">Sending results to instructor...</div>

        <div class="breakdown" id="breakdown-container">
            <!-- Results breakdown injected here -->
        </div>

        <button class="btn" onclick="resetApp()">Return to Menu</button>
    </div>
</div>

<script>
    // --- QUIZ DATA (Extracted from Chat History) ---
    const BUNPO_DATA = {
        "level1": {
            title: "Level 1: Fundamentals",
            questions: [
                { q: "私(わたし) _____ 学生(がくせい)です。", options: ["の", "は", "を", "に"], answer: 1 },
                { q: "図書館(としょかん) _____ 勉強(べんきょう)します。", options: ["に", "へ", "で", "を"], answer: 2 },
                { q: "昨日(きのう)は　_____ です。（Cold）", options: ["さむい", "さむかった", "さむいでした", "さむくなかった"], answer: 1 },
                { q: "私は　車(くるま)が　_____ 。（Want）", options: ["ほしいです", "ほしがります", "ほしくないです", "したいです"], answer: 0 },
                { q: "窓(まど)を　_____ ください。（Please open）", options: ["開(あ)け", "開(あ)けて", "開(あ)く", "開(あ)いた"], answer: 1 },
                { q: "今(いま)　雨(あめ)が　_____ います。", options: ["降(ふ)って", "降(ふ)り", "降(ふ)る", "降(ふ)らない"], answer: 0 },
                { q: "ここに　車(くるま)を　_____ ください。（Please don't park）", options: ["止(と)めないで", "止(と)めなくて", "止(と)めない", "止(と)める"], answer: 0 },
                { q: "私は　漢字(かんじ)を　_____ ことが　できます。", options: ["読(よ)む", "読(よ)める", "読(よ)んで", "読(よ)みます"], answer: 0 },
                { q: "明日(あした)は　雨(あめ)だと　_____ 。（I think）", options: ["言(い)いました", "思(おも)います", "します", "あります"], answer: 1 },
                { q: "もし　時間(じかん)が　_____ 、映画(えいが)を　見(み)ませんか。", options: ["ある", "あれば", "あっても", "あって"], answer: 1 }
            ]
        },
        "level2": {
            title: "Level 2: Application",
            questions: [
                { q: "電車(でんしゃ) _____ カバンを　忘(わす)れました。", options: ["に", "で", "を", "へ"], answer: 0 },
                { q: "1時間(じかん) _____ 着(つ)きます。（Time Span）", options: ["に", "で", "を", "が"], answer: 1 },
                { q: "毎晩(まいばん)　テレビを　_____ 、寝(ね)ます。", options: ["見(み)て", "見(み)る", "見(み)た", "見(み)たり"], answer: 0 },
                { q: "写真(しゃしん)を　_____ まえに、ご飯(はん)を　食(た)べました。", options: ["撮(と)った", "撮(と)る", "撮(と)り", "撮(と)って"], answer: 1 },
                { q: "この　パソコンは　_____ 、便利(べんり)です。（Light and...）", options: ["軽(かる)い", "軽(かる)くて", "軽(かる)いで", "軽(かる)かった"], answer: 1 },
                { q: "日本語(にほんご)が　_____ なりました。（Skillful）", options: ["上手(じょうず)", "上手(じょうず)に", "上手(じょうず)な", "上手(じょうず)く"], answer: 1 },
                { q: "誕生(たんじょう)日(び)に　母(はは)は（私に）シャツを　_____ 。", options: ["もらいました", "あげました", "くれました", "やりました"], answer: 2 },
                { q: "お金(かね)が　_____ 、買(か)い物(もの)に　行(い)きません。", options: ["なかったら", "ないと", "なくて", "なければ"], answer: 0 },
                { q: "この　ボタンを　_____ と、切符(きっぷ)が　出(で)ます。", options: ["押(お)す", "押(お)して", "押(お)した", "押(お)せば"], answer: 0 },
                { q: "約束(やくそく)の　時間(じかん)に　友達(ともだち)が　_____ 。", options: ["来(こ)なかったです", "来(き)ませんでした", "来(く)ないでした", "来(き)ません"], answer: 1 }
            ]
        },
        "level3": {
            title: "Level 3: Complex & Nuance",
            questions: [
                { q: "これ(これ)は　ミラーさん _____ 撮(と)った　写真(しゃしん)です。", options: ["は", "が", "の", "に"], answer: 1 },
                { q: "電車(でんしゃ) _____ 乗(の)って、大阪(おおさか)へ　行(い)きます。", options: ["で", "に", "を", "へ"], answer: 1 },
                { q: "梅田(うめだ)で　電車(でんしゃ) _____ 降(お)りました。", options: ["を", "に", "で", "が"], answer: 0 },
                { q: "京都(きょうと)は　静(しず)か _____ 、きれいな　町(まち)です。", options: ["で", "な", "に", "だ"], answer: 0 },
                { q: "晩(ばん)ご飯(はん)を　_____ あとで、テレビを　見(み)ました。", options: ["食(た)べる", "食(た)べた", "食(た)べて", "食(た)べ"], answer: 1 },
                { q: "妻(つま)が　_____ とき、会社(かいしゃ)を　休(やす)みました。", options: ["病気(びょうき)", "病気(びょうき)の", "病気(びょうき)な", "病気(びょうき)だ"], answer: 1 },
                { q: "昨日(きのう)　_____ 映画(えいが)は　面白(おもしろ)かったです。", options: ["見(み)る", "見(み)た", "見(み)て", "見(み)ない"], answer: 1 },
                { q: "どうして昨日来なかったんですか。...用事(ようじ)が _____ からです。", options: ["あった", "ありました", "ある", "あって"], answer: 0 },
                { q: "部長(ぶちょう)は　私(わたし)に　レポートを　_____ 。", options: ["くれました", "あげました", "もらいました", "やりました"], answer: 0 },
                { q: "A: このボールペン、 _____ もいいですか。 B: ええ。", options: ["使(つか)って", "使(つか)う", "使(つか)ったら", "使(つか)えば"], answer: 0 }
            ]
        }
    };

    // --- APP STATE ---
    let currentSet = [];
    let currentSetTitle = "";
    let currentIndex = 0;
    let score = 0;
    let studentName = "";
    let userAnswers = [];
    let isAnswered = false;

    const PREFIXES = ["a)", "b)", "c)", "d)"];

    // EmailJS Configuration (Stubbed matching the reference file)
    const EMAILJS_SERVICE_ID = "YOUR_SERVICE_ID";
    const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";
    const EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY";

    // --- LOGIC ---
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startQuiz() {
        const nameInput = document.getElementById('student-name').value.trim();
        const setKey = document.getElementById('quiz-set').value;

        if (!nameInput) {
            alert("Please enter your name.");
            return;
        }

        studentName = nameInput;
        currentSet = [...BUNPO_DATA[setKey].questions];
        currentSetTitle = BUNPO_DATA[setKey].title;
        
        currentIndex = 0;
        score = 0;
        userAnswers = [];
        
        document.getElementById('set-title').textContent = currentSetTitle;
        
        renderQuestion();
        switchScreen('quiz-screen');
    }

    function renderQuestion() {
        isAnswered = false;
        document.getElementById('next-btn-container').style.display = 'none';
        
        const qData = currentSet[currentIndex];
        
        // Update Top Bar
        document.getElementById('question-counter').textContent = `Question ${currentIndex + 1}/${currentSet.length}`;
        const progressPct = ((currentIndex) / currentSet.length) * 100;
        document.getElementById('progress-fill').style.width = `${progressPct}%`;

        // Render Question
        document.getElementById('question-text').textContent = `${currentIndex + 1}. ${qData.q}`;

        // Render Vertical Options
        const optionsHtml = qData.options.map((opt, i) => `
            <div class="option" onclick="selectOption(${i}, this)">
                <span class="prefix">${PREFIXES[i]}</span>
                <span class="text">${opt}</span>
            </div>
        `).join('');
        
        document.getElementById('options-container').innerHTML = optionsHtml;
    }

    window.selectOption = function(selectedIndex, el) {
        if (isAnswered) return;
        isAnswered = true;

        const qData = currentSet[currentIndex];
        const correctIndex = qData.answer;
        const isCorrect = (selectedIndex === correctIndex);

        if (isCorrect) score++;

        userAnswers.push({
            q: qData.q,
            selected: qData.options[selectedIndex],
            correct: qData.options[correctIndex],
            isCorrect: isCorrect
        });

        // Styling the selected and correct answers
        const options = document.querySelectorAll('.option');
        options[correctIndex].classList.add('correct');
        
        if (!isCorrect) {
            options[selectedIndex].classList.add('wrong');
        }

        document.getElementById('next-btn-container').style.display = 'block';
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / currentSet.length) * 100}%`;
    }

    window.nextQuestion = function() {
        currentIndex++;
        if (currentIndex < currentSet.length) {
            renderQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        switchScreen('result-screen');
        
        document.getElementById('result-name').textContent = `Great effort, ${studentName}!`;
        document.getElementById('score-display').textContent = `${score}/${currentSet.length}`;

        // Build Breakdown
        const breakdownHtml = userAnswers.map((ans, i) => `
            <div class="breakdown-item ${ans.isCorrect ? 'correct' : 'wrong'}">
                <div style="margin-bottom: 5px;"><strong>Q${i+1}:</strong> ${ans.q}</div>
                <div class="status">${ans.isCorrect ? '✓ Correct' : '✗ Wrong'}</div>
                <div style="color: var(--text-muted); font-size: 0.85em;">
                    Your Answer: ${ans.selected}<br>
                    ${!ans.isCorrect ? `Correct Answer: ${ans.correct}` : ''}
                </div>
            </div>
        `).join('');
        
        document.getElementById('breakdown-container').innerHTML = breakdownHtml;

        // Send Email Routine (Matching reference file behavior)
        sendEmailReport();
    }

    async function sendEmailReport() {
        const statusEl = document.getElementById('email-status');
        
        if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
            statusEl.className = "email-status error";
            statusEl.textContent = "⚠ EmailJS not configured (Keys needed). Results shown locally.";
            return;
        }

        statusEl.className = "email-status";
        statusEl.textContent = "📧 Sending results to instructor...";

        const pct = Math.round((score / currentSet.length) * 100);
        let details = userAnswers.map((a, i) => 
            `Q${i+1}: ${a.isCorrect ? "✓" : "✗"} (Ans: ${a.selected})`
        ).join("\n");

        const params = {
            name: studentName,
            email: "noreply@quiz.com",
            subject: `[Bunpo] ${studentName} - ${currentSetTitle} - ${pct}%`,
            message: `Student: ${studentName}\nSet: ${currentSetTitle}\nScore: ${score}/${currentSet.length} (${pct}%)\n\nBreakdown:\n${details}`
        };

        try {
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params, EMAILJS_PUBLIC_KEY);
            statusEl.className = "email-status success";
            statusEl.textContent = "✓ Results successfully emailed!";
        } catch (err) {
            console.error("EmailJS error:", err);
            statusEl.className = "email-status error";
            statusEl.textContent = "✗ Failed to send email.";
        }
    }

    window.resetApp = function() {
        document.getElementById('student-name').value = "";
        switchScreen('start-screen');
    }
</script>
</body>
</html>
