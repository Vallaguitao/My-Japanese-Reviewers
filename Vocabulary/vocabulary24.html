<script>
const DISPLAY = {
  /* Family */
  "おじいさん":"おじいさん","おじいちゃん":"おじいちゃん",
  "おばあさん":"おばあさん","おばあちゃん":"おばあちゃん",
  /* Key nouns */
  "準備":"<ruby>準備<rt>じゅんび</rt></ruby>",
  "引っ越し":"<ruby>引<rt>ひ</rt></ruby>っ<ruby>越<rt>こ</rt></ruby>し",
  "お菓子":"お<ruby>菓子<rt>かし</rt></ruby>",
  "全部":"<ruby>全部<rt>ぜんぶ</rt></ruby>",
  "自分で":"<ruby>自分<rt>じぶん</rt></ruby>で",
  "母の日":"<ruby>母<rt>はは</rt></ruby>の<ruby>日<rt>ひ</rt></ruby>",
  /* Gift terms */
  "お年玉":"お<ruby>年玉<rt>としだま</rt></ruby>",
  "入学祝い":"<ruby>入学祝<rt>にゅうがくいわ</rt></ruby>い",
  "卒業祝い":"<ruby>卒業祝<rt>そつぎょういわ</rt></ruby>い",
  "結婚祝い":"<ruby>結婚祝<rt>けっこんいわ</rt></ruby>い",
  "出産祝い":"<ruby>出産祝<rt>しゅっさんいわ</rt></ruby>い",
  "お中元":"お<ruby>中元<rt>ちゅうげん</rt></ruby>",
  "お歳暮":"お<ruby>歳暮<rt>せいぼ</rt></ruby>",
  "お香典":"お<ruby>香典<rt>こうでん</rt></ruby>",
  "お見舞い":"お<ruby>見舞<rt>みま</rt></ruby>い",
  "のし袋":"のし<ruby>袋<rt>ぶくろ</rt></ruby>"
};
const READING = {};
for (const [k,v] of Object.entries(DISPLAY)) {
  READING[k] = v.replace(/<ruby>/g,"").replace(/<\/ruby>/g,"").replace(/<rt>/g,"（").replace(/<\/rt>/g,"）");
}

const QUESTIONS = [
  /* ═══ TIER 1: MAIN VOCABULARY ═══ */

  /* ── Verbs ── */
  { english: "give (me / my group)", answer: "くれます", choices: ["くれます","おくります","なおします","せつめいします"] },
  { english: "repair, correct", answer: "なおします", choices: ["なおします","くれます","せつめいします","しょうかいします"] },
  { english: "take (someone somewhere)", answer: "つれていきます", choices: ["つれていきます","つれてきます","おくります","あんないします"] },
  { english: "bring (someone here)", answer: "つれてきます", choices: ["つれてきます","つれていきます","くれます","しょうかいします"] },
  { english: "escort (someone), go with, send off", answer: "おくります", choices: ["おくります","つれていきます","あんないします","くれます"] },
  { english: "introduce", answer: "しょうかいします", choices: ["しょうかいします","あんないします","せつめいします","おくります"] },
  { english: "show around, show the way", answer: "あんないします", choices: ["あんないします","しょうかいします","せつめいします","おくります"] },
  { english: "explain", answer: "せつめいします", choices: ["せつめいします","しょうかいします","あんないします","なおします"] },

  /* ── Family (formal vs informal) ── */
  { english: "grandfather, old man (polite)", answer: "おじいさん", choices: ["おじいさん","おじいちゃん","おばあさん","おばあちゃん"] },
  { english: "grandfather (casual / affectionate)", answer: "おじいちゃん", choices: ["おじいちゃん","おじいさん","おばあちゃん","おばあさん"] },
  { english: "grandmother, old woman (polite)", answer: "おばあさん", choices: ["おばあさん","おばあちゃん","おじいさん","おじいちゃん"] },
  { english: "grandmother (casual / affectionate)", answer: "おばあちゃん", choices: ["おばあちゃん","おばあさん","おじいちゃん","おじいさん"] },

  /* ── Nouns (kanji + furigana) ── */
  { english: "preparation", answer: "準備", choices: ["準備","引っ越し","お菓子","全部"] },
  { english: "moving out (changing residence)", answer: "引っ越し", choices: ["引っ越し","準備","ホームステイ","全部"] },
  { english: "sweets, snacks", answer: "お菓子", choices: ["お菓子","準備","引っ越し","ホームステイ"] },
  { english: "homestay", answer: "ホームステイ", choices: ["ホームステイ","引っ越し","準備","お菓子"] },
  { english: "all, everything", answer: "全部", choices: ["全部","自分で","ほかに","準備"] },
  { english: "by oneself", answer: "自分で", choices: ["自分で","全部","ほかに","準備"] },

  /* ── 会話 ── */
  { english: "besides, in addition", answer: "ほかに", choices: ["ほかに","全部","自分で","母の日"] },
  { english: "Mother's Day", answer: "母の日", choices: ["母の日","ほかに","お菓子","ホームステイ"] },

  /* ═══ TIER 2: GIFT-GIVING CULTURE (kanji + furigana) ═══ */

  { english: "small gift of money given to children on New Year's Day", answer: "お年玉", choices: ["お年玉","入学祝い","お中元","お歳暮"] },
  { english: "gift celebrating admission to school", answer: "入学祝い", choices: ["入学祝い","卒業祝い","お年玉","出産祝い"] },
  { english: "graduation gift (money, stationery, book, etc.)", answer: "卒業祝い", choices: ["卒業祝い","入学祝い","結婚祝い","お年玉"] },
  { english: "wedding gift (money, household goods, etc.)", answer: "結婚祝い", choices: ["結婚祝い","出産祝い","卒業祝い","入学祝い"] },
  { english: "gift celebrating a birth (baby clothes, toys, etc.)", answer: "出産祝い", choices: ["出産祝い","結婚祝い","お見舞い","入学祝い"] },
  { english: "summer gift (Jul./Aug.) for someone who cares for you", answer: "お中元", choices: ["お中元","お歳暮","お年玉","お香典"] },
  { english: "year-end gift (Dec.) for someone who cares for you", answer: "お歳暮", choices: ["お歳暮","お中元","お年玉","お香典"] },
  { english: "condolence money (for a funeral)", answer: "お香典", choices: ["お香典","お見舞い","お歳暮","お中元"] },
  { english: "present for visiting a sick or injured person", answer: "お見舞い", choices: ["お見舞い","お香典","出産祝い","お歳暮"] },
  { english: "special decorated envelope for money gifts", answer: "のし袋", choices: ["のし袋","お年玉","お香典","全部"] },

  /* ═══ TIER 3: GIVING/RECEIVING VERB-DIRECTION ═══ */

  { english: "someone gives TO ME (speaker receives benefit)", answer: "くれます", choices: ["くれます","あげます","もらいます","おくります"] },
  { english: "I give TO SOMEONE ELSE", answer: "あげます", choices: ["あげます","くれます","もらいます","おくります"] },
  { english: "I RECEIVE from someone", answer: "もらいます", choices: ["もらいます","くれます","あげます","おくります"] },
  { english: "take a PERSON somewhere (away from here)", answer: "つれていきます", choices: ["つれていきます","つれてきます","もっていきます","もってきます"] },
  { english: "bring a PERSON here (toward speaker)", answer: "つれてきます", choices: ["つれてきます","つれていきます","もってきます","もっていきます"] },
  { english: "take an OBJECT somewhere (away from here) — L17", answer: "もっていきます", choices: ["もっていきます","もってきます","つれていきます","つれてきます"] },
  { english: "bring an OBJECT here (toward speaker) — L17", answer: "もってきます", choices: ["もってきます","もっていきます","つれてきます","つれていきます"] },
  { english: "gift with red & white ribbon for weddings is called...", answer: "結婚祝い", choices: ["結婚祝い","お香典","お見舞い","出産祝い"] },
  { english: "gift with black & white ribbon for funerals is called...", answer: "お香典", choices: ["お香典","お見舞い","結婚祝い","お歳暮"] },
  { english: "お中元 is for summer; the December equivalent is...", answer: "お歳暮", choices: ["お歳暮","お中元","お年玉","お香典"] },
];

let playerName="";let quiz=[];let answers={};let currentQ=0;let submitted=false;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function renderChoiceText(t){return DISPLAY[t]||t;}
function plainAnswer(t){if(!t||t==="—")return"—";return READING[t]||t;}

emailjs.init("1oR0j0WDvUmSSYEpK");
const $=id=>document.getElementById(id);
const $ns=$("name-screen"),$qs=$("quiz-screen"),$ni=$("name-input"),$bs=$("btn-start");
const $st=$("quiz-subtitle"),$sb=$("score-banner"),$sn=$("score-number"),$sl=$("score-label");
const $er=$("email-row"),$br=$("btn-retake"),$pt=$("progress-text"),$pf=$("progress-fill");
const $ng=$("nav-grid"),$qn=$("q-number"),$qe=$("q-english"),$cg=$("choices-grid");
const $bp=$("btn-prev"),$bn=$("btn-next"),$bm=$("btn-submit");

$ni.addEventListener("input",()=>{$bs.disabled=!$ni.value.trim();});
$ni.addEventListener("keydown",e=>{if(e.key==="Enter"&&$ni.value.trim())go();});
$bs.addEventListener("click",go);

function go(){
  playerName=$ni.value.trim();quiz=shuffle(QUESTIONS).map(q=>({...q,choices:shuffle(q.choices)}));
  answers={};currentQ=0;submitted=false;$ns.style.display="none";$qs.style.display="block";$sb.style.display="none";
  $st.textContent=`${playerName}さん — choose the correct word`;nav();rend();prog();
}
function nav(){$ng.innerHTML="";quiz.forEach((_,i)=>{const b=document.createElement("button");b.className="nav-dot";b.textContent=i+1;b.addEventListener("click",()=>{currentQ=i;rend();});$ng.appendChild(b);});}
function uNav(){$ng.querySelectorAll(".nav-dot").forEach((d,i)=>{d.className="nav-dot";if(i===currentQ)d.classList.add("active");if(!submitted&&answers[i]!==undefined)d.classList.add("answered");if(submitted&&answers[i]===quiz[i].answer)d.classList.add("correct");if(submitted&&answers[i]!==undefined&&answers[i]!==quiz[i].answer)d.classList.add("wrong");});}
function prog(){const c=Object.keys(answers).length;$pt.textContent=`${c} / ${quiz.length} answered`;$pf.style.width=`${(c/quiz.length)*100}%`;$bm.disabled=c<quiz.length;}
function rend(){
  const q=quiz[currentQ];$qn.textContent=`Question ${currentQ+1}`;$qe.textContent=q.english;$cg.innerHTML="";
  q.choices.forEach(c=>{const b=document.createElement("button");b.className="choice-btn";if(submitted)b.classList.add("locked");b.innerHTML=`<span>${renderChoiceText(c)}</span>`;const sel=answers[currentQ]===c,cor=c===q.answer;
    if(!submitted){if(sel)b.classList.add("selected");b.addEventListener("click",()=>{if(submitted)return;answers[currentQ]=c;rend();uNav();prog();});}
    else{if(cor){b.classList.add("correct-reveal");b.innerHTML=`<span>${renderChoiceText(c)}</span><span class="mark ok">✓</span>`;}if(sel&&!cor){b.classList.add("wrong-reveal");b.innerHTML=`<span>${renderChoiceText(c)}</span><span class="mark no">✗</span>`;}}
    $cg.appendChild(b);});
  uNav();const last=currentQ===quiz.length-1;$bp.disabled=currentQ===0;
  if(last&&!submitted){$bn.classList.add("hidden");$bm.classList.remove("hidden");}else{$bn.classList.remove("hidden");$bm.classList.add("hidden");$bn.disabled=last;}
}
$bp.addEventListener("click",()=>{if(currentQ>0){currentQ--;rend();}});
$bn.addEventListener("click",()=>{if(currentQ<quiz.length-1){currentQ++;rend();}});
$bm.addEventListener("click",sub);

async function sub(){
  let s=0;quiz.forEach((q,i)=>{if(answers[i]===q.answer)s++;});submitted=true;
  const t=quiz.length,p=Math.round((s/t)*100);
  $sn.textContent=`${s}/${t}`;
  if(s===t)$sl.textContent="完璧！ Perfect!";else if(p>=90)$sl.textContent="すごい！ Excellent!";else if(p>=70)$sl.textContent="いいですね！ Good job!";else $sl.textContent="もう一度！ Try again!";
  $sb.style.background=p>=90?"linear-gradient(135deg,#2d6a4f,#40916c)":p>=70?"linear-gradient(135deg,#b08d37,#d4a843)":"linear-gradient(135deg,#9b2226,#ca6702)";
  $sb.style.display="block";currentQ=0;rend();uNav();$bm.classList.add("hidden");$bn.classList.remove("hidden");$bn.disabled=false;

  const now=new Date().toLocaleString("en-PH",{timeZone:"Asia/Manila",dateStyle:"full",timeStyle:"short"});
  const det=quiz.map((q,i)=>`${i+1}. ${q.english} → Answer: ${plainAnswer(answers[i]||"—")} | Correct: ${plainAnswer(q.answer)} ${answers[i]===q.answer?"✓":"✗"}`).join("\n");
  const ep={name:playerName,email:"noreply@quiz.com",subject:`[${playerName}] みんなの日本語 Lesson 24 Quiz — ${p}%`,message:`Minna no Nihongo - Lesson 24 Vocabulary Exam Results\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${s}/${t} (${p}%)\n\n--- Detailed Results ---\n${det}\n\nがんばって！`,time:now};
  $er.innerHTML=`<span class="email-pill">📧 Sending results…</span>`;
  try{await emailjs.send("service_v7ifzdj","template_lb9c879",ep);$er.innerHTML=`<span class="email-pill sent">✓ Results emailed!</span>`;}
  catch(err){console.error("EmailJS error:",err);$er.innerHTML=`<span class="email-pill error">✗ ${err?.text||err?.message||'Email failed'}</span>`;}
}
$br.addEventListener("click",()=>{quiz=shuffle(QUESTIONS).map(q=>({...q,choices:shuffle(q.choices)}));answers={};currentQ=0;submitted=false;$sb.style.display="none";nav();rend();prog();});
</script>
</body>
