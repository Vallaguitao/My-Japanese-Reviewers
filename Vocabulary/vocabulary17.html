<script>
/*──────────────────────────────────────────────────────────────
  DISPLAY  — maps an answer string → HTML with <ruby> tags.
  READING  — maps an answer string → plain hiragana (for emails).
  renderChoiceText() checks DISPLAY first; plainAnswer() uses READING.
──────────────────────────────────────────────────────────────*/
const DISPLAY = {
  /* Body parts (single-word kanji) */
  "胸":"<ruby>胸<rt>むね</rt></ruby>",
  "肩":"<ruby>肩<rt>かた</rt></ruby>",
  "首":"<ruby>首<rt>くび</rt></ruby>",
  "腕":"<ruby>腕<rt>うで</rt></ruby>",
  "手":"<ruby>手<rt>て</rt></ruby>",
  "指":"<ruby>指<rt>ゆび</rt></ruby>",
  "背中":"<ruby>背中<rt>せなか</rt></ruby>",
  "腰":"<ruby>腰<rt>こし</rt></ruby>",
  /* Illness nouns (kanji) */
  "盲腸":"<ruby>盲腸<rt>もうちょう</rt></ruby>",
  "骨折":"<ruby>骨折<rt>こっせつ</rt></ruby>",
  /* Symptom phrases */
  "頭が痛い":"<ruby>頭<rt>あたま</rt></ruby>が<ruby>痛<rt>いた</rt></ruby>い",
  "おなかが痛い":"おなかが<ruby>痛<rt>いた</rt></ruby>い",
  "歯が痛い":"<ruby>歯<rt>は</rt></ruby>が<ruby>痛<rt>いた</rt></ruby>い",
  "熱があります":"<ruby>熱<rt>ねつ</rt></ruby>があります",
  "せきが出ます":"せきが<ruby>出<rt>で</rt></ruby>ます",
  "鼻水が出ます":"<ruby>鼻水<rt>はなみず</rt></ruby>が<ruby>出<rt>で</rt></ruby>ます",
  "血が出ます":"<ruby>血<rt>ち</rt></ruby>が<ruby>出<rt>で</rt></ruby>ます",
  "吐き気がします":"<ruby>吐<rt>は</rt></ruby>き<ruby>気<rt>け</rt></ruby>がします",
  "寒気がします":"<ruby>寒気<rt>さむけ</rt></ruby>がします",
  "下痢をします":"<ruby>下痢<rt>げり</rt></ruby>をします",
  "便秘をします":"<ruby>便秘<rt>べんぴ</rt></ruby>をします",
  "食欲がありません":"<ruby>食欲<rt>しょくよく</rt></ruby>がありません",
  "肩がこります":"<ruby>肩<rt>かた</rt></ruby>がこります",
  "体がだるい":"<ruby>体<rt>からだ</rt></ruby>がだるい",
  /* Compound illness names */
  "ぎっくり腰":"ぎっくり<ruby>腰<rt>こし</rt></ruby>",
  "二日酔い":"<ruby>二日酔<rt>ふつかよ</rt></ruby>い"
};

const READING = {
  "胸":"むね","肩":"かた","首":"くび","腕":"うで","手":"て","指":"ゆび",
  "背中":"せなか","腰":"こし","盲腸":"もうちょう","骨折":"こっせつ",
  "頭が痛い":"あたまがいたい","おなかが痛い":"おなかがいたい","歯が痛い":"はがいたい",
  "熱があります":"ねつがあります","せきが出ます":"せきがでます",
  "鼻水が出ます":"はなみずがでます","血が出ます":"ちがでます",
  "吐き気がします":"はきけがします","寒気がします":"さむけがします",
  "下痢をします":"げりをします","便秘をします":"べんぴをします",
  "食欲がありません":"しょくよくがありません","肩がこります":"かたがこります",
  "体がだるい":"からだがだるい","ぎっくり腰":"ぎっくりごし","二日酔い":"ふつかよい"
};

const QUESTIONS = [
  /* ── Verbs: memory / loss ── */
  { english: "memorise", answer: "おぼえます", choices: ["おぼえます","わすれます","なくします","はらいます"] },
  { english: "forget", answer: "わすれます", choices: ["わすれます","おぼえます","なくします","かえします"] },
  { english: "lose (an object)", answer: "なくします", choices: ["なくします","わすれます","おぼえます","はらいます"] },

  /* ── Verbs: money / return ── */
  { english: "pay", answer: "はらいます", choices: ["はらいます","かえします","なくします","でかけます"] },
  { english: "give back, return", answer: "かえします", choices: ["かえします","はらいます","もってきます","でかけます"] },

  /* ── Verbs: going / clothing ── */
  { english: "go out", answer: "でかけます", choices: ["でかけます","かえします","もっていきます","ぬぎます"] },
  { english: "take off (clothes, shoes, etc.)", answer: "ぬぎます", choices: ["ぬぎます","でかけます","もっていきます","はいります"] },

  /* ── Verbs: carry / bring ── */
  { english: "take (something somewhere)", answer: "もっていきます", choices: ["もっていきます","もってきます","でかけます","かえします"] },
  { english: "bring (something here)", answer: "もってきます", choices: ["もってきます","もっていきます","かえします","でかけます"] },

  /* ── Verbs: work ── */
  { english: "worry", answer: "しんぱいします", choices: ["しんぱいします","ざんぎょうします","しゅっちょうします","でかけます"] },
  { english: "work overtime", answer: "ざんぎょうします", choices: ["ざんぎょうします","しゅっちょうします","しんぱいします","もっていきます"] },
  { english: "go on a business trip", answer: "しゅっちょうします", choices: ["しゅっちょうします","ざんぎょうします","しんぱいします","でかけます"] },

  /* ── Verbs: health routine ── */
  { english: "take [medicine]", answer: "のみます", choices: ["のみます","はいります","ぬぎます","おぼえます"] },
  { english: "take [a bath]", answer: "はいります", choices: ["はいります","のみます","でかけます","ぬぎます"] },

  /* ── Adjectives ── */
  { english: "important, precious", answer: "たいせつ", choices: ["たいせつ","だいじょうぶ","あぶない","かゆい"] },
  { english: "all right, safe", answer: "だいじょうぶ", choices: ["だいじょうぶ","たいせつ","あぶない","きんえん"] },
  { english: "dangerous", answer: "あぶない", choices: ["あぶない","だいじょうぶ","たいせつ","かゆい"] },

  /* ── Core nouns ── */
  { english: "no smoking", answer: "きんえん", choices: ["きんえん","ほけんしょう","ねつ","びょうき"] },
  { english: "health insurance card", answer: "ほけんしょう", choices: ["ほけんしょう","きんえん","くすり","びょうき"] },
  { english: "temperature, fever (noun)", answer: "ねつ", choices: ["ねつ","びょうき","くすり","おふろ"] },
  { english: "illness, disease (noun)", answer: "びょうき", choices: ["びょうき","ねつ","くすり","きんえん"] },
  { english: "medicine (noun)", answer: "くすり", choices: ["くすり","ねつ","びょうき","ほけんしょう"] },
  { english: "bath (noun)", answer: "おふろ", choices: ["おふろ","くすり","うわぎ","したぎ"] },
  { english: "jacket, outerwear", answer: "うわぎ", choices: ["うわぎ","したぎ","おふろ","くすり"] },
  { english: "underwear", answer: "したぎ", choices: ["したぎ","うわぎ","おふろ","ほけんしょう"] },

  /* ── Time / grammar ── */
  { english: "before ~, by ~ (indicating time limit)", answer: "～までに", choices: ["～までに","ですから","それから","おだいじに"] },
  { english: "therefore, so", answer: "ですから", choices: ["ですから","～までに","それから","どうしましたか"] },

  /* ── 会話 phrases ── */
  { english: "What's the matter?", answer: "どうしましたか", choices: ["どうしましたか","おだいじに","それから","ですから"] },
  { english: "and, furthermore", answer: "それから", choices: ["それから","ですから","～までに","おだいじに"] },
  { english: "Take care of yourself (said to ill people)", answer: "おだいじに", choices: ["おだいじに","どうしましたか","それから","ですから"] },
  { english: "cold, flu (common illness)", answer: "かぜ", choices: ["かぜ","インフルエンザ","ねんざ","ねつ"] },

  /* ── Body parts: throat & face area ── */
  { english: "throat", answer: "のど", choices: ["のど","あご","首","胸"] },
  { english: "chin, jaw", answer: "あご", choices: ["あご","のど","首","肩"] },

  /* ── Body parts: torso (kanji + furigana) ── */
  { english: "chest", answer: "胸", choices: ["胸","肩","背中","腰"] },
  { english: "shoulder", answer: "肩", choices: ["肩","首","胸","背中"] },
  { english: "neck", answer: "首", choices: ["首","肩","のど","あご"] },
  { english: "back (of the body)", answer: "背中", choices: ["背中","腰","肩","胸"] },
  { english: "lower back, hip area", answer: "腰", choices: ["腰","背中","しり","ひざ"] },

  /* ── Body parts: arms & hands ── */
  { english: "arm", answer: "腕", choices: ["腕","手","指","肩"] },
  { english: "hand", answer: "手", choices: ["手","腕","指","つめ"] },
  { english: "finger", answer: "指", choices: ["指","手","つめ","腕"] },
  { english: "nail (fingernail / toenail)", answer: "つめ", choices: ["つめ","指","手","ひざ"] },

  /* ── Body parts: legs & lower ── */
  { english: "knee", answer: "ひざ", choices: ["ひざ","腰","しり","背中"] },
  { english: "buttocks", answer: "しり", choices: ["しり","腰","ひざ","背中"] },

  /* ── Symptoms: ～が痛い (pain) pattern ── */

  { english: "have a stomachache", answer: "おなかが痛い", choices: ["おなかが痛い","頭が痛い","歯が痛い","肩がこります"] },

let playerName = "";
let quiz = [];
let answers = {};
let currentQ = 0;
let submitted = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderChoiceText(text) {
  if (DISPLAY[text]) return DISPLAY[text];
  return text;
}

function plainAnswer(text) {
  if (!text || text === "—") return "—";
  const r = READING[text];
  return r ? `${text}（${r}）` : text;
}

emailjs.init("1oR0j0WDvUmSSYEpK");

const $ = id => document.getElementById(id);
const $nameScreen = $("name-screen"), $quizScreen = $("quiz-screen");
const $nameInput = $("name-input"), $btnStart = $("btn-start");
const $subtitle = $("quiz-subtitle"), $scoreBanner = $("score-banner");
const $scoreNum = $("score-number"), $scoreLbl = $("score-label");
const $emailRow = $("email-row"), $btnRetake = $("btn-retake");
const $progText = $("progress-text"), $progFill = $("progress-fill");
const $navGrid = $("nav-grid"), $qNumber = $("q-number");
const $qEnglish = $("q-english"), $choicesGrid = $("choices-grid");
const $btnPrev = $("btn-prev"), $btnNext = $("btn-next"), $btnSubmit = $("btn-submit");

$nameInput.addEventListener("input", () => { $btnStart.disabled = !$nameInput.value.trim(); });
$nameInput.addEventListener("keydown", e => { if (e.key === "Enter" && $nameInput.value.trim()) startQuiz(); });
$btnStart.addEventListener("click", startQuiz);

function startQuiz() {
  playerName = $nameInput.value.trim();
  quiz = shuffle(QUESTIONS).map(q => ({ ...q, choices: shuffle(q.choices) }));
  answers = {}; currentQ = 0; submitted = false;
  $nameScreen.style.display = "none";
  $quizScreen.style.display = "block";
  $scoreBanner.style.display = "none";
  $subtitle.textContent = `${playerName}さん — choose the correct word or phrase`;
  buildNavGrid(); renderQuestion(); updateProgress();
}

function buildNavGrid() {
  $navGrid.innerHTML = "";
  quiz.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot"; btn.textContent = i + 1;
    btn.addEventListener("click", () => { currentQ = i; renderQuestion(); });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    if (i === currentQ) dot.classList.add("active");
    if (!submitted && answers[i] !== undefined) dot.classList.add("answered");
    if (submitted && answers[i] === quiz[i].answer) dot.classList.add("correct");
    if (submitted && answers[i] !== undefined && answers[i] !== quiz[i].answer) dot.classList.add("wrong");
  });
}

function updateProgress() {
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${quiz.length} answered`;
  $progFill.style.width = `${(count / quiz.length) * 100}%`;
  $btnSubmit.disabled = count < quiz.length;
}

function renderQuestion() {
  const q = quiz[currentQ];
  $qNumber.textContent = `Question ${currentQ + 1}`;
  $qEnglish.textContent = q.english;
  $choicesGrid.innerHTML = "";
  q.choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (submitted) btn.classList.add("locked");
    btn.innerHTML = `<span>${renderChoiceText(c)}</span>`;
    const selected = answers[currentQ] === c;
    const isCorrectChoice = c === q.answer;
    if (!submitted) {
      if (selected) btn.classList.add("selected");
      btn.addEventListener("click", () => { if (submitted) return; answers[currentQ] = c; renderQuestion(); updateNavGrid(); updateProgress(); });
    } else {
      if (isCorrectChoice) { btn.classList.add("correct-reveal"); btn.innerHTML = `<span>${renderChoiceText(c)}</span><span class="mark ok">✓</span>`; }
      if (selected && !isCorrectChoice) { btn.classList.add("wrong-reveal"); btn.innerHTML = `<span>${renderChoiceText(c)}</span><span class="mark no">✗</span>`; }
    }
    $choicesGrid.appendChild(btn);
  });
  updateNavGrid();
  const isLast = currentQ === quiz.length - 1;
  $btnPrev.disabled = currentQ === 0;
  if (isLast && !submitted) { $btnNext.classList.add("hidden"); $btnSubmit.classList.remove("hidden"); }
  else { $btnNext.classList.remove("hidden"); $btnSubmit.classList.add("hidden"); $btnNext.disabled = isLast; }
}

$btnPrev.addEventListener("click", () => { if (currentQ > 0) { currentQ--; renderQuestion(); } });
$btnNext.addEventListener("click", () => { if (currentQ < quiz.length - 1) { currentQ++; renderQuestion(); } });
$btnSubmit.addEventListener("click", submitQuiz);

async function submitQuiz() {
  let s = 0;
  quiz.forEach((q, i) => { if (answers[i] === q.answer) s++; });
  submitted = true;
  const total = quiz.length;
  const pct = Math.round((s / total) * 100);
  $scoreNum.textContent = `${s}/${total}`;
  if (s === total) $scoreLbl.textContent = "完璧！ Perfect!";
  else if (pct >= 90) $scoreLbl.textContent = "すごい！ Excellent!";
  else if (pct >= 70) $scoreLbl.textContent = "いいですね！ Good job!";
  else $scoreLbl.textContent = "もう一度！ Try again!";
  const gradient = pct >= 90 ? "linear-gradient(135deg,#2d6a4f,#40916c)" : pct >= 70 ? "linear-gradient(135deg,#b08d37,#d4a843)" : "linear-gradient(135deg,#9b2226,#ca6702)";
  $scoreBanner.style.background = gradient;
  $scoreBanner.style.display = "block";
  currentQ = 0; renderQuestion(); updateNavGrid();
  $btnSubmit.classList.add("hidden"); $btnNext.classList.remove("hidden"); $btnNext.disabled = false;

  const EMAILJS_SERVICE_ID  = "service_v7ifzdj";
  const EMAILJS_TEMPLATE_ID = "template_lb9c879";
  const now = new Date().toLocaleString("en-PH", { timeZone: "Asia/Manila", dateStyle: "full", timeStyle: "short" });
  const details = quiz.map((q, i) => `${i+1}. ${q.english} → Answer: ${plainAnswer(answers[i] || "—")} | Correct: ${plainAnswer(q.answer)} ${answers[i] === q.answer ? "✓" : "✗"}`).join("\n");
  const emailParams = {
    name: playerName, email: "noreply@quiz.com",
    subject: `[${playerName}] みんなの日本語 Lesson 17 Quiz — ${pct}%`,
    message: `Minna no Nihongo - Lesson 17 Vocabulary Exam Results\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${s}/${total} (${pct}%)\n\n--- Detailed Results ---\n${details}\n\nがんばって！`,
    time: now
  };
  $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
    $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
  } catch (err) {
    console.error("EmailJS error:", err);
    $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || 'Email failed'}</span>`;
  }
}

$btnRetake.addEventListener("click", () => {
  quiz = shuffle(QUESTIONS).map(q => ({ ...q, choices: shuffle(q.choices) }));
  answers = {}; currentQ = 0; submitted = false;
  $scoreBanner.style.display = "none";
  buildNavGrid(); renderQuestion(); updateProgress();
});
</script>

</html>
