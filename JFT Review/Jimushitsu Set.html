<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JFT Mock Exam 1 — Complete</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;900&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sakura-50:  #fff5f7;
    --sakura-100: #ffe4ec;
    --sakura-200: #ffc9d9;
    --sakura-300: #ffa8c0;
    --sakura-400: #ff7ea3;
    --sakura-500: #f25a82;
    --sakura-600: #d63f6a;
    --ink:        #2b1a22;
    --ink-soft:   #6b4a58;
    --paper:      #fffaf9;
    --gold:       #c9a34a;
    --green:      #3ea67a;
    --green-bg:   #e6f7ee;
    --red:        #d64545;
    --red-bg:     #fdeaea;
    --shadow:     0 10px 40px -12px rgba(214, 63, 106, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at top left, #ffe4ec 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, #ffd6e4 0%, transparent 50%),
      linear-gradient(180deg, #fff5f7 0%, #ffeaf1 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .petal {
    position: fixed; top: -20px; font-size: 18px;
    pointer-events: none; animation: fall linear infinite;
    z-index: 0; opacity: 0.6;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
  .wrap { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 28px 18px 80px; }

  /* HERO */
  header.hero { text-align: center; margin-bottom: 22px; padding: 22px 16px 18px; }
  header.hero::before {
    content: '❀'; display: block; font-size: 26px;
    color: var(--sakura-400); margin-bottom: 6px;
  }
  header.hero .kicker {
    font-family: 'Noto Serif JP', serif;
    font-size: 12px; letter-spacing: 0.35em;
    color: var(--sakura-600); text-transform: uppercase; margin-bottom: 8px;
  }
  header.hero h1 {
    font-family: 'Noto Serif JP', serif; font-weight: 900;
    font-size: clamp(24px, 5.5vw, 36px); line-height: 1.2; color: var(--ink);
  }
  header.hero h1 .jp {
    display: block; font-size: 0.55em; color: var(--sakura-600);
    font-weight: 600; letter-spacing: 0.08em; margin-top: 6px;
  }
  header.hero p.sub { font-size: 13px; color: var(--ink-soft); margin-top: 8px; }

  /* TABS */
  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 22px;
    background: var(--paper);
    padding: 10px;
    border-radius: 18px;
    box-shadow: var(--shadow);
    border: 1px solid var(--sakura-100);
  }
  .tab {
    background: transparent;
    border: 2px solid transparent;
    padding: 12px 6px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
    transition: all 0.2s ease;
    line-height: 1.3;
    position: relative;
  }
  .tab .tab-num {
    display: block;
    font-family: 'Noto Serif JP', serif;
    font-size: 11px;
    color: var(--sakura-400);
    letter-spacing: 0.15em;
    margin-bottom: 2px;
  }
  .tab .tab-name {
    display: block;
    font-size: 13px;
  }
  .tab .tab-status {
    display: block;
    font-size: 10px;
    margin-top: 3px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .tab:hover:not(.active) {
    background: var(--sakura-50);
    color: var(--ink);
  }
  .tab.active {
    background: linear-gradient(135deg, var(--sakura-100), var(--sakura-50));
    border-color: var(--sakura-300);
    color: var(--sakura-600);
    box-shadow: 0 4px 12px -4px var(--sakura-300);
  }
  .tab.active .tab-num { color: var(--sakura-600); }
  .tab.completed::after {
    content: '✓';
    position: absolute;
    top: 4px;
    right: 6px;
    background: var(--green);
    color: white;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .tab.in-progress::after {
    content: '•';
    position: absolute;
    top: 0;
    right: 6px;
    color: var(--sakura-500);
    font-size: 22px;
  }

  /* SET CONTAINER */
  .set { display: none; }
  .set.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .topbar {
    background: var(--paper);
    border-radius: 16px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
    border: 1px solid var(--sakura-100);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
  }
  .topbar .meta {
    display: flex; align-items: center; gap: 14px;
    font-size: 13px; color: var(--ink-soft); font-weight: 500;
  }
  .topbar .meta strong { color: var(--ink); font-weight: 700; }
  .topbar .timer {
    font-family: 'Noto Serif JP', serif; font-size: 16px;
    color: var(--sakura-600); font-weight: 600;
  }
  .progress {
    flex: 1 1 100%; height: 6px;
    background: var(--sakura-100); border-radius: 99px; overflow: hidden;
  }
  .progress > div {
    height: 100%;
    background: linear-gradient(90deg, var(--sakura-400), var(--sakura-600));
    width: 0%; transition: width 0.4s ease;
  }

  /* CARDS */
  .start-card, .result-card {
    background: var(--paper);
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--sakura-100);
    text-align: center;
  }
  .start-card h2, .result-card h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .start-card .set-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--sakura-600);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .start-card p, .result-card p {
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 8px;
  }
  .start-card ul {
    text-align: left;
    max-width: 360px;
    margin: 16px auto 22px;
    font-size: 13px;
    color: var(--ink-soft);
    list-style: none;
  }
  .start-card ul li { padding: 5px 0 5px 22px; position: relative; }
  .start-card ul li::before {
    content: '✿'; position: absolute; left: 0; color: var(--sakura-400);
  }

  button.primary {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700; font-size: 15px;
    background: linear-gradient(135deg, var(--sakura-500), var(--sakura-600));
    color: white; border: none;
    padding: 14px 36px; border-radius: 99px;
    cursor: pointer;
    box-shadow: 0 6px 20px -6px var(--sakura-500);
    transition: transform 0.15s ease;
    letter-spacing: 0.05em;
  }
  button.primary:hover { transform: translateY(-2px); }

  /* QUESTION CARD */
  .question-card {
    background: var(--paper);
    border-radius: 24px;
    padding: 26px 22px 22px;
    box-shadow: var(--shadow);
    border: 1px solid var(--sakura-100);
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-num {
    display: inline-block;
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--sakura-600);
    background: var(--sakura-100);
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 14px;
    font-weight: 600;
  }
  .q-type { font-size: 11px; color: var(--ink-soft); margin-left: 8px; letter-spacing: 0.1em; }

  .q-visual {
    font-size: 64px; text-align: center;
    padding: 14px 0 6px; line-height: 1;
    filter: drop-shadow(0 4px 10px rgba(214, 63, 106, 0.15));
  }
  .q-visual img {
    max-width: 100%;
    max-height: 240px;
    width: auto; height: auto;
    border-radius: 18px;
    border: 3px solid var(--sakura-100);
    box-shadow: 0 12px 32px -10px rgba(214, 63, 106, 0.35);
    display: inline-block;
  }
  @media (max-width: 480px) {
    .q-visual img { max-height: 190px; border-radius: 14px; }
  }

  .q-prompt {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    line-height: 1.7;
    color: var(--ink);
    margin: 12px 0 20px;
    text-align: center;
    font-weight: 500;
  }
  .q-prompt .blank {
    display: inline-block;
    min-width: 70px;
    border-bottom: 2px solid var(--sakura-400);
    margin: 0 4px;
  }
  .q-prompt .highlight {
    color: var(--sakura-600);
    font-weight: 700;
    border-bottom: 2px dashed var(--sakura-300);
    padding-bottom: 1px;
  }

  /* DIALOGUE BOX (Set 3) */
  .dialogue {
    background: linear-gradient(135deg, #fff9fb, #fff5f7);
    border-left: 3px solid var(--sakura-400);
    border-radius: 10px;
    padding: 14px 16px;
    margin: 10px 0 14px;
    text-align: left;
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink);
  }
  .dialogue .line { margin: 2px 0; }
  .dialogue .speaker {
    display: inline-block;
    min-width: 42px;
    font-weight: 700;
    color: var(--sakura-600);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
  }

  /* PASSAGE BOX (Set 4) */
  .passage {
    background: linear-gradient(135deg, #fff9fb, #fff5f7);
    border: 2px solid var(--sakura-200);
    border-radius: 14px;
    padding: 18px 20px;
    margin: 10px 0 14px;
    text-align: left;
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    line-height: 1.9;
    color: var(--ink);
    box-shadow: inset 0 0 0 1px rgba(255, 168, 192, 0.15);
  }
  .passage .p-title {
    font-weight: 700;
    color: var(--sakura-600);
    text-align: center;
    border-bottom: 1px dashed var(--sakura-300);
    padding-bottom: 8px;
    margin-bottom: 12px;
    font-size: 13px;
    letter-spacing: 0.08em;
    font-family: 'Zen Maru Gothic', sans-serif;
  }
  .passage .p-title::before { content: '❀ '; color: var(--sakura-400); }
  .passage .p-title::after  { content: ' ❀'; color: var(--sakura-400); }
  .passage .row {
    display: flex; gap: 12px; padding: 3px 0; align-items: baseline;
  }
  .passage .row .label {
    min-width: 90px;
    font-weight: 700;
    color: var(--sakura-600);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
  }
  .passage .row .value { flex: 1; }

  .q-ask {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    margin: 14px 0 18px;
    text-align: center;
    padding-top: 12px;
    border-top: 1px dashed var(--sakura-200);
  }

  /* CHOICES */
  .choices { display: grid; gap: 10px; }
  .choice {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 16px;
    background: white;
    border: 2px solid var(--sakura-100);
    padding: 14px 18px;
    border-radius: 14px;
    text-align: left;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
  }
  .choice:hover:not(:disabled) {
    border-color: var(--sakura-400);
    background: var(--sakura-50);
    transform: translateX(2px);
  }
  .choice .letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--sakura-100);
    color: var(--sakura-600);
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }
  .choice:disabled { cursor: default; }
  .choice.correct {
    background: var(--green-bg);
    border-color: var(--green);
    color: var(--green);
  }
  .choice.correct .letter { background: var(--green); color: white; }
  .choice.wrong {
    background: var(--red-bg);
    border-color: var(--red);
    color: var(--red);
  }
  .choice.wrong .letter { background: var(--red); color: white; }
  .choice.dimmed { opacity: 0.5; }

  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; animation: slideUp 0.3s ease; }
  .feedback.ok {
    background: var(--green-bg);
    color: #226b4e;
    border-left: 3px solid var(--green);
  }
  .feedback.ng {
    background: var(--red-bg);
    color: #8b2727;
    border-left: 3px solid var(--red);
  }
  .feedback strong { font-weight: 700; }

  .next-btn {
    margin-top: 16px;
    width: 100%;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 15px;
    background: var(--ink);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { background: var(--sakura-600); }

  /* RESULTS */
  .score-ring {
    width: 150px;
    height: 150px;
    margin: 8px auto 18px;
    position: relative;
  }
  .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .score-ring circle { fill: none; stroke-width: 10; }
  .score-ring .bg { stroke: var(--sakura-100); }
  .score-ring .fg {
    stroke-linecap: round;
    transition: stroke-dashoffset 1.2s ease;
  }
  .score-ring .label {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-ring .label .num {
    font-family: 'Noto Serif JP', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--ink);
    line-height: 1;
  }
  .score-ring .label .out {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
    letter-spacing: 0.1em;
  }
  .verdict {
    font-family: 'Noto Serif JP', serif;
    font-size: 19px;
    color: var(--sakura-600);
    margin: 6px 0 4px;
    font-weight: 700;
  }

  .review-list { text-align: left; margin-top: 22px; display: grid; gap: 10px; }
  .review-item {
    background: white;
    border: 1px solid var(--sakura-100);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .review-item.ng { border-left: 3px solid var(--red); }
  .review-item.ok { border-left: 3px solid var(--green); }
  .review-item .q { color: var(--ink); font-weight: 600; margin-bottom: 4px; }
  .review-item .a { color: var(--ink-soft); font-size: 12px; }
  .review-item .a .mark-ok { color: var(--green); font-weight: 700; }
  .review-item .a .mark-ng { color: var(--red); text-decoration: line-through; }

  .result-actions {
    display: flex; gap: 10px;
    justify-content: center; margin-top: 22px; flex-wrap: wrap;
  }
  .result-actions button {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700; font-size: 14px;
    padding: 12px 24px; border-radius: 99px;
    border: none; cursor: pointer;
  }
  .result-actions .retry {
    background: linear-gradient(135deg, var(--sakura-500), var(--sakura-600));
    color: white;
  }
  .result-actions .next-set {
    background: white;
    color: var(--sakura-600);
    border: 2px solid var(--sakura-300);
  }

  /* OVERALL FOOTER */
  .grand-total {
    margin-top: 24px;
    padding: 16px;
    background: var(--paper);
    border-radius: 16px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--sakura-100);
    font-size: 13px;
    color: var(--ink-soft);
  }
  .grand-total strong {
    color: var(--sakura-600);
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
  }

  footer {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
  }
  footer .mark { color: var(--sakura-400); }

  @media (max-width: 480px) {
    .wrap { padding: 18px 12px 60px; }
    .question-card, .start-card, .result-card { padding: 22px 16px; }
    .q-prompt { font-size: 16px; }
    .choice { font-size: 15px; padding: 12px 14px; }
    .tab .tab-name { font-size: 11px; }
    .tab .tab-num { font-size: 9px; }
    .tabs { padding: 6px; gap: 4px; }
    .tab { padding: 10px 4px; }
  }

  .passage-image {
    background: linear-gradient(135deg, #fff9fb, #fff5f7);
    border: 2px solid var(--sakura-200);
    border-radius: 14px;
    padding: 14px;
    margin: 10px 0 14px;
    text-align: center;
    box-shadow: inset 0 0 0 1px rgba(255, 168, 192, 0.15);
  }
  .passage-image img {
    max-width: 100%;
    max-height: 360px;
    height: auto;
    border-radius: 10px;
    display: inline-block;
  }
</style>
</head>
<body>

<div class="petal" style="left:8%;  animation-duration:14s; animation-delay:0s;">🌸</div>
<div class="petal" style="left:22%; animation-duration:18s; animation-delay:3s;">❀</div>
<div class="petal" style="left:42%; animation-duration:16s; animation-delay:6s;">🌸</div>
<div class="petal" style="left:66%; animation-duration:20s; animation-delay:2s;">❀</div>
<div class="petal" style="left:82%; animation-duration:15s; animation-delay:8s;">🌸</div>
<div class="petal" style="left:92%; animation-duration:17s; animation-delay:4s;">❀</div>

<div class="wrap">

  <header class="hero">
    <div class="kicker">JFT-Basic ・ A2 / N4</div>
    <h1>Mock Exam 1
      <span class="jp">そうごうもしけん ・ Complete Practice Test</span>
    </h1>
    <p class="sub">4 sets ・ 52 questions total ・ tap any tab to begin</p>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab active" data-set="1" onclick="switchSet(1)">
      <span class="tab-num">SET 1</span>
      <span class="tab-name">語彙</span>
      <span class="tab-status" id="status-1">12 Q</span>
    </button>
    <button class="tab" data-set="2" onclick="switchSet(2)">
      <span class="tab-num">SET 2</span>
      <span class="tab-name">表現</span>
      <span class="tab-status" id="status-2">13 Q</span>
    </button>
    <button class="tab" data-set="3" onclick="switchSet(3)">
      <span class="tab-num">SET 3</span>
      <span class="tab-name">聴解</span>
      <span class="tab-status" id="status-3">15 Q</span>
    </button>
    <button class="tab" data-set="4" onclick="switchSet(4)">
      <span class="tab-num">SET 4</span>
      <span class="tab-name">読解</span>
      <span class="tab-status" id="status-4">12 Q</span>
    </button>
  </nav>

  <!-- SET CONTAINERS -->
  <div class="set active" id="set-1"></div>
  <div class="set" id="set-2"></div>
  <div class="set" id="set-3"></div>
  <div class="set" id="set-4"></div>

  <div class="grand-total" id="grand-total">
    Sets completed: <strong id="sets-done">0</strong> / 4
    ・ Total score: <strong id="total-score">0</strong> / 52
  </div>

  <footer>
    <span class="mark">❀</span> My Japanese Reviewers ・ JFT Mock Series 1 <span class="mark">❀</span>
  </footer>
</div>

<script>
/* ============================================================
   QUESTION DATA — 4 SETS
   ============================================================ */

const setData = {
  "1": {
    "name": "Vocabulary & Script",
    "nameJp": "語彙・文字 ・ Vocabulary & Script",
    "intro": "Choose the correct word for each picture or sentence. Tests image recognition, fill-in vocabulary, and kanji readings.",
    "questions": [

/* ============================================================
   STATE & CONTROL
   ============================================================ */

const typeLabel = {
  image:       "IMAGE",
  fill:        "FILL-IN",
  script:      "SCRIPT READING",
  dialog:      "DIALOGUE",
  longdialog:  "長い会話 ・ LONG DIALOGUE",
  expression:  "EXPRESSION",
  listen:      "会話 ・ CONVERSATION",
  except:      "会話 ・ EXCEPT QUESTION",
  reading:     "読解 ・ READING"
};

const state = {
  active: 1,
  sets: {}
};

for (let i = 1; i <= 4; i++) {
  state.sets[i] = {
    phase: 'start',  // 'start' | 'question' | 'result'
    current: 0,
    score: 0,
    results: [],
    startTime: null,
    accumulated: 0,
    timerId: null
  };
}

function switchSet(n) {
  // pause active timer
  pauseTimer(state.active);
  state.active = n;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', +t.dataset.set === n));
  document.querySelectorAll('.set').forEach(s => s.classList.toggle('active', s.id === 'set-' + n));
  renderSet(n);
  // resume timer if mid-question
  if (state.sets[n].phase === 'question') resumeTimer(n);
}

function pauseTimer(n) {
  const s = state.sets[n];
  if (s.timerId) {
    clearInterval(s.timerId);
    s.timerId = null;
    if (s.startTime) {
      s.accumulated += Date.now() - s.startTime;
      s.startTime = null;
    }
  }
}

function resumeTimer(n) {
  const s = state.sets[n];
  s.startTime = Date.now();
  tickTimer(n);
  s.timerId = setInterval(() => tickTimer(n), 1000);
}

function tickTimer(n) {
  const s = state.sets[n];
  const elapsed = Math.floor((s.accumulated + (s.startTime ? Date.now() - s.startTime : 0)) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const ss = String(elapsed % 60).padStart(2, '0');
  const el = document.getElementById('timer-' + n);
  if (el) el.textContent = `${m}:${ss}`;
}

/* ============================================================
   RENDERING
   ============================================================ */

function renderSet(n) {
  const s = state.sets[n];
  const data = setData[n];
  if (s.phase === 'start') renderStart(n);
  else if (s.phase === 'question') renderQuestion(n);
  else if (s.phase === 'result') renderResult(n);
}

function renderStart(n) {
  const data = setData[n];
  const container = document.getElementById('set-' + n);
  container.innerHTML = `
    <div class="start-card">
      <div class="set-label">SET ${n} ・ ${data.questions.length} QUESTIONS</div>
      <h2>${data.nameJp}</h2>
      <p>${data.intro}</p>
      <ul>
        <li>Tap an answer to submit — you can't change it.</li>
        <li>Correct answers glow <strong style="color:var(--green)">green</strong>, wrong ones turn <strong style="color:var(--red)">red</strong>.</li>
        <li>You can switch tabs anytime — your progress is saved.</li>
      </ul>
      <button class="primary" onclick="startSet(${n})">スタート ・ Begin Set ${n}</button>
    </div>
  `;
}

function startSet(n) {
  const s = state.sets[n];
  s.phase = 'question';
  s.current = 0;
  s.score = 0;
  s.results = [];
  s.accumulated = 0;
  s.startTime = null;
  resumeTimer(n);
  updateTabStatus(n);
  renderQuestion(n);
}

function updateTabStatus(n) {
  const tab = document.querySelector(`.tab[data-set="${n}"]`);
  const status = document.getElementById('status-' + n);
  const s = state.sets[n];
  const total = setData[n].questions.length;
  tab.classList.remove('completed', 'in-progress');
  if (s.phase === 'result') {
    tab.classList.add('completed');
    status.textContent = `${s.score}/${total}`;
  } else if (s.phase === 'question') {
    tab.classList.add('in-progress');
    status.textContent = `${s.current + 1}/${total}`;
  } else {
    status.textContent = `${total} Q`;
  }
  // update grand total
  let done = 0, totalScore = 0;
  for (let i = 1; i <= 4; i++) {
    if (state.sets[i].phase === 'result') {
      done++;
      totalScore += state.sets[i].score;
    }
  }
  document.getElementById('sets-done').textContent = done;
  document.getElementById('total-score').textContent = totalScore;
}

function renderQuestion(n) {
  const s = state.sets[n];
  const data = setData[n];
  const q = data.questions[s.current];
  const total = data.questions.length;
  const letters = ['A', 'B', 'C', 'D'];

  const container = document.getElementById('set-' + n);

  // Build prompt — Set 4 uses passage + q
  let promptHtml;
  if (q.passage) {
    promptHtml = `${q.passage}<div class="q-ask">${q.q}</div>`;
  } else {
    promptHtml = `<div class="q-prompt">${q.prompt}</div>`;
  }

  container.innerHTML = `
    <div class="topbar">
      <div class="meta">
        <span>Q <strong>${q.num}</strong> ・ ${s.current + 1}/${total}</span>
        <span>Score <strong>${s.score}</strong></span>
      </div>
      <div class="timer" id="timer-${n}">00:00</div>
      <div class="progress"><div style="width:${(s.current / total * 100)}%"></div></div>
    </div>
    <div class="question-card">
      <span class="q-num">Q ${q.num} <span class="q-type">・ ${typeLabel[q.type] || q.type}</span></span>
      <div class="q-visual">${q.visual}</div>
      ${promptHtml}
      <div class="choices">
        ${q.choices.map((c, i) => `
          <button class="choice" data-i="${i}" onclick="choose(${n}, ${i})">
            <span class="letter">${letters[i]}</span>
            <span>${c}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback-${n}"></div>
      <button class="next-btn" id="next-btn-${n}" onclick="nextQuestion(${n})">
        ${s.current + 1 === total ? '結果を見る ・ See Results →' : 'つぎへ ・ Next →'}
      </button>
    </div>
  `;
  tickTimer(n);
  updateTabStatus(n);
}

function choose(n, chosenIdx) {
  const s = state.sets[n];
  const q = setData[n].questions[s.current];
  const correctIdx = q.answer;
  const buttons = document.querySelectorAll('#set-' + n + ' .choice');

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct');
    else if (i === chosenIdx) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });

  const isCorrect = chosenIdx === correctIdx;
  if (isCorrect) s.score++;
  s.results.push({ qIndex: s.current, chosen: chosenIdx, correct: isCorrect });

  const fb = document.getElementById('feedback-' + n);
  fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'ng');
  fb.innerHTML = isCorrect
    ? `<strong>せいかい！ Correct.</strong> ${q.note}`
    : `<strong>ざんねん。 Correct answer: ${q.choices[correctIdx]}.</strong><br>${q.note}`;

  document.getElementById('next-btn-' + n).classList.add('show');
  updateTabStatus(n);
}

function nextQuestion(n) {
  const s = state.sets[n];
  s.current++;
  if (s.current >= setData[n].questions.length) {
    finishSet(n);
  } else {
    renderQuestion(n);
  }
}

function finishSet(n) {
  pauseTimer(n);
  const s = state.sets[n];
  s.phase = 'result';
  renderResult(n);
  updateTabStatus(n);
}

function renderResult(n) {
  const s = state.sets[n];
  const data = setData[n];
  const total = data.questions.length;
  const pct = Math.round(s.score / total * 100);
  const elapsed = Math.floor(s.accumulated / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const ss = String(elapsed % 60).padStart(2, '0');
  const circumference = 2 * Math.PI * 65;
  const offset = circumference - (pct / 100) * circumference;

  let verdict = '';
  if (pct === 100)      verdict = 'かんぺき！ Perfect!';
  else if (pct >= 85)   verdict = 'すばらしい！ Excellent!';
  else if (pct >= 70)   verdict = 'よくできました ・ Well done';
  else if (pct >= 50)   verdict = 'もうすこし ・ Keep going';
  else                  verdict = 'がんばって ・ Keep studying';

  const reviewHtml = s.results.map(r => {
    const q = data.questions[r.qIndex];
    return `
      <div class="review-item ${r.correct ? 'ok' : 'ng'}">
        <div class="q">Q${q.num}. ${stripHtml(q.prompt || q.q)}</div>
        <div class="a">
          ${r.correct
            ? `<span class="mark-ok">✓</span> ${q.choices[q.answer]}`
            : `<span class="mark-ng">✗ ${q.choices[r.chosen]}</span> → <span class="mark-ok">✓ ${q.choices[q.answer]}</span>`}
        </div>
      </div>
    `;
  }).join('');

  const nextBtn = n < 4
    ? `<button class="next-set" onclick="switchSet(${n + 1})">つぎのセット ・ Next Set →</button>`
    : `<button class="next-set" onclick="switchSet(1)">セット 1 へ ・ Back to Set 1</button>`;

  const container = document.getElementById('set-' + n);
  container.innerHTML = `
    <div class="result-card">
      <div class="set-label">SET ${n} ・ ${data.name.toUpperCase()}</div>
      <h2>けっか ・ Your Result</h2>
      <div class="score-ring">
        <svg viewBox="0 0 150 150">
          <defs>
            <linearGradient id="grad-${n}" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff7ea3"/>
              <stop offset="100%" stop-color="#d63f6a"/>
            </linearGradient>
          </defs>
          <circle class="bg" cx="75" cy="75" r="65"/>
          <circle class="fg" cx="75" cy="75" r="65"
            stroke="url(#grad-${n})"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference}"
            id="ring-fg-${n}"/>
        </svg>
        <div class="label">
          <div class="num">${s.score}<span style="font-size:18px;color:var(--ink-soft);">/${total}</span></div>
          <div class="out">${pct}% ・ ${m}:${ss}</div>
        </div>
      </div>
      <div class="verdict">${verdict}</div>
      <p>Review your answers below.</p>
      <div class="review-list">${reviewHtml}</div>
      <div class="result-actions">
        <button class="retry" onclick="startSet(${n})">もういちど ・ Retry</button>
        ${nextBtn}
      </div>
    </div>
  `;
  requestAnimationFrame(() => {
    const r = document.getElementById('ring-fg-' + n);
    if (r) r.style.strokeDashoffset = offset;
  });
}

function stripHtml(str) {
  const tmp = document.createElement('div');
  tmp.innerHTML = str;
  return (tmp.textContent || tmp.innerText || '').slice(0, 80);
}

// Initialize
renderSet(1);
</script>
</body>
</html>
