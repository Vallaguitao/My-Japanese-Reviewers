const QUESTIONS = [
  {
    "question": "The \"A I U E O\" conjugation is technically called _____ conjugation.",
    "options": [
      {
        "id": "a",
        "text": "Godan (<ruby>五<rt>ご</rt>段<rt>だん</rt></ruby>)"
      },
      {
        "id": "b",
        "text": "Ichidan (<ruby>一<rt>いち</rt>段<rt>だん</rt></ruby>)"
      },
      {
        "id": "c",
        "text": "Te-kei (て<ruby>形<rt>けい</rt></ruby>)"
      },
      {
        "id": "d",
        "text": "Ta-kei (た<ruby>形<rt>けい</rt></ruby>)"
      }

  },
  {
    "question": "What is the Dictionary form of <ruby>急<rt>いそ</rt></ruby>ぎます?",
    "options": [
      {
        "id": "a",
        "text": "<ruby>急<rt>いそ</rt></ruby>く"

        "text": "<ruby>急<rt>いそ</rt></ruby>ぐ"

    ],
    "correct": "b",
    "explanation": "The correct choice is <strong>「急(いそ)ぐ」</strong>. いそぎます is a Group 1 verb. Change the 'gi' sound before ます to the 'gu' sound in the dictionary form: いそぎ ➔ <strong>いそぐ</strong>.<br><br><strong>Why other choices are incorrect:</strong><br>• <code>急(いそ)く</code> is incorrect because it is unvoiced (should be ぐ).<br>• <code>急(いそ)む</code> is incorrect because it uses a completely different ending syllable.<br>• <code>急(いそ)る</code> is incorrect because it uses a completely different ending syllable."
  },
  {
    "question": "What is the Dictionary form of <ruby>持<rt>も</rt></ruby>っていきます?",
    "options": [
      {
        "id": "a",
        "text": "<ruby>持<rt>も</rt></ruby>っていく"
      },
      {
        "id": "b",
        "text": "<ruby>持<rt>も</rt></ruby>ってう"

      {

        "text": "<ruby>持<rt>も</rt></ruby>っている"

      },
      {

    ],

/* ── State ── */
let playerName = "";
let answers = {};
let currentQ = 0;
let submitted = false;

/* ── Initialize EmailJS (Optional) ── */
// emailjs.init("YOUR_PUBLIC_KEY");

/* ── DOM refs ── */
const $nameScreen = document.getElementById("name-screen");
const $quizScreen = document.getElementById("quiz-screen");
const $nameInput  = document.getElementById("name-input");
const $btnStart   = document.getElementById("btn-start");
const $subtitle   = document.getElementById("quiz-subtitle");
const $scoreBanner= document.getElementById("score-banner");
const $scoreNum   = document.getElementById("score-number");
const $scoreLbl   = document.getElementById("score-label");
const $emailRow     = document.getElementById("email-row");
const $btnRetake    = document.getElementById("btn-retake");
const $btnReview    = document.getElementById("btn-review");
const $reviewBanner = document.getElementById("review-banner");
const $progText     = document.getElementById("progress-text");
const $progFill     = document.getElementById("progress-fill");
const $navGrid      = document.getElementById("nav-grid");
const $qCard        = document.getElementById("q-card");
const $qNumber      = document.getElementById("q-number");
const $qText        = document.getElementById("q-text");
const $choicesGrid  = document.getElementById("choices-grid");
const $feedbackCard = document.getElementById("feedback-card");
const $skippedWarning = document.getElementById("skipped-warning");
const $timerDisplay = document.getElementById("timer-display");
let reviewMode = false;
let reviewIndices = [];
let endTime = null;
let timeLeft = 0;
let timerInterval = null;
const $btnPrev      = document.getElementById("btn-prev");
const $btnNext      = document.getElementById("btn-next");
const $btnSubmit    = document.getElementById("btn-submit");

/* ── Name Screen ── */
$nameInput.addEventListener("input", () => {
  $btnStart.disabled = !$nameInput.value.trim();
});
$nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && $nameInput.value.trim()) startQuiz();
});
$btnStart.addEventListener("click", startQuiz);

function shuffleQuestions() {
  for (let i = QUESTIONS.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [QUESTIONS[i], QUESTIONS[j]] = [QUESTIONS[j], QUESTIONS[i]];
  }
}

function startTimer() {
  const qCount = QUESTIONS.length;
  let TIME_LIMIT;
  if (qCount <= 30) {
    TIME_LIMIT = 20 * 60;
  } else if (qCount <= 40) {
    TIME_LIMIT = 25 * 60;
  } else if (qCount <= 50) {
    TIME_LIMIT = 30 * 60;
  } else {
    TIME_LIMIT = 40 * 60;
  }

  endTime = Date.now() + TIME_LIMIT * 1000;
  timeLeft = TIME_LIMIT;
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (submitted) {
      clearInterval(timerInterval);
      return;
    }
    timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time is up! Your exam will be submitted automatically.");
      submitQuiz(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const s = String(timeLeft % 60).padStart(2, '0');
  if ($timerDisplay) {
    $timerDisplay.textContent = `${m}:${s}`;
    if (timeLeft < 300) {
      $timerDisplay.parentElement.classList.add("warning");
    } else {
      $timerDisplay.parentElement.classList.remove("warning");
    }
  }
}

function startQuiz() {
  playerName = $nameInput.value.trim();
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];

  shuffleQuestions();

  $nameScreen.style.display = "none";
  $quizScreen.style.display = "block";
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  $subtitle.textContent = `${playerName}さん — Conjugate the verbs`;

  buildNavGrid();
  startTimer();
  renderQuestion();
  updateProgress();
}

/* ── Nav Grid ── */
function buildNavGrid() {
  $navGrid.innerHTML = "";
  QUESTIONS.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot";
    btn.textContent = i + 1;
    btn.addEventListener("click", () => {
      if (reviewMode) {
        const idx = reviewIndices.indexOf(i);
        if (idx === -1) return;
        currentQ = idx;
      } else {
        currentQ = i;
      }
      renderQuestion();
    });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;

  if (submitted) {
    $navGrid.classList.remove("hidden");
  } else {
    $navGrid.classList.add("hidden");
  }

  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    
    if (submitted) {
      dot.classList.add("locked");
      if (answers[i] === QUESTIONS[i].correct) dot.classList.add("correct");
      else if (answers[i]) dot.classList.add("wrong");
      else dot.classList.add("unanswered-locked");
    } else {
      if (answers[i]) dot.classList.add("answered");
    }

    if (i === realIdx) dot.classList.add("active");
  });
}

function updateProgress() {
  if (reviewMode) {
    $progText.textContent = `Reviewing ${currentQ + 1} / ${reviewIndices.length}`;
    $progFill.style.width = `${((currentQ + 1) / reviewIndices.length) * 100}%`;
    return;
  }
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${QUESTIONS.length} answered`;
  $progFill.style.width = `${(count / QUESTIONS.length) * 100}%`;
  $btnSubmit.disabled = false;
}

/* ── Render Question ── */
function renderQuestion() {
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  const q = QUESTIONS[realIdx];
  $qNumber.textContent = reviewMode
    ? `Review ${currentQ + 1} of ${reviewIndices.length}`
    : `Question ${realIdx + 1} of ${QUESTIONS.length}`;
  $qText.innerHTML = q.question;

  $choicesGrid.innerHTML = "";
  const isAnswered = answers[realIdx] !== undefined;

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (submitted) btn.classList.add("locked");
    
    btn.innerHTML = `<span class="choice-letter">${opt.id}.</span><span>${opt.text}</span>`;

    const selected = answers[realIdx] === opt.id;
    const isCorrectChoice = opt.id === q.correct;

    if (!submitted) {
      if (selected) btn.classList.add("selected");
      btn.addEventListener("click", () => {
        if (submitted) return;
        answers[realIdx] = opt.id;
        renderQuestion();
        updateProgress();
      });
    } else {
      if (isCorrectChoice) {
        btn.classList.add("correct-reveal");
        btn.innerHTML += `<span class="mark ok">✓</span>`;
      } else if (selected && !isCorrectChoice) {
        btn.classList.add("wrong-reveal");
        btn.innerHTML += `<span class="mark no">✗</span>`;
      } else {
        btn.classList.add("faded-reveal");
      }
    }

    $choicesGrid.appendChild(btn);
  });

  /* Feedback Card */
  if (submitted && isAnswered) {
    renderFeedback(q, answers[realIdx]);
  } else {
    $feedbackCard.style.display = "none";
    $feedbackCard.innerHTML = "";
  }

  // Hide skipped questions warning when navigating to a question
  $skippedWarning.classList.add("hidden");

  updateNavGrid();
  updateNavButtons();
}

function renderFeedback(q, given) {
  const isCorrect = given === q.correct;
  $feedbackCard.className = `feedback-card ${isCorrect ? "correct" : "wrong"}`;
  $feedbackCard.style.display = "block";

  let html = `<div class="fb-header">${isCorrect ? "✓ Correct" : `✗ Not quite — answer: ${q.correct}`}</div>`;
  if (q.correctNote) html += `<div>${q.correctNote}</div>`;
  if (q.explanation) html += `<div class="fb-block">${q.explanation}</div>`;
  if (q.connect)     html += `<div class="fb-block connect">${q.connect}</div>`;
  if (q.warn)        html += `<div class="fb-block warn">${q.warn}</div>`;

  $feedbackCard.innerHTML = html;
}

function updateNavButtons() {
  const total = reviewMode ? reviewIndices.length : QUESTIONS.length;
  $btnPrev.disabled = currentQ === 0;

  if (!submitted) {
    const isLast = currentQ === QUESTIONS.length - 1;
    if (isLast) {
      $btnNext.classList.add("hidden");
      $btnSubmit.classList.remove("hidden");
    } else {
      $btnNext.classList.remove("hidden");
      $btnSubmit.classList.add("hidden");
      $btnNext.textContent = "Next →";
    }
  } else {
    $btnSubmit.classList.add("hidden");
    $btnNext.classList.remove("hidden");
    
    if (reviewMode) {
      if (currentQ === total - 1) {
        $btnNext.textContent = "Done reviewing ✓";
      } else {
        $btnNext.textContent = "Next →";
      }
      $btnNext.disabled = false;
    } else {
      $btnNext.textContent = "Next →";
      $btnNext.disabled = currentQ === total - 1;
    }
  }
}

/* ── Navigation ── */
$btnPrev.addEventListener("click", () => {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
});
$btnNext.addEventListener("click", () => {
  const total = reviewMode ? reviewIndices.length : QUESTIONS.length;
  if (currentQ < total - 1) {
    currentQ++; renderQuestion();
  } else if (reviewMode) {
    reviewMode = false;
    $reviewBanner.style.display = "none";
    $scoreBanner.style.display = "block";
    $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });
  }
});

/* ── Submit ── */
$btnSubmit.addEventListener("click", submitQuiz);

async function submitQuiz(force = false) {
  const count = Object.keys(answers).length;
  if (force !== true && count < QUESTIONS.length) {
    const skipped = [];
    QUESTIONS.forEach((_, i) => {
      if (!answers[i]) skipped.push(i);
    });

    $skippedWarning.innerHTML = `⚠️ You have unanswered questions: ` + 
      skipped.map(idx => `<span class="skipped-link" onclick="jumpToQuestion(${idx})">Question ${idx + 1}</span>`).join(", ") + 
      `. Please answer them before submitting.`;
    $skippedWarning.classList.remove("hidden");
    return;
  }

  $skippedWarning.classList.add("hidden");
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  let s = 0;
  QUESTIONS.forEach((q, i) => { if (answers[i] === q.correct) s++; });
  submitted = true;

  const pct = Math.round((s / QUESTIONS.length) * 100);
  $scoreNum.textContent = `${s}/${QUESTIONS.length}`;

  if (s >= 25) {
    $scoreLbl.textContent = "完璧！ Perfect!";
    $scoreBanner.style.background = "#e8f5e9";
    $scoreBanner.style.borderColor = "#2e7d32";
    $scoreBanner.style.color = "#1b5e20";
  } else if (s >= 15) {
    $scoreLbl.textContent = "いいですね！ Good job!";
    $scoreBanner.style.background = "#fff9c4";
    $scoreBanner.style.borderColor = "#fbc02d";
    $scoreBanner.style.color = "#f57f17";
  } else {
    $scoreLbl.textContent = "もう一度！ Try again!";
    $scoreBanner.style.background = "#ffebee";
    $scoreBanner.style.borderColor = "#c62828";
    $scoreBanner.style.color = "#b71c1c";
  }
  
  $scoreBanner.style.display = "block";

  currentQ = 0;
  renderQuestion();
  updateNavGrid();

  /* Hide submit, show next */
  $btnSubmit.classList.add("hidden");
  $btnNext.classList.remove("hidden");
  $btnNext.disabled = false;

  // Show review button if there are wrong answers
  const wrongCount = QUESTIONS.length - s;
  $btnReview.disabled = wrongCount === 0;
  $btnReview.textContent = wrongCount === 0
    ? "🎉 No mistakes!"
    : `📝 Review ${wrongCount} wrong answer${wrongCount > 1 ? 's' : ''}`;

  /* ══════════════════════════════════════════════════
     EMAILJS TEMPLATE SETUP (Fallback mode simulated)
     ══════════════════════════════════════════════════ */
  const EMAILJS_PUBLIC_KEY  = "YOUR_PUBLIC_KEY"; // Replace to enable
  const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";
  const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";

  const now = new Date().toLocaleString("en-PH", { timeZone: "Asia/Manila", dateStyle: "full", timeStyle: "short" });
  
  if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
    // Simulated sequence for demo
    $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
    setTimeout(() => {
      $emailRow.innerHTML = `<span class="email-pill sent">✓ Results saved & simulated email sent!</span>`;
    }, 1500);
  } else {
    $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
    try {
      const emailParams = {
        name: playerName,
        subject: `[${playerName}] Verb Conjugation Quiz — ${pct}%`,
        message: `Verb Conjugation Quiz Results\nScore: ${s}/${QUESTIONS.length} (${pct}%)\nTime: ${now}`,
      };
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams, EMAILJS_PUBLIC_KEY);
      $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
    } catch (err) {
      console.error("EmailJS error:", err);
      $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || 'Email failed'}</span>`;
    }
  }
}

/* ── Review & Retake ── */
$btnReview.addEventListener("click", () => {
  reviewIndices = QUESTIONS
    .map((q, i) => ({ i, wrong: answers[i] !== q.correct }))
    .filter(x => x.wrong)
    .map(x => x.i);
  if (reviewIndices.length === 0) return;
  reviewMode = true;
  currentQ = 0;
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "block";
  renderQuestion();
});

$btnRetake.addEventListener("click", () => {
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  
  shuffleQuestions();

  buildNavGrid();
  startTimer();
  renderQuestion();
  updateProgress();
});

window.jumpToQuestion = function(idx) {
  currentQ = idx;
  renderQuestion();
};


</script>
</body>
</html>
