<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adjective Conjugation Practice | N5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --accent-start: #a9342a;
    --accent-end: #8f241c;
    --bg-base: #f8f3ea;
    --bg-radial-1: rgba(169, 52, 42, 0.06);
    --bg-radial-2: rgba(38, 58, 99, 0.04);
    --bg-card: rgba(255, 253, 248, 0.94);
    --bg-input: rgba(24, 32, 47, 0.04);
    --bg-button: #fffdf8;
    --bg-button-hover: #f4ddd8;
    --text-primary: #18202f;
    --text-muted: #667085;
    --text-on-accent: #ffffff;
    --border: rgba(24, 32, 47, 0.12);
    --border-active: #a9342a;
    --success: #e8f5e9;
    --success-bright: #2e7d32;
    --success-text: #1b5e20;
    --warning: #fff9c4;
    --warning-bright: #f57f17;
    --error: #ffebee;
    --error-bright: #c62828;
    --error-text: #b71c1c;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      linear-gradient(90deg, rgba(169, 52, 42, 0.06) 1px, transparent 1px),
      linear-gradient(180deg, rgba(38, 58, 99, 0.04), transparent 34rem),
      #f8f3ea;
    background-size: 44px 44px, auto, auto;
    color: var(--text-primary);
    font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: none;
  }

  .container {
    max-width: 620px;
    margin: 0 auto;
    padding: 32px 16px 60px;
    position: relative;
    z-index: 1;
  }

  .jp {
    font-family: 'Noto Sans JP', 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
  }
  .blank {
    display: inline-block;
    min-width: 28px;
    padding: 0 6px;
    margin: 0 2px;
    background: var(--accent-start);
    color: #ffffff;
    border-radius: 6px;
    font-weight: 800;
    text-align: center;
  }
  ruby rt { font-size: 0.6em; color: var(--text-muted); }

  /* ── Card Styles ── */
  .card, .q-card, .score-banner {
    background: var(--bg-card);
    border-radius: 12px;
    padding: 32px 24px;
    border: 1px solid var(--border);
    box-shadow: 0 12px 40px rgba(45, 24, 64, 0.06);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  /* ── Name Screen ── */
  #name-screen { margin-top: 40px; }

  .badge {
    display: inline-block;
    background: var(--accent-start);
    color: #ffffff;
    font-weight: 800;
    font-size: 10px;
    padding: 5px 16px;
    border-radius: 20px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    box-shadow: 0 4px 12px rgba(127, 86, 218, 0.15);
  }

  .title {
    font-size: 26px;
    font-weight: 800;
    margin: 16px 0 6px;
    letter-spacing: -0.5px;
    color: var(--text-primary);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
  }

  .name-label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin: 24px 0 8px;
    text-align: left;
    font-weight: 700;
  }

  .name-input {
    width: 100%;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255, 253, 248, 0.94);
    color: var(--text-primary);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
  }
  .name-input:focus {
    border-color: var(--accent-start);
    box-shadow: 0 0 0 3px rgba(127, 86, 218, 0.15);
  }

  .btn-primary {
    width: 100%;
    margin-top: 24px;
    padding: 16px 0;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    border: none;
    color: #ffffff;
    font-size: 16px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(127, 86, 218, 0.25);
    transition: all 0.25s ease;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(127, 86, 218, 0.35);
    opacity: 0.95;
  }
  .btn-primary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ── Quiz Screen ── */
  #quiz-screen { display: none; }
  .header { text-align: center; margin-bottom: 24px; }
  .header .subtitle { margin-top: 6px; }

  /* Score Banner */
  .score-banner {
    display: none;
    border-radius: 8px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .score-number { font-size: 52px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; margin-bottom: 6px;}
  .score-label { font-size: 20px; font-weight: 700; margin-bottom: 14px; }
  .email-row { margin-bottom: 20px; }
  .email-pill {
    display: inline-block;
    background: rgba(45, 24, 64, 0.04);
    border: 1px solid var(--border);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .email-pill.sent {
    background: #e8f5e9;
    border: 1px solid #26893e;
    color: #175225;
  }
  .email-pill.error {
    background: #ffebee;
    border: 1px solid #ba2846;
    color: #701326;
  }

  .end-actions {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px;
  }
  .btn-end {
    background: rgba(45, 24, 64, 0.06);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-end:hover:not(:disabled) {
    background: var(--bg-button);
    border-color: rgba(127, 86, 218, 0.2);
    color: var(--accent-start);
    transform: translateY(-1px);
  }
  .btn-end:disabled { opacity: 0.4; cursor: default; }

  /* Review Banner */
  .review-banner {
    display: none;
    background: #fff9c4;
    border: 1px solid #fbc02d;
    color: #f57f17;
    text-align: center;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* Progress */
  .progress-row { margin-bottom: 20px; }
  .progress-text { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 8px; font-weight: 700; }
  .progress-bar { height: 6px; background: rgba(45, 24, 64, 0.06); border-radius: 6px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
    border-radius: 6px;
    width: 0%;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Nav Grid */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }
  .nav-dot {
    aspect-ratio: 1;
    border-radius: 50%;
    background: #fffdf8;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-dot:hover:not(.answered):not(.active):not(.locked) {
    background: var(--bg-button);
    color: var(--accent-start);
  }
  .nav-dot.answered {
    background: rgba(127, 86, 218, 0.08);
    border-color: rgba(127, 86, 218, 0.3);
    color: var(--accent-start);
  }
  .nav-dot.active {
    border-color: var(--accent-start);
    background: var(--bg-button);
    color: var(--accent-start);
    box-shadow: 0 0 0 3px rgba(127, 86, 218, 0.2);
  }
  .nav-dot.correct {
    background: #e8f5e9;
    border-color: var(--success-bright);
    color: var(--success-text);
  }
  .nav-dot.wrong {
    background: #ffebee;
    border-color: var(--error-bright);
    color: var(--error-text);
  }
  .nav-dot.unanswered-locked {
    background: rgba(45, 24, 64, 0.02);
    border-color: rgba(45, 24, 64, 0.06);
    color: rgba(45, 24, 64, 0.3);
    opacity: 0.5;
  }
  @media (max-width: 480px) {
    .nav-grid { gap: 4px; }
    .nav-dot { font-size: 10px; }
  }

  /* Question Card */
  .q-card {
    background: var(--bg-card);
    border-radius: 8px;
    padding: 28px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(45, 24, 64, 0.04);
    animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .q-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 8px;
    letter-spacing: 0.3px;
  }
  .q-tag.i-adj { background: #f3e5f5; color: #6a1b9a; }
  .q-tag.na-adj { background: #e3f2fd; color: #1565c0; }
  .q-tag.type { background: rgba(45, 24, 64, 0.05); color: var(--text-muted); }

  .q-number {
    font-size: 11px;
    color: var(--accent-start);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .q-text {
    font-size: 21px;
    font-weight: 700;
    margin-bottom: 28px;
    line-height: 1.45;
    color: var(--text-primary);
  }

  /* Choices Grid */
  .choices-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .choice-btn {
    padding: 18px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fffdf8;
    color: var(--text-primary);
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    position: relative;
    display: flex;
    align-items: center;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  .choice-btn:hover:not(.locked) {
    border-color: rgba(127, 86, 218, 0.3);
    background: var(--bg-button);
    color: var(--accent-start);
    transform: translateY(-1px);
  }
  .choice-btn.selected {
    background: var(--bg-button);
    border-color: var(--accent-start);
    color: var(--accent-start);
  }
  .choice-btn.correct-reveal {
    background: #e8f5e9;
    border-color: var(--success-bright);
    color: var(--success-text);
  }
  .choice-btn.wrong-reveal {
    background: #ffebee;
    border-color: var(--error-bright);
    color: var(--error-text);
  }
  .choice-btn.faded-reveal {
    opacity: 0.4;
    border-color: rgba(45, 24, 64, 0.04);
  }
  .choice-letter {
    font-weight: 800;
    margin-right: 16px;
    opacity: 0.5;
  }
  .choice-btn:hover .choice-letter, .choice-btn.selected .choice-letter { opacity: 1; }
  .mark {
    position: absolute;
    right: 20px;
    font-size: 20px;
    font-weight: 900;
  }
  .mark.ok { color: var(--success-bright); }
  .mark.no { color: var(--error-bright); }

  /* ── Interactive Matching Grid ── */
  .matching-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(10px, 3vw, 24px);
    margin-top: 15px;
  }
  .matching-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .matching-col-title {
    font-size: 12px;
    font-weight: 800;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    margin-bottom: 6px;
  }
  .match-card {
    padding: 14px clamp(10px, 2vw, 16px);
    border-radius: 8px;
    border: 2px solid var(--border);
    background: #fffdf8;
    color: var(--text-primary);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    user-select: none;
  }
  .match-card:hover:not(.matched):not(.disabled) {
    border-color: var(--accent-start);
    background: var(--bg-button);
    color: var(--accent-start);
    transform: translateY(-1px);
  }
  .match-card.selected {
    border-color: var(--accent-start);
    background: var(--bg-button);
    color: var(--accent-start);
    box-shadow: 0 0 0 3px rgba(127, 86, 218, 0.15);
  }
  .match-card.matched {
    background: #e8f5e9;
    border-color: var(--success-bright);
    color: var(--success-text);
    cursor: default;
  }
  .match-card.wrong {
    border-color: var(--error-bright);
    background: #ffebee;
    color: var(--error-text);
    animation: shakeMatch 0.4s;
  }
  @keyframes shakeMatch {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ── Explanation Box / Feedback Card ── */
  .feedback-card {
    display: none;
    margin-top: 24px;
    padding: 18px 20px;
    border-radius: 8px;
    background: #fff8ef;
    border: 1px solid rgba(169, 52, 42, 0.15);
    font-size: 14px;
    line-height: 1.55;
    color: #18202f;
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fb-header {
    font-weight: 800;
    margin-bottom: 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .feedback-card.correct .fb-header { color: #2e7d32; }
  .feedback-card.wrong .fb-header { color: #c62828; }
  .fb-block { margin-top: 8px; }
  .fb-block.connect { color: #667085; font-size: 13px; }
  .fb-block.warn {
    color: #b71c1c;
    background: #ffebee;
    border: 1px solid rgba(198, 40, 40, 0.2);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
  }

  /* Skipped warning alert box */
  .skipped-warning {
    margin-bottom: 20px;
    padding: 16px;
    background: #fff8ef;
    border: 1px solid var(--accent-start);
    border-radius: 8px;
    color: var(--accent-start);
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  .skipped-link {
    color: var(--accent-start);
    text-decoration: underline;
    cursor: pointer;
    margin: 0 4px;
    font-weight: 800;
  }
  .skipped-link:hover { color: var(--accent-end); }

  /* Arrow Row */
  .arrow-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn-nav {
    flex: 1;
    padding: 16px 0;
    border-radius: 8px;
    background: #fffdf8;
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-nav:hover:not(:disabled) {
    background: var(--bg-button);
    color: var(--accent-start);
    border-color: rgba(127, 86, 218, 0.2);
  }
  .btn-nav:disabled { opacity: 0.25; cursor: not-allowed; }
  
  .btn-submit {
    flex: 1;
    padding: 16px 0;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    border: none;
    color: #ffffff;
    font-size: 15px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(127, 86, 218, 0.25);
    transition: all 0.2s;
  }
  .btn-submit:hover:not(:disabled) {
    box-shadow: 0 6px 20px rgba(127, 86, 218, 0.35);
    opacity: 0.95;
  }
  .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

  .text-center { text-align: center; }
  .hidden { display: none !important; }

  /* Breadcrumb */
  .site-breadcrumb, .site-breadcrumb * { box-sizing: border-box; }
  .site-breadcrumb {
    position: relative;
    z-index: 20;
    width: min(1180px, calc(100% - 32px));
    margin: 16px auto 12px;
    font-family: "Noto Sans JP", sans-serif;
    color: var(--text-primary);
  }
  .site-breadcrumb__list {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0;
    list-style: none;
    margin: 0;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(255, 253, 248, 0.94);
    box-shadow: 0 10px 30px rgba(45, 24, 64, 0.08);
  }
  .site-breadcrumb__item {
    display: inline-flex;
    align-items: center;
    min-width: 0;
    color: var(--text-muted);
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1.4;
  }
  .site-breadcrumb__item + .site-breadcrumb__item::before {
    content: "/";
    margin: 0 8px;
    color: rgba(127, 86, 218, 0.3);
    font-weight: 800;
  }
  .site-breadcrumb__link {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.18s ease;
  }
  .site-breadcrumb__link:hover {
    color: var(--accent-start);
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .site-breadcrumb__category { color: var(--accent-start); }
  .site-breadcrumb__current { color: var(--text-primary); overflow-wrap: anywhere; }

  @media (max-width: 640px) {
    .site-breadcrumb { width: min(100% - 20px, 680px); margin: 12px auto 10px; }
    .site-breadcrumb__list { padding: 8px 10px; }
    .site-breadcrumb__item { font-size: 0.78rem; }
  }

  /* Timer Display styling */
  .topbar-timer {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(255, 253, 248, 0.94);
    box-shadow: 0 2px 6px rgba(45, 24, 64, 0.04);
  }
  .topbar-timer.warning {
    color: var(--error-bright);
    border-color: var(--error-bright);
    background: #ffebee;
    animation: timerPulse 1s infinite alternate;
  }
  @keyframes timerPulse {
    from { opacity: 1; }
    to { opacity: 0.6; }
  }
</style>
</head>
<body>

<!-- Site Breadcrumb -->
<nav class="site-breadcrumb" aria-label="Breadcrumb">
  <ol class="site-breadcrumb__list">
    <li class="site-breadcrumb__item"><a class="site-breadcrumb__link" href="../../index.html">Home</a></li>
    <li class="site-breadcrumb__item"><a class="site-breadcrumb__link site-breadcrumb__category" href="../../index.html#quiz">Quiz</a></li>
    <li class="site-breadcrumb__item"><span class="site-breadcrumb__current" aria-current="page">Adjective Conjugation Quiz</span></li>
  </ol>
</nav>
<!-- End Site Breadcrumb -->

<div class="container">

  <!-- ════ NAME SCREEN ════ -->
  <div id="name-screen">
    <div class="card text-center">
      <span class="badge">My-Japanese-Reviewers</span>
      <h1 class="title">Adjective Conjugation Practice</h1>
      <p class="subtitle">27 questions · Conjugation &amp; Sentences · N5 Level</p>
      <label class="name-label">おなまえは？ Enter your name</label>
      <input class="name-input" id="name-input" type="text" placeholder="Your name..." autofocus>
      <button class="btn-primary" id="btn-start" disabled>Start Quiz →</button>
    </div>
  </div>

  <!-- ════ QUIZ SCREEN ════ -->
  <div id="quiz-screen">
    <header class="header">
      <span class="badge">My-Japanese-Reviewers</span>
      <h1 class="title">Adjective Conjugation</h1>
      <p class="subtitle" id="quiz-subtitle"></p>
    </header>

    <div class="score-banner" id="score-banner" aria-live="polite">
      <div class="score-number" id="score-number"></div>
      <div class="score-label" id="score-label"></div>

function conjugateIAdj(adj, tense, polarity) {
  const stem = adj.base.slice(0, -1);
  if (adj.irregular && adj.base === 'いい') {
    if (tense === 'present' && polarity === 'positive') return 'いい です';
    if (tense === 'present' && polarity === 'negative') return 'よくない です';
    if (tense === 'past' && polarity === 'positive') return 'よかった です';
    if (tense === 'past' && polarity === 'negative') return 'よくなかった です';
  }
  if (tense === 'present' && polarity === 'positive') return adj.base + ' です';
  if (tense === 'present' && polarity === 'negative') return stem + 'くない です';
  if (tense === 'past' && polarity === 'positive') return stem + 'かった です';
  if (tense === 'past' && polarity === 'negative') return stem + 'くなかった です';
}

function conjugateNaAdj(adj, tense, polarity) {
  if (tense === 'present' && polarity === 'positive') return adj.base + ' です';
  if (tense === 'present' && polarity === 'negative') return adj.base + ' じゃありません';
  if (tense === 'past' && polarity === 'positive') return adj.base + ' でした';
  if (tense === 'past' && polarity === 'negative') return adj.base + ' じゃありませんでした';
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatDuration(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  if (m === 0) return `${s}s`;
  return `${m}m ${s}s`;
}

function getConjugationExplanation(adj, tense, polarity, correctAns, choices, isI) {
  const stem = isI ? adj.base.slice(0, -1) : adj.base;
  let ruleText = "";
  if (isI) {
    if (adj.irregular && adj.base === 'いい') {
      if (tense === 'present' && polarity === 'positive') ruleText = 'irregular base present positive is standard <strong>いい です</strong>.';
      if (tense === 'present' && polarity === 'negative') ruleText = 'stem changes to よ + くないです ➔ <strong>よくない です</strong>.';
      if (tense === 'past' && polarity === 'positive') ruleText = 'stem changes to よ + かったですよ ➔ <strong>よかった です</strong>.';
      if (tense === 'past' && polarity === 'negative') ruleText = 'stem changes to よ + くなかったです ➔ <strong>よくなかった です</strong>.';
    } else {
      if (tense === 'present' && polarity === 'positive') ruleText = 'add です directly to dictionary form ➔ <strong>' + adj.base + ' です</strong>.';
      if (tense === 'present' && polarity === 'negative') ruleText = 'replace final い with くない + です ➔ <strong>' + stem + 'くない です</strong>.';
      if (tense === 'past' && polarity === 'positive') ruleText = 'replace final い with かった + です ➔ <strong>' + stem + 'かった です</strong>.';
      if (tense === 'past' && polarity === 'negative') ruleText = 'replace final い with くなかった + です ➔ <strong>' + stem + 'くなかった です</strong>.';
    }
  } else {
    if (tense === 'present' && polarity === 'positive') ruleText = 'add です to stem ➔ <strong>' + adj.base + ' です</strong>.';
    if (tense === 'present' && polarity === 'negative') ruleText = 'add じゃありません to stem ➔ <strong>' + adj.base + ' じゃありません</strong>.';
    if (tense === 'past' && polarity === 'positive') ruleText = 'add でした to stem ➔ <strong>' + adj.base + ' でした</strong>.';
    if (tense === 'past' && polarity === 'negative') ruleText = 'add じゃありませんでした to stem ➔ <strong>' + adj.base + ' じゃありませんでした</strong>.';
  }

  let explainHtml = 'The correct choice is <strong>「' + correctAns + '」</strong>. For the adjective <strong>' + adj.base + '</strong> (' + adj.meaning + '), the rule for ' + tense + ' ' + polarity + ' is: ' + ruleText + '<br><br><strong>Why other choices are incorrect:</strong><br>';
  
  choices.forEach(opt => {
    if (opt === correctAns) return;
    let desc = "";
    if (isI) {
      if (opt.endsWith('いです')) desc = 'present positive form';
      else if (opt.endsWith('くない です')) desc = 'present negative form';
      else if (opt.endsWith('かった です')) desc = 'past positive form';
      else if (opt.endsWith('くなかった です')) desc = 'past negative form';
      else if (opt.endsWith('でした')) desc = 'grammatically invalid form (never append でした directly to い-adjectives)';
      else desc = 'incorrect conjugation style or category';
    } else {
      if (opt.endsWith('です') && !opt.endsWith('ない です') && !opt.endsWith('た です')) desc = 'present positive form';
      else if (opt.endsWith('じゃありません')) desc = 'present negative form';
      else if (opt.endsWith('でした')) desc = 'past positive form';
      else if (opt.endsWith('じゃありませんでした')) desc = 'past negative form';
      else if (opt.endsWith('い です') || opt.endsWith('くない です') || opt.endsWith('かった です')) desc = 'incorrect conjugation style (treating な-adjective as an い-adjective)';
      else desc = 'incorrect conjugation style or category';
    }
    explainHtml += '• <code>' + opt + '</code> represents the ' + desc + ', which is incorrect for this slot.<br>';
  });
  
  return explainHtml;
}

function generateConjugationQuestions() {
  const list = [];
  const tenses = ['present', 'past'];
  const polarities = ['positive', 'negative'];
  
  // 8 i-adj
  const shuffledI = shuffle(iAdjectives);
  for (let i = 0; i < 8; i++) {
    const adj = shuffledI[i % shuffledI.length];
    const tense = tenses[Math.floor(Math.random() * 2)];
    const polarity = polarities[Math.floor(Math.random() * 2)];
    const ans = conjugateIAdj(adj, tense, polarity);
    
    // Generate wrong answers
    const optionsSet = new Set([ans]);
    const stem = adj.base.slice(0, -1);
    const distractors = [
      adj.base + ' です',
      stem + 'くない です',
      stem + 'かった です',
      stem + 'くなかった です',
      adj.base + ' でした',
      stem + ' じゃありません'
    ];
    shuffle(distractors).forEach(d => { if (optionsSet.size < 4) optionsSet.add(d); });
    
    list.push({
      type: 'i-adj',
      category: 'い-けいようし',
      stem: `Conjugate this adjective into <span class="blank">${tense} ${polarity}</span>:<br><span class="jp" style="font-size:26px; color:var(--accent-start);">${adj.base}</span> (${adj.meaning})`,
      correctAnswer: ans,
      choices: shuffle(Array.from(optionsSet)),
      correctNote: `Conjugation result: <span class="jp">${ans}</span>.`,
      explain: getConjugationExplanation(adj, tense, polarity, ans, Array.from(optionsSet), false)
    });
  }

  // 8 na-adj
  const shuffledNa = shuffle(naAdjectives);
  for (let i = 0; i < 8; i++) {
    const adj = shuffledNa[i % shuffledNa.length];
    const tense = tenses[Math.floor(Math.random() * 2)];
    const polarity = polarities[Math.floor(Math.random() * 2)];
    const ans = conjugateNaAdj(adj, tense, polarity);
    
    // Generate wrong answers
    const optionsSet = new Set([ans]);
    const distractors = [
      adj.base + ' です',
      adj.base + ' じゃありません',
      adj.base + ' でした',
      adj.base + ' じゃありませんでした',
      adj.base + 'い です',
      adj.base + 'くない です'
    ];
    shuffle(distractors).forEach(d => { if (optionsSet.size < 4) optionsSet.add(d); });

    list.push({
      type: 'na-adj',
      category: 'な-けいようし',
      stem: `Conjugate this adjective into <span class="blank">${tense} ${polarity}</span>:<br><span class="jp" style="font-size:26px; color:var(--accent-start);">${adj.base}</span> (${adj.meaning})`,
      correctAnswer: ans,
      choices: shuffle(Array.from(optionsSet)),
      correctNote: `Conjugation result: <span class="jp">${ans}</span>.`,
      explain: getConjugationExplanation(adj, tense, polarity, ans, Array.from(optionsSet), false)
    });
  }

  return shuffle(list);
}

function generateMatchingQuestions() {
  const matchQuestions = [];
  const tenses = ['present', 'past'];
  const polarities = ['positive', 'negative'];

  for (let set = 0; set < 3; set++) {
    const pairs = [];
    const used = new Set();
    
    for (let i = 0; i < 4; i++) {
      let adj, isI;
      do {
        isI = Math.random() > 0.5;
        adj = isI ? iAdjectives[Math.floor(Math.random() * iAdjectives.length)] 
                  : naAdjectives[Math.floor(Math.random() * naAdjectives.length)];
      } while (used.has(adj.base));
      
      used.add(adj.base);
      const tense = tenses[Math.floor(Math.random() * 2)];
      const polarity = polarities[Math.floor(Math.random() * 2)];
      const conjugated = isI ? conjugateIAdj(adj, tense, polarity) : conjugateNaAdj(adj, tense, polarity);
      
      pairs.push({
        base: adj.base + (isI ? ' (い)' : ' (な)'),
        conjugated: conjugated,
        desc: `${adj.base} (${tense} ${polarity})`
      });
    }

    const explainText = pairs.map(p => `• <strong>${p.base}</strong> ➔ <span class="jp">${p.conjugated}</span>`).join('<br>');

    matchQuestions.push({
      type: 'matching',
      category: 'Conjugation Matching',
      stem: `👥 Match the base adjectives on the left with their correct conjugated forms on the right.`,
      pairs: pairs, // Array of {base, conjugated, desc}
      correctAnswer: 'completed',
      correctNote: 'Matched all 4 pairs correctly! 🌸',
      explain: `<div style="margin-top:8px;"><strong>Correct Pairs:</strong><br>${explainText}</div>`
    });
  }
  return matchQuestions;
}

function generateSentenceQuestions() {
  const list = sentenceQuestionsStatic.map(q => ({
    type: q.type,
    category: 'Sentence Practice',
    stem: `Complete the sentence:<br><span class="jp" style="font-size:22px;">${q.template}</span><br><span style="color:var(--text-muted); font-size:14px;">"${q.english}"</span>`,
    correctAnswer: q.correctAnswer,
    choices: q.choices,
    correctNote: q.correctNote,
    explain: q.explain
  }));
  return shuffle(list);
}

function startTimer() {
  const qCount = quiz.length;
  let TIME_LIMIT;
  if (qCount <= 30) {
    TIME_LIMIT = 20 * 60;
  } else if (qCount <= 40) {
    TIME_LIMIT = 25 * 60;
  } else if (qCount <= 50) {
    TIME_LIMIT = 30 * 60;
  } else {
    TIME_LIMIT = 40 * 60;
  }

  endTime = Date.now() + TIME_LIMIT * 1000;
  timeLeft = TIME_LIMIT;
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (submitted) {
      clearInterval(timerInterval);
      return;
    }
    timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time is up! Your exam will be submitted automatically.");
      submitQuiz(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const s = String(timeLeft % 60).padStart(2, '0');
  if ($timerDisplay) {
    $timerDisplay.textContent = `${m}:${s}`;
    if (timeLeft < 300) {
      $timerDisplay.parentElement.classList.add("warning");
    } else {
      $timerDisplay.parentElement.classList.remove("warning");
    }
  }
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
}

/* ═══════════════════════════════════════════════════════════════
   NAV GRID
   ═══════════════════════════════════════════════════════════════ */
function buildNavGrid() {
  $navGrid.innerHTML = "";
  quiz.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot";
    btn.textContent = i + 1;
    btn.addEventListener("click", () => {
      if (reviewMode) {
        const idx = reviewIndices.indexOf(i);
        if (idx === -1) return;
        currentQ = idx;
      } else {
        currentQ = i;
      }
      renderQuestion();
    });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;

  if (submitted) {
    $navGrid.classList.remove("hidden");
  } else {
    $navGrid.classList.add("hidden");
  }

  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    if (submitted) {
      dot.classList.add("locked");
      if (answers[i] === quiz[i].correctAnswer) dot.classList.add("correct");
      else if (answers[i]) dot.classList.add("wrong");
      else dot.classList.add("unanswered-locked");
    } else {
      if (answers[i]) dot.classList.add("answered");
    }
    if (i === realIdx) dot.classList.add("active");
  });
}

/* ═══════════════════════════════════════════════════════════════
   PROGRESS
   ═══════════════════════════════════════════════════════════════ */
function updateProgress() {
  if (reviewMode) {
    $progText.textContent = `Reviewing ${currentQ + 1} / ${reviewIndices.length}`;
    $progFill.style.width = `${((currentQ + 1) / reviewIndices.length) * 100}%`;
    return;
  }
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${quiz.length} answered`;
  $progFill.style.width = `${(count / quiz.length) * 100}%`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER QUESTION
   ═══════════════════════════════════════════════════════════════ */
function renderQuestion() {
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  const q = quiz[realIdx];
  const isAnswered = answers[realIdx] !== undefined;

  $qNumber.textContent = reviewMode
    ? `Review ${currentQ + 1} of ${reviewIndices.length}`
    : `Question ${realIdx + 1} of ${quiz.length}`;

  const tempDiv = document.createElement("div");
  tempDiv.innerHTML = q.stem;
  const hintSpan = tempDiv.querySelector("span[style*='color:var(--text-muted)']");
  if (hintSpan) {
    const prev = hintSpan.previousSibling;
    if (prev && prev.nodeName === "BR") {
      prev.parentNode.removeChild(prev);
    }
    hintSpan.parentNode.removeChild(hintSpan);
  }
  $qText.innerHTML = tempDiv.innerHTML;

  // Clear skipped questions warning
  $skippedWarning.classList.add("hidden");

  // Remove existing matching containers if any
  const oldMatching = document.getElementById("matching-grid-wrapper");
  if (oldMatching) oldMatching.remove();

  if (q.type === 'matching') {
    $choicesGrid.classList.add("hidden");
    renderMatchingUI(q, realIdx);
  } else {
    $choicesGrid.classList.remove("hidden");
    renderChoicesUI(q, realIdx);
  }

  /* Feedback card */
  if (submitted && isAnswered) {
    renderFeedback(q, answers[realIdx]);
  } else {
    $feedbackCard.style.display = "none";
    $feedbackCard.innerHTML = "";
  }

  updateNavGrid();
  updateProgress();
  updateNavButtons();
}

function renderFeedback(q, given) {
  const isCorrect = given === q.correctAnswer;
  $feedbackCard.className = `feedback-card ${isCorrect ? "correct" : "wrong"}`;
  $feedbackCard.style.display = "block";

  let html = `<div class="fb-header">${isCorrect ? "✓ Correct" : `✗ Not quite — answer: ${q.correctAnswer}`}</div>`;
  if (q.correctNote) html += `<div>${q.correctNote}</div>`;
  if (q.explain)     html += `<div class="fb-block">${q.explain}</div>`;
  if (q.connect)     html += `<div class="fb-block connect">${q.connect}</div>`;
  if (q.warn)        html += `<div class="fb-block warn">${q.warn}</div>`;

  $feedbackCard.innerHTML = html;
}

function renderChoicesUI(q, realIdx) {
  $choicesGrid.innerHTML = "";
  const given = answers[realIdx];

  q.choices.forEach((opt, idx) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (submitted) btn.classList.add("locked");

    const selected = given === opt;
    const isCorrectChoice = opt === q.correctAnswer;

    const letters = ['a', 'b', 'c', 'd'];
    btn.innerHTML = `<span class="choice-letter">${letters[idx]}.</span><span>${opt}</span>`;
    btn.setAttribute("aria-pressed", selected ? "true" : "false");

    if (!submitted) {
      if (selected) btn.classList.add("selected");
      btn.addEventListener("click", () => {
        if (submitted) return;
        answers[realIdx] = opt;
        renderQuestion();
        updateNavGrid();
        updateProgress();
      });
    } else {
      if (isCorrectChoice) {
        btn.classList.add("correct-reveal");
        btn.innerHTML += `<span class="mark ok">✓</span>`;
      } else if (selected && !isCorrectChoice) {
        btn.classList.add("wrong-reveal");
        btn.innerHTML += `<span class="mark no">✗</span>`;
      } else {
        btn.classList.add("faded-reveal");
      }
    }
    $choicesGrid.appendChild(btn);
  });
}

function renderMatchingUI(q, realIdx) {
  const container = document.createElement("div");
  container.id = "matching-grid-wrapper";
  container.className = "matching-container";

  const given = answers[realIdx];
  const isAnswered = given !== undefined;

  // Set up local transient state if loading an unanswered question
  if (!isAnswered) {
    if (!q.shuffledLeft) {
      q.shuffledLeft = shuffle(q.pairs.map(p => p.base));
      q.shuffledRight = shuffle(q.pairs.map(p => p.conjugated));
      q.localMatched = []; // pairs matched so far
    }
  }

  // Left Column (Bases)
  const leftCol = document.createElement("div");
  leftCol.className = "matching-col";
  leftCol.innerHTML = `<div class="matching-col-title">Adjectives</div>`;
  
  const leftItems = isAnswered ? q.pairs.map(p => p.base) : q.shuffledLeft;
  leftItems.forEach(base => {
    const card = document.createElement("div");
    card.className = "match-card";
    card.textContent = base;
    
    const isAlreadyMatched = isAnswered || q.localMatched.some(pair => pair.left === base);
    if (isAlreadyMatched) {
      card.classList.add("matched");
    } else {
      if (activeLeftSelected === base) card.classList.add("selected");
      card.addEventListener("click", () => {
        if (activeLeftSelected === base) {
          activeLeftSelected = null;
        } else {
          activeLeftSelected = base;
        }
        renderMatchingUIElements(q, container, realIdx);
      });
    }
    leftCol.appendChild(card);
  });

  // Right Column (Conjugations)
  const rightCol = document.createElement("div");
  rightCol.className = "matching-col";
  rightCol.innerHTML = `<div class="matching-col-title">Conjugated Forms</div>`;

  const rightItems = isAnswered ? q.pairs.map(p => p.conjugated) : q.shuffledRight;
  rightItems.forEach(conj => {
    const card = document.createElement("div");
    card.className = "match-card";
    card.textContent = conj;

    const isAlreadyMatched = isAnswered || q.localMatched.some(pair => pair.right === conj);
    if (isAlreadyMatched) {
      card.classList.add("matched");
    } else {
      if (activeRightSelected === conj) card.classList.add("selected");
      card.addEventListener("click", () => {
        if (activeRightSelected === conj) {
          activeRightSelected = null;
        } else {
          activeRightSelected = conj;
          // If left was already selected, evaluate match!
          if (activeLeftSelected) {
            evaluateMatch(q, container, realIdx);
            return;
          }
        }
        renderMatchingUIElements(q, container, realIdx);
      });
    }
    rightCol.appendChild(card);
  });

  container.appendChild(leftCol);
  container.appendChild(rightCol);

  $choicesGrid.parentNode.insertBefore(container, $choicesGrid.nextSibling);
}

// Re-render only matching layout elements (to update active selection highlights)
function renderMatchingUIElements(q, container, realIdx) {
  const oldMatching = document.getElementById("matching-grid-wrapper");
  if (oldMatching) oldMatching.remove();
  renderMatchingUI(q, realIdx);
}

function evaluateMatch(q, container, realIdx) {
  const left = activeLeftSelected;
  const right = activeRightSelected;

  // Find correct right side
  const pair = q.pairs.find(p => p.base === left);
  const correctRight = pair ? pair.conjugated : null;

  const cards = container.querySelectorAll(".match-card");
  let leftCard, rightCard;
  cards.forEach(c => {
    if (c.textContent === left) leftCard = c;
    if (c.textContent === right) rightCard = c;
  });

  if (right === correctRight) {
    // Correct Match
    q.localMatched.push({ left, right });
    activeLeftSelected = null;
    activeRightSelected = null;

    leftCard.className = "match-card matched";
    rightCard.className = "match-card matched";

    if (q.localMatched.length === q.pairs.length) {
      answers[realIdx] = "completed";
      updateProgress();
      setTimeout(() => {
        renderQuestion();
      }, 500);
    } else {
      renderMatchingUIElements(q, container, realIdx);
    }
  } else {
    // Incorrect Match - flash red and shake
    leftCard.className = "match-card wrong";
    rightCard.className = "match-card wrong";
    activeLeftSelected = null;
    activeRightSelected = null;

    setTimeout(() => {
      leftCard.className = "match-card";
      rightCard.className = "match-card";
      renderMatchingUIElements(q, container, realIdx);
    }, 500);
  }
}

/* ═══════════════════════════════════════════════════════════════
   NAV BUTTON MANAGEMENT
   ═══════════════════════════════════════════════════════════════ */
function updateNavButtons() {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  $btnPrev.disabled = currentQ === 0;

  if (!submitted) {
    const isLast = currentQ === quiz.length - 1;
    if (isLast) {
      $btnNext.classList.add("hidden");
      $btnSubmit.classList.remove("hidden");
      $btnSubmit.disabled = false;
    } else {
      $btnNext.classList.remove("hidden");
      $btnSubmit.classList.add("hidden");
      $btnNext.textContent = "Next →";
    }
  } else {
    $btnSubmit.classList.add("hidden");
    $btnNext.classList.remove("hidden");
    
    if (reviewMode) {
      if (currentQ === total - 1) {
        $btnNext.textContent = "Done reviewing ✓";
      } else {
        $btnNext.textContent = "Next →";
      }
      $btnNext.disabled = false;
    } else {
      $btnNext.textContent = "Next →";
      $btnNext.disabled = currentQ === total - 1;
    }
  }
}

$btnPrev.addEventListener("click", () => {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
});

$btnNext.addEventListener("click", () => {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  if (currentQ < total - 1) {
    currentQ++;
    renderQuestion();
  } else if (reviewMode) {
    reviewMode = false;
    $reviewBanner.style.display = "none";
    $scoreBanner.style.display = "block";
    $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });
  }
});

/* ═══════════════════════════════════════════════════════════════
   SUBMIT & EMAILJS
   ═══════════════════════════════════════════════════════════════ */
$btnSubmit.addEventListener("click", () => submitQuiz(false));

async function submitQuiz(force = false) {
  const answeredCount = Object.keys(answers).length;
  
  if (!force && answeredCount < quiz.length) {
    const skipped = [];
    quiz.forEach((_, i) => {
      if (!answers[i]) skipped.push(i);
    });

    $skippedWarning.innerHTML = `⚠️ You have unanswered questions: ` + 
      skipped.map(idx => `<span class="skipped-link" onclick="jumpToQuestion(${idx})">Question ${idx + 1}</span>`).join(", ") + 
      `. Please answer them before submitting.`;
    $skippedWarning.classList.remove("hidden");
    $skippedWarning.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  $skippedWarning.classList.add("hidden");
  stopTimer();
  $timerDisplay.parentElement.style.display = "none";

  // Score
  let score = 0;
  quiz.forEach((q, i) => {
    if (answers[i] === q.correctAnswer) score++;
  });

  submitted = true;
  const pct = Math.round((score / quiz.length) * 100);

  $scoreNum.textContent = `${score}/${quiz.length}`;
  if (score >= 23) {
    $scoreLbl.textContent = "完璧！ Perfect!";
    $scoreBanner.style.background = "#e8f5e9";
    $scoreBanner.style.borderColor = "#2e7d32";
    $scoreBanner.style.color = "#1b5e20";
  } else if (score >= 16) {
    $scoreLbl.textContent = "いいですね！ Good job!";
    $scoreBanner.style.background = "#fff9c4";
    $scoreBanner.style.borderColor = "#fbc02d";
    $scoreBanner.style.color = "#f57f17";
  } else {
    $scoreLbl.textContent = "もう一度！ Try again!";
    $scoreBanner.style.background = "#ffebee";
    $scoreBanner.style.borderColor = "#c62828";
    $scoreBanner.style.color = "#b71c1c";
  }
  $scoreBanner.style.display = "block";

  // Show review buttons
  const wrongCount = quiz.length - score;
  $btnReview.disabled = wrongCount === 0;
  $btnReview.textContent = wrongCount === 0
    ? "🎉 No mistakes!"
    : `📝 Review ${wrongCount} wrong answer${wrongCount > 1 ? 's' : ''}`;

  currentQ = 0;
  renderQuestion();
  updateNavGrid();
  $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });

  // EmailJS sending
  const cfg = QUIZ_CONFIG.emailjs;
  const now = new Date().toLocaleString(cfg.locale, {
    timeZone: cfg.timezone, dateStyle: "full", timeStyle: "short"
  });
  
  const elapsedSeconds = 1200 - timeLeft;
  
  const details = quiz.map((q, i) => {
    const stripHtml = (s) => s.replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
    return `${i + 1}. [${q.category}] ${stripHtml(q.stem)} → Answered: ${answers[i] || "—"} | Correct: ${q.correctAnswer} ${answers[i] === q.correctAnswer ? "✓" : "✗"}`;
  }).join("\n");

  const emailParams = {
    name: playerName,
    email: "noreply@quiz.com",
    subject: `[${playerName}] Adjective Conjugation Quiz — ${pct}%`,
    message: `Adjective Conjugation Quiz Results\nScore: ${score}/${quiz.length} (${pct}%)\nTime: ${formatDuration(elapsedSeconds)}\nDate: ${now}\n\n--- Detailed results ---\n${details}`,
    time: now
  };

  $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
  try {
    await emailjs.send(cfg.serviceId, cfg.templateId, emailParams);
    $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
  } catch (err) {
    console.error("EmailJS error:", err);
    $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || 'Email failed'}</span>`;
  }
}



/* ═══════════════════════════════════════════════════════════════
   REVIEW & RETAKE & HOME
   ═══════════════════════════════════════════════════════════════ */
$btnReview.addEventListener("click", () => {
  reviewIndices = quiz
    .map((q, i) => ({ i, wrong: answers[i] !== q.correctAnswer }))
    .filter(x => x.wrong)
    .map(x => x.i);
  if (reviewIndices.length === 0) return;
  reviewMode = true;
  currentQ = 0;
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "block";
  renderQuestion();
});

$btnRetake.addEventListener("click", () => {
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];

  // Reset matching items cache
  quiz.forEach(q => {
    if (q.type === 'matching') {
      delete q.shuffledLeft;
      delete q.shuffledRight;
      delete q.localMatched;
    }
  });

  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  $timerDisplay.parentElement.style.display = "flex";

  buildNavGrid();
  renderQuestion();
  updateProgress();
  startTimer();
  window.scrollTo({ top: 0, behavior: "smooth" });
});

$btnHome.addEventListener("click", () => {
  stopTimer();
  $quizScreen.style.display = "none";
  $nameScreen.style.display = "block";
});

window.jumpToQuestion = function(idx) {
  if (reviewMode) {
    const rIdx = reviewIndices.indexOf(idx);
    if (rIdx !== -1) currentQ = rIdx;
  } else {
    currentQ = idx;
  }
  renderQuestion();
};
</script>
