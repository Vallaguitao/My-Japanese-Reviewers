<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      linear-gradient(90deg, rgba(169, 52, 42, 0.06) 1px, transparent 1px),
      linear-gradient(180deg, rgba(38, 58, 99, 0.04), transparent 34rem),
      #f8f3ea;
    background-size: 44px 44px, auto, auto;
    color: #18202f;
    font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  .container {
    max-width: 620px;
    margin: 0 auto;
    padding: 32px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* Inline Japanese helper — slightly larger, JP-first font stack */
  .jp {
    font-family: 'Noto Sans JP', 'Zen Kaku Gothic New', sans-serif;
    font-size: 1.08em;
    font-weight: 700;
  }
  .blank {
    display: inline-block;
    min-width: 28px;
    padding: 0 6px;
    margin: 0 2px;
    background: #a9342a;
    color: #ffffff;
    border-radius: 6px;
    font-weight: 800;
    text-align: center;
  }
  ruby rt { font-size: 0.6em; color: #667085; }

  /* ── Card Styles ── */
  .card, .q-card, .score-banner {
    background: rgba(255, 253, 248, 0.94);
    border-radius: 8px;
    padding: 32px 24px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    box-shadow: 0 12px 40px rgba(24, 32, 47, 0.06);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  /* ── Name Screen ── */
  #name-screen { margin-top: 40px; }

  .badge {
    display: inline-block;
    background: #a9342a;
    color: #ffffff;
    font-weight: 800;
    font-size: 10px;
    padding: 5px 16px;
    border-radius: 20px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    box-shadow: 0 4px 12px rgba(169, 52, 42, 0.15);
  }

  .title {
    font-size: 26px;
    font-weight: 800;
    margin: 16px 0 6px;
    letter-spacing: -0.5px;
    color: #18202f;
  }

  .subtitle {
    font-size: 14px;
    color: #667085;
  }

  .name-label {
    display: block;
    font-size: 13px;
    color: #667085;
    margin: 32px 0 8px;
    text-align: left;
    font-weight: 700;
  }

  .name-input {
    width: 100%;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    background: #ffffff;
    color: #18202f;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
  }
  .name-input:focus {
    border-color: #a9342a;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(169, 52, 42, 0.15);
  }

  .btn-primary {
    width: 100%;
    margin-top: 24px;
    padding: 16px 0;
    border-radius: 8px;
    background: #a9342a;
    border: none;
    color: #ffffff;
    font-size: 16px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.25);
    transition: all 0.25s ease;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(169, 52, 42, 0.35);
    opacity: 0.95;
  }
  .btn-primary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ── Quiz Screen ── */
  #quiz-screen { display: none; }

  .header { text-align: center; margin-bottom: 24px; }
  .header .subtitle { margin-top: 6px; }

  /* Score Banner */
  .score-banner {
    display: none;
    border-radius: 8px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 24px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    box-shadow: 0 12px 40px rgba(24, 32, 47, 0.06);
    animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .score-number { font-size: 52px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; margin-bottom: 6px; }
  .score-label { font-size: 20px; font-weight: 700; margin-bottom: 14px; }
  .lesson-breakdown {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px;
    margin-bottom: 14px;
  }
  .lesson-stat {
    background: rgba(24, 32, 47, 0.05);
    border: 1px solid rgba(24, 32, 47, 0.1);
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    color: inherit;
  }
  .email-row { margin-bottom: 20px; }
  .email-pill {
    display: inline-block;
    background: rgba(24, 32, 47, 0.04);
    border: 1px solid rgba(24, 32, 47, 0.12);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 700;
    color: #18202f;
  }
  .email-pill.sent {
    background: #e8f5e9;
    border: 1px solid #2e7d32;
    color: #1b5e20;
  }
  .email-pill.error {
    background: #ffebee;
    border: 1px solid #c62828;
    color: #b71c1c;
  }

  .end-actions {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px;
  }
  .btn-end {
    background: rgba(24, 32, 47, 0.06);
    border: 1px solid rgba(24, 32, 47, 0.12);
    color: #18202f;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-end:hover:not(:disabled) {
    background: #f4ddd8;
    border-color: rgba(169, 52, 42, 0.2);
    color: #a9342a;
    transform: translateY(-1px);
  }
  .btn-end:disabled { opacity: 0.4; cursor: default; }

  /* ── Review Banner ── */
  .review-banner {
    display: none;
    background: #fff9c4;
    border: 1px solid #fbc02d;
    color: #f57f17;
    text-align: center;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* Progress */
  .progress-row { margin-bottom: 20px; }
  .progress-text { font-size: 12px; color: #667085; display: block; margin-bottom: 8px; font-weight: 700; }
  .progress-bar { height: 6px; background: rgba(24, 32, 47, 0.06); border-radius: 6px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #a9342a, #8f241c);
    border-radius: 6px;
    width: 0%;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(169, 52, 42, 0.15);
  }

  /* Nav Grid */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }
  .nav-dot {
    aspect-ratio: 1;
    border-radius: 50%;
    background: #fffdf8;
    border: 1px solid rgba(24, 32, 47, 0.12);
    color: #667085;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-dot:hover:not(.locked) {
    background: #f4ddd8;
    color: #a9342a;
    border-color: rgba(169, 52, 42, 0.2);
  }
  .nav-dot.answered {
    background: rgba(169, 52, 42, 0.06);
    border-color: rgba(169, 52, 42, 0.2);
    color: #a9342a;
  }
  .nav-dot.active {
    border-color: #a9342a;
    background: #f4ddd8;
    color: #a9342a;
    box-shadow: 0 0 0 3px rgba(169, 52, 42, 0.15);
  }
  .nav-dot.correct {
    background: #e8f5e9;
    border-color: #2e7d32;
    color: #1b5e20;
  }
  .nav-dot.wrong {
    background: #ffebee;
    border-color: #c62828;
    color: #b71c1c;
  }
  .nav-dot.unanswered-locked {
    background: rgba(24, 32, 47, 0.02);
    border-color: rgba(24, 32, 47, 0.06);
    color: rgba(24, 32, 47, 0.3);
    opacity: 0.5;
  }
  @media (max-width: 480px) {
    .nav-grid { gap: 4px; }
    .nav-dot { font-size: 10px; }
  }

  /* Question Card */
  .q-card {
    background: rgba(255, 253, 248, 0.94);
    border-radius: 8px;
    padding: 28px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(24, 32, 47, 0.04);
    animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .q-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 8px;
    letter-spacing: 0.3px;
  }
  .q-tag.lesson-1 { background: #e3f2fd; color: #0d47a1; }
  .q-tag.lesson-2 { background: #e8f5e9; color: #1b5e20; }
  .q-tag.lesson-3 { background: #fff8e1; color: #ff6f00; }
  .q-tag.lesson-4 { background: #fce4ec; color: #880e4f; }
  .q-tag.lesson-5 { background: #f3e5f5; color: #4a148c; }
  .q-tag.type {
    background: rgba(24, 32, 47, 0.05);
    color: #667085;
  }

  .q-number {
    font-size: 11px;
    color: #a9342a;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .q-stem {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
    line-height: 1.45;
    color: #18202f;
  }

  .choices-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .choice-btn {
    padding: 18px 20px;
    border-radius: 8px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    background: #fffdf8;
    color: #18202f;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    position: relative;
    display: flex;
    align-items: center;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  .choice-btn:hover:not(.locked) {
    border-color: rgba(169, 52, 42, 0.3);
    background: #f4ddd8;
    color: #a9342a;
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.05);
  }
  .choice-btn.selected {
    background: #f4ddd8;
    border-color: #a9342a;
    color: #a9342a;
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.1);
  }
  .choice-btn.correct-reveal {
    background: #e8f5e9;
    border-color: #2e7d32;
    color: #1b5e20;
  }
  .choice-btn.wrong-reveal {
    background: #ffebee;
    border-color: #c62828;
    color: #b71c1c;
  }
  .choice-btn.faded-reveal {
    opacity: 0.4;
    border-color: rgba(24, 32, 47, 0.04);
  }
  .choice-letter {
    font-weight: 800;
    margin-right: 16px;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .choice-btn:hover .choice-letter, .choice-btn.selected .choice-letter { opacity: 1; }
  
  .mark {
    position: absolute;
    right: 20px;
    font-size: 20px;
    font-weight: 900;
  }
  .mark.ok { color: #1b5e20; }
  .mark.no { color: #b71c1c; }

  /* Explanation Box / Feedback Card */
  .feedback-card {
    display: none;
    margin-top: 24px;
    padding: 18px 20px;
    border-radius: 8px;
    background: #fff8ef;
    border: 1px solid rgba(169, 52, 42, 0.15);
    font-size: 14px;
    line-height: 1.55;
    color: #18202f;
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fb-header {
    font-weight: 800;
    margin-bottom: 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .feedback-card.correct .fb-header { color: #2e7d32; }
  .feedback-card.wrong .fb-header { color: #c62828; }
  .fb-block { margin-top: 8px; }
  .fb-block.connect { color: #667085; font-size: 13px; }
  .fb-block.warn {
    color: #b71c1c;
    background: #ffebee;
    border: 1px solid rgba(198, 40, 40, 0.2);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
  }

  /* Skipped warning alert box */
  .skipped-warning {
    margin-bottom: 20px;
    padding: 16px;
    background: #fff8ef;
    border: 1px solid #a9342a;
    border-radius: 8px;
    color: #a9342a;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  .skipped-link {
    color: #a9342a;
    text-decoration: underline;
    cursor: pointer;
    margin: 0 4px;
    font-weight: 800;
  }
  .skipped-link:hover {
    color: #8f241c;
  }

  /* Arrow Row */
  .arrow-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn-nav {
    flex: 1;
    padding: 16px 0;
    border-radius: 8px;
    background: #fffdf8;
    border: 1px solid rgba(24, 32, 47, 0.12);
    color: #18202f;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-nav:hover:not(:disabled) {
    background: #f4ddd8;
    color: #a9342a;
    border-color: rgba(169, 52, 42, 0.2);
  }
  .btn-nav:disabled { opacity: 0.25; cursor: not-allowed; }
  
  .btn-submit {
    flex: 1;
    padding: 16px 0;
    border-radius: 8px;
    background: #a9342a;
    border: none;
    color: #ffffff;
    font-size: 15px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.25);
    transition: all 0.2s;
  }
  .btn-submit:hover:not(:disabled) {
    box-shadow: 0 6px 20px rgba(169, 52, 42, 0.35);
    opacity: 0.95;
  }
  .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

  .text-center { text-align: center; }
  .hidden { display: none !important; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .container { padding: 16px 12px 50px; }
    .title { font-size: 20px; }
    .q-stem { font-size: 16px; }
    .choice-btn { font-size: 15px; padding: 12px 10px; }
    .lesson-breakdown { gap: 6px; }
    .lesson-stat { font-size: 11px; padding: 5px 9px; }
  }

/* ========== Site Breadcrumb ========== */
.site-breadcrumb,
.site-breadcrumb * {
  box-sizing: border-box;
}

.site-breadcrumb {
  position: relative;
  z-index: 20;
  width: min(1180px, calc(100% - 32px));
  margin: 16px auto 12px;
  font-family: "Noto Sans JP", "Outfit", system-ui, sans-serif;
  color: #18202f;
}

.site-breadcrumb__list {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0;
  list-style: none;
  margin: 0;

  border: 1px solid rgba(24, 32, 47, 0.12);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.94);
  box-shadow: 0 10px 30px rgba(24, 32, 47, 0.08);
}

.site-breadcrumb__item {
  display: inline-flex;
  align-items: center;
  min-width: 0;
  color: #667085;
  font-size: 0.82rem;
  font-weight: 700;
  line-height: 1.4;
}

.site-breadcrumb__item + .site-breadcrumb__item::before {
  content: "/";
  margin: 0 8px;
  color: rgba(169, 52, 42, 0.42);
  font-weight: 800;
}

.site-breadcrumb__link {
  color: #667085;
  text-decoration: none;
  transition: color 0.18s ease, background 0.18s ease;
}

.site-breadcrumb__link:hover {
  color: #a9342a;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__link:focus-visible {
  color: #a9342a;
  outline: 2px solid rgba(169, 52, 42, 0.45);
  outline-offset: 3px;
  border-radius: 4px;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__category {
  color: #a9342a;
}

.site-breadcrumb__current {
  color: #18202f;
  overflow-wrap: anywhere;
}

.site-breadcrumb__navigation {
  margin-left: auto;
}

.site-breadcrumb__navigation::before {
  display: none !important;
}

.site-breadcrumb__btn-short {
  display: none;
}

.site-breadcrumb__btn-full {
  display: inline;
}

.site-breadcrumb__divider {
  color: rgba(24, 32, 47, 0.12);
  margin: 0 6px;
}

@media (max-width: 768px) {
  .progress-container + .presentation {
    padding-top: 160px;
  }
}

@media (max-width: 640px) {
  .site-breadcrumb {
    width: min(100% - 20px, 680px);
    margin: 12px auto 10px;
  }

  .site-breadcrumb__list {
    padding: 8px 10px;
  }

  .site-breadcrumb__item {
    font-size: 0.78rem;
  }

  .site-breadcrumb__btn-full {
    display: none;
  }

  .site-breadcrumb__btn-short {
    display: inline;
  }
}
</style>
</head>

<div class="container">

  <!-- ════ NAME SCREEN ════ -->
  <div id="name-screen">
    <div class="card text-center">
      <span class="badge" id="ns-badge"></span>
      <h1 class="title" id="ns-title"></h1>
      <p class="subtitle" id="ns-subtitle"></p>

      <label class="name-label" for="name-input">おなまえは？ Enter your name</label>
      <input class="name-input" id="name-input" type="text" placeholder="Your name..." autocomplete="off" autofocus>
      <button class="btn-primary" id="btn-start" disabled>Start Quiz →</button>
    </div>
  </div>

  <!-- ════ QUIZ SCREEN ════ -->
  <div id="quiz-screen">
    <header class="header">
      <span class="badge" id="qs-badge"></span>
      <h1 class="title" id="qs-title"></h1>
      <p class="subtitle" id="quiz-subtitle"></p>
    </header>

    <div class="score-banner" id="score-banner" aria-live="polite">
      <div class="score-number" id="score-number"></div>
      <div class="score-label" id="score-label"></div>
      <div class="lesson-breakdown" id="lesson-breakdown"></div>
      <div class="email-row" id="email-row"></div>
      <div class="end-actions">
        <button class="btn-end" id="btn-review" disabled>📝 Review wrong answers</button>
        <button class="btn-end" id="btn-retake">🔄 Retake quiz</button>
      </div>
    </div>

    <div class="review-banner" id="review-banner">
      📝 Review mode — showing only the questions you got wrong
    </div>

    <div class="progress-row">
      <span class="progress-text" id="progress-text">0 / 0 answered</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let playerName = "";
let quiz = [];
let answers = {};
let currentQ = 0;
let submitted = false;
let reviewMode = false;
let reviewIndices = [];

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickScoreTier(pct) {
  const tiers = QUIZ_CONFIG.scoreThresholds;
  if (pct >= tiers.perfect.min)   return tiers.perfect;
  if (pct >= tiers.excellent.min) return tiers.excellent;
  if (pct >= tiers.good.min)      return tiers.good;
  return tiers.fail;
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
emailjs.init(QUIZ_CONFIG.emailjs.publicKey);

/* DOM refs */
const $nameScreen   = document.getElementById("name-screen");
const $quizScreen   = document.getElementById("quiz-screen");

const $reviewBanner = document.getElementById("review-banner");
const $progText     = document.getElementById("progress-text");
const $progFill     = document.getElementById("progress-fill");
const $navGrid      = document.getElementById("nav-grid");
const $qLessonTag   = document.getElementById("q-lesson-tag");

/* Populate header text from CONFIG */
document.title = QUIZ_CONFIG.title;
document.getElementById("ns-badge").textContent = QUIZ_CONFIG.badge;
document.getElementById("ns-title").textContent = QUIZ_CONFIG.title;
document.getElementById("ns-subtitle").textContent = QUIZ_CONFIG.subtitle;
document.getElementById("qs-badge").textContent = QUIZ_CONFIG.badge;
document.getElementById("qs-title").textContent = QUIZ_CONFIG.titleShort;

/* ═══════════════════════════════════════════════════════════════
   NAME SCREEN
   ═══════════════════════════════════════════════════════════════ */
$nameInput.addEventListener("input", () => {
  $btnStart.disabled = !$nameInput.value.trim();
});
$nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && $nameInput.value.trim()) startQuiz();
});
$btnStart.addEventListener("click", startQuiz);

function startQuiz() {
  playerName = $nameInput.value.trim();
  const baseQuestions = QUIZ_CONFIG.shuffleQuestions ? shuffle(QUESTIONS) : [...QUESTIONS];
  quiz = baseQuestions.map(q => ({
    ...q,
    choices: QUIZ_CONFIG.shuffleChoices ? shuffle(q.choices) : [...q.choices]
  }));
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];

  $nameScreen.style.display = "none";
  $quizScreen.style.display = "block";
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  $subtitle.textContent = `${playerName}さん — choose the correct answer for each question`;

  buildNavGrid();
  renderQuestion();
  updateProgress();
}

/* ═══════════════════════════════════════════════════════════════
   NAV GRID
   ═══════════════════════════════════════════════════════════════ */
function buildNavGrid() {
  $navGrid.innerHTML = "";
  quiz.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot";
    btn.textContent = i + 1;
    btn.setAttribute("aria-label", `Question ${i + 1}`);
    btn.addEventListener("click", () => {
      if (reviewMode) {
        const idx = reviewIndices.indexOf(i);
        if (idx === -1) return;
        currentQ = idx;
      } else {
        currentQ = i;
      }
      renderQuestion();
    });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;

  if (submitted) {
    $navGrid.classList.remove("hidden");
  } else {
    $navGrid.classList.add("hidden");
  }

  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    let label = `Question ${i + 1}`;
    if (i === realIdx) { dot.classList.add("active"); label += ", current"; }
    
    if (submitted) {
      dot.classList.add("locked");
      if (answers[i] === quiz[i].answer) {
        dot.classList.add("correct"); label += ", correct";
      } else if (answers[i] !== undefined) {
        dot.classList.add("wrong"); label += ", incorrect";
      } else {
        dot.classList.add("unanswered-locked"); label += ", unanswered";
      }
    } else {
      if (answers[i] !== undefined) {
        dot.classList.add("answered"); label += ", answered";
      }
    }
    dot.setAttribute("aria-label", label);
  });
}

/* ═══════════════════════════════════════════════════════════════
   PROGRESS
   ═══════════════════════════════════════════════════════════════ */
function updateProgress() {
  if (reviewMode) {
    $progText.textContent = `Reviewing ${currentQ + 1} / ${reviewIndices.length}`;
    $progFill.style.width = `${((currentQ + 1) / reviewIndices.length) * 100}%`;
    return;
  }
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${quiz.length} answered`;
  $progFill.style.width = `${(count / quiz.length) * 100}%`;
  $btnSubmit.disabled = false;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER QUESTION
   ═══════════════════════════════════════════════════════════════ */
function renderQuestion() {
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  const q = quiz[realIdx];

  /* Lesson + type tags */
  const lessonLabels = {1: "🗣️ マナー", 2: "🏠 くらし", 3: "🛒 サービス", 4: "💬 副詞", 5: "💭 リアクション"};
  $qLessonTag.className = `q-tag lesson-${q.lesson}`;
  $qLessonTag.textContent = lessonLabels[q.lesson] || `📘 Lesson ${q.lesson}`;
  $qTypeTag.textContent = q.type;

  /* Number + stem */
  $qNumber.textContent = reviewMode
    ? `Review ${currentQ + 1} of ${reviewIndices.length}`
    : `Question ${realIdx + 1} of ${quiz.length}`;
  $qStem.innerHTML = q.stem;

  /* Choices */
  $choicesGrid.innerHTML = "";
  const isAnswered = answers[realIdx] !== undefined;

  q.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (submitted) btn.classList.add("locked");

    const letters = ['a', 'b', 'c', 'd'];
    btn.innerHTML = `<span class="choice-letter">${letters[i]}.</span><span>${c}</span>`;
    
    const selected = answers[realIdx] === c;
    const isCorrectChoice = c === q.answer;

    if (!submitted) {
      if (selected) btn.classList.add("selected");
      btn.addEventListener("click", () => {
        if (submitted) return;
        answers[realIdx] = c;
        renderQuestion();
      });
    } else {
      if (isCorrectChoice) {
        btn.classList.add("correct-reveal");
        btn.innerHTML += `<span class="mark ok">✓</span>`;
      } else if (selected && !isCorrectChoice) {
        btn.classList.add("wrong-reveal");
        btn.innerHTML += `<span class="mark no">✗</span>`;
      } else {
        btn.classList.add("faded-reveal");
      }
    }

    $choicesGrid.appendChild(btn);
  });

  /* Feedback card */
  if (submitted && isAnswered) {
    renderFeedback(q, answers[realIdx]);
  } else {
    $feedbackCard.style.display = "none";
    $feedbackCard.innerHTML = "";
  }

  // Hide skipped questions warning when navigating to a question
  $skippedWarning.classList.add("hidden");

  updateNavGrid();
  updateProgress();
  updateNavButtons();
}

function renderFeedback(q, given) {
  const isCorrect = given === q.answer;
  $feedbackCard.className = `feedback-card ${isCorrect ? "correct" : "wrong"}`;
  $feedbackCard.style.display = "block";

  let html = `<div class="fb-header">${isCorrect ? "✓ Correct" : `✗ Not quite — answer: ${q.answer}`}</div>`;
  if (q.correctNote) html += `<div>${q.correctNote}</div>`;
  if (q.explain)     html += `<div class="fb-block">${q.explain}</div>`;
  if (q.connect)     html += `<div class="fb-block connect">${q.connect}</div>`;
  if (q.warn)        html += `<div class="fb-block warn">${q.warn}</div>`;

  $feedbackCard.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   NAV BUTTONS
   ═══════════════════════════════════════════════════════════════ */
function updateNavButtons() {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  $btnPrev.disabled = currentQ === 0;

  if (!submitted) {
    const isLast = currentQ === quiz.length - 1;
    if (isLast) {
      $btnNext.classList.add("hidden");
      $btnSubmit.classList.remove("hidden");
    } else {
      $btnNext.classList.remove("hidden");
      $btnSubmit.classList.add("hidden");
      $btnNext.textContent = "Next →";
    }
  } else {
    $btnSubmit.classList.add("hidden");
    $btnNext.classList.remove("hidden");
    
    if (reviewMode) {
      if (currentQ === total - 1) {
        $btnNext.textContent = "Done reviewing ✓";
      } else {
        $btnNext.textContent = "Next →";
      }
      $btnNext.disabled = false;
    } else {
      $btnNext.textContent = "Next →";
      $btnNext.disabled = currentQ === total - 1;
    }
  }
}

$btnPrev.addEventListener("click", () => {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
});
$btnNext.addEventListener("click", () => {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  if (currentQ < total - 1) {
    currentQ++; renderQuestion();
  } else if (reviewMode) {
    /* Exit review mode back to results */
    reviewMode = false;
    $reviewBanner.style.display = "none";
    $scoreBanner.style.display = "block";
    $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });
  }
});

/* ═══════════════════════════════════════════════════════════════
   SUBMIT — score, render results, send email
   ═══════════════════════════════════════════════════════════════ */
$btnSubmit.addEventListener("click", submitQuiz);

async function submitQuiz() {
  const count = Object.keys(answers).length;
  if (count < quiz.length) {
    const skipped = [];
    quiz.forEach((_, i) => {
      if (answers[i] === undefined) skipped.push(i);
    });

    $skippedWarning.innerHTML = `⚠️ You have unanswered questions: ` + 
      skipped.map(idx => `<span class="skipped-link" onclick="jumpToQuestion(${idx})">Question ${idx + 1}</span>`).join(", ") + 
      `. Please answer them before submitting.`;
    $skippedWarning.classList.remove("hidden");
    return;
  }

  $skippedWarning.classList.add("hidden");

  let correct = 0;
  const lessonStats = {};

  quiz.forEach((q, i) => {
    const isRight = answers[i] === q.answer;
    if (isRight) correct++;
    if (!lessonStats[q.lesson]) lessonStats[q.lesson] = { correct: 0, total: 0 };
    lessonStats[q.lesson].total++;
    if (isRight) lessonStats[q.lesson].correct++;
  });

  submitted = true;
  const pct = Math.round((correct / quiz.length) * 100);
  const tier = pickScoreTier(pct);

  $scoreNum.textContent = `${correct}/${quiz.length}`;
  $scoreLbl.textContent = tier.label;
  $scoreBanner.style.background = tier.bg;
  $scoreBanner.style.borderColor = tier.border;
  $scoreBanner.style.color = tier.text;
  $scoreBanner.style.display = "block";

  /* Per-lesson breakdown */
  $lessonBreak.innerHTML = "";
  const lessonNames = {1: "マナー", 2: "くらし", 3: "サービス", 4: "副詞", 5: "リアクション"};
  Object.keys(lessonStats).sort((a, b) => +a - +b).forEach(l => {
    const s = lessonStats[l];
    const span = document.createElement("span");
    span.className = "lesson-stat";
    span.textContent = `${lessonNames[l] || "L"+l}: ${s.correct}/${s.total}`;
    $lessonBreak.appendChild(span);
  });

  /* Enable review button if there are wrong answers */
  const wrongCount = quiz.length - correct;
  $btnReview.disabled = wrongCount === 0;
  $btnReview.textContent = wrongCount === 0
    ? "🎉 No mistakes!"
    : `📝 Review ${wrongCount} wrong answer${wrongCount > 1 ? "s" : ""}`;

  currentQ = 0;
  renderQuestion();
  updateNavGrid();
  $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });

  /* ── Send results via EmailJS ── */
  const cfg = QUIZ_CONFIG.emailjs;
  const now = new Date().toLocaleString(cfg.locale, {
    timeZone: cfg.timezone, dateStyle: "full", timeStyle: "short"
  });
  const details = quiz.map((q, i) => {
    const stripHtml = (s) => s.replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
    return `${i + 1}. [L${q.lesson} ${q.type}] ${stripHtml(q.stem)} → Answer: ${answers[i] || "—"} | Correct: ${q.answer} ${answers[i] === q.answer ? "✓" : "✗"}`;
  }).join("\n");

  const emailParams = {
    name: playerName,
    email: "noreply@quiz.com",
    subject: `[${playerName}] ${QUIZ_CONFIG.title} — ${pct}%`,
    message: `${QUIZ_CONFIG.title}\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${correct}/${quiz.length} (${pct}%)\n\n--- Per-category breakdown ---\n${Object.keys(lessonStats).sort((a, b) => +a - +b).map(l => {return `${lessonNames[l]||"L"+l}: ${lessonStats[l].correct}/${lessonStats[l].total}`}).join("\n")}\n\n--- Detailed results ---\n${details}\n\nがんばって！`,
    time: now
  };

  $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
  try {
    await emailjs.send(cfg.serviceId, cfg.templateId, emailParams, cfg.publicKey);
    $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
  } catch (err) {
    console.error("EmailJS error:", err);
    $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || "Email failed"}</span>`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   REVIEW + RETAKE
   ═══════════════════════════════════════════════════════════════ */
$btnReview.addEventListener("click", () => {
  reviewIndices = quiz
    .map((q, i) => ({ i, wrong: answers[i] !== q.answer }))
    .filter(x => x.wrong)
    .map(x => x.i);
  if (reviewIndices.length === 0) return;
  reviewMode = true;
  currentQ = 0;
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "block";
  renderQuestion();
});

$btnRetake.addEventListener("click", () => {
  /* Re-shuffle and reset everything */
  const baseQuestions = QUIZ_CONFIG.shuffleQuestions ? shuffle(QUESTIONS) : [...QUESTIONS];
  quiz = baseQuestions.map(q => ({
    ...q,
    choices: QUIZ_CONFIG.shuffleChoices ? shuffle(q.choices) : [...q.choices]
  }));
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  buildNavGrid();
  renderQuestion();
  updateProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
});

window.jumpToQuestion = function(idx) {
  currentQ = idx;
  renderQuestion();
};
</script>
</body>
</html>
