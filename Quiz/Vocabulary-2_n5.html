<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなの日本語 N5 — Vocabulary Reviewer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #1a1525;
    color: #e8e0f0;
    font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(232,180,200,0.07) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(120,100,180,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 540px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* ── Name Screen ── */
  #name-screen { margin-top: 50px; }

  .card {
    background: #221d2e;
    border-radius: 16px;
    padding: 28px 20px;
    border: 1px solid #3d3650;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #e8b4c8, #c89db7);
    color: #1a1525;
    font-weight: 700;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .title {
    font-size: 22px;
    font-weight: 800;
    margin: 4px 0 4px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 13px;
    color: #9e93b0;
  }

  .name-label {
    display: block;
    font-size: 13px;
    color: #9e93b0;
    margin: 24px 0 8px;
    text-align: left;
  }

  .name-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid #3d3650;
    background: #2a2535;
    color: #e8e0f0;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  
  select.name-input {
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239e93b0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 16px;
  }

  .name-input:focus { border-color: #e8b4c8; }

  .btn-primary {
    width: 100%;
    margin-top: 24px;
    padding: 14px 0;
    border-radius: 12px;
    background: linear-gradient(135deg, #e8b4c8, #c89db7);
    border: none;
    color: #1a1525;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }

  /* ── Quiz Screen ── */
  #quiz-screen { display: none; }

  .header { text-align: center; margin-bottom: 22px; }
  .header .subtitle { margin-top: 2px; }

  /* Score Banner */
  .score-banner {
    display: none;
    border-radius: 16px;
    padding: 22px 16px;
    text-align: center;
    margin-bottom: 20px;
    animation: slideDown 0.4s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .score-number { font-size: 44px; font-weight: 800; letter-spacing: -1px; }
  .score-label { font-size: 16px; font-weight: 600; margin-top: 4px; }
  .email-row { margin-top: 10px; }
  .email-pill {
    display: inline-block;
    background: #3d3650;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 12px;
  }
  .email-pill.sent { background: #2d6a4f; }
  .email-pill.error { background: #9b2226; }
  .btn-retake {
    margin-top: 12px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    padding: 8px 22px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }

  /* Progress */
  .progress-row { margin-bottom: 14px; }
  .progress-text { font-size: 12px; color: #9e93b0; display: block; margin-bottom: 6px; }
  .progress-bar { height: 4px; background: #2a2535; border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #e8b4c8, #c89db7);
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Nav Grid */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    margin-bottom: 20px;
  }
  .nav-dot {
    aspect-ratio: 1;
    border-radius: 8px;
    background: #2a2535;
    color: #e8e0f0;
    font-size: 11px;
    font-weight: 600;
    border: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav-dot.answered { background: #4a4458; }
  .nav-dot.active { border-color: #e8b4c8; }
  .nav-dot.correct { background: #2d6a4f; }
  .nav-dot.wrong { background: #9b2226; }

  /* Question Card */
  .q-card {
    background: #221d2e;
    border-radius: 16px;
    padding: 24px 18px;
    border: 1px solid #3d3650;
    margin-bottom: 16px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-number {
    font-size: 11px;
    color: #9e93b0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .q-english {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    line-height: 1.3;
  }
  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 480px) {
    .choices-grid { grid-template-columns: 1fr; }
  }
  .choice-btn {
    padding: 14px 10px;
    border-radius: 12px;
    border: 2px solid #3d3650;
    background: #2a2535;
    color: #e8e0f0;
    text-align: center;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 600;
    position: relative;
    transition: all 0.15s;
  }
  .choice-btn:hover:not(.locked) { border-color: #5c4d7a; background: #302844; }
  .choice-btn.selected { background: #5c4d7a; border-color: #e8b4c8; }
  .choice-btn.correct-reveal { background: #2d6a4f; border-color: #40916c; }
  .choice-btn.wrong-reveal { background: #9b2226; border-color: #ca6702; }
  .choice-btn .mark {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 14px;
  }
  .choice-btn .mark.ok { color: #a7f3d0; }
  .choice-btn .mark.no { color: #fca5a5; }

  /* Arrow Row */
  .arrow-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn-nav {
    flex: 1;
    padding: 12px 0;
    border-radius: 12px;
    background: #2a2535;
    border: 1px solid #3d3650;
    color: #e8e0f0;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .btn-submit {
    flex: 1;
    padding: 12px 0;
    border-radius: 12px;
    background: linear-gradient(135deg, #e8b4c8, #c89db7);
    border: none;
    color: #1a1525;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-submit:disabled { opacity: 0.35; cursor: default; }

  .text-center { text-align: center; }
  .hidden { display: none !important; }

/* ========== Site Breadcrumb ========== */
.site-breadcrumb,
.site-breadcrumb * {
  box-sizing: border-box;
}

.site-breadcrumb {
  position: relative;
  z-index: 20;
  width: min(1180px, calc(100% - 32px));
  margin: 16px auto 12px;
  font-family: "Noto Sans JP", "Outfit", system-ui, sans-serif;
  color: #18202f;
}

.site-breadcrumb__list {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0;
  list-style: none;
  margin: 0;
  padding: 8px 12px;
  border: 1px solid rgba(24, 32, 47, 0.12);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.94);
  box-shadow: 0 10px 30px rgba(24, 32, 47, 0.08);
}

.site-breadcrumb__item {
  display: inline-flex;
  align-items: center;
  min-width: 0;
  color: #667085;
  font-size: 0.82rem;
  font-weight: 700;
  line-height: 1.4;
}

.site-breadcrumb__item + .site-breadcrumb__item::before {
  content: "/";
  margin: 0 8px;
  color: rgba(169, 52, 42, 0.42);
  font-weight: 800;
}

.site-breadcrumb__link {
  color: #667085;
  text-decoration: none;
  transition: color 0.18s ease, background 0.18s ease;
}

.site-breadcrumb__link:hover {
  color: #a9342a;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__link:focus-visible {
  color: #a9342a;
  outline: 2px solid rgba(169, 52, 42, 0.45);
  outline-offset: 3px;
  border-radius: 4px;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__category {
  color: #a9342a;
}

.site-breadcrumb__current {
  color: #18202f;
  overflow-wrap: anywhere;
}

@media (max-width: 768px) {
  .progress-container + .presentation {
    padding-top: 160px;
  }
}

@media (max-width: 640px) {
  .site-breadcrumb {
    width: min(100% - 20px, 680px);
    margin: 12px auto 10px;
  }

  .site-breadcrumb__list {
    padding: 8px 10px;
  }

  .site-breadcrumb__item {
    font-size: 0.78rem;
  }
}
/* ========== End Site Breadcrumb ========== */
    </style>
</head>

      { english: "Noon / Daytime", answer: "昼（ひる）", choices: ["朝（あさ）", "夜（よる）", "昼（ひる）", "晩（ばん）"] },
      { english: "To receive", answer: "もらいます", choices: ["あげます", "もらいます", "くれます", "かします"] },
      { english: "Outside", answer: "外（そと）", choices: ["中（なか）", "外（そと）", "前（まえ）", "後ろ（うしろ）"] }
    ]
  }
};

/* ── State ── */
let playerName = "";
let currentSetKey = "";
let quiz = [];
let answers = {};
let currentQ = 0;
let submitted = false;

/* ── Helpers ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── Initialize EmailJS ── */
emailjs.init("1oR0j0WDvUmSSYEpK");

/* ── DOM refs ── */
const $nameScreen = document.getElementById("name-screen");
const $quizScreen = document.getElementById("quiz-screen");
const $nameInput  = document.getElementById("name-input");
const $setSelect  = document.getElementById("set-select");
const $btnStart   = document.getElementById("btn-start");
const $quizTitle  = document.getElementById("quiz-title");
const $subtitle   = document.getElementById("quiz-subtitle");
const $scoreBanner= document.getElementById("score-banner");
const $scoreNum   = document.getElementById("score-number");
const $scoreLbl   = document.getElementById("score-label");
const $emailRow   = document.getElementById("email-row");
const $btnRetake  = document.getElementById("btn-retake");
const $btnHome    = document.getElementById("btn-home");
const $progText   = document.getElementById("progress-text");
const $progFill   = document.getElementById("progress-fill");
const $navGrid    = document.getElementById("nav-grid");
const $qCard      = document.getElementById("q-card");
const $qNumber    = document.getElementById("q-number");
const $qEnglish   = document.getElementById("q-english");
const $choicesGrid= document.getElementById("choices-grid");
const $btnPrev    = document.getElementById("btn-prev");
const $btnNext    = document.getElementById("btn-next");
const $btnSubmit  = document.getElementById("btn-submit");

/* ── Name Screen ── */
$nameInput.addEventListener("input", () => {
  $btnStart.disabled = !$nameInput.value.trim();
});
$nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && $nameInput.value.trim()) startQuiz();
});
$btnStart.addEventListener("click", startQuiz);

function startQuiz() {
  playerName = $nameInput.value.trim();
  currentSetKey = $setSelect.value;
  const selectedSet = ALL_SETS[currentSetKey];
  
  quiz = shuffle(selectedSet.questions).map(q => ({ ...q, choices: shuffle(q.choices) }));
  answers = {};
  currentQ = 0;
  submitted = false;

  $nameScreen.style.display = "none";
  $quizScreen.style.display = "block";
  $scoreBanner.style.display = "none";
  
  $quizTitle.textContent = selectedSet.title;
  $subtitle.textContent = `${playerName}さん — Choose the correct translation`;

  buildNavGrid();
  renderQuestion();
  updateProgress();
}

/* ── Nav Grid ── */
function buildNavGrid() {
  $navGrid.innerHTML = "";
  quiz.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot";
    btn.textContent = i + 1;
    btn.addEventListener("click", () => { currentQ = i; renderQuestion(); });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    if (i === currentQ) dot.classList.add("active");
    if (!submitted && answers[i] !== undefined) dot.classList.add("answered");
    if (submitted && answers[i] === quiz[i].answer) dot.classList.add("correct");
    if (submitted && answers[i] !== undefined && answers[i] !== quiz[i].answer) dot.classList.add("wrong");
  });
}

/* ── Progress ── */
function updateProgress() {
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${quiz.length} answered`;
  $progFill.style.width = `${(count / quiz.length) * 100}%`;
  $btnSubmit.disabled = count < quiz.length;
}

/* ── Render Question ── */
function renderQuestion() {
  const q = quiz[currentQ];
  $qNumber.textContent = `Question ${currentQ + 1}`;
  $qEnglish.textContent = q.english;

  $choicesGrid.innerHTML = "";
  q.choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (submitted) btn.classList.add("locked");
    btn.innerHTML = `<span>${c}</span>`;

    const selected = answers[currentQ] === c;
    const isCorrectChoice = c === q.answer;

    if (!submitted) {
      if (selected) btn.classList.add("selected");
      btn.addEventListener("click", () => {
        if (submitted) return;
        answers[currentQ] = c;
        renderQuestion();
        updateNavGrid();
        updateProgress();
      });
    } else {
      if (isCorrectChoice) {
        btn.classList.add("correct-reveal");
        btn.innerHTML += `<span class="mark ok">✓</span>`;
      }
      if (selected && !isCorrectChoice) {
        btn.classList.add("wrong-reveal");
        btn.innerHTML += `<span class="mark no">✗</span>`;
      }
    }

    $choicesGrid.appendChild(btn);
  });

  updateNavGrid();

  /* Arrow / submit visibility */
  const isLast = currentQ === quiz.length - 1;
  $btnPrev.disabled = currentQ === 0;

  if (isLast && !submitted) {
    $btnNext.classList.add("hidden");
    $btnSubmit.classList.remove("hidden");
  } else {
    $btnNext.classList.remove("hidden");
    $btnSubmit.classList.add("hidden");
    $btnNext.disabled = isLast;
  }
}

/* ── Navigation ── */
$btnPrev.addEventListener("click", () => { if (currentQ > 0) { currentQ--; renderQuestion(); } });
$btnNext.addEventListener("click", () => { if (currentQ < quiz.length - 1) { currentQ++; renderQuestion(); } });
$btnHome.addEventListener("click", () => {
  $quizScreen.style.display = "none";
  $nameScreen.style.display = "block";
});

/* ── Submit ── */
$btnSubmit.addEventListener("click", submitQuiz);

async function submitQuiz() {
  let s = 0;
  quiz.forEach((q, i) => { if (answers[i] === q.answer) s++; });
  submitted = true;

  const pct = Math.round((s / quiz.length) * 100);
  $scoreNum.textContent = `${s}/${quiz.length}`;

  if (s === quiz.length) $scoreLbl.textContent = "完璧！ Perfect!";
  else if (s >= quiz.length * 0.9) $scoreLbl.textContent = "すごい！ Excellent!";
  else if (s >= quiz.length * 0.7) $scoreLbl.textContent = "いいですね！ Good job!";
  else $scoreLbl.textContent = "もう一度！ Try again!";

  const gradient = s >= quiz.length * 0.9
    ? "linear-gradient(135deg,#2d6a4f,#40916c)"
    : s >= quiz.length * 0.7
      ? "linear-gradient(135deg,#b08d37,#d4a843)"
      : "linear-gradient(135deg,#9b2226,#ca6702)";
  $scoreBanner.style.background = gradient;
  $scoreBanner.style.display = "block";

  currentQ = 0;
  renderQuestion();
  updateNavGrid();

  /* Hide submit, show next */
  $btnSubmit.classList.add("hidden");
  $btnNext.classList.remove("hidden");
  $btnNext.disabled = false;

  /* Email setup */
  const EMAILJS_PUBLIC_KEY  = "1oR0j0WDvUmSSYEpK";
  const EMAILJS_SERVICE_ID  = "service_v7ifzdj";
  const EMAILJS_TEMPLATE_ID = "template_lb9c879";

  const now = new Date().toLocaleString("en-PH", { timeZone: "Asia/Manila", dateStyle: "full", timeStyle: "short" });
  const details = quiz.map((q, i) =>
    `${i+1}. ${q.english} → Answer: ${answers[i] || "—"} | Correct: ${q.answer} ${answers[i] === q.answer ? "✓" : "✗"}`
  ).join("\n");

  const emailParams = {
    name: playerName,
    email: "noreply@quiz.com",
    subject: `[${playerName}] ${ALL_SETS[currentSetKey].title} Quiz — ${pct}%`,
    message: `Minna no Nihongo - ${ALL_SETS[currentSetKey].title} Vocabulary Exam Results\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${s}/${quiz.length} (${pct}%)\n\n--- Detailed Results ---\n${details}\n\nがんばって！`,
    time: now
  };

  if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
    $emailRow.innerHTML = `<span class="email-pill error">⚠ EmailJS not configured</span>`;
  } else {
    $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams, EMAILJS_PUBLIC_KEY);
      $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
    } catch (err) {
      console.error("EmailJS error:", err);
      $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || 'Email failed'}</span>`;
    }
  }
}

/* ── Retake ── */
$btnRetake.addEventListener("click", () => {
  const selectedSet = ALL_SETS[currentSetKey];
  quiz = shuffle(selectedSet.questions).map(q => ({ ...q, choices: shuffle(q.choices) }));
  answers = {};
  currentQ = 0;
  submitted = false;
  $scoreBanner.style.display = "none";
  buildNavGrid();
  renderQuestion();
  updateProgress();
});
</script>
</body>
</html>
