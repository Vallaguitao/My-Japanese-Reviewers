<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなの日本語 (L1-25) — Grammar Reviewer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #1a1525;
    color: #e8e0f0;
    font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(232,180,200,0.07) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(140,160,220,0.07) 0%, transparent 50%);
    z-index: -1;
    pointer-events: none;
  }

  ruby { ruby-position: over; }
  rt { 
    font-size: 0.55em; 
    color: #bfa5d8; 
    font-weight: 400;
    user-select: none;
  }

  .app-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    position: relative;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  header h1 {
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    font-weight: 800;
    background: linear-gradient(135deg, #f3a6b6, #c09cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
    letter-spacing: -0.5px;
  }
  header p { color: #a498b8; font-size: 0.95rem; }

  /* ── Screens ── */
  .screen { display: none; animation: fadeIn 0.4s ease forwards; }
  .screen.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Glass Cards ── */
  .glass-card {
    background: rgba(40, 32, 55, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 2rem;
    box-shadow: 0 16px 40px rgba(0,0,0,0.2);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* ── Setup Screen ── */
  .setup-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
  .input-group label {
    font-size: 0.9rem;
    color: #c09cf8;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  input[type="text"], select {
    width: 100%;
    background: rgba(20, 15, 28, 0.8);
    border: 1px solid rgba(192, 156, 248, 0.3);
    color: #fff;
    padding: 1rem 1.2rem;
    border-radius: 12px;
    font-size: 1rem;
    outline: none;
    transition: all 0.2s;
    font-family: inherit;
  }
  input[type="text"]:focus, select:focus {
    border-color: #f3a6b6;
    box-shadow: 0 0 0 3px rgba(243, 166, 182, 0.2);
  }
  select option { background: #282037; color: #fff; }

  .btn {
    background: linear-gradient(135deg, #f3a6b6, #c09cf8);
    color: #1a1525;
    border: none;
    padding: 1rem;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    width: 100%;
    font-family: inherit;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(192, 156, 248, 0.4);
  }
  .btn:active { transform: translateY(0); }

  /* ── Quiz Screen ── */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    color: #a498b8;
  }
  .progress-container {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f3a6b6, #c09cf8);
    width: 0%;
    transition: width 0.4s ease;
  }
  
  .question-box {
    margin-bottom: 2rem;
  }
  .question-text {
    font-size: clamp(1.3rem, 4vw, 1.6rem);
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 0.5rem;
    color: #fff;
  }
  .question-meaning {
    font-size: 0.95rem;
    color: #a498b8;
    font-style: italic;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 2rem;
  }
  
  .choice-btn {
    background: rgba(20, 15, 28, 0.6);
    border: 1px solid rgba(255,255,255,0.1);
    color: #e8e0f0;
    padding: 1rem 1.2rem;
    border-radius: 12px;
    font-size: 1.1rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    font-family: inherit;
  }
  .choice-btn .letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    margin-right: 12px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #c09cf8;
  }
  
  .choice-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.05);
    border-color: rgba(192, 156, 248, 0.5);
  }
  .choice-btn.selected {
    background: rgba(192, 156, 248, 0.15);
    border-color: #c09cf8;
  }
  .choice-btn.selected .letter {
    background: #c09cf8;
    color: #1a1525;
  }

  /* Answer Reveal States */
  .choice-btn.correct {
    background: rgba(46, 213, 115, 0.15) !important;
    border-color: #2ed573 !important;
    color: #2ed573;
  }
  .choice-btn.correct .letter { background: #2ed573; color: #1a1525; }
  
  .choice-btn.wrong {
    background: rgba(255, 71, 87, 0.15) !important;
    border-color: #ff4757 !important;
    color: #ff4757;
    opacity: 0.7;
  }
  .choice-btn.wrong .letter { background: #ff4757; color: #fff; }

  /* ── Results Screen ── */
  .results-header { text-align: center; margin-bottom: 2rem; }
  .score-circle {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: conic-gradient(#c09cf8 var(--p), rgba(255,255,255,0.05) 0);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
    position: relative;
  }
  .score-circle::before {
    content: '';
    position: absolute; inset: 8px;
    background: #282037; border-radius: 50%;
  }
  .score-text {
    position: relative;
    font-size: 2rem; font-weight: 800; color: #fff;
  }
  
  .review-list {
    display: flex; flex-direction: column; gap: 1rem;
    margin-bottom: 2rem;
    max-height: 400px; overflow-y: auto;
    padding-right: 5px;
  }
  .review-list::-webkit-scrollbar { width: 6px; }
  .review-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 3px; }
  .review-list::-webkit-scrollbar-thumb { background: rgba(192,156,248,0.3); border-radius: 3px; }
  
  .review-item {
    background: rgba(20, 15, 28, 0.5);
    border-left: 4px solid #ff4757;
    padding: 1rem; border-radius: 8px;
  }
  .review-item.perfect { border-left-color: #2ed573; text-align: center; }
  .review-q { font-size: 1.1rem; margin-bottom: 0.4rem; color: #fff; }
  .review-ans { font-size: 0.9rem; color: #2ed573; }
  .review-yours { font-size: 0.9rem; color: #ff4757; text-decoration: line-through; margin-right: 10px; }

  .action-buttons { display: flex; gap: 1rem; }
  .btn-outline {
    background: transparent;
    border: 2px solid #c09cf8;
    color: #c09cf8;
  }
  .btn-outline:hover { background: rgba(192, 156, 248, 0.1); }

  .email-status {
    text-align: center; margin-top: 1.5rem; font-size: 0.9rem;
  }
  .email-pill {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.1);
  }
  .email-pill.sent { background: rgba(46, 213, 115, 0.2); color: #2ed573; }
  .email-pill.error { background: rgba(255, 71, 87, 0.2); color: #ff4757; }

  /* ── AI Features ── */
  .btn-sparkle {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #1a1525;
    margin-top: 1rem;
  }
  .btn-sparkle:hover {
    box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
  }
  .ai-box {
    background: rgba(255, 215, 0, 0.1);
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 12px;
    padding: 1.2rem;
    margin-top: 1rem;
    font-size: 0.95rem;
    color: #fff;
    display: none;
    line-height: 1.5;
  }
  .ai-box.visible { display: block; animation: fadeIn 0.3s ease; }
  .ai-loading {
    display: inline-block;
    width: 20px; height: 20px;
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: #FFD700;
    animation: spin 1s ease-in-out infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .action-buttons { flex-direction: column; }
    .glass-card { padding: 1.5rem; }
  }
</style>
  <link rel="stylesheet" href="../assets/site-nav.css">
</head>
<body>

<div class="app-container">
  <header>
    <h1>みんなの<ruby>日本語<rt>にほんご</rt></ruby></h1>
    <p>Grammar Reviewer (Lessons 1-25)</p>
  </header>

  <!-- Setup Screen -->
  <main id="screen-setup" class="screen active glass-card">
    <div class="setup-form">
      <div class="input-group">
        <label for="playerName">Player Name</label>
        <input type="text" id="playerName" placeholder="Enter your name..." autocomplete="off">
      </div>
      <div class="input-group">
        <label for="setSelect">Select Practice Set (30 Qs each)</label>
        <select id="setSelect"></select>
      </div>
      <button class="btn" id="startBtn">Start Practice</button>
    </div>
  </main>

  <!-- Quiz Screen -->
  <main id="screen-quiz" class="screen glass-card">
    <div class="quiz-header">
      <span id="qCounter">Question 1 of 30</span>
      <span id="qSetTitle">Set Title</span>
    </div>
    <div class="progress-container">
      <div class="progress-bar" id="pBar"></div>
    </div>
    
    <div class="question-box">
      <div class="question-text" id="qText"></div>
      <div class="question-meaning" id="qMeaning"></div>
    </div>

    <div class="choices" id="choicesBox">
      <!-- Buttons injected via JS -->
    </div>

    <button class="btn btn-sparkle" id="explainBtn" style="display:none;">✨ AI Sensei: Explain Grammar</button>
    <div class="ai-box" id="aiExplanationBox"></div>

    <button class="btn" id="nextBtn" style="display:none; margin-top: 1rem;">Next Question</button>
  </main>

  <!-- Results Screen -->
  <main id="screen-results" class="screen glass-card">
    <div class="results-header">
      <div class="score-circle" id="scoreCircle">
        <span class="score-text" id="scoreText">0%</span>
      </div>
      <h2 style="color:#fff; margin-bottom:5px;" id="resultMessage">お疲れ様でした！</h2>
      <p style="color:#a498b8;">Here is your review.</p>
    </div>

    <div class="review-list" id="reviewList"></div>

    <button class="btn btn-sparkle" id="aiAdviceBtn" style="margin-bottom: 1.5rem;">✨ Get AI Study Advice</button>
    <div class="ai-box" id="aiAdviceBox" style="margin-bottom: 1.5rem;"></div>

    <div class="action-buttons">
      <button class="btn btn-outline" id="homeBtn">Back to Menu</button>
      <button class="btn" id="retryBtn">Retry Set</button>
    </div>
    
    <div class="email-status" id="emailStatus"></div>
  </main>
</div>

/* ── App State ── */
let currentSetKey = null;
let playerName = "";
let quiz = [];
let currentIdx = 0;
let score = 0;
let answers = []; // Stores user's selected option ('a','b',etc.)

/* ── Gemini API Config ── */
const apiKey = "";

async function callGeminiAPI(prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
  const payload = {
    contents: [{ parts: [{ text: prompt }] }],
    systemInstruction: { parts: [{ text: "You are a helpful and encouraging Japanese language teacher (Sensei). Keep explanations concise and easy to understand for an N5 level student." }] }
  };

  let retries = 5;
  let delay = 1000;
  for (let i = 0; i < retries; i++) {
    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error('API Error');
      const data = await response.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, I couldn't generate a response.";
    } catch (error) {
      if (i === retries - 1) return "Sorry, the AI Sensei is currently unavailable. Please try again later.";
      await new Promise(res => setTimeout(res, delay));
      delay *= 2;
    }
  }
}

/* ── DOM Elements ── */
const $screenSetup = document.getElementById("screen-setup");
const $screenQuiz = document.getElementById("screen-quiz");
const $screenResults = document.getElementById("screen-results");

const $playerName = document.getElementById("playerName");
const $setSelect = document.getElementById("setSelect");
const $startBtn = document.getElementById("startBtn");

const $qCounter = document.getElementById("qCounter");
const $qSetTitle = document.getElementById("qSetTitle");
const $pBar = document.getElementById("pBar");
const $qText = document.getElementById("qText");
const $qMeaning = document.getElementById("qMeaning");
const $choicesBox = document.getElementById("choicesBox");
const $nextBtn = document.getElementById("nextBtn");
const $explainBtn = document.getElementById("explainBtn");
const $aiExplanationBox = document.getElementById("aiExplanationBox");

const $scoreCircle = document.getElementById("scoreCircle");
const $scoreText = document.getElementById("scoreText");
const $resultMessage = document.getElementById("resultMessage");
const $reviewList = document.getElementById("reviewList");
const $emailStatus = document.getElementById("emailStatus");
const $aiAdviceBtn = document.getElementById("aiAdviceBtn");
const $aiAdviceBox = document.getElementById("aiAdviceBox");

const $homeBtn = document.getElementById("homeBtn");
const $retryBtn = document.getElementById("retryBtn");

/* ── Initialization ── */
function init() {
  if (typeof emailjs !== "undefined") {
    emailjs.init(EMAILJS_PUBLIC_KEY);
  }
  
  $setSelect.innerHTML = "";
  for (const [key, obj] of Object.entries(ALL_SETS)) {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = obj.title;
    $setSelect.appendChild(opt);
  }

  const savedName = localStorage.getItem("mjr_name");
  if (savedName) $playerName.value = savedName;

  $startBtn.addEventListener("click", startQuiz);
  $nextBtn.addEventListener("click", handleNext);
  $explainBtn.addEventListener("click", handleAIExplain);
  $aiAdviceBtn.addEventListener("click", handleAIAdvice);
  $homeBtn.addEventListener("click", () => switchScreen($screenSetup));
  $retryBtn.addEventListener("click", () => {
    switchScreen($screenSetup);
    setTimeout(startQuiz, 50); // slight delay to feel like a restart
  });
}

function switchScreen(screenEl) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  screenEl.classList.add('active');
}

/* ── Quiz Flow ── */
function startQuiz() {
  const nameVal = $playerName.value.trim();
  if (!nameVal) { alert("Please enter your name."); return; }
  
  localStorage.setItem("mjr_name", nameVal);
  playerName = nameVal;
  currentSetKey = $setSelect.value;
  quiz = ALL_SETS[currentSetKey].data;
  
  currentIdx = 0;
  score = 0;
  answers = [];
  
  $aiExplanationBox.classList.remove("visible");
  $aiExplanationBox.innerHTML = "";
  $explainBtn.style.display = "none";
  $aiAdviceBox.classList.remove("visible");
  $aiAdviceBox.innerHTML = "";
  $aiAdviceBtn.style.display = "inline-block";

  $qSetTitle.textContent = ALL_SETS[currentSetKey].title;
  switchScreen($screenQuiz);
  renderQuestion();
}

function renderQuestion() {
  $nextBtn.style.display = "none";
  $explainBtn.style.display = "none";
  $aiExplanationBox.classList.remove("visible");
  $aiExplanationBox.innerHTML = "";
  
  const item = quiz[currentIdx];
  
  $qCounter.textContent = `Question ${currentIdx + 1} of ${quiz.length}`;
  $pBar.style.width = `${(currentIdx / quiz.length) * 100}%`;
  
  $qText.innerHTML = item.q;
  $qMeaning.textContent = item.meaning;
  
  $choicesBox.innerHTML = "";
  ['a', 'b', 'c', 'd'].forEach(letter => {
    if (!item[letter]) return; 
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerHTML = `<span class="letter">${letter.toUpperCase()}</span> ${item[letter]}`;
    btn.onclick = () => selectChoice(letter, btn);
    $choicesBox.appendChild(btn);
  });
}

function selectChoice(letter, btnNode) {
  if (answers[currentIdx] !== undefined) return; 
  answers[currentIdx] = letter;
  
  const item = quiz[currentIdx];
  const isCorrect = (letter === item.answer);
  if (isCorrect) score++;

  Array.from($choicesBox.children).forEach(child => {
    child.disabled = true;
    child.style.cursor = "default";
    
    const childLetter = child.querySelector('.letter').textContent.toLowerCase();
    if (childLetter === item.answer) {
      child.classList.add("correct");
    } else if (childLetter === letter && !isCorrect) {
      child.classList.add("wrong");
    }
  });

  $explainBtn.style.display = "block";
  $nextBtn.textContent = (currentIdx === quiz.length - 1) ? "View Results" : "Next Question";
  $nextBtn.style.display = "block";
}

function handleNext() {
  currentIdx++;
  if (currentIdx >= quiz.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

/* ── AI Feature Handlers ── */
async function handleAIExplain() {
  $explainBtn.style.display = "none";
  $aiExplanationBox.classList.add("visible");
  $aiExplanationBox.innerHTML = `<span class="ai-loading"></span> ✨ AI Sensei is analyzing the grammar...`;
  
  const item = quiz[currentIdx];
  const userAnsLetter = answers[currentIdx];
  const userAnsText = item[userAnsLetter];
  const correctAnsText = item[item.answer];
  
  let prompt = `A student is taking a Japanese N5 grammar quiz.\nQuestion: '${item.q.replace(/<[^>]+>/g, '')}'\nMeaning: '${item.meaning}'\nCorrect Answer: '${correctAnsText}'\nStudent's Answer: '${userAnsText}'\n\nExplain briefly (2-3 sentences) why '${correctAnsText}' is correct and the underlying grammar rule.`;
  if (userAnsLetter !== item.answer) {
    prompt += ` Also, gently explain why '${userAnsText}' is incorrect.`;
  }
  
  const explanation = await callGeminiAPI(prompt);
  $aiExplanationBox.innerHTML = `<strong>✨ AI Sensei:</strong><br>${explanation.replace(/\n/g, '<br>')}`;
}

async function handleAIAdvice() {
  $aiAdviceBtn.style.display = "none";
  $aiAdviceBox.classList.add("visible");
  $aiAdviceBox.innerHTML = `<span class="ai-loading"></span> ✨ AI Sensei is analyzing your results...`;
  
  let wrongList = [];
  quiz.forEach((q, i) => {
    if (answers[i] !== q.answer) {
      wrongList.push(`Q: ${q.q.replace(/<[^>]+>/g, '')} (Correct: ${q[q.answer]}, Student chose: ${q[answers[i]] || 'None'})`);
    }
  });
  
  let prompt = `A student just completed an N5 Japanese grammar quiz and scored ${score}/${quiz.length}.\n`;
  if (wrongList.length === 0) {
    prompt += `They got a perfect score! Give them 2 sentences of praise and encouragement to keep studying Japanese.`;
  } else {
    prompt += `Here are some questions they got wrong:\n${wrongList.slice(0, 5).join('\n')}\n\nBased on these mistakes, give them a short, encouraging 3-sentence study advice pointing out which specific grammar concepts they should review next.`;
  }
  
  const advice = await callGeminiAPI(prompt);
  $aiAdviceBox.innerHTML = `<strong>✨ AI Sensei's Advice:</strong><br>${advice.replace(/\n/g, '<br>')}`;
}

/* ── Results & Email ── */
function showResults() {
  switchScreen($screenResults);
  const pct = Math.round((score / quiz.length) * 100);
  
  $pBar.style.width = "100%";
  $scoreCircle.style.setProperty('--p', `${pct}%`);
  $scoreText.textContent = `${pct}%`;
  
  if (pct >= 90) $resultMessage.textContent = "すばらしい！ (Excellent!)";
  else if (pct >= 70) $resultMessage.textContent = "よくできました！ (Well done!)";
  else $resultMessage.textContent = "がんばって！ (Keep trying!)";

  $reviewList.innerHTML = "";
  quiz.forEach((q, i) => {
    const isCorrect = answers[i] === q.answer;
    const div = document.createElement("div");
    div.className = `review-item ${isCorrect ? 'perfect' : ''}`;
    
    let ansHtml = "";
    if (isCorrect) {
      ansHtml = `<div class="review-ans">✓ ${q[q.answer]}</div>`;
    } else {
      const userAnsText = q[answers[i]] || "No Answer";
      ansHtml = `
        <span class="review-yours">✗ ${userAnsText}</span>
        <span class="review-ans">✓ ${q[q.answer]}</span>
      `;
    }

    div.innerHTML = `
      <div class="review-q">${i + 1}. ${q.q}</div>
      ${ansHtml}
    `;
    $reviewList.appendChild(div);
  });

  sendEmail(score, pct);
}

async function sendEmail(s, pct) {
  const now = new Date().toLocaleString();
  const details = quiz.map((q, i) => 
    `Q${i+1}: ${q.q.replace(/<[^>]+>/g, '')}\nYour answer: ${q[answers[i]] || 'None'} | Correct: ${q[q.answer]} ${answers[i] === q.answer ? "✓" : "✗"}`
  ).join("\n");

  const emailParams = {
    name: playerName,
    email: "noreply@quiz.com",
    subject: `[${playerName}] ${ALL_SETS[currentSetKey].title} Quiz — ${pct}%`,
    message: `Minna no Nihongo Grammar Results\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${s}/${quiz.length} (${pct}%)\n\n--- Detailed Results ---\n${details}\n\nがんばって！`,
    time: now
  };

  if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
    $emailStatus.innerHTML = `<span class="email-pill error">⚠ EmailJS not configured. Add keys to use email feature.</span>`;
  } else {
    $emailStatus.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams, EMAILJS_PUBLIC_KEY);
      $emailStatus.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
    } catch (err) {
      console.error("EmailJS error:", err);
      $emailStatus.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || 'Email failed'}</span>`;
    }
  }
}
