<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Reviewer | N5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      linear-gradient(90deg, rgba(169, 52, 42, 0.06) 1px, transparent 1px),
      linear-gradient(180deg, rgba(38, 58, 99, 0.04), transparent 34rem),
      #f8f3ea;
    background-size: 44px 44px, auto, auto;
    color: #18202f;
    font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  .container {
    max-width: 620px;
    margin: 0 auto;
    padding: 32px 16px 60px;
    position: relative;
    z-index: 1;
  }

  ruby rt { font-size: 0.6em; color: #667085; }

  /* ── Card Styles ── */
  .card, .q-card, .score-banner {
    background: rgba(255, 253, 248, 0.94);
    border-radius: 8px;
    padding: 32px 24px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    box-shadow: 0 12px 40px rgba(24, 32, 47, 0.06);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  /* ── Name Screen ── */
  #name-screen { margin-top: 40px; }

  .badge {
    display: inline-block;
    background: #a9342a;
    color: #ffffff;
    font-weight: 800;
    font-size: 10px;
    padding: 5px 16px;
    border-radius: 20px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    box-shadow: 0 4px 12px rgba(169, 52, 42, 0.15);
    margin-bottom: 12px;
  }

  .title {
    font-size: 26px;
    font-weight: 800;
    margin: 16px 0 6px;
    letter-spacing: -0.5px;
    color: #18202f;
  }

  .subtitle {
    font-size: 14px;
    color: #667085;
  }

  .name-label {
    display: block;
    font-size: 13px;
    color: #667085;
    margin: 24px 0 8px;
    text-align: left;
    font-weight: 700;
  }

  .name-input {
    width: 100%;
    padding: 16px;
    border-radius: 8px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    background: #ffffff;
    color: #18202f;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
  }
  .name-input:focus {
    border-color: #a9342a;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(169, 52, 42, 0.15);
  }

  select.name-input {
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667085' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 16px center;
    background-size: 16px;
  }

  optgroup { background: #fffdf8; color: #a9342a; font-weight: 700; }
  option { background: #fffdf8; color: #18202f; }

  .btn-primary {
    width: 100%;
    margin-top: 24px;
    padding: 16px 0;
    border-radius: 8px;
    background: #a9342a;
    border: none;
    color: #ffffff;
    font-size: 16px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.25);
    transition: all 0.25s ease;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(169, 52, 42, 0.35);
    opacity: 0.95;
  }
  .btn-primary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* ── Quiz Screen ── */
  #quiz-screen { display: none; }

  .header { text-align: center; margin-bottom: 24px; }
  .header .subtitle { margin-top: 6px; }

  /* Score Banner */
  .score-banner {
    display: none;
    border-radius: 8px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 24px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    box-shadow: 0 12px 40px rgba(24, 32, 47, 0.06);
    animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .score-number { font-size: 52px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; margin-bottom: 6px; }
  .score-label { font-size: 20px; font-weight: 700; margin-bottom: 14px; }

  .email-row { margin-bottom: 20px; }
  .email-pill {
    display: inline-block;
    background: rgba(24, 32, 47, 0.04);
    border: 1px solid rgba(24, 32, 47, 0.12);
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 700;
    color: #18202f;
  }
  .email-pill.sent {
    background: #e8f5e9;
    border: 1px solid #2e7d32;
    color: #1b5e20;
  }
  .email-pill.error {
    background: #ffebee;
    border: 1px solid #c62828;
    color: #b71c1c;
  }

  .end-actions {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px;
  }
  .btn-end {
    background: rgba(24, 32, 47, 0.06);
    border: 1px solid rgba(24, 32, 47, 0.12);
    color: #18202f;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-end:hover:not(:disabled) {
    background: #f4ddd8;
    border-color: rgba(169, 52, 42, 0.2);
    color: #a9342a;
    transform: translateY(-1px);
  }
  .btn-end:disabled { opacity: 0.4; cursor: default; }

  /* Progress */
  .progress-row { margin-bottom: 20px; }
  .progress-text { font-size: 12px; color: #667085; display: block; margin-bottom: 8px; font-weight: 700; }
  .progress-bar { height: 6px; background: rgba(24, 32, 47, 0.06); border-radius: 6px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #a9342a, #8f241c);
    border-radius: 6px;
    width: 0%;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(169, 52, 42, 0.15);
  }

  /* Nav Grid */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }
  .nav-dot {
    aspect-ratio: 1;
    border-radius: 50%;
    background: #fffdf8;
    border: 1px solid rgba(24, 32, 47, 0.12);
    color: #667085;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-dot:hover:not(.locked) {
    background: #f4ddd8;
    color: #a9342a;
    border-color: rgba(169, 52, 42, 0.2);
  }
  .nav-dot.answered {
    background: rgba(169, 52, 42, 0.06);
    border-color: rgba(169, 52, 42, 0.2);
    color: #a9342a;
  }
  .nav-dot.active {
    border-color: #a9342a;
    background: #f4ddd8;
    color: #a9342a;
    box-shadow: 0 0 0 3px rgba(169, 52, 42, 0.15);
  }
  .nav-dot.correct {
    background: #e8f5e9;
    border-color: #2e7d32;
    color: #1b5e20;
  }
  .nav-dot.wrong {
    background: #ffebee;
    border-color: #c62828;
    color: #b71c1c;
  }

  /* Question Card */
  .q-card {
    background: rgba(255, 253, 248, 0.94);
    border-radius: 8px;
    padding: 28px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(24, 32, 47, 0.04);
    animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    color: #a9342a;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .q-text {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
    line-height: 1.45;
    color: #18202f;
  }

  .choices-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .choice-btn {
    padding: 18px 20px;
    border-radius: 8px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    background: #fffdf8;
    color: #18202f;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    position: relative;
    display: flex;
    align-items: center;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  .choice-btn:hover:not(.locked) {
    border-color: rgba(169, 52, 42, 0.3);
    background: #f4ddd8;
    color: #a9342a;
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.05);
  }
  .choice-btn.selected {
    background: #f4ddd8;
    border-color: #a9342a;
    color: #a9342a;
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.1);
  }
  .choice-btn.correct-reveal {
    background: #e8f5e9;
    border-color: #2e7d32;
    color: #1b5e20;
  }
  .choice-btn.wrong-reveal {
    background: #ffebee;
    border-color: #c62828;
    color: #b71c1c;
  }
  .choice-btn.faded-reveal {
    opacity: 0.4;
    border-color: rgba(24, 32, 47, 0.04);
  }
  
  .choice-btn .prefix {
    font-weight: 800;
    margin-right: 16px;
    opacity: 0.5;
    transition: opacity 0.2s;
    color: #a9342a;
    width: 24px;
    font-size: 16px;
    display: inline-block;
  }
  .choice-btn:hover .prefix, .choice-btn.selected .prefix { opacity: 1; }

  .mark {
    position: absolute;
    right: 20px;
    font-size: 20px;
    font-weight: 900;
  }
  .mark.ok { color: #1b5e20; }
  .mark.no { color: #b71c1c; }

  /* Explanation Box / Feedback Card */
  .feedback-card {
    display: none;
    margin-top: 24px;
    padding: 18px 20px;
    border-radius: 8px;
    background: #fff8ef;
    border: 1px solid rgba(169, 52, 42, 0.15);
    font-size: 14px;
    line-height: 1.55;
    color: #18202f;
    animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fb-header {
    font-weight: 800;
    margin-bottom: 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .feedback-card.correct .fb-header { color: #2e7d32; }
  .feedback-card.wrong .fb-header { color: #c62828; }
  .fb-block { margin-top: 8px; }
  .fb-block.connect { color: #667085; font-size: 13px; }
  .fb-block.warn {
    color: #b71c1c;
    background: #ffebee;
    border: 1px solid rgba(198, 40, 40, 0.2);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
  }

  /* ── Review Banner ── */
  .review-banner {
    display: none;
    background: #fff9c4;
    border: 1px solid #fbc02d;
    color: #f57f17;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 24px;
    box-shadow: 0 4px 15px rgba(245, 127, 23, 0.08);
    animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Skipped warning alert box */
  .skipped-warning {
    margin-bottom: 20px;
    padding: 16px;
    background: #fff8ef;
    border: 1px solid #a9342a;
    border-radius: 8px;
    color: #a9342a;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  .skipped-link {
    color: #a9342a;
    text-decoration: underline;
    cursor: pointer;
    margin: 0 4px;
    font-weight: 800;
  }
  .skipped-link:hover {
    color: #8f241c;
  }

  /* Arrow Row */
  .arrow-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn-nav {
    flex: 1;
    padding: 16px 0;
    border-radius: 8px;
    background: #fffdf8;
    border: 1px solid rgba(24, 32, 47, 0.12);
    color: #18202f;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-nav:hover:not(:disabled) {
    background: #f4ddd8;
    color: #a9342a;
    border-color: rgba(169, 52, 42, 0.2);
  }
  .btn-nav:disabled { opacity: 0.25; cursor: not-allowed; }

  .btn-submit {
    flex: 1;
    padding: 16px 0;
    border-radius: 8px;
    background: #a9342a;
    border: none;
    color: #ffffff;
    font-size: 15px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.25);
    transition: all 0.2s;
  }
  .btn-submit:hover:not(:disabled) {
    box-shadow: 0 6px 20px rgba(169, 52, 42, 0.35);
    opacity: 0.95;
  }
  .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

  .text-center { text-align: center; }
  .hidden { display: none !important; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .container { padding: 16px 12px 50px; }
    .title { font-size: 20px; }
    .q-text { font-size: 16px; }
    .choice-btn { font-size: 15px; padding: 12px 10px; }
  }

/* ========== Site Breadcrumb ========== */
.site-breadcrumb,
.site-breadcrumb * {
  box-sizing: border-box;
}

.site-breadcrumb {
  position: relative;
  z-index: 20;
  width: min(1180px, calc(100% - 32px));
  margin: 16px auto 12px;
  font-family: "Noto Sans JP", "Outfit", system-ui, sans-serif;
  color: #18202f;
}

.site-breadcrumb__list {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0;
  list-style: none;
  margin: 0;
  padding: 8px 12px;
  border: 1px solid rgba(24, 32, 47, 0.12);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.94);
  box-shadow: 0 10px 30px rgba(24, 32, 47, 0.08);
}

.site-breadcrumb__item {
  display: inline-flex;
  align-items: center;
  min-width: 0;
  color: #667085;
  font-size: 0.82rem;
  font-weight: 700;
  line-height: 1.4;
}

.site-breadcrumb__item + .site-breadcrumb__item::before {
  content: "/";
  margin: 0 8px;
  color: rgba(169, 52, 42, 0.42);
  font-weight: 800;
}

.site-breadcrumb__link {
  color: #667085;
  text-decoration: none;
  transition: color 0.18s ease, background 0.18s ease;
}

.site-breadcrumb__link:hover {
  color: #a9342a;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__link:focus-visible {
  color: #a9342a;
  outline: 2px solid rgba(169, 52, 42, 0.45);
  outline-offset: 3px;
  border-radius: 4px;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__category {
  color: #a9342a;
}

.site-breadcrumb__current {
  color: #18202f;
  overflow-wrap: anywhere;
}



@media (max-width: 640px) {
  .site-breadcrumb {
    width: min(100% - 20px, 680px);
    margin: 12px auto 10px;
  }

  .site-breadcrumb__list {
    padding: 8px 10px;
  }

  .site-breadcrumb__item {
    font-size: 0.78rem;
  }
}
/* ========== End Site Breadcrumb ========== */
    
  /* Timer Display styling next to progress */
  .topbar-timer {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 700;
    color: #18202f;
    border: 1px solid rgba(24, 32, 47, 0.12);
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(255, 253, 248, 0.94);
    box-shadow: 0 2px 6px rgba(24, 32, 47, 0.04);
  }
  .topbar-timer.warning {
    color: #a9342a;
    border-color: #a9342a;
    background: #fff8ef;
    animation: timerPulse 1s infinite alternate;
  }
  @keyframes timerPulse {
    from { opacity: 1; }
    to { opacity: 0.6; }
  }
</style>
</head>
<body>

<!-- Site Breadcrumb -->
<nav class="site-breadcrumb" aria-label="Breadcrumb">
  <ol class="site-breadcrumb__list">
    <li class="site-breadcrumb__item"><a class="site-breadcrumb__link" href="../index.html">Home</a></li>
    <li class="site-breadcrumb__item"><a class="site-breadcrumb__link site-breadcrumb__category" href="../index.html#quiz">Quiz</a></li>
    <li class="site-breadcrumb__item"><span class="site-breadcrumb__current" aria-current="page">Grammar 1 n5</span></li>
  </ol>
</nav>
<!-- End Site Breadcrumb -->


<div class="container">

  <!-- ════ NAME SCREEN ════ -->
  <div id="name-screen">
    <div class="card text-center">
      <span class="badge">JLPT N5 Bunpo Prep</span>
      <h1 class="title">みんなの日本語 文法</h1>
      <p class="subtitle">Grammar Reviewer • 30 items per set</p>
      
      <label class="name-label">おなまえは？ Enter your name</label>
      <input class="name-input" id="name-input" type="text" placeholder="Your name..." autofocus autocomplete="off">
      
      <label class="name-label" style="margin-top: 20px;">セットをえらんでください Select Exam Set</label>
      <select class="name-input" id="set-select">
        <optgroup label="Core Lessons">
          <option value="set1">Set 1: Lessons 1-3</option>
          <option value="set2">Set 2: Lessons 4-6</option>
          <option value="set3">Set 3: Lessons 7-9</option>
          <option value="set4">Set 4: Lessons 10-11</option>
          <option value="set5">Set 5: Lessons 11-12</option>
          <option value="set6">Set 6: Lesson 13</option>
          <option value="set7">Set 7: Lessons 14-16</option>
          <option value="set8">Set 8: Lessons 17-19</option>
          <option value="set9">Set 9: Lessons 20-22</option>
          <option value="set10">Set 10: Lessons 23-25</option>
        </optgroup>
        <optgroup label="Comprehensive Mix">
          <option value="level1">Mix Level 1: Fundamentals</option>
          <option value="level2">Mix Level 2: Application</option>
          <option value="level3">Mix Level 3: Complex & Nuance</option>
        </optgroup>
      </select>

      <button class="btn-primary" id="btn-start" disabled>Start Exam →</button>
    </div>
  </div>

  <!-- ════ QUIZ SCREEN ════ -->
  <div id="quiz-screen">
    <header class="header">
      <span class="badge" id="quiz-badge">みんなの日本語</span>
      <h1 class="title" id="quiz-title">Grammar Exam</h1>
      <p class="subtitle" id="quiz-subtitle"></p>
    </header>

    <div class="score-banner" id="score-banner">
      <div class="score-number" id="score-number"></div>
      <div class="score-label" id="score-label"></div>
      <div class="email-row" id="email-row"></div>
      <div class="end-actions">
        <button class="btn-end" id="btn-review" disabled>📝 Review wrong answers</button>
        <button class="btn-end" id="btn-retake">🔄 Retake Quiz</button>
        <button class="btn-end" id="btn-home">🏠 Main Menu</button>
      </div>
    </div>

    <div class="review-banner" id="review-banner">
      📝 Review mode — showing only the questions you got wrong
    </div>

    <div class="progress-row">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <span class="progress-text" id="progress-text" style="margin-bottom: 0;">0 / 30 answered</span>
        <div class="topbar-timer" id="timer-wrapper">
          <span class="timer-icon">⏳</span>
          <span class="timer-display" id="timer-display">00:00</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="nav-grid hidden" id="nav-grid"></div>

    <div class="skipped-warning hidden" id="skipped-warning"></div>

    <div class="q-card" id="q-card">
      <div class="q-number" id="q-number"></div>
      <div class="q-text" id="q-text"></div>
      <div class="choices-grid" id="choices-grid"></div>
      <div class="feedback-card" id="feedback-card" aria-live="polite"></div>
    </div>

        "explain": "The correct choice is <strong>「したり」</strong>. Non-exhaustive activities 「したり」.<br><br><strong>Why other choices are incorrect:</strong><br>• <code>して</code> is grammatically or semantically incorrect in this specific sentence context.<br>• <code>した</code> is grammatically or semantically incorrect in this specific sentence context.<br>• <code>する</code> is grammatically or semantically incorrect in this specific sentence context."
      }
    ]
  }
};

/* ── State ── */
let playerName = "";
let currentSetKey = "";
let quiz = [];
let answers = {};
let currentQ = 0;
let submitted = false;

/* ── Helpers ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── Initialize EmailJS ── */
emailjs.init("1oR0j0WDvUmSSYEpK");

/* ── DOM refs ── */
const $nameScreen = document.getElementById("name-screen");
const $quizScreen = document.getElementById("quiz-screen");
const $nameInput  = document.getElementById("name-input");
const $setSelect  = document.getElementById("set-select");
const $btnStart   = document.getElementById("btn-start");
const $quizTitle  = document.getElementById("quiz-title");
const $subtitle   = document.getElementById("quiz-subtitle");
const $scoreBanner= document.getElementById("score-banner");
const $scoreNum   = document.getElementById("score-number");
const $scoreLbl   = document.getElementById("score-label");
const $emailRow   = document.getElementById("email-row");
const $btnRetake  = document.getElementById("btn-retake");
const $btnReview  = document.getElementById("btn-review");
const $btnHome    = document.getElementById("btn-home");
const $reviewBanner = document.getElementById("review-banner");
const $progText   = document.getElementById("progress-text");
const $progFill   = document.getElementById("progress-fill");
const $navGrid    = document.getElementById("nav-grid");
const $skippedWarning = document.getElementById("skipped-warning");
const $feedbackCard = document.getElementById("feedback-card");
const $timerDisplay = document.getElementById("timer-display");
let reviewMode = false;
let reviewIndices = [];
let endTime = null;
let timeLeft = 0;
let timerInterval = null;
const $qCard      = document.getElementById("q-card");
const $qNumber    = document.getElementById("q-number");
const $qText      = document.getElementById("q-text");
const $choicesGrid= document.getElementById("choices-grid");
const $btnPrev    = document.getElementById("btn-prev");
const $btnNext    = document.getElementById("btn-next");
const $btnSubmit  = document.getElementById("btn-submit");

/* ── Name Screen ── */
$nameInput.addEventListener("input", () => {
  $btnStart.disabled = !$nameInput.value.trim();
});
$nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && $nameInput.value.trim()) startQuiz();
});
$btnStart.addEventListener("click", startQuiz);

function startTimer() {
  const qCount = quiz.length;
  let TIME_LIMIT;
  if (qCount <= 30) {
    TIME_LIMIT = 20 * 60;
  } else if (qCount <= 40) {
    TIME_LIMIT = 25 * 60;
  } else if (qCount <= 50) {
    TIME_LIMIT = 30 * 60;
  } else {
    TIME_LIMIT = 40 * 60;
  }

  endTime = Date.now() + TIME_LIMIT * 1000;
  timeLeft = TIME_LIMIT;
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (submitted) {
      clearInterval(timerInterval);
      return;
    }
    timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time is up! Your exam will be submitted automatically.");
      submitQuiz(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const s = String(timeLeft % 60).padStart(2, '0');
  if ($timerDisplay) {
    $timerDisplay.textContent = `${m}:${s}`;
    if (timeLeft < 300) {
      $timerDisplay.parentElement.classList.add("warning");
    } else {
      $timerDisplay.parentElement.classList.remove("warning");
    }
  }
}

function startQuiz() {
  playerName = $nameInput.value.trim();
  currentSetKey = $setSelect.value;
  const selectedSet = ALL_SETS[currentSetKey];
  
  // Transform Bunpo_n5 original structure (indices) into Minna_n5 structure (strings)
  const mappedQuiz = selectedSet.questions.map(q => {
      const correctString = q.options[q.answer];
      return {
          question: q.q,
          answer: correctString,
          choices: shuffle([...q.options])
      };
  });
  
  quiz = shuffle(mappedQuiz);
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];

  $nameScreen.style.display = "none";
  $quizScreen.style.display = "block";
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  $skippedWarning.classList.add("hidden");
  
  $quizTitle.textContent = selectedSet.title;
  $subtitle.textContent = `${playerName}さん — Choose the correct grammar logic`;

  buildNavGrid();
  startTimer();
  renderQuestion();
  updateProgress();
}

/* ── Nav Grid ── */
function buildNavGrid() {
  $navGrid.innerHTML = "";
  quiz.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot";
    btn.textContent = i + 1;
    btn.addEventListener("click", () => {
      if (reviewMode) {
        const idx = reviewIndices.indexOf(i);
        if (idx === -1) return;
        currentQ = idx;
      } else {
        currentQ = i;
      }
      renderQuestion();
    });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  if (submitted) {
    $navGrid.classList.remove("hidden");
  } else {
    $navGrid.classList.add("hidden");
  }
  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    if (i === realIdx) dot.classList.add("active");
    if (!submitted && answers[i] !== undefined) dot.classList.add("answered");
    if (submitted && answers[i] === quiz[i].answer) dot.classList.add("correct");
    if (submitted && answers[i] !== undefined && answers[i] !== quiz[i].answer) dot.classList.add("wrong");
  });
}

function updateProgress() {
  if (reviewMode) {
    $progText.textContent = `Reviewing ${currentQ + 1} / ${reviewIndices.length}`;
    $progFill.style.width = `${((currentQ + 1) / reviewIndices.length) * 100}%`;
    return;
  }
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${quiz.length} answered`;
  $progFill.style.width = `${(count / quiz.length) * 100}%`;
  $btnSubmit.disabled = false;
}

/* ── Render Question ── */
function renderQuestion() {
  $skippedWarning.classList.add("hidden");
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  const q = quiz[realIdx];
  $qNumber.textContent = reviewMode
    ? `Review ${currentQ + 1} of ${reviewIndices.length}`
    : `Question ${realIdx + 1} of ${quiz.length}`;
  
  // Format question slightly nicely if we want to highlight Q number
  $qText.innerHTML = `<span style="color:#e8b4c8; margin-right:6px;">Q${realIdx + 1}.</span> ${q.question}`;

  $choicesGrid.innerHTML = "";
  const isAnswered = answers[realIdx] !== undefined;

  q.choices.forEach((c, index) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (submitted) btn.classList.add("locked");
    
    // Applying 'vertical answer choices (a, b, c, d)' logic
    const prefixStr = ["a)", "b)", "c)", "d)"][index];

    btn.innerHTML = `
      <span class="prefix">${prefixStr}</span>
      <span class="text">${c}</span>
    `;

    const selected = answers[realIdx] === c;
    const isCorrectChoice = c === q.answer;

    if (!submitted) {
      if (selected) btn.classList.add("selected");
      btn.addEventListener("click", () => {
        if (submitted) return;
        answers[realIdx] = c;
        renderQuestion();
        updateNavGrid();
        updateProgress();
      });
    } else {
      if (isCorrectChoice) {
        btn.classList.add("correct-reveal");
        btn.innerHTML += `<span class="mark ok">✓</span>`;
      } else if (selected && !isCorrectChoice) {
        btn.classList.add("wrong-reveal");
        btn.innerHTML += `<span class="mark no">✗</span>`;
      } else {
        btn.classList.add("faded-reveal");
      }
    }

    $choicesGrid.appendChild(btn);
  });

  /* Feedback Card */
  if (submitted && isAnswered) {
    renderFeedback(q, answers[realIdx]);
  } else {
    $feedbackCard.style.display = "none";
    $feedbackCard.innerHTML = "";
  }

  updateNavGrid();
  updateNavButtons();
}

function renderFeedback(q, given) {
  const isCorrect = given === q.answer;
  $feedbackCard.className = `feedback-card ${isCorrect ? "correct" : "wrong"}`;
  $feedbackCard.style.display = "block";

  let html = `<div class="fb-header">${isCorrect ? "✓ Correct" : `✗ Not quite — answer: ${q.answer}`}</div>`;
  if (q.correctNote) html += `<div>${q.correctNote}</div>`;
  if (q.explain)     html += `<div class="fb-block">${q.explain}</div>`;
  if (q.connect)     html += `<div class="fb-block connect">${q.connect}</div>`;
  if (q.warn)        html += `<div class="fb-block warn">${q.warn}</div>`;

  $feedbackCard.innerHTML = html;
}

function updateNavButtons() {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  $btnPrev.disabled = currentQ === 0;

  if (!submitted) {
    const isLast = currentQ === quiz.length - 1;
    if (isLast) {
      $btnNext.classList.add("hidden");
      $btnSubmit.classList.remove("hidden");
    } else {
      $btnNext.classList.remove("hidden");
      $btnSubmit.classList.add("hidden");
      $btnNext.textContent = "Next →";
    }
  } else {
    $btnSubmit.classList.add("hidden");
    $btnNext.classList.remove("hidden");
    
    if (reviewMode) {
      if (currentQ === total - 1) {
        $btnNext.textContent = "Done reviewing ✓";
      } else {
        $btnNext.textContent = "Next →";
      }
      $btnNext.disabled = false;
    } else {
      $btnNext.textContent = "Next →";
      $btnNext.disabled = currentQ === total - 1;
    }
  }
}

/* ── Navigation ── */
$btnPrev.addEventListener("click", () => { if (currentQ > 0) { currentQ--; renderQuestion(); } });
$btnNext.addEventListener("click", () => {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  if (currentQ < total - 1) {
    currentQ++; renderQuestion();
  } else if (reviewMode) {
    /* Exit review mode back to results */
    reviewMode = false;
    $reviewBanner.style.display = "none";
    $scoreBanner.style.display = "block";
    $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });
  }
});
$btnHome.addEventListener("click", () => {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  $quizScreen.style.display = "none";
  $nameScreen.style.display = "block";
});

/* ── Submit ── */
$btnSubmit.addEventListener("click", submitQuiz);

async function submitQuiz(force = false) {
  const count = Object.keys(answers).length;
  if (force !== true && count < quiz.length) {
    const skipped = [];
    quiz.forEach((_, i) => {
      if (answers[i] === undefined) skipped.push(i);
    });

    $skippedWarning.innerHTML = `⚠️ You have unanswered questions: ` + 
      skipped.map(idx => `<span class="skipped-link" onclick="jumpToQuestion(${idx})">Question ${idx + 1}</span>`).join(", ") + 
      `. Please answer them before submitting.`;
    $skippedWarning.classList.remove("hidden");
    return;
  }

  $skippedWarning.classList.add("hidden");
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  let s = 0;
  quiz.forEach((q, i) => { if (answers[i] === q.answer) s++; });
  submitted = true;

  const pct = Math.round((s / quiz.length) * 100);
  $scoreNum.textContent = `${s}/${quiz.length}`;

  if (s === quiz.length) $scoreLbl.textContent = "完璧！ Perfect!";
  else if (s >= quiz.length * 0.9) $scoreLbl.textContent = "すごい！ Excellent!";
  else if (s >= quiz.length * 0.7) $scoreLbl.textContent = "いいですね！ Good job!";
  else $scoreLbl.textContent = "もう一度！ Try again!";

  if (s >= quiz.length * 0.9) {
    $scoreBanner.style.background = "#e8f5e9";
    $scoreBanner.style.borderColor = "#2e7d32";
    $scoreBanner.style.color = "#1b5e20";
  } else if (s >= quiz.length * 0.7) {
    $scoreBanner.style.background = "#fff9c4";
    $scoreBanner.style.borderColor = "#fbc02d";
    $scoreBanner.style.color = "#f57f17";
  } else {
    $scoreBanner.style.background = "#ffebee";
    $scoreBanner.style.borderColor = "#c62828";
    $scoreBanner.style.color = "#b71c1c";
  }
  $scoreBanner.style.display = "block";

  currentQ = 0;
  renderQuestion();
  updateNavGrid();

  /* Hide submit, show next */
  $btnSubmit.classList.add("hidden");
  $btnNext.classList.remove("hidden");
  $btnNext.disabled = false;

  // Show review button if there are wrong answers
  const wrongCount = quiz.length - s;
  $btnReview.disabled = wrongCount === 0;
  $btnReview.textContent = wrongCount === 0
    ? "🎉 No mistakes!"
    : `📝 Review ${wrongCount} wrong answer${wrongCount > 1 ? 's' : ''}`;

  /* Email setup */
  const EMAILJS_PUBLIC_KEY  = "1oR0j0WDvUmSSYEpK";
  const EMAILJS_SERVICE_ID  = "service_v7ifzdj";
  const EMAILJS_TEMPLATE_ID = "template_lb9c879";

  const now = new Date().toLocaleString("en-PH", { timeZone: "Asia/Manila", dateStyle: "full", timeStyle: "short" });
  const details = quiz.map((q, i) =>
    `Q${i+1}: ${answers[i] === q.answer ? "✓" : "✗"} (Ans: ${answers[i] || "—"} | Correct: ${q.answer})`
  ).join("\n");

  const emailParams = {
    name: playerName,
    email: "noreply@quiz.com",
    subject: `[${playerName}] ${ALL_SETS[currentSetKey].title} Quiz — ${pct}%`,
    message: `Minna no Nihongo - ${ALL_SETS[currentSetKey].title} Bunpo Exam Results\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${s}/${quiz.length} (${pct}%)\n\n--- Detailed Results ---\n${details}\n\nがんばって！`,
    time: now
  };

  if (EMAILJS_PUBLIC_KEY === "YOUR_PUBLIC_KEY") {
    $emailRow.innerHTML = `<span class="email-pill error">⚠ EmailJS not configured</span>`;
  } else {
    $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams, EMAILJS_PUBLIC_KEY);
      $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
    } catch (err) {
      console.error("EmailJS error:", err);
      $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || 'Email failed'}</span>`;
    }
  }
}

/* ── Review & Retake ── */
$btnReview.addEventListener("click", () => {
  reviewIndices = quiz
    .map((q, i) => ({ i, wrong: answers[i] !== q.answer }))
    .filter(x => x.wrong)
    .map(x => x.i);
  if (reviewIndices.length === 0) return;
  reviewMode = true;
  currentQ = 0;
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "block";
  renderQuestion();
});

$btnRetake.addEventListener("click", () => {
  const selectedSet = ALL_SETS[currentSetKey];
  reviewMode = false;
  reviewIndices = [];
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  
  // Re-map and shuffle options again for the retake
  const mappedQuiz = selectedSet.questions.map(q => {
      const correctString = q.options[q.answer];
      return {
          question: q.q,
          answer: correctString,
          choices: shuffle([...q.options])
      };
  });

  quiz = shuffle(mappedQuiz);
  answers = {};
  currentQ = 0;
  submitted = false;
  $scoreBanner.style.display = "none";
  $skippedWarning.classList.add("hidden");
  buildNavGrid();
  startTimer();
  renderQuestion();
  updateProgress();
});

window.jumpToQuestion = function(idx) {
  currentQ = idx;
  renderQuestion();
};
</script>
</body>
</html>
