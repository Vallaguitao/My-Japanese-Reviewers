  /* ── Quiz Screen ── */
  #quiz-screen { display: none; }

  .header { text-align: center; margin-bottom: 24px; }

  /* Score Banner */

    text-align: center;

    border: 1px solid rgba(24, 32, 47, 0.12);

    animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }

  }
  .score-number { font-size: 52px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; margin-bottom: 6px; }
  .score-label { font-size: 20px; font-weight: 700; margin-bottom: 14px; }
  
  .lesson-breakdown {

  .email-row { margin-bottom: 20px; }
  .email-pill {
    display: inline-block;
    background: rgba(24, 32, 47, 0.04);
    border: 1px solid rgba(24, 32, 47, 0.12);

    background: #ffebee;

  .end-actions {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;

  }
  .btn-end {
    background: rgba(24, 32, 47, 0.06);
    border: 1px solid rgba(24, 32, 47, 0.12);
    color: #18202f;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-end:hover:not(:disabled) {
    background: #f4ddd8;
    border-color: rgba(169, 52, 42, 0.2);
    color: #a9342a;
    transform: translateY(-1px);
  }
  .btn-end:disabled { opacity: 0.4; cursor: default; }

  /* ── Review Banner ── */
  .review-banner {
    display: none;
    background: #fff9c4;
    border: 1px solid #fbc02d;
    color: #f57f17;
    text-align: center;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* Progress */
  .progress-row { margin-bottom: 20px; }
  .progress-text { font-size: 12px; color: #667085; display: block; margin-bottom: 8px; font-weight: 700; }
  .progress-bar { height: 6px; background: rgba(24, 32, 47, 0.06); border-radius: 6px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #a9342a, #8f241c);
    border-radius: 6px;
    width: 0%;
    transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(169, 52, 42, 0.15);
  }

  /* Timer Display styling next to progress */
  .topbar-timer {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 700;
    color: #18202f;
    border: 1px solid rgba(24, 32, 47, 0.12);
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(255, 253, 248, 0.94);
    box-shadow: 0 2px 6px rgba(24, 32, 47, 0.04);
  }
  .topbar-timer.warning {
    color: #a9342a;
    border-color: #a9342a;
    background: #ffebee;
    animation: timerPulse 1s infinite alternate;
  }
  .topbar-timer.danger {
    color: #b71c1c;
    border-color: #b71c1c;
    background: #ffebee;
    animation: timerPulse 1s infinite alternate;
  }
  @keyframes timerPulse {
    from { opacity: 1; }
    to { opacity: 0.6; }
  }
  .timer-icon { font-size: 16px; }
  .timer-display { font-variant-numeric: tabular-nums; letter-spacing: 0.5px; }

  /* Nav Grid */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }
  .nav-dot {
    aspect-ratio: 1;
    border-radius: 8px;
    background: #fffdf8;
    border: 1px solid rgba(24, 32, 47, 0.12);
    color: #667085;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-dot:hover:not(.locked) {
    background: #f4ddd8;
    color: #a9342a;
    border-color: rgba(169, 52, 42, 0.2);
  }
  .nav-dot.answered {
    background: rgba(169, 52, 42, 0.06);
    border-color: rgba(169, 52, 42, 0.2);
    color: #a9342a;
  }
  .nav-dot.active {
    border-color: #a9342a;
    background: #f4ddd8;
    color: #a9342a;
    box-shadow: 0 0 0 3px rgba(169, 52, 42, 0.15);
  }
  .nav-dot.correct {
    background: #e8f5e9;
    border-color: #2e7d32;
    color: #1b5e20;
  }
  .nav-dot.wrong {
    background: #ffebee;
    border-color: #c62828;
    color: #b71c1c;
  }
  .nav-dot.unanswered-locked {
    background: rgba(24, 32, 47, 0.02);
    border-color: rgba(24, 32, 47, 0.06);
    color: rgba(24, 32, 47, 0.3);
    opacity: 0.5;
  }

  /* Question Card */
  .q-card {
    background: rgba(255, 253, 248, 0.94);
    border-radius: 8px;
    padding: 28px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(24, 32, 47, 0.04);
    animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .q-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 8px;
    letter-spacing: 0.3px;
  }
  .q-tag.lesson-1  { background: #cfe5f7; color: #1e4a7d; }
  .q-tag.lesson-2  { background: #d4f0d5; color: #1f5a2a; }
  .q-tag.lesson-3  { background: #fbe7c4; color: #7a4a1c; }
  .q-tag.lesson-4  { background: #fbd5e3; color: #7a1f4a; }
  .q-tag.lesson-5  { background: #e0d5f5; color: #4a2d7a; }
  .q-tag.lesson-6  { background: #d4ecf2; color: #1c5566; }
  .q-tag.lesson-7  { background: #fde0c8; color: #7d3a14; }
  .q-tag.lesson-8  { background: #d8f0e0; color: #1f5a3f; }
  .q-tag.lesson-9  { background: #e8d8f5; color: #5a2d7a; }
  .q-tag.lesson-10 { background: #fcd5d5; color: #7a2828; }
  .q-tag.lesson-11 { background: #cfe7d8; color: #1f5a3a; }
  .q-tag.lesson-12 { background: #f7d8e8; color: #7a1f5a; }
  .q-tag.lesson-13 { background: #d4e0fc; color: #1f3a7a; }
  .q-tag.lesson-14 { background: #fce8c8; color: #7a4d14; }
  .q-tag.lesson-15 { background: #d8f5e8; color: #1f5a4a; }
  .q-tag.lesson-16 { background: #f5d5e0; color: #7a1f4a; }
  .q-tag.lesson-17 { background: #d8e8f5; color: #1f4a7a; }
  .q-tag.lesson-18 { background: #f7c8d8; color: #7a1f3a; }
  .q-tag.type {
    background: rgba(24, 32, 47, 0.04);
    color: #667085;
    border: 1px solid rgba(24, 32, 47, 0.12);
  }

  .q-number {
    font-size: 11px;
    color: #667085;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .q-stem {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    line-height: 1.4;
    color: #18202f;
  }

  .choices-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .choice-btn {
    padding: 18px 20px;
    border-radius: 8px;
    border: 1px solid rgba(24, 32, 47, 0.12);
    background: #fffdf8;
    color: #18202f;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    position: relative;
    display: flex;
    align-items: center;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    line-height: 1.4;
  }
  .choice-btn:hover:not(.locked) {
    border-color: rgba(169, 52, 42, 0.3);
    background: #f4ddd8;
    color: #a9342a;
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.05);
  }
  .choice-btn.selected {
    background: #f4ddd8;
    border-color: #a9342a;
    color: #a9342a;
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.1);
  }
  .choice-btn.correct-reveal {
    background: #e8f5e9;
    border-color: #2e7d32;
    color: #1b5e20;
  }
  .choice-btn.wrong-reveal {
    background: #ffebee;
    border-color: #c62828;
    color: #b71c1c;
  }
  .choice-btn.faded-reveal {
    opacity: 0.4;
    border-color: rgba(24, 32, 47, 0.04);
  }
  .choice-letter {
    font-weight: 800;
    margin-right: 16px;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .choice-btn:hover .choice-letter, .choice-btn.selected .choice-letter { opacity: 1; }
  
  .mark {
    position: absolute;
    right: 20px;
    font-size: 20px;
    font-weight: 900;
  }
  .mark.ok { color: #1b5e20; }
  .mark.no { color: #b71c1c; }

  /* Arrow Row */
  .arrow-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn-nav {
    flex: 1;
    padding: 16px 0;
    border-radius: 8px;
    background: #fffdf8;
    border: 1px solid rgba(24, 32, 47, 0.12);
    color: #18202f;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-nav:hover:not(:disabled) {
    background: #f4ddd8;
    color: #a9342a;
    border-color: rgba(169, 52, 42, 0.2);
  }
  .btn-nav:disabled { opacity: 0.25; cursor: not-allowed; }
  
  .btn-submit {
    flex: 1;
    padding: 16px 0;
    border-radius: 8px;
    background: #a9342a;
    border: none;
    color: #ffffff;
    font-size: 15px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(169, 52, 42, 0.25);
    transition: all 0.2s;
  }
  .btn-submit:hover:not(:disabled) {
    box-shadow: 0 6px 20px rgba(169, 52, 42, 0.35);
    opacity: 0.95;
  }
  .btn-submit:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

  /* Skipped warning alert box */
  .skipped-warning {
    margin-bottom: 20px;
    padding: 16px;
    background: #fff8ef;
    border: 1px solid #a9342a;
    border-radius: 8px;
    color: #a9342a;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
  }
  .skipped-link {
    color: #a9342a;
    text-decoration: underline;
    cursor: pointer;
    margin: 0 4px;
    font-weight: 800;
  }
  .skipped-link:hover {
    color: #8f241c;
  }

  .text-center { text-align: center; }
  .hidden { display: none !important; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .container { padding: 16px 12px 50px; }
    .title { font-size: 20px; }
    .q-stem { font-size: 18px; }
    .choice-btn { font-size: 14px; padding: 12px 10px; }
    .lesson-breakdown { gap: 5px; }
    .lesson-stat { font-size: 11px; padding: 5px 9px; }
    .nav-grid { grid-template-columns: repeat(auto-fill, minmax(28px, 1fr)); gap: 5px; }
  }

  /* Desktop refinements */
  @media (min-width: 1024px) {
    .container { max-width: 620px; padding: 32px 16px 80px; }
  }

/* ========== Site Breadcrumb ========== */
.site-breadcrumb,
.site-breadcrumb * {
  box-sizing: border-box;
}

.site-breadcrumb {
  position: relative;
  z-index: 20;
  width: min(1180px, calc(100% - 32px));
  margin: 16px auto 12px;
  font-family: "Noto Sans JP", "Outfit", system-ui, sans-serif;
  color: #18202f;
}

.site-breadcrumb__list {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0;
  list-style: none;
  margin: 0;
  padding: 8px 12px;
  border: 1px solid rgba(24, 32, 47, 0.12);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.94);
  box-shadow: 0 10px 30px rgba(24, 32, 47, 0.08);
}

.site-breadcrumb__item {
  display: inline-flex;
  align-items: center;
  min-width: 0;
  color: #667085;
  font-size: 0.82rem;
  font-weight: 700;
  line-height: 1.4;
}

.site-breadcrumb__item + .site-breadcrumb__item::before {
  content: "/";
  margin: 0 8px;
  color: rgba(169, 52, 42, 0.42);
  font-weight: 800;
}

.site-breadcrumb__link {
  color: #667085;
  text-decoration: none;
  transition: color 0.18s ease, background 0.18s ease;
}

.site-breadcrumb__link:hover {
  color: #a9342a;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__link:focus-visible {
  color: #a9342a;
  outline: 2px solid rgba(169, 52, 42, 0.45);
  outline-offset: 3px;
  border-radius: 4px;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__category {
  color: #a9342a;
}

.site-breadcrumb__current {
  color: #18202f;
  overflow-wrap: anywhere;
}

@media (max-width: 640px) {
  .site-breadcrumb {
    width: min(100% - 20px, 680px);
    margin: 12px auto 10px;
  }

  .site-breadcrumb__list {
    padding: 8px 10px;
  }

  .site-breadcrumb__item {
    font-size: 0.78rem;
  }
}
/* ========== End Site Breadcrumb ========== */

  /* ── Explanation Box / Feedback Card ── */
  .feedback-card {
    display: none;
    margin-top: 24px;
    padding: 18px 20px;
    border-radius: 8px;
    background: #fff8ef;
    border: 1px solid rgba(169, 52, 42, 0.15);

  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fb-header {
    font-weight: 800;
    margin-bottom: 8px;
    font-size: 12px;

    letter-spacing: 0.8px;
    display: flex;
    align-items: center;

  }

  .feedback-card.wrong .fb-header { color: #c62828; }
  .fb-block { margin-top: 8px; }
  .fb-block.connect { color: #667085; font-size: 13px; }
  .fb-block.warn {
    color: #b71c1c;
    background: #ffebee;
    border: 1px solid rgba(198, 40, 40, 0.2);

    border-radius: 6px;
    font-size: 13px;
  }

<!-- Site Breadcrumb -->

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let playerName = "";
let quiz = [];
let answers = {};
let currentQ = 0;
let submitted = false;
let reviewMode = false;
let reviewIndices = [];
let timeLeft = 0;
let endTime = null;
let timerInterval = null;

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickScoreTier(pct) {
  if (pct === 100) {
    return { label: "完璧(かんぺき)！ Perfect! 🌸", bg: "#e8f5e9", border: "#2e7d32", text: "#1b5e20" };
  } else if (pct >= 90) {
    return { label: "すごい！ Excellent! 🎉", bg: "#e8f5e9", border: "#2e7d32", text: "#1b5e20" };
  } else if (pct >= 75) {
    return { label: "いいですね！ Good job! 👏", bg: "#fff9c4", border: "#fbc02d", text: "#f57f17" };
  } else if (pct >= 60) {
    return { label: "がんばった！ Keep going! 💪", bg: "#fff9c4", border: "#fbc02d", text: "#f57f17" };
  } else {
    return { label: "もう一度(いちど)！ Try again! 🌱", bg: "#ffebee", border: "#c62828", text: "#b71c1c" };
  }
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
}

function formatDuration(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  if (m === 0) return `${s}s`;
  return `${m}m ${s}s`;
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
emailjs.init(QUIZ_CONFIG.emailjs.publicKey);

const $nameScreen   = document.getElementById("name-screen");
const $quizScreen   = document.getElementById("quiz-screen");
const $nameInput    = document.getElementById("name-input");
const $btnStart     = document.getElementById("btn-start");
const $subtitle     = document.getElementById("quiz-subtitle");
const $timerWrapper = document.getElementById("timer-wrapper");
const $timerDisplay = document.getElementById("timer-display");
const $scoreBanner  = document.getElementById("score-banner");
const $scoreNum     = document.getElementById("score-number");
const $scoreLbl     = document.getElementById("score-label");
const $emailRow     = document.getElementById("email-row");
const $btnReview    = document.getElementById("btn-review");
const $btnRetake    = document.getElementById("btn-retake");
const $btnHome      = document.getElementById("btn-home");
const $reviewBanner = document.getElementById("review-banner");
const $progText     = document.getElementById("progress-text");
const $progFill     = document.getElementById("progress-fill");
const $navGrid      = document.getElementById("nav-grid");
const $qNumber      = document.getElementById("q-number");
const $qStem        = document.getElementById("q-stem");
const $choicesGrid  = document.getElementById("choices-grid");
const $feedbackCard = document.getElementById("feedback-card");
const $btnPrev      = document.getElementById("btn-prev");
const $btnNext      = document.getElementById("btn-next");
const $btnSubmit    = document.getElementById("btn-submit");
const $skippedWarning = document.getElementById("skipped-warning");

document.title = QUIZ_CONFIG.title;
document.getElementById("ns-title").textContent = QUIZ_CONFIG.title;
document.getElementById("ns-subtitle").innerHTML = QUIZ_CONFIG.subtitle;
document.getElementById("qs-title").textContent = QUIZ_CONFIG.titleShort;

/* ═══════════════════════════════════════════════════════════════
   NAME SCREEN
   ═══════════════════════════════════════════════════════════════ */
$nameInput.addEventListener("input", () => {
  $btnStart.disabled = !$nameInput.value.trim();
});
$nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && $nameInput.value.trim()) startQuiz();
});
$btnStart.addEventListener("click", startQuiz);

function startQuiz() {
  playerName = $nameInput.value.trim();
  const baseQuestions = QUIZ_CONFIG.shuffleQuestions ? shuffle(QUESTIONS) : [...QUESTIONS];
  quiz = baseQuestions.map(q => ({
    ...q,
    choices: QUIZ_CONFIG.shuffleChoices ? shuffle(q.choices) : [...q.choices]
  }));
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];

  $nameScreen.style.display = "none";
  $quizScreen.style.display = "block";
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  $timerWrapper.style.display = "flex";
  $skippedWarning.classList.add("hidden");
  $subtitle.innerHTML = `${playerName}さん — choose the correct answer for each question 🌸`;

  buildNavGrid();
  startTimer();
  renderQuestion();
  updateProgress();
}

/* ═══════════════════════════════════════════════════════════════
   TIMER
   ═══════════════════════════════════════════════════════════════ */
function startTimer() {
  const qCount = quiz.length;
  let TIME_LIMIT;
  if (qCount <= 30) {
    TIME_LIMIT = 20 * 60;
  } else if (qCount <= 40) {
    TIME_LIMIT = 25 * 60;
  } else if (qCount <= 50) {
    TIME_LIMIT = 30 * 60;
  } else {
    TIME_LIMIT = 40 * 60;
  }

  endTime = Date.now() + TIME_LIMIT * 1000;
  timeLeft = TIME_LIMIT;
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (submitted) {
      clearInterval(timerInterval);
      return;
    }
    timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("Time is up! Your exam will be submitted automatically.");
      submitQuiz(true);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
  const s = String(timeLeft % 60).padStart(2, '0');
  if ($timerDisplay) {
    $timerDisplay.textContent = `${m}:${s}`;
    $timerWrapper.classList.remove("warning", "danger");
    if (timeLeft < 300) {
      $timerWrapper.classList.add("danger");
    } else if (timeLeft < 600) {
      $timerWrapper.classList.add("warning");
    }
  }
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
}

/* ═══════════════════════════════════════════════════════════════
   NAV GRID
   ═══════════════════════════════════════════════════════════════ */
function buildNavGrid() {
  $navGrid.innerHTML = "";
  quiz.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot";
    btn.textContent = i + 1;
    btn.setAttribute("aria-label", `Question ${i + 1}`);
    btn.addEventListener("click", () => {
      if (reviewMode) {
        const idx = reviewIndices.indexOf(i);
        if (idx === -1) return;
        currentQ = idx;
      } else {
        currentQ = i;
      }
      renderQuestion();
    });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;

  if (submitted) {
    $navGrid.classList.remove("hidden");
  } else {
    $navGrid.classList.add("hidden");
  }

  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    let label = `Question ${i + 1}`;
    if (i === realIdx) { dot.classList.add("active"); label += ", current"; }
    
    if (submitted) {
      dot.classList.add("locked");
      if (answers[i] === quiz[i].answer) {
        dot.classList.add("correct"); label += ", correct";
      } else if (answers[i] !== undefined) {
        dot.classList.add("wrong"); label += ", incorrect";
      } else {
        dot.classList.add("unanswered-locked"); label += ", unanswered";
      }
    } else {
      if (answers[i] !== undefined) {
        dot.classList.add("answered"); label += ", answered";
      }
    }
    dot.setAttribute("aria-label", label);
  });
}

/* ═══════════════════════════════════════════════════════════════
   PROGRESS
   ═══════════════════════════════════════════════════════════════ */
function updateProgress() {
  if (reviewMode) {
    $progText.textContent = `Reviewing ${currentQ + 1} / ${reviewIndices.length}`;
    $progFill.style.width = `${((currentQ + 1) / reviewIndices.length) * 100}%`;
    return;
  }
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${quiz.length} answered`;
  $progFill.style.width = `${(count / quiz.length) * 100}%`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER QUESTION
   ═══════════════════════════════════════════════════════════════ */
function renderQuestion() {
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  const q = quiz[realIdx];
  const isAnswered = answers[realIdx] !== undefined;

  $qNumber.textContent = reviewMode
    ? `Review ${currentQ + 1} of ${reviewIndices.length}`
    : `Question ${realIdx + 1} of ${quiz.length}`;

  const tempDiv = document.createElement("div");
  tempDiv.innerHTML = q.stem;
  const hintSpan = tempDiv.querySelector("span[style*='color:var(--text-muted)']");
  if (hintSpan) {
    const prev = hintSpan.previousSibling;
    if (prev && prev.nodeName === "BR") {
      prev.parentNode.removeChild(prev);
    }
    hintSpan.parentNode.removeChild(hintSpan);
  }
  $qStem.innerHTML = tempDiv.innerHTML;

  $choicesGrid.className = `choices-grid${q.longChoices ? " long" : ""}`;
  $choicesGrid.innerHTML = "";

  q.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (submitted) btn.classList.add("locked");
    
    const letters = ['a', 'b', 'c', 'd'];
    btn.innerHTML = `<span class="choice-letter">${letters[i]}.</span><span>${c}</span>`;

    const selected = answers[realIdx] === c;
    const isCorrectChoice = c === q.answer;
    btn.setAttribute("aria-pressed", selected ? "true" : "false");

    if (!submitted) {
      if (selected) btn.classList.add("selected");
      btn.addEventListener("click", () => {
        if (submitted) return;
        answers[realIdx] = c;
        renderQuestion();
        updateNavGrid();
        updateProgress();
      });
    } else {
      if (isCorrectChoice) {
        btn.classList.add("correct-reveal");
        btn.innerHTML += `<span class="mark ok">✓</span>`;
      } else if (selected && !isCorrectChoice) {
        btn.classList.add("wrong-reveal");
        btn.innerHTML += `<span class="mark no">✗</span>`;
      } else {
        btn.classList.add("faded-reveal");
      }
    }

    $choicesGrid.appendChild(btn);
  });

  /* Feedback card */
  if (submitted && isAnswered) {
    renderFeedback(q, answers[realIdx]);
  } else {
    $feedbackCard.style.display = "none";
    $feedbackCard.innerHTML = "";
  }

  // Hide skipped questions warning when navigating to a question
  $skippedWarning.classList.add("hidden");

  updateNavGrid();
  updateProgress();
  updateNavButtons();
}

function renderFeedback(q, given) {
  const isCorrect = given === q.answer;
  $feedbackCard.className = `feedback-card ${isCorrect ? "correct" : "wrong"}`;
  $feedbackCard.style.display = "block";

  let html = `<div class="fb-header">${isCorrect ? "✓ Correct" : `✗ Not quite — answer: ${q.answer}`}</div>`;
  if (q.correctNote) html += `<div>${q.correctNote}</div>`;
  if (q.explain)     html += `<div class="fb-block">${q.explain}</div>`;
  if (q.connect)     html += `<div class="fb-block connect">${q.connect}</div>`;
  if (q.warn)        html += `<div class="fb-block warn">${q.warn}</div>`;

  $feedbackCard.innerHTML = html;
}

function updateNavButtons() {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  $btnPrev.disabled = currentQ === 0;

  if (!submitted) {
    const isLast = currentQ === quiz.length - 1;
    if (isLast) {
      $btnNext.classList.add("hidden");
      $btnSubmit.classList.remove("hidden");
    } else {
      $btnNext.classList.remove("hidden");
      $btnSubmit.classList.add("hidden");
      $btnNext.textContent = "Next →";
    }
  } else {
    $btnSubmit.classList.add("hidden");
    $btnNext.classList.remove("hidden");
    
    if (reviewMode) {
      if (currentQ === total - 1) {
        $btnNext.textContent = "Done reviewing ✓";
      } else {
        $btnNext.textContent = "Next →";
      }
      $btnNext.disabled = false;
    } else {
      $btnNext.textContent = "Next →";
      $btnNext.disabled = currentQ === total - 1;
    }
  }
}

$btnPrev.addEventListener("click", () => {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
});
$btnNext.addEventListener("click", () => {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  if (currentQ < total - 1) {
    currentQ++; renderQuestion();
  } else if (reviewMode) {
    reviewMode = false;
    $reviewBanner.style.display = "none";
    $scoreBanner.style.display = "block";
    $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });
  }
});



/* ═══════════════════════════════════════════════════════════════
   SUBMIT
   ═══════════════════════════════════════════════════════════════ */
$btnSubmit.addEventListener("click", () => submitQuiz(false));

async function submitQuiz(force = false) {
  const count = Object.keys(answers).length;
  if (force !== true && count < quiz.length) {
    const skipped = [];
    quiz.forEach((_, i) => {
      if (answers[i] === undefined) skipped.push(i);
    });

    $skippedWarning.innerHTML = `⚠️ You have unanswered questions: ` + 
      skipped.map(idx => `<span class="skipped-link" onclick="jumpToQuestion(${idx})">Question ${idx + 1}</span>`).join(", ") + 
      `. Please answer them before submitting.`;
    $skippedWarning.classList.remove("hidden");
    $skippedWarning.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  $skippedWarning.classList.add("hidden");
  stopTimer();
  $timerWrapper.style.display = "none";

  let correct = 0;
  quiz.forEach((q, i) => {
    if (answers[i] === q.answer) correct++;
  });

  submitted = true;
  const pct = Math.round((correct / quiz.length) * 100);
  const tier = pickScoreTier(pct);

  $scoreNum.textContent = `${correct}/${quiz.length}`;
  $scoreLbl.textContent = tier.label;
  $scoreBanner.style.background = tier.bg;
  $scoreBanner.style.borderColor = tier.border;
  $scoreBanner.style.color = tier.text;
  $scoreBanner.style.display = "block";

  /* Enable review button if there are wrong answers */
  const wrongCount = quiz.length - correct;
  $btnReview.disabled = wrongCount === 0;
  $btnReview.textContent = wrongCount === 0
    ? "🎉 No mistakes!"
    : `📝 Review ${wrongCount} wrong answer${wrongCount > 1 ? "s" : ""}`;

  currentQ = 0;
  renderQuestion();
  updateNavGrid();
  $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });

  /* EmailJS send */
  const cfg = QUIZ_CONFIG.emailjs;
  const now = new Date().toLocaleString(cfg.locale, {
    timeZone: cfg.timezone, dateStyle: "full", timeStyle: "short"
  });
  const details = quiz.map((q, i) => {
    const stripHtml = (s) => s.replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
    return `${i + 1}. [L${q.lesson} ${q.type}] ${stripHtml(q.stem)} → Answer: ${answers[i] || "—"} | Correct: ${q.answer} ${answers[i] === q.answer ? "✓" : "✗"}`;
  }).join("\n");

  const emailParams = {
    name: playerName,
    email: "noreply@quiz.com",
    subject: `[${playerName}] Irodori A2 Grammar Quiz L1–L18 — ${pct}%`,
    message: `🌸 Irodori A2 Grammar Master Quiz · L1–L18\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${correct}/${quiz.length} (${pct}%)\n\n--- Detailed results ---\n${details}\n\nがんばって！🌸`,
    time: now
  };

  $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
  try {
    await emailjs.send(cfg.serviceId, cfg.templateId, emailParams, cfg.publicKey);
    $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
  } catch (err) {
    console.error("EmailJS error:", err);
    $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || "Email failed"}</span>`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   REVIEW + RETAKE + HOME
   ═══════════════════════════════════════════════════════════════ */
$btnReview.addEventListener("click", () => {
  reviewIndices = quiz
    .map((q, i) => ({ i, wrong: answers[i] !== q.answer }))
    .filter(x => x.wrong)
    .map(x => x.i);
  if (reviewIndices.length === 0) return;
  reviewMode = true;
  currentQ = 0;
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "block";
  renderQuestion();
});

$btnRetake.addEventListener("click", () => {
  stopTimer();
  const baseQuestions = QUIZ_CONFIG.shuffleQuestions ? shuffle(QUESTIONS) : [...QUESTIONS];
  quiz = baseQuestions.map(q => ({
    ...q,
    choices: QUIZ_CONFIG.shuffleChoices ? shuffle(q.choices) : [...q.choices]
  }));
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  $timerWrapper.style.display = "flex";
  $skippedWarning.classList.add("hidden");
  buildNavGrid();
  renderQuestion();
  updateProgress();
  startTimer();
  window.scrollTo({ top: 0, behavior: "smooth" });
});

$btnHome.addEventListener("click", () => {
  stopTimer();
  $quizScreen.style.display = "none";
  $nameScreen.style.display = "block";
});

window.jumpToQuestion = function(idx) {
  currentQ = idx;
  renderQuestion();
};
</script>
</body>
</html>
