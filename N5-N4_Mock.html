<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N5–N4 Grammar Mock Exam · 60 Questions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  /* ═══════════════════════════════════════════════════════════════
     THEME — sakura (default). Swap this :root block to retheme.
     See references/themes.md for ocean / forest / sunset alternates.
     ═══════════════════════════════════════════════════════════════ */
  :root {
    --bg-base: #1a1525;
    --bg-radial-1: rgba(232, 180, 200, 0.07);
    --bg-radial-2: rgba(120, 100, 180, 0.07);
    --bg-card: #221d2e;
    --bg-input: #2a2535;
    --bg-button: #3d3650;
    --bg-button-hover: #302844;
    --bg-feedback-correct: #1a3d2a;
    --bg-feedback-wrong: #3d1a1f;

    --text-primary: #e8e0f0;
    --text-muted: #9e93b0;
    --text-on-accent: #1a1525;

    --border: #3d3650;
    --border-active: #5c4d7a;

    --accent-start: #e8b4c8;
    --accent-end: #c89db7;

    --success: #2d6a4f;
    --success-bright: #40916c;
    --success-text: #a7f3d0;
    --warning: #b08d37;
    --warning-bright: #d4a843;
    --error: #9b2226;
    --error-bright: #ca6702;
    --error-text: #fca5a5;

    --tag-l1-bg: #1e3a5f; --tag-l1-fg: #93c5fd;
    --tag-l2-bg: #1e4a3a; --tag-l2-fg: #86efac;
    --tag-l3-bg: #5a3a1e; --tag-l3-fg: #fcd34d;
    --tag-l4-bg: #4a1e3a; --tag-l4-fg: #f9a8d4;
    --tag-l5-bg: #3a1e4a; --tag-l5-fg: #c4b5fd;
  }

  /* ── Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, var(--bg-radial-1) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, var(--bg-radial-2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 580px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* Inline Japanese helper — slightly larger, JP-first font stack */
  .jp {
    font-family: 'Noto Sans JP', 'Zen Kaku Gothic New', sans-serif;
    font-size: 1.08em;
    font-weight: 700;
  }
  .blank {
    display: inline-block;
    min-width: 28px;
    padding: 0 6px;
    margin: 0 2px;
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    color: var(--text-on-accent);
    border-radius: 6px;
    font-weight: 800;
    text-align: center;
  }
  ruby rt { font-size: 0.6em; color: var(--text-muted); }

  /* ── Name Screen ── */
  #name-screen { margin-top: 50px; }

  .card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 28px 20px;
    border: 1px solid var(--border);
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    color: var(--text-on-accent);
    font-weight: 700;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  .title {
    font-size: 22px;
    font-weight: 800;
    margin: 14px 0 4px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .scope-pills {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    margin: 16px 0 4px;
  }
  .scope-pill {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 10px;
  }

  .name-label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin: 24px 0 8px;
    text-align: left;
  }

  .name-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--accent-start); }

  .btn-primary {
    width: 100%;
    margin-top: 16px;
    padding: 14px 0;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    border: none;
    color: var(--text-on-accent);
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:focus-visible { outline: 3px solid var(--accent-start); outline-offset: 3px; }
  .btn-primary:active:not(:disabled) { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }

  /* ── Quiz Screen ── */
  #quiz-screen { display: none; }

  .header { text-align: center; margin-bottom: 22px; }
  .header .subtitle { margin-top: 2px; }

  /* ── Score Banner ── */
  .score-banner {
    display: none;
    border-radius: 16px;
    padding: 22px 16px;
    text-align: center;
    margin-bottom: 20px;
    animation: slideDown 0.4s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .score-number { font-size: 44px; font-weight: 800; letter-spacing: -1px; }
  .score-label { font-size: 16px; font-weight: 600; margin-top: 4px; }
  .lesson-breakdown {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px;
  }
  .lesson-stat {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(4px);
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
  }
  .email-row { margin-top: 12px; }
  .email-pill {
    display: inline-block;
    background: var(--bg-button);
    color: var(--text-primary);
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 12px;
  }
  .email-pill.sent { background: var(--success); color: var(--success-text); }
  .email-pill.error { background: var(--error); color: var(--error-text); }

  .end-actions {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px;
  }
  .btn-end {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-end:hover:not(:disabled) { background: rgba(255, 255, 255, 0.25); }
  .btn-end:disabled { opacity: 0.4; cursor: default; }
  .btn-end:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  /* ── Review Banner ── */
  .review-banner {
    display: none;
    background: linear-gradient(135deg, var(--warning), var(--warning-bright));
    color: #1a1525;
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
  }

  /* ── Progress ── */
  .progress-row { margin-bottom: 14px; }
  .progress-text { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* ── Nav Grid (adaptive — fits any question count) ── */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
    gap: 6px;
    margin-bottom: 20px;
  }
  .nav-dot {
    aspect-ratio: 1;
    border-radius: 8px;
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 11px;
    font-weight: 600;
    border: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav-dot:hover { background: var(--bg-button-hover); }
  .nav-dot:focus-visible { outline: 2px solid var(--accent-start); outline-offset: 2px; }
  .nav-dot.answered { background: var(--bg-button); }
  .nav-dot.active { border-color: var(--accent-start); }
  .nav-dot.correct { background: var(--success); }
  .nav-dot.wrong { background: var(--error); }

  /* ── Question Card ── */
  .q-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 22px 18px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .q-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 8px;
    letter-spacing: 0.3px;
  }
  .q-tag.lesson-1 { background: var(--tag-l1-bg); color: var(--tag-l1-fg); }
  .q-tag.lesson-2 { background: var(--tag-l2-bg); color: var(--tag-l2-fg); }
  .q-tag.lesson-3 { background: var(--tag-l3-bg); color: var(--tag-l3-fg); }
  .q-tag.lesson-4 { background: var(--tag-l4-bg); color: var(--tag-l4-fg); }
  .q-tag.lesson-5 { background: var(--tag-l5-bg); color: var(--tag-l5-fg); }
  .q-tag.type {
    background: var(--bg-button);
    color: var(--text-muted);
  }

  .q-number {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .q-stem {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 18px;
    line-height: 1.45;
  }

  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .choices-grid.long { grid-template-columns: 1fr; }

  .choice-btn {
    padding: 14px 12px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    text-align: center;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    position: relative;
    transition: all 0.15s;
  }
  .choices-grid.long .choice-btn { text-align: left; padding: 14px 16px; }
  .choice-btn:hover:not(:disabled) { border-color: var(--border-active); background: var(--bg-button-hover); }
  .choice-btn:focus-visible { outline: 2px solid var(--accent-start); outline-offset: 2px; }
  .choice-btn.selected { background: var(--border-active); border-color: var(--accent-start); }
  .choice-btn.correct-reveal { background: var(--success); border-color: var(--success-bright); }
  .choice-btn.wrong-reveal { background: var(--error); border-color: var(--error-bright); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn .mark {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 14px;
    font-weight: 700;
  }
  .choice-btn .mark.ok { color: var(--success-text); }
  .choice-btn .mark.no { color: var(--error-text); }
  .choice-btn .key-hint {
    position: absolute;
    top: 6px; left: 8px;
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 700;
    opacity: 0.7;
  }

  /* ── Feedback Card ── */
  .feedback-card {
    display: none;
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 14px;
    border: 1px solid;
    font-size: 14px;
    line-height: 1.55;
    animation: fadeIn 0.3s ease;
  }
  .feedback-card.correct {
    background: var(--bg-feedback-correct);
    border-color: var(--success-bright);
  }
  .feedback-card.wrong {
    background: var(--bg-feedback-wrong);
    border-color: var(--error-bright);
  }
  .fb-header {
    font-weight: 700;
    margin-bottom: 6px;
    font-size: 13px;
    letter-spacing: 0.3px;
  }
  .feedback-card.correct .fb-header { color: var(--success-text); }
  .feedback-card.wrong .fb-header { color: var(--error-text); }
  .fb-block { margin-top: 8px; }
  .fb-block.connect { color: var(--text-muted); font-size: 13px; }
  .fb-block.warn {
    color: #fcd34d;
    background: rgba(252, 211, 77, 0.08);
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
  }

  /* ── Arrow Row ── */
  .arrow-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn-nav {
    flex: 1;
    padding: 12px 0;
    border-radius: 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .btn-nav:hover:not(:disabled) { background: var(--bg-button-hover); }
  .btn-nav:focus-visible { outline: 2px solid var(--accent-start); outline-offset: 2px; }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .btn-next-primary {
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    color: var(--text-on-accent);
    border: none;
  }

  .text-center { text-align: center; }
  .hidden { display: none !important; }

  /* ── Mobile tweaks ── */
  @media (max-width: 480px) {
    .container { padding: 16px 12px 50px; }
    .title { font-size: 20px; }
    .q-stem { font-size: 16px; }
    .choice-btn { font-size: 15px; padding: 12px 10px; }
    .lesson-breakdown { gap: 6px; }
    .lesson-stat { font-size: 11px; padding: 5px 9px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- ════ NAME SCREEN ════ -->
  <div id="name-screen">
    <div class="card text-center">
      <span class="badge" id="ns-badge"></span>
      <h1 class="title" id="ns-title"></h1>
      <p class="subtitle" id="ns-subtitle"></p>

      <div class="scope-pills" id="scope-pills"></div>

      <label class="name-label" for="name-input">おなまえは？ Enter your name</label>
      <input class="name-input" id="name-input" type="text" placeholder="Your name..." autocomplete="off" autofocus>
      <button class="btn-primary" id="btn-start" disabled>Start Quiz →</button>
    </div>
  </div>

  <!-- ════ QUIZ SCREEN ════ -->
  <div id="quiz-screen">
    <header class="header">
      <span class="badge" id="qs-badge"></span>
      <h1 class="title" id="qs-title"></h1>
      <p class="subtitle" id="quiz-subtitle"></p>
    </header>

    <div class="score-banner" id="score-banner" aria-live="polite">
      <div class="score-number" id="score-number"></div>
      <div class="score-label" id="score-label"></div>
      <div class="lesson-breakdown" id="lesson-breakdown"></div>
      <div class="email-row" id="email-row"></div>
      <div class="end-actions">
        <button class="btn-end" id="btn-review" disabled>📝 Review wrong answers</button>
        <button class="btn-end" id="btn-retake">🔄 Retake quiz</button>
      </div>
    </div>

    <div class="review-banner" id="review-banner">
      📝 Review mode — showing only the questions you got wrong
    </div>

    <div class="progress-row">
      <span class="progress-text" id="progress-text">0 / 0 answered</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="nav-grid" id="nav-grid"></div>

    <div class="q-card" id="q-card">
      <div class="q-meta">
        <span class="q-tag lesson-1" id="q-lesson-tag">📘 Lesson 1</span>
        <span class="q-tag type" id="q-type-tag">Grammar</span>
      </div>
      <div class="q-number" id="q-number"></div>
      <div class="q-stem" id="q-stem"></div>
      <div class="choices-grid" id="choices-grid"></div>
      <div class="feedback-card" id="feedback-card" aria-live="polite"></div>
    </div>

    <div class="arrow-row">
      <button class="btn-nav" id="btn-prev">← Previous</button>
      <button class="btn-nav btn-next-primary" id="btn-next">Next →</button>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   QUIZ_CONFIG — edit this block to customize the quiz.
   Everything below QUESTIONS is generic logic; do not edit unless
   you know what you're doing.
   ═══════════════════════════════════════════════════════════════ */
const QUIZ_CONFIG = {
  // Display
  badge: "JLPT N5–N4 模擬試験",
  title: "N5–N4 Grammar Mock Exam · 60 Questions",
  titleShort: "N5–N4 文法 Mock · 60 Q",
  subtitle: "60 grammar questions · 文法1 (fill-in) + 文法2 (★ sentence rearrangement) · covers Minna I (L1–25), Minna II, and A2 grammar",
  scopePills: ["📘 N5 ×30", "📗 N4 ×20", "📙 A2 ×10", "📝 文法1 ×42", "★ 文法2 ×18"],

  // Behavior
  shuffleQuestions: true,
  shuffleChoices: true,

  // Score thresholds (PERCENTAGE, not absolute count)
  scoreThresholds: {
    perfect:   { min: 100, label: "完璧！ Perfect!",     gradient: "linear-gradient(135deg, var(--success), var(--success-bright))" },
    excellent: { min: 90,  label: "すごい！ Excellent!",  gradient: "linear-gradient(135deg, var(--success), var(--success-bright))" },
    good:      { min: 70,  label: "いいですね！ Good job!", gradient: "linear-gradient(135deg, var(--warning), var(--warning-bright))" },
    fail:      { min: 0,   label: "もう一度！ Try again!", gradient: "linear-gradient(135deg, var(--error), var(--error-bright))" }
  },

  // EmailJS — baked in. Edit these if deploying with different credentials.
  emailjs: {
    publicKey:  "1oR0j0WDvUmSSYEpK",
    serviceId:  "service_v7ifzdj",
    templateId: "template_lb9c879",
    timezone:   "Asia/Manila",
    locale:     "en-PH"
  }
};

/* ═══════════════════════════════════════════════════════════════
   QUESTIONS — 60-Question N5–N4 Grammar Mock Exam
   Lesson IDs:
     1–25  → N5 (Minna I, lessons 1–25)
     26–43 → N4 (Minna II — the Lesson_1.html through Lesson_18.html files; mapped to 26–43)
     44–61 → A2 (transitional A2/N3 grammar — Lesson_1_A2.html through Lesson_18_A2.html; mapped to 44–61)
   Format: 40 文法1 (fill-in-the-blank) + 20 文法2 (★ sentence rearrangement)
   Distribution: N5 ×30 / N4 ×20 / A2 ×10
   ═══════════════════════════════════════════════════════════════ */
const QUESTIONS = [

  /* ════════════ N5 SECTION (30 questions) ════════════ */

  { /* Q1 — N5 L1 は */
    lesson: 1, type: "N5 · 文法1",
    stem: 'Choose the correct particle:<br><span class="jp">わたし<span class="blank">?</span> <ruby>田中<rt>たなか</rt></ruby>です。</span>',
    answer: "は",
    choices: ["は", "が", "を", "の"],
    correctNote: 'は marks the topic — "<em>as for me</em>, (I am) Tanaka."',
    explain: 'The N5 backbone pattern: <span class="jp">[topic] は [predicate] です</span>. は introduces what we\'re talking about.',
    connect: '🔗 The same は returns in L2 (これは…), L3 (ここは…), L8 (Aは adj です), and every later lesson — it never goes away.',
    warn: '⚠️ Pronounced 「<span class="jp">わ</span>」 (wa) — never "ha" — when used as a particle.'
  },
  { /* Q2 — N5 L1 の */
    lesson: 1, type: "N5 · 文法1",
    stem: 'Choose the correct particle:<br><span class="jp">マイクさんは IMC<span class="blank">?</span> <ruby>社員<rt>しゃいん</rt></ruby>です。</span>',
    answer: "の",
    choices: ["の", "は", "に", "で"],
    correctNote: 'の links two nouns: <span class="jp">IMCの社員</span> = "an employee <em>of</em> IMC."',
    explain: '<span class="jp">N₁ の N₂</span> = "N₁\'s N₂" or "N₂ of N₁." The first noun describes or owns the second.',
    connect: '🔗 In L2 you\'ll see <span class="jp">わたしの<ruby>本<rt>ほん</rt></ruby></span>. In L22 the same の plays a NEW role — connecting whole clauses to nouns.'
  },

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickScoreTier(pct) {
  const tiers = QUIZ_CONFIG.scoreThresholds;
  if (pct >= tiers.perfect.min)   return tiers.perfect;
  if (pct >= tiers.excellent.min) return tiers.excellent;
  if (pct >= tiers.good.min)      return tiers.good;
  return tiers.fail;
}

/* Map sequential lesson IDs to display labels:
   1–25  → N5 L1–L25  (Minna I)
   26–43 → N4 L1–L18  (Minna II — internally numbered 1–18 in this course)
   44–61 → A2 L1–L18  (transitional N4–N3 grammar) */
function getLessonLabel(num, opts = {}) {
  const { withIcon = true, short = false } = opts;
  let icon, levelTag, lessonNum;
  if (num <= 25)      { icon = "📘"; levelTag = "N5"; lessonNum = num; }
  else if (num <= 43) { icon = "📗"; levelTag = "N4"; lessonNum = num - 25; }
  else                { icon = "📙"; levelTag = "A2"; lessonNum = num - 43; }
  const body = short ? `${levelTag}-L${lessonNum}` : `${levelTag} · L${lessonNum}`;
  return withIcon ? `${icon} ${body}` : body;
}

/* Tag color cycles through 5 palette slots */
function getTagColorClass(num) {
  return `lesson-${((num - 1) % 5) + 1}`;
}

/* ═══════════════════════════════════════════════════════════════
   NAME SCREEN
   ═══════════════════════════════════════════════════════════════ */
$nameInput.addEventListener("input", () => {
  $btnStart.disabled = !$nameInput.value.trim();
});
$nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && $nameInput.value.trim()) startQuiz();
});
$btnStart.addEventListener("click", startQuiz);

function startQuiz() {
  playerName = $nameInput.value.trim();
  const baseQuestions = QUIZ_CONFIG.shuffleQuestions ? shuffle(QUESTIONS) : [...QUESTIONS];
  quiz = baseQuestions.map(q => ({
    ...q,
    choices: QUIZ_CONFIG.shuffleChoices ? shuffle(q.choices) : [...q.choices]
  }));
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];

  $nameScreen.style.display = "none";
  $quizScreen.style.display = "block";
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  $subtitle.textContent = `${playerName}さん — choose the correct answer for each question`;

  buildNavGrid();
  renderQuestion();
  updateProgress();
}

/* ═══════════════════════════════════════════════════════════════
   NAV GRID
   ═══════════════════════════════════════════════════════════════ */
function buildNavGrid() {
  $navGrid.innerHTML = "";
  quiz.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot";
    btn.textContent = i + 1;
    btn.setAttribute("aria-label", `Question ${i + 1}`);
    btn.addEventListener("click", () => {
      if (reviewMode) {
        const idx = reviewIndices.indexOf(i);
        if (idx === -1) return;
        currentQ = idx;
      } else {
        currentQ = i;
      }
      renderQuestion();
    });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    let label = `Question ${i + 1}`;
    if (i === realIdx) { dot.classList.add("active"); label += ", current"; }
    if (!submitted && answers[i] !== undefined) {
      dot.classList.add("answered"); label += ", answered";
    }
    if (submitted && answers[i] === quiz[i].answer) {
      dot.classList.add("correct"); label += ", correct";
    }
    if (submitted && answers[i] !== undefined && answers[i] !== quiz[i].answer) {
      dot.classList.add("wrong"); label += ", incorrect";
    }
    dot.setAttribute("aria-label", label);
  });
}

/* ═══════════════════════════════════════════════════════════════
   PROGRESS
   ═══════════════════════════════════════════════════════════════ */
function updateProgress() {
  if (reviewMode) {
    $progText.textContent = `Reviewing ${currentQ + 1} / ${reviewIndices.length}`;
    $progFill.style.width = `${((currentQ + 1) / reviewIndices.length) * 100}%`;
    return;
  }
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${quiz.length} answered`;
  $progFill.style.width = `${(count / quiz.length) * 100}%`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER QUESTION
   ═══════════════════════════════════════════════════════════════ */
function renderQuestion() {
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  const q = quiz[realIdx];

  /* Lesson + type tags */
  $qLessonTag.className = `q-tag ${getTagColorClass(q.lesson)}`;
  $qLessonTag.textContent = getLessonLabel(q.lesson);
  $qTypeTag.textContent = q.type;

  /* Number + stem */
  $qNumber.textContent = reviewMode
    ? `Review ${currentQ + 1} of ${reviewIndices.length}`
    : `Question ${realIdx + 1} of ${quiz.length}`;
  $qStem.innerHTML = q.stem;

  /* Choices */
  $choicesGrid.className = `choices-grid${q.longChoices ? " long" : ""}`;
  $choicesGrid.innerHTML = "";
  const isAnswered = answers[realIdx] !== undefined;

  q.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    const selected = answers[realIdx] === c;
    const isCorrectChoice = c === q.answer;

    btn.innerHTML = `<span class="key-hint">${i + 1}</span><span>${c}</span>`;
    btn.setAttribute("aria-pressed", selected ? "true" : "false");

    if (isAnswered) {
      btn.disabled = true;
      if (isCorrectChoice) {
        btn.classList.add("correct-reveal");
        btn.innerHTML += `<span class="mark ok">✓</span>`;
      }
      if (selected && !isCorrectChoice) {
        btn.classList.add("wrong-reveal");
        btn.innerHTML += `<span class="mark no">✗</span>`;
      }
    } else {
      btn.addEventListener("click", () => answerQuestion(c));
    }

    $choicesGrid.appendChild(btn);
  });

  /* Feedback card */
  if (isAnswered) {
    renderFeedback(q, answers[realIdx]);
  } else {
    $feedbackCard.style.display = "none";
    $feedbackCard.innerHTML = "";
  }

  updateNavGrid();
  updateProgress();
  updateNavButtons();
}

function renderFeedback(q, given) {
  const isCorrect = given === q.answer;
  $feedbackCard.className = `feedback-card ${isCorrect ? "correct" : "wrong"}`;
  $feedbackCard.style.display = "block";

  let html = `<div class="fb-header">${isCorrect ? "✓ Correct" : `✗ Not quite — answer: ${q.answer}`}</div>`;
  if (q.correctNote) html += `<div>${q.correctNote}</div>`;
  if (q.explain)     html += `<div class="fb-block">${q.explain}</div>`;
  if (q.connect)     html += `<div class="fb-block connect">${q.connect}</div>`;
  if (q.warn)        html += `<div class="fb-block warn">${q.warn}</div>`;

  $feedbackCard.innerHTML = html;
}

function answerQuestion(choice) {
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  if (answers[realIdx] !== undefined) return;
  answers[realIdx] = choice;
  renderQuestion();

  /* If we just finished the last question of a fresh attempt, auto-submit */
  if (!submitted && !reviewMode && Object.keys(answers).length === quiz.length) {
    setTimeout(submitQuiz, 600);
  }
}

/* ═══════════════════════════════════════════════════════════════
   NAV BUTTONS
   ═══════════════════════════════════════════════════════════════ */
function updateNavButtons() {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  $btnPrev.disabled = currentQ === 0;
  if (currentQ === total - 1) {
    $btnNext.textContent = reviewMode ? "Done reviewing ✓" : "Finish →";
  } else {
    $btnNext.textContent = "Next →";
  }
  $btnNext.disabled = false;
}

$btnPrev.addEventListener("click", () => {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
});
$btnNext.addEventListener("click", () => {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  if (currentQ < total - 1) {
    currentQ++; renderQuestion();
  } else if (reviewMode) {
    /* Exit review mode back to results */
    reviewMode = false;
    $reviewBanner.style.display = "none";
    $scoreBanner.style.display = "block";
    $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });
  }
});

/* ═══════════════════════════════════════════════════════════════
   KEYBOARD CONTROLS
   - Arrow Left/Right: prev/next
   - Digits 1–9: pick that choice (when not typing in input)
   ═══════════════════════════════════════════════════════════════ */
document.addEventListener("keydown", (e) => {
  /* Skip if user is typing in the name input */
  if (document.activeElement === $nameInput) return;
  /* Skip if name screen is still up */
  if ($quizScreen.style.display !== "block") return;

  if (e.key === "ArrowRight") { $btnNext.click(); e.preventDefault(); return; }
  if (e.key === "ArrowLeft")  { $btnPrev.click(); e.preventDefault(); return; }

  if (/^[1-9]$/.test(e.key)) {
    const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
    if (answers[realIdx] !== undefined) return;  // already answered
    const idx = parseInt(e.key, 10) - 1;
    const q = quiz[realIdx];
    if (idx < q.choices.length) {
      answerQuestion(q.choices[idx]);
      e.preventDefault();
    }
  }
});

/* ═══════════════════════════════════════════════════════════════
   SUBMIT — score, render results, send email
   ═══════════════════════════════════════════════════════════════ */
async function submitQuiz() {
  let correct = 0;
  const lessonStats = {};

  quiz.forEach((q, i) => {
    const isRight = answers[i] === q.answer;
    if (isRight) correct++;
    if (!lessonStats[q.lesson]) lessonStats[q.lesson] = { correct: 0, total: 0 };
    lessonStats[q.lesson].total++;
    if (isRight) lessonStats[q.lesson].correct++;
  });

  submitted = true;
  const pct = Math.round((correct / quiz.length) * 100);
  const tier = pickScoreTier(pct);

  $scoreNum.textContent = `${correct}/${quiz.length}`;
  $scoreLbl.textContent = tier.label;
  $scoreBanner.style.background = tier.gradient;
  $scoreBanner.style.display = "block";

  /* Per-lesson breakdown */
  $lessonBreak.innerHTML = "";
  Object.keys(lessonStats).sort((a, b) => +a - +b).forEach(l => {
    const s = lessonStats[l];
    const span = document.createElement("span");
    span.className = "lesson-stat";
    span.textContent = `${getLessonLabel(+l, { short: true })}: ${s.correct}/${s.total}`;
    $lessonBreak.appendChild(span);
  });

  /* Enable review button if there are wrong answers */
  const wrongCount = quiz.length - correct;
  $btnReview.disabled = wrongCount === 0;
  $btnReview.textContent = wrongCount === 0
    ? "🎉 No mistakes!"
    : `📝 Review ${wrongCount} wrong answer${wrongCount > 1 ? "s" : ""}`;

  updateNavGrid();
  $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });

  /* ── Send results via EmailJS ── */
  const cfg = QUIZ_CONFIG.emailjs;
  const now = new Date().toLocaleString(cfg.locale, {
    timeZone: cfg.timezone, dateStyle: "full", timeStyle: "short"
  });
  const details = quiz.map((q, i) => {
    const stripHtml = (s) => s.replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
    return `${i + 1}. [${getLessonLabel(q.lesson, { withIcon: false })} · ${q.type}] ${stripHtml(q.stem)} → Answer: ${answers[i] || "—"} | Correct: ${q.answer} ${answers[i] === q.answer ? "✓" : "✗"}`;
  }).join("\n");

  const emailParams = {
    name: playerName,
    email: "noreply@quiz.com",
    subject: `[${playerName}] ${QUIZ_CONFIG.title} — ${pct}%`,
    message: `${QUIZ_CONFIG.title}\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${correct}/${quiz.length} (${pct}%)\n\n--- Per-lesson breakdown ---\n${Object.keys(lessonStats).sort((a, b) => +a - +b).map(l => `${getLessonLabel(+l, { withIcon: false })}: ${lessonStats[l].correct}/${lessonStats[l].total}`).join("\n")}\n\n--- Detailed results ---\n${details}\n\nがんばって！`,
    time: now
  };

  $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
  try {
    await emailjs.send(cfg.serviceId, cfg.templateId, emailParams, cfg.publicKey);
    $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
  } catch (err) {
    console.error("EmailJS error:", err);
    $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || "Email failed"}</span>`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   REVIEW + RETAKE
   ═══════════════════════════════════════════════════════════════ */
$btnReview.addEventListener("click", () => {
  reviewIndices = quiz
    .map((q, i) => ({ i, wrong: answers[i] !== q.answer }))
    .filter(x => x.wrong)
    .map(x => x.i);
  if (reviewIndices.length === 0) return;
  reviewMode = true;
  currentQ = 0;
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "block";
  renderQuestion();
});

$btnRetake.addEventListener("click", () => {
  /* Re-shuffle and reset everything */
  const baseQuestions = QUIZ_CONFIG.shuffleQuestions ? shuffle(QUESTIONS) : [...QUESTIONS];
  quiz = baseQuestions.map(q => ({
    ...q,
    choices: QUIZ_CONFIG.shuffleChoices ? shuffle(q.choices) : [...q.choices]
  }));
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  buildNavGrid();
  renderQuestion();
  updateProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>
</body>
