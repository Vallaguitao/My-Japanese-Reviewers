<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lessons 5–7 · Grammar & Particles Quiz | Minna no Nihongo N5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --bg-base: #1a1226;
    --bg-radial-1: rgba(168, 85, 247, 0.07);
    --bg-radial-2: rgba(236, 72, 153, 0.06);
    --bg-card: #231830;
    --bg-input: #2d1f3d;
    --bg-button: #3d2a55;
    --bg-button-hover: #4a3466;
    --bg-feedback-correct: #14352b;
    --bg-feedback-wrong: #3d1520;
    --text-primary: #f0e6ff;
    --text-muted: #a78bca;
    --text-on-accent: #1a1226;
    --border: #3d2a55;
    --border-active: #8b5cf6;
    --accent-start: #c084fc;
    --accent-end: #a855f7;
    --success: #166534;
    --success-bright: #22c55e;
    --success-text: #bbf7d0;
    --warning: #a16207;
    --warning-bright: #eab308;
    --error: #991b1b;
    --error-bright: #ef4444;
    --error-text: #fecaca;
    --tag-l5-bg: #3d1a2e; --tag-l5-fg: #fb7185;
    --tag-l6-bg: #1a3d2a; --tag-l6-fg: #86efac;
    --tag-l7-bg: #1a2e3d; --tag-l7-fg: #7dd3fc;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: var(--bg-base); color: var(--text-primary); font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, var(--bg-radial-1) 0%, transparent 50%), radial-gradient(circle at 80% 70%, var(--bg-radial-2) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .container { max-width: 580px; margin: 0 auto; padding: 24px 16px 60px; position: relative; z-index: 1; }
  .jp { font-family: 'Noto Sans JP', 'Zen Kaku Gothic New', sans-serif; font-size: 1.08em; font-weight: 700; }
  .blank { display: inline-block; min-width: 28px; padding: 0 6px; margin: 0 2px; background: linear-gradient(135deg, var(--accent-start), var(--accent-end)); color: var(--text-on-accent); border-radius: 6px; font-weight: 800; text-align: center; }
  ruby rt { font-size: 0.6em; color: var(--text-muted); }
  .dir { display: inline-block; background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); padding: 2px 10px; border-radius: 6px; font-size: 0.85em; margin-top: 6px; color: var(--accent-start); font-weight: 600; letter-spacing: 0.5px; }

  #name-screen { margin-top: 50px; }
  .card { background: var(--bg-card); border-radius: 16px; padding: 28px 20px; border: 1px solid var(--border); }
  .badge { display: inline-block; background: linear-gradient(135deg, var(--accent-start), var(--accent-end)); color: var(--text-on-accent); font-weight: 700; font-size: 12px; padding: 4px 14px; border-radius: 20px; letter-spacing: 1px; }
  .title { font-size: 22px; font-weight: 800; margin: 14px 0 4px; letter-spacing: -0.5px; }
  .subtitle { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .scope-pills { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: 16px 0 4px; }
  .scope-pill { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 10px; }
  .name-label { display: block; font-size: 13px; color: var(--text-muted); margin: 24px 0 8px; text-align: left; }
  .name-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg-input); color: var(--text-primary); font-size: 16px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .name-input:focus { border-color: var(--accent-start); }
  .btn-primary { width: 100%; margin-top: 16px; padding: 14px 0; border-radius: 12px; background: linear-gradient(135deg, var(--accent-start), var(--accent-end)); border: none; color: var(--text-on-accent); font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .btn-primary:focus-visible { outline: 3px solid var(--accent-start); outline-offset: 3px; }
  .btn-primary:active:not(:disabled) { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }

  #quiz-screen { display: none; }
  .header { text-align: center; margin-bottom: 22px; }
  .header .subtitle { margin-top: 2px; }
  .score-banner { display: none; border-radius: 16px; padding: 22px 16px; text-align: center; margin-bottom: 20px; animation: slideDown 0.4s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  .score-number { font-size: 44px; font-weight: 800; letter-spacing: -1px; }
  .score-label { font-size: 16px; font-weight: 600; margin-top: 4px; }
  .lesson-breakdown { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  .lesson-stat { background: rgba(255,255,255,0.12); backdrop-filter: blur(4px); padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .email-row { margin-top: 12px; }
  .email-pill { display: inline-block; background: var(--bg-button); color: var(--text-primary); font-size: 12px; padding: 4px 14px; border-radius: 12px; }
  .email-pill.sent { background: var(--success); color: var(--success-text); }
  .email-pill.error { background: var(--error); color: var(--error-text); }
  .end-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  .btn-end { background: rgba(255,255,255,0.15); color: #fff; border: none; padding: 8px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.15s; }
  .btn-end:hover:not(:disabled) { background: rgba(255,255,255,0.25); }
  .btn-end:disabled { opacity: 0.4; cursor: default; }
  .btn-end:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .review-banner { display: none; background: linear-gradient(135deg, var(--warning), var(--warning-bright)); color: #1a1525; text-align: center; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 14px; }
  .progress-row { margin-bottom: 14px; }
  .progress-text { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-start), var(--accent-end)); border-radius: 4px; width: 0%; transition: width 0.3s ease; }
  .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(32px, 1fr)); gap: 6px; margin-bottom: 20px; }
  .nav-dot { aspect-ratio: 1; border-radius: 8px; background: var(--bg-input); color: var(--text-primary); font-size: 11px; font-weight: 600; border: 2px solid transparent; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .nav-dot:hover { background: var(--bg-button-hover); }
  .nav-dot:focus-visible { outline: 2px solid var(--accent-start); outline-offset: 2px; }
  .nav-dot.answered { background: var(--bg-button); }
  .nav-dot.active { border-color: var(--accent-start); }
  .nav-dot.correct { background: var(--success); }
  .nav-dot.wrong { background: var(--error); }
  .q-card { background: var(--bg-card); border-radius: 16px; padding: 22px 18px; border: 1px solid var(--border); margin-bottom: 16px; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .q-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .q-tag { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 8px; letter-spacing: 0.3px; }
  .q-tag.lesson-5 { background: var(--tag-l5-bg); color: var(--tag-l5-fg); }
  .q-tag.lesson-6 { background: var(--tag-l6-bg); color: var(--tag-l6-fg); }
  .q-tag.lesson-7 { background: var(--tag-l7-bg); color: var(--tag-l7-fg); }
  .q-tag.type { background: var(--bg-button); color: var(--text-muted); }
  .q-number { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .q-stem { font-size: 18px; font-weight: 600; margin-bottom: 18px; line-height: 1.55; }
  .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choices-grid.long { grid-template-columns: 1fr; }
  .choice-btn { padding: 14px 12px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg-input); color: var(--text-primary); text-align: center; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 600; line-height: 1.4; position: relative; transition: all 0.15s; }
  .choices-grid.long .choice-btn { text-align: left; padding: 14px 16px; }
  .choice-btn:hover:not(:disabled) { border-color: var(--border-active); background: var(--bg-button-hover); }
  .choice-btn:focus-visible { outline: 2px solid var(--accent-start); outline-offset: 2px; }
  .choice-btn.correct-reveal { background: var(--success); border-color: var(--success-bright); }
  .choice-btn.wrong-reveal { background: var(--error); border-color: var(--error-bright); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn .mark { position: absolute; top: 6px; right: 8px; font-size: 14px; font-weight: 700; }
  .choice-btn .mark.ok { color: var(--success-text); }
  .choice-btn .mark.no { color: var(--error-text); }
  .choice-btn .key-hint { position: absolute; top: 6px; left: 8px; font-size: 10px; color: var(--text-muted); font-weight: 700; opacity: 0.7; }
  .feedback-card { display: none; border-radius: 12px; padding: 14px 16px; margin-top: 14px; border: 1px solid; font-size: 14px; line-height: 1.55; animation: fadeIn 0.3s ease; }
  .feedback-card.correct { background: var(--bg-feedback-correct); border-color: var(--success-bright); }
  .feedback-card.wrong { background: var(--bg-feedback-wrong); border-color: var(--error-bright); }
  .fb-header { font-weight: 700; margin-bottom: 6px; font-size: 13px; letter-spacing: 0.3px; }
  .feedback-card.correct .fb-header { color: var(--success-text); }
  .feedback-card.wrong .fb-header { color: var(--error-text); }
  .fb-block { margin-top: 8px; }
  .fb-block.connect { color: var(--text-muted); font-size: 13px; }
  .fb-block.warn { color: #fcd34d; background: rgba(252,211,77,0.08); padding: 8px 10px; border-radius: 8px; font-size: 13px; }
  .arrow-row { display: flex; justify-content: space-between; gap: 12px; }
  .btn-nav { flex: 1; padding: 12px 0; border-radius: 12px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity 0.15s, background 0.15s; }
  .btn-nav:hover:not(:disabled) { background: var(--bg-button-hover); }
  .btn-nav:focus-visible { outline: 2px solid var(--accent-start); outline-offset: 2px; }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .btn-next-primary { background: linear-gradient(135deg, var(--accent-start), var(--accent-end)); color: var(--text-on-accent); border: none; }
  .text-center { text-align: center; }
  .hidden { display: none !important; }
  @media (max-width: 480px) {
    .container { padding: 16px 12px 50px; } .title { font-size: 20px; } .q-stem { font-size: 16px; }
    .choice-btn { font-size: 15px; padding: 12px 10px; } .lesson-stat { font-size: 11px; padding: 5px 9px; }
  }
</style>
</head>
<body>
<div class="container">
  <div id="name-screen">
    <div class="card text-center">
      <span class="badge" id="ns-badge"></span>
      <h1 class="title" id="ns-title"></h1>
      <p class="subtitle" id="ns-subtitle"></p>
      <div class="scope-pills" id="scope-pills"></div>
      <label class="name-label" for="name-input">おなまえは？ Enter your name</label>
      <input class="name-input" id="name-input" type="text" placeholder="Your name..." autocomplete="off" autofocus>
      <button class="btn-primary" id="btn-start" disabled>Start Quiz →</button>
    </div>
  </div>
  <div id="quiz-screen">
    <header class="header">
      <span class="badge" id="qs-badge"></span>
      <h1 class="title" id="qs-title"></h1>
      <p class="subtitle" id="quiz-subtitle"></p>
    </header>
    <div class="score-banner" id="score-banner" aria-live="polite">
      <div class="score-number" id="score-number"></div>
      <div class="score-label" id="score-label"></div>
      <div class="lesson-breakdown" id="lesson-breakdown"></div>
      <div class="email-row" id="email-row"></div>
      <div class="end-actions">
        <button class="btn-end" id="btn-review" disabled>📝 Review wrong answers</button>
        <button class="btn-end" id="btn-retake">🔄 Retake quiz</button>
      </div>
    </div>
    <div class="review-banner" id="review-banner">📝 Review mode — showing only the questions you got wrong</div>
    <div class="progress-row">
      <span class="progress-text" id="progress-text">0 / 0 answered</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="nav-grid" id="nav-grid"></div>
    <div class="q-card" id="q-card">
      <div class="q-meta">
        <span class="q-tag lesson-5" id="q-lesson-tag">📘 Lesson 5</span>
        <span class="q-tag type" id="q-type-tag">Particle</span>
      </div>
      <div class="q-number" id="q-number"></div>
      <div class="q-stem" id="q-stem"></div>
      <div class="choices-grid" id="choices-grid"></div>
      <div class="feedback-card" id="feedback-card" aria-live="polite"></div>
    </div>
    <div class="arrow-row">
      <button class="btn-nav" id="btn-prev">← Previous</button>
      <button class="btn-nav btn-next-primary" id="btn-next">Next →</button>
    </div>
  </div>
</div>

<script>
const QUIZ_CONFIG = {
  badge: "みんなの日本語 · L5–7",
  title: "Grammar & Particles — Deep Drill",
  titleShort: "L5–7 · Particles & Grammar",
  subtitle: "50 questions · particles (へ で を に と も から) + grammar patterns",
  scopePills: ["🔤 Particles ×30", "🤝 ませんか・ましょう ×7", "✅ もう・まだ ×5", "🎁 あげ↔もらい ×8"],
  shuffleQuestions: true,
  shuffleChoices: true,
  scoreThresholds: {
    perfect:   { min: 100, label: "完璧（かんぺき）！ Perfect!",      gradient: "linear-gradient(135deg, var(--success), var(--success-bright))" },
    excellent: { min: 90,  label: "すごい！ Excellent!",               gradient: "linear-gradient(135deg, var(--success), var(--success-bright))" },
    good:      { min: 70,  label: "いいですね！ Good job!",            gradient: "linear-gradient(135deg, var(--warning), var(--warning-bright))" },
    fail:      { min: 0,   label: "もう一度！ Try again!",             gradient: "linear-gradient(135deg, var(--error), var(--error-bright))" }
  },
  emailjs: { publicKey: "1oR0j0WDvUmSSYEpK", serviceId: "service_v7ifzdj", templateId: "template_lb9c879", timezone: "Asia/Manila", locale: "en-PH" }
};

const QUESTIONS = [

  /* ════════════ へ — Direction (L5) ×5 ════════════ */
  {
    lesson: 5, type: "Particle",
    stem: '<span class="jp">がっこう<span class="blank">?</span> <ruby>行<rt>い</rt></ruby>きます。</span>',
    answer: "へ", choices: ["へ", "で", "を", "に"],
    correctNote: '<span class="jp">へ</span> marks direction/destination with movement verbs (<span class="jp"><ruby>行<rt>い</rt></ruby>きます・<ruby>来<rt>き</rt></ruby>ます・<ruby>帰<rt>かえ</rt></ruby>ります</span>).',
    explain: 'Place + へ + movement verb is the core L5 pattern. へ answers "where to?"',
    connect: '🔗 へ only works with movement verbs (L5). For actions AT a place, use で (L6).',
    warn: '⚠️ へ is pronounced "e" (え), not "he" — just like は is read "wa" as a particle!'
  },
  {
    lesson: 5, type: "Particle",
    stem: '<span class="jp"><ruby>日本<rt>にほん</rt></ruby><span class="blank">?</span> <ruby>来<rt>き</rt></ruby>ました。</span>',
    answer: "へ", choices: ["へ", "で", "を", "に"],
    correctNote: '<span class="jp"><ruby>日本<rt>にほん</rt></ruby>へ <ruby>来<rt>き</rt></ruby>ました</span> — きます is a movement verb → へ.',
    explain: 'きます (come) is one of three movement verbs that take へ for destination.'
  },
  {
    lesson: 5, type: "Particle",
    stem: '<span class="jp">うち<span class="blank">?</span> <ruby>帰<rt>かえ</rt></ruby>ります。</span>',
    answer: "へ", choices: ["へ", "で", "を", "に"],
    correctNote: '<span class="jp">うちへ <ruby>帰<rt>かえ</rt></ruby>ります</span> — かえります is the third movement verb → へ.',
    explain: 'うち (home) is the destination → へ. かえります = return/go home.'
  },
  {
    lesson: 5, type: "Particle",
    stem: 'Which sentence correctly uses <span class="jp">へ</span>?',
    answer: "きょうとへ いきます。",
    longChoices: true,
    choices: ["きょうとへ いきます。", "きょうとへ たべます。", "きょうとで いきます。", "きょうとを いきます。"],
    correctNote: 'へ only pairs with movement verbs. たべます is NOT a movement verb.',
    explain: 'Only いきます, きます, かえります take へ. Other verbs use different particles.',
    warn: '⚠️ "きょうとへ たべます" is wrong — you can\'t use へ with non-movement verbs!'
  },
  {
    lesson: 5, type: "Particle",
    stem: '"I\'m not going anywhere." — Choose the correct sentence:',
    answer: "どこ[へ]も いきません。",
    longChoices: true,
    choices: ["どこ[へ]も いきません。", "どこを いきません。", "どこで いきません。", "どこに いきません。"],
    correctNote: '<span class="jp">どこ[へ]も + negative verb</span> = total negation. The particle へ is optional inside this pattern.',
    explain: 'Question word + も + negative verb = "not ~ anywhere." This is the L5 total negation pattern.',
    connect: '🔗 This extends: なにも たべません (L6), だれも きませんでした (nobody came).'
  },

  /* ════════════ で — Transport (L5) ×3 ════════════ */
  {
    lesson: 5, type: "Particle",
    stem: '<span class="jp">でんしゃ<span class="blank">?</span> がっこうへ <ruby>行<rt>い</rt></ruby>きます。</span>',
    answer: "で", choices: ["へ", "で", "を", "に"],
    correctNote: '<span class="jp">で</span> marks means of transport. <span class="jp">でんしゃで</span> = by train.',
    explain: 'Vehicle + で + movement verb. This is the FIRST meaning of で (L5: transport).',
    connect: '🔗 で evolution: transport (L5) → place of action (L6) → tool/means (L7). Three jobs, one particle!',
    warn: '⚠️ Exception: あるいて (on foot) does NOT use で — it\'s already in て-form!'
  },
  {
    lesson: 5, type: "Particle",
    stem: '<span class="jp">タクシー<span class="blank">?</span> えきへ <ruby>行<rt>い</rt></ruby>きました。</span>',
    answer: "で", choices: ["へ", "で", "を", "に"],
    correctNote: '<span class="jp">タクシーで</span> = by taxi (transport). <span class="jp">えきへ</span> = to the station (direction).',
    explain: 'Two particles in one sentence: で (how) and へ (where). They never conflict.'
  },
  {
    lesson: 5, type: "Particle",
    stem: '"I went to school on foot." — Choose the correct sentence:',
    answer: "がっこうへ あるいて いきました。",
    longChoices: true,
    choices: ["がっこうへ あるいて いきました。", "がっこうへ あるいてで いきました。", "がっこうへ あるいを いきました。", "がっこうで あるいて いきました。"],
    correctNote: '<span class="jp">あるいて</span> is already in the て-form — no additional で needed.',
    warn: '⚠️ あるいてで ✗ — one of the most common L5 errors. Just use あるいて by itself.'
  },

  /* ════════════ と — Companion (L5) ×3 ════════════ */
  {
    lesson: 5, type: "Particle",
    stem: '<span class="jp">ともだち<span class="blank">?</span> スーパーへ <ruby>行<rt>い</rt></ruby>きました。</span>',
    answer: "と", choices: ["と", "で", "を", "に"],
    correctNote: '<span class="jp">と</span> marks the person you do something with. <span class="jp">ともだちと</span> = with a friend.',
    explain: 'Person + と + verb = doing something together.',
    connect: '🔗 ひとりで (alone) is the opposite of と. If alone, no と needed.'
  },
  {
    lesson: 5, type: "Particle",
    stem: '<span class="jp">かぞく<span class="blank">?</span> ばんごはんを <ruby>食<rt>た</rt></ruby>べます。</span>',
    answer: "と", choices: ["と", "で", "を", "に"],
    correctNote: '<span class="jp">かぞくと</span> = with my family.',
    explain: 'と works with any verb, not just movement verbs.'
  },
  {
    lesson: 5, type: "Particle",
    stem: '"I went to the station alone." — Choose correctly:',
    answer: "ひとりで えきへ いきました。",
    longChoices: true,

/* ═══════════════════ ENGINE (do not edit) ═══════════════════ */
let playerName="",quiz=[],answers={},currentQ=0,submitted=false,reviewMode=false,reviewIndices=[];
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pickScoreTier(p){const t=QUIZ_CONFIG.scoreThresholds;if(p>=t.perfect.min)return t.perfect;if(p>=t.excellent.min)return t.excellent;if(p>=t.good.min)return t.good;return t.fail;}

emailjs.init(QUIZ_CONFIG.emailjs.publicKey);
const $=id=>document.getElementById(id);
const $nameScreen=$("name-screen"),$quizScreen=$("quiz-screen"),$nameInput=$("name-input"),$btnStart=$("btn-start"),$scopePills=$("scope-pills"),$subtitle=$("quiz-subtitle"),$scoreBanner=$("score-banner"),$scoreNum=$("score-number"),$scoreLbl=$("score-label"),$lessonBreak=$("lesson-breakdown"),$emailRow=$("email-row"),$btnReview=$("btn-review"),$btnRetake=$("btn-retake"),$reviewBanner=$("review-banner"),$progText=$("progress-text"),$progFill=$("progress-fill"),$navGrid=$("nav-grid"),$qLessonTag=$("q-lesson-tag"),$qTypeTag=$("q-type-tag"),$qNumber=$("q-number"),$qStem=$("q-stem"),$choicesGrid=$("choices-grid"),$feedbackCard=$("feedback-card"),$btnPrev=$("btn-prev"),$btnNext=$("btn-next");

document.title=QUIZ_CONFIG.title;
$("ns-badge").textContent=QUIZ_CONFIG.badge;$("ns-title").textContent=QUIZ_CONFIG.title;$("ns-subtitle").textContent=QUIZ_CONFIG.subtitle;$("qs-badge").textContent=QUIZ_CONFIG.badge;$("qs-title").textContent=QUIZ_CONFIG.titleShort;
QUIZ_CONFIG.scopePills.forEach(t=>{const s=document.createElement("span");s.className="scope-pill";s.textContent=t;$scopePills.appendChild(s);});

$nameInput.addEventListener("input",()=>{$btnStart.disabled=!$nameInput.value.trim();});
$nameInput.addEventListener("keydown",e=>{if(e.key==="Enter"&&$nameInput.value.trim())startQuiz();});
$btnStart.addEventListener("click",startQuiz);

function startQuiz(){
  playerName=$nameInput.value.trim();
  const base=QUIZ_CONFIG.shuffleQuestions?shuffle(QUESTIONS):[...QUESTIONS];
  quiz=base.map(q=>({...q,choices:QUIZ_CONFIG.shuffleChoices?shuffle(q.choices):[...q.choices]}));
  answers={};currentQ=0;submitted=false;reviewMode=false;reviewIndices=[];
  $nameScreen.style.display="none";$quizScreen.style.display="block";$scoreBanner.style.display="none";$reviewBanner.style.display="none";
  $subtitle.textContent=`${playerName}さん — choose the correct answer for each question`;
  buildNavGrid();renderQuestion();updateProgress();
}

function buildNavGrid(){
  $navGrid.innerHTML="";
  quiz.forEach((_,i)=>{const b=document.createElement("button");b.className="nav-dot";b.textContent=i+1;b.setAttribute("aria-label",`Question ${i+1}`);b.addEventListener("click",()=>{if(reviewMode){const idx=reviewIndices.indexOf(i);if(idx===-1)return;currentQ=idx;}else{currentQ=i;}renderQuestion();});$navGrid.appendChild(b);});
}
function updateNavGrid(){
  const dots=$navGrid.querySelectorAll(".nav-dot");const realIdx=reviewMode?reviewIndices[currentQ]:currentQ;
  dots.forEach((d,i)=>{d.className="nav-dot";let l=`Question ${i+1}`;if(i===realIdx){d.classList.add("active");l+=", current";}if(!submitted&&answers[i]!==undefined){d.classList.add("answered");l+=", answered";}if(submitted&&answers[i]===quiz[i].answer){d.classList.add("correct");l+=", correct";}if(submitted&&answers[i]!==undefined&&answers[i]!==quiz[i].answer){d.classList.add("wrong");l+=", incorrect";}d.setAttribute("aria-label",l);});
}
function updateProgress(){
  if(reviewMode){$progText.textContent=`Reviewing ${currentQ+1} / ${reviewIndices.length}`;$progFill.style.width=`${((currentQ+1)/reviewIndices.length)*100}%`;return;}
  const c=Object.keys(answers).length;$progText.textContent=`${c} / ${quiz.length} answered`;$progFill.style.width=`${(c/quiz.length)*100}%`;
}
function renderQuestion(){
  const ri=reviewMode?reviewIndices[currentQ]:currentQ,q=quiz[ri];
  $qLessonTag.className=`q-tag lesson-${q.lesson}`;$qLessonTag.textContent=`📘 Lesson ${q.lesson}`;$qTypeTag.textContent=q.type;
  $qNumber.textContent=reviewMode?`Review ${currentQ+1} of ${reviewIndices.length}`:`Question ${ri+1} of ${quiz.length}`;
  $qStem.innerHTML=q.stem;
  $choicesGrid.className=`choices-grid${q.longChoices?" long":""}`;$choicesGrid.innerHTML="";
  const ia=answers[ri]!==undefined;
  q.choices.forEach((c,i)=>{const b=document.createElement("button");b.className="choice-btn";const sel=answers[ri]===c,cor=c===q.answer;
    b.innerHTML=`<span class="key-hint">${i+1}</span><span>${c}</span>`;b.setAttribute("aria-pressed",sel?"true":"false");
    if(ia){b.disabled=true;if(cor){b.classList.add("correct-reveal");b.innerHTML+=`<span class="mark ok">✓</span>`;}if(sel&&!cor){b.classList.add("wrong-reveal");b.innerHTML+=`<span class="mark no">✗</span>`;}}else{b.addEventListener("click",()=>answerQuestion(c));}
    $choicesGrid.appendChild(b);});
  if(ia){renderFeedback(q,answers[ri]);}else{$feedbackCard.style.display="none";$feedbackCard.innerHTML="";}
  updateNavGrid();updateProgress();updateNavButtons();
}
function renderFeedback(q,g){
  const ok=g===q.answer;$feedbackCard.className=`feedback-card ${ok?"correct":"wrong"}`;$feedbackCard.style.display="block";
  let h=`<div class="fb-header">${ok?"✓ Correct":`✗ Not quite — answer: ${q.answer}`}</div>`;
  if(q.correctNote)h+=`<div>${q.correctNote}</div>`;if(q.explain)h+=`<div class="fb-block">${q.explain}</div>`;if(q.connect)h+=`<div class="fb-block connect">${q.connect}</div>`;if(q.warn)h+=`<div class="fb-block warn">${q.warn}</div>`;
  $feedbackCard.innerHTML=h;
}
function answerQuestion(c){const ri=reviewMode?reviewIndices[currentQ]:currentQ;if(answers[ri]!==undefined)return;answers[ri]=c;renderQuestion();if(!submitted&&!reviewMode&&Object.keys(answers).length===quiz.length){setTimeout(submitQuiz,600);}}
function updateNavButtons(){const t=reviewMode?reviewIndices.length:quiz.length;$btnPrev.disabled=currentQ===0;$btnNext.textContent=currentQ===t-1?(reviewMode?"Done reviewing ✓":"Finish →"):"Next →";$btnNext.disabled=false;}
$btnPrev.addEventListener("click",()=>{if(currentQ>0){currentQ--;renderQuestion();}});
$btnNext.addEventListener("click",()=>{const t=reviewMode?reviewIndices.length:quiz.length;if(currentQ<t-1){currentQ++;renderQuestion();}else if(reviewMode){reviewMode=false;$reviewBanner.style.display="none";$scoreBanner.style.display="block";$scoreBanner.scrollIntoView({behavior:"smooth",block:"start"});}});
document.addEventListener("keydown",e=>{if(document.activeElement===$nameInput)return;if($quizScreen.style.display!=="block")return;if(e.key==="ArrowRight"){$btnNext.click();e.preventDefault();return;}if(e.key==="ArrowLeft"){$btnPrev.click();e.preventDefault();return;}if(/^[1-9]$/.test(e.key)){const ri=reviewMode?reviewIndices[currentQ]:currentQ;if(answers[ri]!==undefined)return;const idx=parseInt(e.key,10)-1;if(idx<quiz[ri].choices.length){answerQuestion(quiz[ri].choices[idx]);e.preventDefault();}}});

async function submitQuiz(){
  let correct=0;const ls={},ts={};
  quiz.forEach((q,i)=>{const ok=answers[i]===q.answer;if(ok)correct++;if(!ls[q.lesson])ls[q.lesson]={correct:0,total:0};ls[q.lesson].total++;if(ok)ls[q.lesson].correct++;if(!ts[q.type])ts[q.type]={correct:0,total:0};ts[q.type].total++;if(ok)ts[q.type].correct++;});
  submitted=true;const pct=Math.round((correct/quiz.length)*100),tier=pickScoreTier(pct);
  $scoreNum.textContent=`${correct}/${quiz.length}`;$scoreLbl.textContent=tier.label;$scoreBanner.style.background=tier.gradient;$scoreBanner.style.display="block";
  $lessonBreak.innerHTML="";
  Object.keys(ls).sort((a,b)=>+a-+b).forEach(l=>{const s=ls[l],sp=document.createElement("span");sp.className="lesson-stat";sp.textContent=`L${l}: ${s.correct}/${s.total}`;$lessonBreak.appendChild(sp);});
  Object.keys(ts).forEach(t=>{const s=ts[t],sp=document.createElement("span");sp.className="lesson-stat";sp.textContent=`${t}: ${s.correct}/${s.total}`;$lessonBreak.appendChild(sp);});
  const wc=quiz.length-correct;$btnReview.disabled=wc===0;$btnReview.textContent=wc===0?"🎉 No mistakes!":`📝 Review ${wc} wrong answer${wc>1?"s":""}`;
  updateNavGrid();$scoreBanner.scrollIntoView({behavior:"smooth",block:"start"});
  const cfg=QUIZ_CONFIG.emailjs,now=new Date().toLocaleString(cfg.locale,{timeZone:cfg.timezone,dateStyle:"full",timeStyle:"short"});
  const det=quiz.map((q,i)=>{const s=q.stem.replace(/<[^>]*>/g,"").replace(/\s+/g," ").trim();return`${i+1}. [L${q.lesson} ${q.type}] ${s} → ${answers[i]||"—"} | Correct: ${q.answer} ${answers[i]===q.answer?"✓":"✗"}`;}).join("\n");
  const lb=Object.keys(ls).sort((a,b)=>+a-+b).map(l=>`L${l}: ${ls[l].correct}/${ls[l].total}`).join("\n");
  const tb=Object.keys(ts).map(t=>`${t}: ${ts[t].correct}/${ts[t].total}`).join("\n");
  const ep={name:playerName,email:"noreply@quiz.com",subject:`[${playerName}] ${QUIZ_CONFIG.title} — ${pct}%`,message:`${QUIZ_CONFIG.title}\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${correct}/${quiz.length} (${pct}%)\n\n--- Per-lesson ---\n${lb}\n\n--- Per-type ---\n${tb}\n\n--- Details ---\n${det}\n\nがんばって！`,time:now};
  $emailRow.innerHTML=`<span class="email-pill">📧 Sending results…</span>`;
  try{await emailjs.send(cfg.serviceId,cfg.templateId,ep,cfg.publicKey);$emailRow.innerHTML=`<span class="email-pill sent">✓ Results emailed!</span>`;}catch(err){console.error("EmailJS error:",err);$emailRow.innerHTML=`<span class="email-pill error">✗ ${err?.text||err?.message||"Email failed"}</span>`;}
}
$btnReview.addEventListener("click",()=>{reviewIndices=quiz.map((q,i)=>({i,wrong:answers[i]!==q.answer})).filter(x=>x.wrong).map(x=>x.i);if(reviewIndices.length===0)return;reviewMode=true;currentQ=0;$scoreBanner.style.display="none";$reviewBanner.style.display="block";renderQuestion();});
$btnRetake.addEventListener("click",()=>{const base=QUIZ_CONFIG.shuffleQuestions?shuffle(QUESTIONS):[...QUESTIONS];quiz=base.map(q=>({...q,choices:QUIZ_CONFIG.shuffleChoices?shuffle(q.choices):[...q.choices]}));answers={};currentQ=0;submitted=false;reviewMode=false;reviewIndices=[];$scoreBanner.style.display="none";$reviewBanner.style.display="none";buildNavGrid();renderQuestion();updateProgress();window.scrollTo({top:0,behavior:"smooth"});});
</script>
