<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>N5 Kanji Reviewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
    --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
    --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
    --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-300: #93c5fd;
    --blue-600: #2563eb; --blue-700: #1d4ed8;
    --red-500: #ef4444;
    --radius-xl: 0.75rem; --radius-2xl: 1rem; --radius-3xl: 1.5rem;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
    --shadow-inner: inset 0 2px 4px rgba(0,0,0,.06);
  }

  body {
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    background: var(--slate-50);
    color: var(--slate-800);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
    -webkit-tap-highlight-color: transparent;
  }

  .container {
    width: 100%; max-width: 28rem;
    display: flex; flex-direction: column;
    flex-grow: 1; gap: 1.5rem;
  }

  /* ─── Header ─── */
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.5rem 0;
  }
  header h1 {
    font-size: 1.25rem; font-weight: 700;
    letter-spacing: -0.025em; color: var(--slate-900);
  }
  header .counter {
    font-size: 0.875rem; color: var(--slate-500); margin-top: 2px;
  }
  .mode-btn {
    display: flex; align-items: center; gap: 0.5rem;
    background: #fff; padding: 0.5rem 1rem;
    border-radius: var(--radius-full);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--slate-200);
    font-size: 0.875rem; font-weight: 500;
    cursor: pointer; transition: background .15s;
    color: var(--slate-800);
  }
  .mode-btn:hover { background: var(--slate-50); }

  /* ─── Main ─── */
  main {
    flex-grow: 1; display: flex;
    flex-direction: column; justify-content: center;
  }

  /* ─── Flashcard ─── */
  .card-wrapper {
    width: 100%; aspect-ratio: 1 / 1;
    perspective: 1000px; cursor: pointer;
  }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.55s cubic-bezier(.4,.2,.2,1);
    transform-style: preserve-3d;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    border-radius: var(--radius-3xl);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .card-front {
    background: #fff;
    border: 2px solid var(--slate-100);
    box-shadow: var(--shadow-lg);
  }
  .card-front .kanji-char {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(6rem, 22vw, 10rem);
    font-weight: 500; color: var(--slate-800);
    user-select: none; line-height: 1;
  }
  .card-front .hint {
    position: absolute; bottom: 1.5rem;
    font-size: 0.8rem; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--slate-400);
  }

  .card-back {
    background: var(--slate-800); color: #fff;
    transform: rotateY(180deg); padding: 2rem;
    text-align: center; box-shadow: var(--shadow-lg);
  }
  .card-back .meaning {
    font-size: 1.8rem; font-weight: 700;
    color: var(--blue-300); margin-bottom: 1.5rem;
  }
  .reading-box {
    background: rgba(51,65,85,.5);
    border-radius: var(--radius-xl); padding: 1rem;
  }
  .reading-box + .reading-box { margin-top: 1rem; }
  .reading-label {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--slate-400); margin-bottom: 0.25rem;
  }
  .reading-value { font-size: 1.15rem; }

  /* ─── Drawing Mode ─── */
  .draw-section { display: flex; flex-direction: column; gap: 1rem; }

  .draw-prompt {
    background: #fff; border-radius: var(--radius-3xl);
    box-shadow: var(--shadow-sm); border: 1px solid var(--slate-200);
    padding: 1.25rem; text-align: center;
  }
  .draw-prompt .label {
    font-size: 0.8rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--slate-500); margin-bottom: 0.25rem;
  }
  .draw-prompt h2 {
    font-size: 1.35rem; font-weight: 700; color: var(--slate-800);
  }
  .draw-prompt .sub {
    font-size: 0.85rem; color: var(--slate-500); margin-top: 0.25rem;
  }

  .canvas-wrap {
    position: relative; width: 100%; aspect-ratio: 1 / 1;
    background: #fff; border-radius: var(--radius-3xl);
    box-shadow: var(--shadow-inner);
    border: 2px dashed var(--slate-300);
    overflow: hidden; touch-action: none;
  }
  .canvas-guide {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.18;
  }
  .canvas-guide .h { position: absolute; top: 50%; left: 0; width: 100%; border-top: 1px solid var(--slate-400); }
  .canvas-guide .v { position: absolute; top: 0; left: 50%; height: 100%; border-left: 1px solid var(--slate-400); }

  .answer-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; user-select: none; opacity: 0.18;
  }
  .answer-overlay span {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(8rem, 30vw, 14rem);
    font-weight: 700; color: var(--red-500); line-height: 1;
  }

  canvas#drawCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    cursor: crosshair; touch-action: none;
  }

  .canvas-controls {
    display: flex; gap: 0.75rem; justify-content: center;
  }
  .ctrl-btn {
    flex: 1; display: flex; justify-content: center; align-items: center;
    gap: 0.5rem; padding: 0.75rem;
    border-radius: var(--radius-xl);
    font-weight: 500; font-size: 0.9rem;
    border: none; cursor: pointer; transition: background .15s, color .15s;
    font-family: inherit;
  }
  .ctrl-clear {
    background: var(--slate-100); color: var(--slate-700);
  }
  .ctrl-clear:hover { background: var(--slate-200); }
  .ctrl-show {
    background: var(--slate-800); color: #fff;
  }
  .ctrl-show:hover { background: var(--slate-700); }
  .ctrl-show.active {
    background: var(--blue-100); color: var(--blue-700);
  }

  /* ─── Footer Nav ─── */
  footer {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1rem; padding: 1rem 0 2rem;
    border-top: 1px solid var(--slate-200);
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 0.75rem;
    color: var(--slate-500); background: transparent;
    border: none; border-radius: var(--radius-xl);
    cursor: pointer; transition: all .15s;
    font-family: inherit;
  }
  .nav-btn:hover { color: var(--slate-900); background: var(--slate-100); }
  .nav-btn.shuffle:hover { color: var(--blue-600); background: var(--blue-50); }
  .nav-btn span {
    font-size: 0.7rem; font-weight: 500; margin-top: 0.25rem;
  }

  /* ─── SVG icons ─── */
  .icon { width: 20px; height: 20px; stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .icon-lg { width: 24px; height: 24px; }

  /* ─── Utility ─── */
  .hidden { display: none !important; }

/* ========== Site Breadcrumb ========== */
.site-breadcrumb,
.site-breadcrumb * {
  box-sizing: border-box;
}

.site-breadcrumb {
  position: relative;
  z-index: 20;
  width: min(1180px, calc(100% - 32px));
  margin: 16px auto 12px;
  font-family: "Noto Sans JP", "Outfit", system-ui, sans-serif;
  color: #18202f;
}

.site-breadcrumb__list {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0;
  list-style: none;
  margin: 0;
  padding: 8px 12px;
  border: 1px solid rgba(24, 32, 47, 0.12);
  border-radius: 8px;
  background: rgba(255, 253, 248, 0.94);
  box-shadow: 0 10px 30px rgba(24, 32, 47, 0.08);
}

.site-breadcrumb__item {
  display: inline-flex;
  align-items: center;
  min-width: 0;
  color: #667085;
  font-size: 0.82rem;
  font-weight: 700;
  line-height: 1.4;
}

.site-breadcrumb__item + .site-breadcrumb__item::before {
  content: "/";
  margin: 0 8px;
  color: rgba(169, 52, 42, 0.42);
  font-weight: 800;
}

.site-breadcrumb__link {
  color: #667085;
  text-decoration: none;
  transition: color 0.18s ease, background 0.18s ease;
}

.site-breadcrumb__link:hover {
  color: #a9342a;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__link:focus-visible {
  color: #a9342a;
  outline: 2px solid rgba(169, 52, 42, 0.45);
  outline-offset: 3px;
  border-radius: 4px;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.site-breadcrumb__category {
  color: #a9342a;
}

.site-breadcrumb__current {
  color: #18202f;
  overflow-wrap: anywhere;
}

@media (max-width: 768px) {
  .progress-container + .presentation {
    padding-top: 160px;
  }
}

@media (max-width: 640px) {
  .site-breadcrumb {
    width: min(100% - 20px, 680px);
    margin: 12px auto 10px;
  }

  .site-breadcrumb__list {
    padding: 8px 10px;
  }

  .site-breadcrumb__item {
    font-size: 0.78rem;
  }
}
/* ========== End Site Breadcrumb ========== */
    </style>
</head>

</nav>

<div class="container">
  <!-- Header -->

    <button class="mode-btn" id="modeToggle" onclick="toggleMode()">

      <span id="modeLabel">Practice Draw</span>
    </button>
  </header>

  <!-- Main Content -->

            <p class="reading-value" id="kanjiKun">hito-tsu</p>

        </div>
      </div>
    </div>

    <!-- DRAW MODE -->
    <div class="draw-section hidden" id="drawMode">
      <div class="draw-prompt">
        <p class="label">Draw this Kanji</p>
        <h2 id="drawMeaning">One</h2>
        <p class="sub" id="drawReadings">hito-tsu / ICHI, ITSU</p>
      </div>

      <div class="canvas-wrap" id="canvasWrap">
        <div class="canvas-guide"><div class="h"></div><div class="v"></div></div>
        <div class="answer-overlay hidden" id="answerOverlay">
          <span id="answerChar">一</span>
        </div>
        <canvas id="drawCanvas"></canvas>
      </div>

      <div class="canvas-controls">
        <button class="ctrl-btn ctrl-clear" onclick="clearCanvas()">
          <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Clear
        </button>
        <button class="ctrl-btn ctrl-show" id="showBtn" onclick="toggleAnswer()">
          <svg class="icon" id="showIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="showLabel">Show Answer</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Footer Nav -->
  <footer>
    <button class="nav-btn" onclick="prevCard()">
      <svg class="icon icon-lg" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Prev</span>
    </button>
    <button class="nav-btn shuffle" onclick="shuffleList()">
      <svg class="icon" viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      <span>Shuffle</span>
    </button>
    <button class="nav-btn" onclick="nextCard()">
      <svg class="icon icon-lg" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      <span>Next</span>
    </button>
  </footer>
</div>

  { k:'目', m:'Eye', o:'MOKU, BOKU', ku:'me' },
  { k:'耳', m:'Ear', o:'JI', ku:'mimi' },
  { k:'手', m:'Hand', o:'SHU', ku:'te' },
  { k:'足', m:'Foot / Leg', o:'SOKU', ku:'ashi, ta-riru' }
];

// ─── State ───
let list = [...KANJI_DATA];
let currentIndex = 0;
let mode = 'flashcard'; // 'flashcard' | 'draw'
let isFlipped = false;
let showAnswer = false;
let isDrawing = false;

// ─── DOM Refs ───
const $cardInner   = document.getElementById('cardInner');
const $kanjiChar   = document.getElementById('kanjiChar');
const $kanjiMeaning= document.getElementById('kanjiMeaning');
const $kanjiOn     = document.getElementById('kanjiOn');
const $kanjiKun    = document.getElementById('kanjiKun');
const $flashcard   = document.getElementById('flashcardMode');
const $drawMode    = document.getElementById('drawMode');
const $drawMeaning = document.getElementById('drawMeaning');
const $drawReadings= document.getElementById('drawReadings');
const $answerOverlay = document.getElementById('answerOverlay');
const $answerChar  = document.getElementById('answerChar');
const $showBtn     = document.getElementById('showBtn');
const $showLabel   = document.getElementById('showLabel');
const $showIcon    = document.getElementById('showIcon');
const $modeIcon    = document.getElementById('modeIcon');
const $modeLabel   = document.getElementById('modeLabel');
const $currentNum  = document.getElementById('current-num');
const $totalNum    = document.getElementById('total-num');
const $canvasWrap  = document.getElementById('canvasWrap');
const canvas       = document.getElementById('drawCanvas');
const ctx          = canvas.getContext('2d');

// ─── Init ───
$totalNum.textContent = list.length;
renderCard();

// ─── Card Rendering ───
function renderCard() {
  const k = list[currentIndex];
  $kanjiChar.textContent    = k.k;
  $kanjiMeaning.textContent = k.m;
  $kanjiOn.textContent      = k.o;
  $kanjiKun.textContent     = k.ku;
  $drawMeaning.textContent  = k.m;
  $drawReadings.textContent = k.ku + ' / ' + k.o;
  $answerChar.textContent   = k.k;
  $currentNum.textContent   = currentIndex + 1;
}

// ─── Navigation ───
function nextCard() {
  currentIndex = (currentIndex + 1) % list.length;
  resetState();
}
function prevCard() {
  currentIndex = (currentIndex - 1 + list.length) % list.length;
  resetState();
}
function shuffleList() {
  for (let i = list.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [list[i], list[j]] = [list[j], list[i]];
  }
  currentIndex = 0;
  resetState();
}

function resetState() {
  isFlipped = false;
  showAnswer = false;
  $cardInner.classList.remove('flipped');
  $answerOverlay.classList.add('hidden');
  $showBtn.classList.remove('active');
  $showLabel.textContent = 'Show Answer';
  $showIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  clearCanvas();
  renderCard();
}

// ─── Flashcard Flip ───
function flipCard() {
  if (mode !== 'flashcard') return;
  isFlipped = !isFlipped;
  $cardInner.classList.toggle('flipped', isFlipped);
}

// ─── Mode Toggle ───
function toggleMode() {
  mode = mode === 'flashcard' ? 'draw' : 'flashcard';
  $flashcard.classList.toggle('hidden', mode !== 'flashcard');
  $drawMode.classList.toggle('hidden', mode !== 'draw');

  if (mode === 'draw') {
    $modeIcon.innerHTML = '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>';
    $modeLabel.textContent = 'Study Cards';
    // Wait a tick for DOM to lay out, then size the canvas
    requestAnimationFrame(sizeCanvas);
  } else {
    $modeIcon.innerHTML = '<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>';
    $modeLabel.textContent = 'Practice Draw';
  }
  resetState();
}

// ─── Show / Hide Answer ───
function toggleAnswer() {
  showAnswer = !showAnswer;
  $answerOverlay.classList.toggle('hidden', !showAnswer);
  $showBtn.classList.toggle('active', showAnswer);
  if (showAnswer) {
    $showLabel.textContent = 'Hide Kanji';
    $showIcon.innerHTML = '<path d="M9 14 4 9l5-5"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>';
  } else {
    $showLabel.textContent = 'Show Answer';
    $showIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// ─── Canvas Drawing ───
function sizeCanvas() {
  canvas.width  = $canvasWrap.clientWidth;
  canvas.height = $canvasWrap.clientHeight;
  ctx.lineCap   = 'round';
  ctx.lineJoin  = 'round';
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#1e293b';
}

function getPos(e) {
  const src = e.touches ? e.touches[0] : e;
  const rect = canvas.getBoundingClientRect();
  // Scale coordinates to match canvas internal resolution
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('mousedown', e => {
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  isDrawing = true;
});
canvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y); ctx.stroke();
});
canvas.addEventListener('mouseup',    () => { ctx.closePath(); isDrawing = false; });
canvas.addEventListener('mouseleave', () => { ctx.closePath(); isDrawing = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  isDrawing = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (!isDrawing) return;
  e.preventDefault();
  const p = getPos(e);
  ctx.lineTo(p.x, p.y); ctx.stroke();
}, { passive: false });
canvas.addEventListener('touchend',    () => { ctx.closePath(); isDrawing = false; });
canvas.addEventListener('touchcancel', () => { ctx.closePath(); isDrawing = false; });

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Handle window resize for canvas
window.addEventListener('resize', () => {
  if (mode === 'draw') sizeCanvas();
});

// ─── Keyboard Nav ───
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});
</script>
</body>
</html>
