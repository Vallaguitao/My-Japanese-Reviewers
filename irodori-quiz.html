<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irodori Grammar Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sakura-50: #fef7f8;
    --sakura-100: #fdeef0;
    --sakura-200: #fbdae0;
    --sakura-300: #f7b8c4;
    --sakura-400: #f291a5;
    --sakura-500: #e86b8a;
    --sakura-600: #d44a6e;
    --sakura-700: #b83359;
    --sakura-800: #9a2d4e;
    --sakura-900: #7f2944;
    --leaf-400: #86b88a;
    --leaf-500: #6a9e6f;
    --leaf-600: #4f7f53;
    --correct: #4caf7a;
    --correct-bg: #eaf7ef;
    --wrong: #d94f5c;
    --wrong-bg: #fdeef0;
    --text-primary: #3d2533;
    --text-secondary: #6b4a5a;
    --text-light: #9a7a8a;
    --bg-main: #fef7f8;
    --bg-card: #ffffff;
    --shadow-sm: 0 2px 8px rgba(184, 51, 89, 0.08);
    --shadow-md: 0 4px 20px rgba(184, 51, 89, 0.12);
    --shadow-lg: 0 8px 32px rgba(184, 51, 89, 0.16);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Sakura petal background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(247, 184, 196, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(242, 145, 165, 0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(253, 238, 240, 0.3) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--sakura-400), var(--sakura-500));
    color: white;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--sakura-700);
    margin-bottom: 4px;
  }

  .header p {
    color: var(--text-light);
    font-size: 0.875rem;
  }

  /* Progress bar */
  .progress-area {
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease 0.1s both;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .progress-info .score {
    font-weight: 500;
    color: var(--sakura-600);
  }

  .progress-bar {
    height: 8px;
    background: var(--sakura-100);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sakura-400), var(--sakura-500));
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* Question card */
  .question-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 28px 24px;
    margin-bottom: 20px;
    animation: slideUp 0.5s ease;
    border: 1px solid rgba(247, 184, 196, 0.2);
  }

  .question-number {
    font-size: 0.75rem;
    color: var(--text-light);
    font-weight: 500;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .question-number::before {
    content: '🌸';
    font-size: 0.85rem;
  }

  .sentence {
    font-size: 1.2rem;
    line-height: 2;
    margin-bottom: 8px;
    font-weight: 400;
  }

  .sentence .speaker {
    font-weight: 700;
    color: var(--sakura-600);
    margin-right: 4px;
  }

  .sentence .blank {
    display: inline-block;
    min-width: 100px;
    border-bottom: 2.5px dashed var(--sakura-400);
    text-align: center;
    padding: 0 4px;
    margin: 0 2px;
    color: var(--sakura-600);
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .sentence .blank.filled {
    border-bottom-style: solid;
    border-color: var(--correct);
    color: var(--correct);
  }

  .sentence .blank.wrong {
    border-bottom-style: solid;
    border-color: var(--wrong);
    color: var(--wrong);
    text-decoration: line-through;
  }

  .sentence-b {
    font-size: 1.05rem;
    color: var(--text-secondary);
    line-height: 1.9;
    margin-top: 8px;
  }

  .furigana-note {
    font-size: 0.7rem;
    color: var(--text-light);
    margin-top: 10px;
    line-height: 1.5;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
  }

  .option-btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    border: 2px solid var(--sakura-200);
    border-radius: 12px;
    background: var(--sakura-50);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.1rem;
    color: var(--text-primary);
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    font-weight: 400;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--sakura-400);
    background: var(--sakura-100);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .option-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .option-btn:disabled {
    cursor: default;
  }

  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
    font-weight: 500;
  }

  .option-btn.correct::after {
    content: ' ✓';
    font-weight: 700;
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
    opacity: 0.8;
  }

  .option-btn.wrong::after {
    content: ' ✗';
    font-weight: 700;
  }

  .option-btn.dimmed {
    opacity: 0.45;
    border-color: var(--sakura-100);
  }

  /* Explanation */
  .explanation {
    margin-top: 18px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #fef9f0, #fdf5e6);
    border-radius: 12px;
    border-left: 4px solid var(--sakura-400);
    animation: fadeIn 0.4s ease;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text-secondary);
  }

  .explanation strong {
    color: var(--sakura-700);
    font-weight: 700;
  }

  .explanation .grammar-point {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    color: var(--sakura-600);
    font-size: 0.95rem;
    margin-bottom: 4px;
    display: block;
  }

  /* Next button */
  .next-btn {
    display: block;
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--sakura-500), var(--sakura-600));
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    animation: fadeIn 0.4s ease;
    margin-top: 16px;
    box-shadow: 0 4px 15px rgba(212, 74, 110, 0.3);
  }

  .next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(212, 74, 110, 0.4);
  }

  .next-btn:active {
    transform: translateY(0);
  }

  /* Results screen */
  .results-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 40px 24px;
    text-align: center;
    animation: slideUp 0.6s ease;
    border: 1px solid rgba(247, 184, 196, 0.2);
  }

  .results-emoji {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
  }

  .results-card h2 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.5rem;
    color: var(--sakura-700);
    margin-bottom: 8px;
  }

  .results-score {
    font-size: 3rem;
    font-weight: 700;
    color: var(--sakura-600);
    margin: 16px 0;
    font-family: 'Zen Maru Gothic', sans-serif;
  }

  .results-score span {
    font-size: 1.2rem;
    color: var(--text-light);
    font-weight: 400;
  }

  .results-message {
    color: var(--text-secondary);
    margin-bottom: 24px;
    line-height: 1.7;
    font-size: 0.95rem;
  }

  .retry-btn {
    display: inline-block;
    padding: 14px 40px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--sakura-500), var(--sakura-600));
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(212, 74, 110, 0.3);
    margin-top: 8px;
  }

  .retry-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(212, 74, 110, 0.4);
  }

  .review-section {
    margin-top: 32px;
    text-align: left;
  }

  .review-section h3 {
    font-family: 'Zen Maru Gothic', sans-serif;
    color: var(--sakura-700);
    font-size: 1.1rem;
    margin-bottom: 16px;
    text-align: center;
  }

  .review-item {
    background: var(--sakura-50);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 10px;
    border-left: 4px solid var(--correct);
    font-size: 0.9rem;
    line-height: 1.8;
  }

  .review-item.missed {
    border-left-color: var(--wrong);
    background: var(--wrong-bg);
  }

  .review-item .q-label {
    font-size: 0.7rem;
    color: var(--text-light);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .review-item .answer-line {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .hidden { display: none !important; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  /* Floating petals */
  .petal {
    position: fixed;
    width: 12px;
    height: 12px;
    background: var(--sakura-300);
    border-radius: 50% 0 50% 50%;
    opacity: 0.2;
    pointer-events: none;
    z-index: 0;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.2; }
    90% { opacity: 0.2; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-badge">IRODORI • 文法れんしゅう</div>
    <h1>Grammar Practice</h1>
    <p>Read each sentence and choose the best answer</p>
  </div>

  <div class="progress-area">
    <div class="progress-info">
      <span id="progress-text">Question 1 / 12</span>
      <span class="score" id="score-text">Score: 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div id="quiz-area"></div>
  <div id="results-area" class="hidden"></div>
</div>

<script>
const questions = [
  {
    id: 1,
    sentenceA: '旧暦（きゅうれき）のお正月（しょうがつ）の日（ひ）は、年（とし）によって違（ちが）います。',
    display: ['旧暦のお正月の日は、年', '___', '違います。'],
    sentenceB: null,
    options: ['によって', 'において', 'になって'],
    answer: 'によって',
    explanation: {
      point: '〜によって（depending on）',
      text: '「によって」は「〜に応じて・〜次第で」という意味です。旧暦の正月は年ごとに日付が変わるので、「年によって違います」が正しいです。「において」は場所・場面（in/at）、「になって」は変化（become）を表します。'
    }
  },
  {
    id: 2,
    sentenceA: 'A：アナさんはお祭（まつ）りに来（こ）れません。',
    display: ['A：アナさんはお祭りに', '___', '。'],
    sentenceB: 'B：そうですか。残念（ざんねん）ですね。',
    options: ['来たりしています', '来れません', '来たばかりです'],
    answer: '来れません',
    explanation: {
      point: '〜れません（can\'t ~）',
      text: '「来れません」は可能形の否定で「来ることができない」という意味です。Bが「残念ですね」と返しているので、来られないことが分かります。「来たりしています」は繰り返しの動作、「来たばかりです」は直後を表すので文脈に合いません。'
    }
  },
  {
    id: 3,
    sentenceA: '今年（ことし）は、クリスマスも会社（かいしゃ）に行（い）かなくちゃならないんです。',
    display: ['今年は、クリスマスも会社に', '___', 'なくちゃならないんです。'],
    sentenceB: null,
    options: ['行か', '行く', '行け'],
    answer: '行か',
    explanation: {
      point: '〜なくちゃならない（have to ~）',
      text: '「〜なくちゃならない」は義務を表す表現で、動詞の「ない形」の語幹に接続します。行く → 行か + なくちゃならない。「行く」は辞書形、「行け」は命令形・可能形なので、この文型には接続できません。'
    }
  },
  {
    id: 4,
    sentenceA: 'お正月（しょうがつ）は、親戚（しんせき）が来（き）たりして、忙（いそが）しかったです。',
    display: ['お正月は、親戚が', '___', '、忙しかったです。'],
    sentenceB: null,
    options: ['来ながら', '来ないで', '来たりして'],
    answer: '来たりして',
    explanation: {
      point: '〜たりして（doing things like ~）',
      text: '「〜たりして」は、複数の動作や状態の例を挙げるときに使います。親戚が来るなど色々あって忙しかった、という意味です。「来ながら」は同時進行、「来ないで」は否定の依頼で文脈に合いません。'
    }
  },
  {
    id: 5,
    sentenceA: '今度（こんど）の休（やす）み、１日（にち）だけ実家（じっか）に帰（かえ）ります。',
    display: ['今度の休み、１日', '___', '実家に帰ります。'],
    sentenceB: null,
    options: ['しか', 'とか', 'だけ'],
    answer: 'だけ',
    explanation: {
      point: '〜だけ（only ~）',
      text: '「だけ」は「only」の意味で、肯定文で使います。「しか」も「only」ですが、必ず否定形（〜ません）とセットになります。ここは「帰ります」と肯定文なので「だけ」が正解です。「とか」は例示（〜など）に使います。'
    }
  },
  {
    id: 6,
    sentenceA: 'A：お祭（まつ）りのときは特別（とくべつ）な料理（りょうり）をたくさん作（つく）らなくちゃならないんです。',
    display: ['A：お祭りのときは特別な料理をたくさん', '___', 'んです。'],
    sentenceB: 'B：そうなんですか。大変（たいへん）ですね。',
    options: ['作らなくてもいい', '作らない', '作らなくちゃならない'],
    answer: '作らなくちゃならない',
    explanation: {
      point: '〜なくちゃならない（have to ~）',
      text: 'Bが「大変ですね」と共感しているので、Aは「たくさん作らなければならない」と義務・負担を述べています。「作らなくてもいい」は「作らなくても大丈夫」（don\'t have to）、「作らない」は単純な否定なので文脈に合いません。'
    }
  },
  {
    id: 7,
    sentenceA: '休（やす）みは友（とも）だちと遊（あそ）んだりして、楽（たの）しかったです。',
    display: ['休みは友だちと', '___', '、楽しかったです。'],
    sentenceB: null,
    options: ['遊んだりして', '遊んだあと', '遊んだほうが'],
    answer: '遊んだりして',
    explanation: {
      point: '〜たりして（doing things like ~）',
      text: '友達と遊ぶなどして楽しかった、という例示の表現です。「遊んだあと」は時間関係（after playing）、「遊んだほうが」は比較・アドバイス（better to play）で、この文脈には合いません。'
    }
  },
  {
    id: 8,
    sentenceA: 'A：実家（じっか）で、ゆっくりテレビを見（み）れました。',
    display: ['A：実家で、ゆっくりテレビを', '___', '。'],
    sentenceB: 'B：よかったですね。',
    options: ['見ることです', '見れました', '見てください'],
    answer: '見れました',
    explanation: {
      point: '〜れました（was able to ~）',
      text: '「見れました」は可能形の過去で「見ることができた」という意味です。Bが「よかったですね」と返しているので、実現できたことへの感想だと分かります。「見ることです」は定義、「見てください」は依頼なので合いません。'
    }
  },
  {
    id: 9,
    sentenceA: 'A：成人式（せいじんしき）は、何（なに）をするんですか？',
    display: ['A：成人式は、何を', '___', '？'],
    sentenceB: 'B：市長（しちょう）さんの話（はなし）を聞（き）いたり、写真（しゃしん）を撮（と）ったりします。',
    options: ['したばかりですか', 'するんですか', 'してみますか'],
    answer: 'するんですか',
    explanation: {
      point: '〜するんですか（what do you do ~?）',
      text: '「するんですか」は「〜のですか」の口語形で、説明を求める質問です。Bが具体的に活動を説明しているので、「何をするんですか」（what do people do?）が自然です。「したばかり」は直後、「してみますか」は提案・試みの意味です。'
    }
  },
  {
    id: 10,
    sentenceA: '今年（ことし）のお正月（しょうがつ）は１日（にち）しか休（やす）めませんでした。',
    display: ['今年のお正月は１日', '___', '休めませんでした。'],
    sentenceB: null,
    options: ['だけ', 'ごろ', 'しか'],
    answer: 'しか',
    explanation: {
      point: '〜しか＋否定（only ~ / nothing but ~）',
      text: '「しか」は否定形とセットで「〜だけしかない」という限定を強調します。「休めませんでした」と否定形なので「しか」が正解。「だけ」は肯定文で使います。「ごろ」は時間の概算（〜頃）で意味が違います。'
    }
  },
  {
    id: 11,
    sentenceA: 'A：「ナーダム」では、何（なに）をするんですか？',
    display: ['A：「ナーダム」では、何を', '___', '？'],
    sentenceB: 'B：パレードを見（み）たり、「ホーショール」という特別（とくべつ）な料理（りょうり）を食（た）べたりします。',
    options: ['するんですか', 'してくれますか', 'したらいいですか'],
    answer: 'するんですか',
    explanation: {
      point: '〜するんですか（what do you do ~?）',
      text: 'Q9と同じ文型です。イベントの内容を尋ねる質問で、「するんですか」が最も自然です。「してくれますか」は依頼（will you do for me?）、「したらいいですか」はアドバイス求め（what should I do?）なので合いません。'
    }
  },
  {
    id: 12,
    sentenceA: 'お年玉（としだま）は、500円（えん）しかもらえませんでした。',
    display: ['お年玉は、500円', '___', 'もらえませんでした。'],
    sentenceB: null,
    options: ['しか', 'だけ', 'は'],
    answer: 'しか',
    explanation: {
      point: '〜しか＋否定（only ~ / nothing but ~）',
      text: '「もらえませんでした」が否定形なので「しか」が正解です。500円しかもらえなかった＝少ないことを強調しています。「だけ」は肯定文、「は」は主題マーカーで、この文脈の限定表現には合いません。'
    }
  }
];

let currentQ = 0;
let score = 0;
let answered = [];

function init() {
  currentQ = 0;
  score = 0;
  answered = [];
  document.getElementById('results-area').classList.add('hidden');
  renderQuestion();
  updateProgress();
  createPetals();
}

function renderQuestion() {
  const q = questions[currentQ];
  const area = document.getElementById('quiz-area');

  const sentenceParts = q.display.map((part, i) => {
    if (part === '___') return '<span class="blank" id="blank-slot">　？　</span>';
    return part;
  }).join('');

  let html = `
    <div class="question-card" id="q-card">
      <div class="question-number">問題 ${q.id} / 12</div>
      <div class="sentence">${sentenceParts}</div>
      ${q.sentenceB ? `<div class="sentence-b">${q.sentenceB}</div>` : ''}
      <div class="options" id="options-area">
        ${q.options.map((opt, i) => `
          <button class="option-btn" onclick="selectAnswer(${i})" data-option="${opt}">${opt}</button>
        `).join('')}
      </div>
      <div id="explanation-area"></div>
      <div id="next-area"></div>
    </div>
  `;
  area.innerHTML = html;
}

function selectAnswer(idx) {
  const q = questions[currentQ];
  const selected = q.options[idx];
  const isCorrect = selected === q.answer;
  const buttons = document.querySelectorAll('.option-btn');
  const blank = document.getElementById('blank-slot');

  if (isCorrect) {
    score++;
    blank.textContent = q.answer;
    blank.classList.add('filled');
  } else {
    blank.textContent = selected;
    blank.classList.add('wrong');
    setTimeout(() => {
      blank.textContent = q.answer;
      blank.classList.remove('wrong');
      blank.classList.add('filled');
    }, 800);
  }

  answered.push({ id: q.id, correct: isCorrect, selected, answer: q.answer });

  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (q.options[i] === q.answer) {
      btn.classList.add('correct');
    } else if (i === idx && !isCorrect) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dimmed');
    }
  });

  // Show explanation
  const expArea = document.getElementById('explanation-area');
  expArea.innerHTML = `
    <div class="explanation">
      <span class="grammar-point">${q.explanation.point}</span>
      ${q.explanation.text}
    </div>
  `;

  // Show next button
  const nextArea = document.getElementById('next-area');
  const isLast = currentQ >= questions.length - 1;
  nextArea.innerHTML = `
    <button class="next-btn" onclick="${isLast ? 'showResults()' : 'nextQuestion()'}">
      ${isLast ? '結果を見る →' : '次の問題 →'}
    </button>
  `;

  updateProgress();
}

function nextQuestion() {
  currentQ++;
  renderQuestion();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const answered_count = answered.length;
  document.getElementById('progress-text').textContent = `Question ${currentQ + 1} / 12`;
  document.getElementById('score-text').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(answered_count / 12) * 100}%`;
}

function showResults() {
  document.getElementById('quiz-area').innerHTML = '';
  document.getElementById('progress-fill').style.width = '100%';

  const pct = Math.round((score / 12) * 100);
  let emoji, msg;
  if (pct === 100) { emoji = '🌸✨'; msg = '満点！パーフェクト！文法の理解が素晴らしいです。'; }
  else if (pct >= 80) { emoji = '🌸'; msg = 'よくできました！あと少しで完璧です。'; }
  else if (pct >= 60) { emoji = '🌱'; msg = 'まあまあです。間違えた問題を復習しましょう。'; }
  else { emoji = '📖'; msg = 'もう少し練習しましょう。文法のポイントを確認してみてください。'; }

  const missed = answered.filter(a => !a.correct);

  let reviewHTML = '';
  if (missed.length > 0) {
    reviewHTML = `
      <div class="review-section">
        <h3>間違えた問題</h3>
        ${missed.map(m => {
          const q = questions.find(qq => qq.id === m.id);
          return `
            <div class="review-item missed">
              <div class="q-label">問題 ${m.id}</div>
              <div>${q.display.join('').replace('___', `<strong>${q.answer}</strong>`)}</div>
              <div class="answer-line">あなたの答え：${m.selected}　→　正解：${m.answer}</div>
              <div style="margin-top:6px;font-size:0.8rem;color:var(--text-light)">${q.explanation.point}：${q.explanation.text.substring(0, 80)}…</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  const resultsArea = document.getElementById('results-area');
  resultsArea.classList.remove('hidden');
  resultsArea.innerHTML = `
    <div class="results-card">
      <span class="results-emoji">${emoji}</span>
      <h2>クイズ完了！</h2>
      <div class="results-score">${score} <span>/ 12</span></div>
      <div class="results-message">${msg}</div>
      <button class="retry-btn" onclick="init()">もう一度チャレンジ →</button>
      ${reviewHTML}
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function createPetals() {
  document.querySelectorAll('.petal').forEach(p => p.remove());
  for (let i = 0; i < 6; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.style.left = Math.random() * 100 + '%';
    petal.style.animationDuration = (8 + Math.random() * 12) + 's';
    petal.style.animationDelay = Math.random() * 10 + 's';
    petal.style.width = (8 + Math.random() * 8) + 'px';
    petal.style.height = petal.style.width;
    document.body.appendChild(petal);
  }
}

init();
</script>
</body>
</html>
