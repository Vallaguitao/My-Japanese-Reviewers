<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みんなの日本語 Lesson 14 — Vocabulary Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #1a1525; color: #e8e0f0; font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, rgba(232,180,200,0.07) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(120,100,180,0.07) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .container { max-width: 540px; margin: 0 auto; padding: 24px 16px 60px; position: relative; z-index: 1; }
  #name-screen { margin-top: 50px; }
  .card { background: #221d2e; border-radius: 16px; padding: 28px 20px; border: 1px solid #3d3650; }
  .badge { display: inline-block; background: linear-gradient(135deg, #e8b4c8, #c89db7); color: #1a1525; font-weight: 700; font-size: 12px; padding: 4px 14px; border-radius: 20px; letter-spacing: 1px; }
  .title { font-size: 22px; font-weight: 800; margin: 14px 0 4px; letter-spacing: -0.5px; }
  .subtitle { font-size: 13px; color: #9e93b0; }
  .name-label { display: block; font-size: 13px; color: #9e93b0; margin: 24px 0 8px; text-align: left; }
  .name-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 2px solid #3d3650; background: #2a2535; color: #e8e0f0; font-size: 16px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .name-input:focus { border-color: #e8b4c8; }
  .btn-primary { width: 100%; margin-top: 16px; padding: 14px 0; border-radius: 12px; background: linear-gradient(135deg, #e8b4c8, #c89db7); border: none; color: #1a1525; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity 0.2s; }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }
  #quiz-screen { display: none; }
  .header { text-align: center; margin-bottom: 22px; }
  .header .subtitle { margin-top: 2px; }
  .score-banner { display: none; border-radius: 16px; padding: 22px 16px; text-align: center; margin-bottom: 20px; animation: slideDown 0.4s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  .score-number { font-size: 44px; font-weight: 800; letter-spacing: -1px; }
  .score-label { font-size: 16px; font-weight: 600; margin-top: 4px; }
  .email-row { margin-top: 10px; }
  .email-pill { display: inline-block; background: #3d3650; font-size: 12px; padding: 4px 14px; border-radius: 12px; }
  .email-pill.sent { background: #2d6a4f; }
  .email-pill.error { background: #9b2226; }
  .btn-retake { margin-top: 12px; background: rgba(255,255,255,0.15); color: #fff; border: none; padding: 8px 22px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .progress-row { margin-bottom: 14px; }
  .progress-text { font-size: 12px; color: #9e93b0; display: block; margin-bottom: 6px; }
  .progress-bar { height: 4px; background: #2a2535; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #e8b4c8, #c89db7); border-radius: 4px; width: 0%; transition: width 0.3s ease; }
  .nav-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-bottom: 20px; }
  .nav-dot { aspect-ratio: 1; border-radius: 8px; background: #2a2535; color: #e8e0f0; font-size: 11px; font-weight: 600; border: 2px solid transparent; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .nav-dot.answered { background: #4a4458; }
  .nav-dot.active { border-color: #e8b4c8; }
  .nav-dot.correct { background: #2d6a4f; }
  .nav-dot.wrong { background: #9b2226; }
  .q-card { background: #221d2e; border-radius: 16px; padding: 24px 18px; border: 1px solid #3d3650; margin-bottom: 16px; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .q-number { font-size: 11px; color: #9e93b0; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .q-english { font-size: 20px; font-weight: 700; margin-bottom: 20px; line-height: 1.3; }
  .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn { padding: 14px 10px; border-radius: 12px; border: 2px solid #3d3650; background: #2a2535; color: #e8e0f0; text-align: center; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 18px; font-weight: 600; position: relative; transition: all 0.15s; }
  .choice-btn:hover:not(.locked) { border-color: #5c4d7a; background: #302844; }
  .choice-btn.selected { background: #5c4d7a; border-color: #e8b4c8; }
  .choice-btn.correct-reveal { background: #2d6a4f; border-color: #40916c; }
  .choice-btn.wrong-reveal { background: #9b2226; border-color: #ca6702; }
  .choice-btn .mark { position: absolute; top: 6px; right: 8px; font-size: 14px; }
  .choice-btn .mark.ok { color: #a7f3d0; }
  .choice-btn .mark.no { color: #fca5a5; }
  .arrow-row { display: flex; justify-content: space-between; gap: 12px; }
  .btn-nav { flex: 1; padding: 12px 0; border-radius: 12px; background: #2a2535; border: 1px solid #3d3650; color: #e8e0f0; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .btn-submit { flex: 1; padding: 12px 0; border-radius: 12px; background: linear-gradient(135deg, #e8b4c8, #c89db7); border: none; color: #1a1525; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: opacity 0.2s; }
  .btn-submit:disabled { opacity: 0.35; cursor: default; }
  .text-center { text-align: center; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <div id="name-screen">
    <div class="card text-center">
      <span class="badge">みんなの日本語</span>
      <h1 class="title">Lesson 14 — Vocabulary Exam</h1>
      <p class="subtitle">70 multiple-choice questions · hiragana &amp; katakana</p>
      <label class="name-label">おなまえは？ Enter your name</label>
      <input class="name-input" id="name-input" type="text" placeholder="Your name..." autofocus>
      <button class="btn-primary" id="btn-start" disabled>Start Exam →</button>
    </div>
  </div>

  <div id="quiz-screen">
    <header class="header">
      <span class="badge">みんなの日本語</span>
      <h1 class="title">Lesson 14 — Vocabulary Exam</h1>
      <p class="subtitle" id="quiz-subtitle"></p>
    </header>
    <div class="score-banner" id="score-banner">
      <div class="score-number" id="score-number"></div>
      <div class="score-label" id="score-label"></div>
      <div class="email-row" id="email-row"></div>
      <button class="btn-retake" id="btn-retake">Retake Quiz</button>

      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="nav-grid" id="nav-grid"></div>
    <div class="q-card" id="q-card">
      <div class="q-number" id="q-number"></div>
      <div class="q-english" id="q-english"></div>
      <div class="choices-grid" id="choices-grid"></div>
    </div>
    <div class="arrow-row">
      <button class="btn-nav" id="btn-prev">← Previous</button>
      <button class="btn-nav" id="btn-next">Next →</button>
      <button class="btn-submit hidden" id="btn-submit" disabled>Submit Exam</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [

  /* ── Verbs: action ── */

  { english: "stand up", answer: "たちます", choices: ["たちます","すわります","まちます","ふります"] },
  { english: "enter (e.g., a café)", answer: "はいります", choices: ["はいります","でます","すわります","たちます"] },
  { english: "go out (e.g., of a café)", answer: "でます", choices: ["でます","はいります","とめます","しめます"] },

  /* ── Verbs: weather / misc ── */
  { english: "rain (verb)", answer: "ふります", choices: ["ふります","つけます","けします","コピーします"] },
  { english: "copy", answer: "コピーします", choices: ["コピーします","ふります","つかいます","みせます"] },

  /* ── Common nouns: home ── */
  { english: "electricity, light", answer: "でんき", choices: ["でんき","エアコン","パスポート","ちず"] },
  { english: "air conditioner", answer: "エアコン", choices: ["エアコン","でんき","パスポート","ちず"] },

  /* ── Common nouns: documents / personal ── */
  { english: "passport", answer: "パスポート", choices: ["パスポート","ちず","じゅうしょ","なまえ"] },
  { english: "name", answer: "なまえ", choices: ["なまえ","じゅうしょ","パスポート","ちず"] },
  { english: "address", answer: "じゅうしょ", choices: ["じゅうしょ","なまえ","ちず","パスポート"] },
  { english: "map", answer: "ちず", choices: ["ちず","じゅうしょ","パスポート","なまえ"] },

  /* ── Common nouns: kitchen ── */
  { english: "salt", answer: "しお", choices: ["しお","さとう","でんき","ちず"] },
  { english: "sugar", answer: "さとう", choices: ["さとう","しお","でんき","エアコン"] },

  /* ── Q&A / reading words ── */
  { english: "question, problem, trouble", answer: "もんだい", choices: ["もんだい","こたえ","よみかた","ちず"] },
  { english: "answer", answer: "こたえ", choices: ["こたえ","もんだい","よみかた","なまえ"] },
  { english: "how to read, way of reading", answer: "よみかた", choices: ["よみかた","こたえ","もんだい","じゅうしょ"] },

  /* ── Adverbs ── */
  { english: "straight (ahead)", answer: "まっすぐ", choices: ["まっすぐ","ゆっくり","すぐ","また"] },
  { english: "slowly, leisurely", answer: "ゆっくり", choices: ["ゆっくり","まっすぐ","すぐ","あとで"] },
  { english: "immediately, soon", answer: "すぐ", choices: ["すぐ","また","あとで","ゆっくり"] },
  { english: "again", answer: "また", choices: ["また","すぐ","あとで","もうすこし"] },
  { english: "later", answer: "あとで", choices: ["あとで","すぐ","また","もうすこし"] },
  { english: "a little more", answer: "もうすこし", choices: ["もうすこし","あとで","また","すぐ"] },

  /* ── Conversation phrases ── */
  { english: "right (encouraging some action) — 'now then'", answer: "さあ", choices: ["さあ","あれ","また","すぐ"] },
  { english: "Oh! Eh? (in surprise or wonder)", answer: "あれ", choices: ["あれ","さあ","また","あとで"] },
  { english: "Turn right at the traffic lights", answer: "しんごうをみぎへまがってください", choices: ["しんごうをみぎへまがってください","これでおねがいします","しょうしょうおまちください","ごちゅうもんは"] },
  { english: "I'd like to pay with this", answer: "これでおねがいします", choices: ["これでおねがいします","しんごうをみぎへまがってください","しょうしょうおまちください","ごちゅうもんは"] },
  { english: "change (money returned)", answer: "おつり", choices: ["おつり","さあ","あれ","あとで"] },

  /* ── Station: entrances & exits ── */
  { english: "exit", answer: "でぐち", choices: ["でぐち","いりぐち","ひがしぐち","にしぐち"] },
  { english: "entrance", answer: "いりぐち", choices: ["いりぐち","でぐち","かいさつぐち","ひがしぐち"] },
  { english: "east exit", answer: "ひがしぐち", choices: ["ひがしぐち","にしぐち","みなみぐち","きたぐち"] },
  { english: "west exit", answer: "にしぐち", choices: ["にしぐち","ひがしぐち","みなみぐち","きたぐち"] },
  { english: "south exit", answer: "みなみぐち", choices: ["みなみぐち","きたぐち","ひがしぐち","にしぐち"] },
  { english: "north exit", answer: "きたぐち", choices: ["きたぐち","みなみぐち","にしぐち","ひがしぐち"] },
  { english: "central exit", answer: "ちゅうおうぐち", choices: ["ちゅうおうぐち","かいさつぐち","ひがしぐち","にしぐち"] },
  { english: "ticket barrier (ticket gate)", answer: "かいさつぐち", choices: ["かいさつぐち","ちゅうおうぐち","でぐち","いりぐち"] },

  /* ── Station: facilities ── */
  { english: "ticket office, ticket area", answer: "きっぷうりば", choices: ["きっぷうりば","じどうけんばいき","せいさんき","ばいてん"] },
  { english: "ticket machine", answer: "じどうけんばいき", choices: ["じどうけんばいき","きっぷうりば","せいさんき","ばいてん"] },
  { english: "fare adjustment machine", answer: "せいさんき", choices: ["せいさんき","じどうけんばいき","きっぷうりば","じこくひょう"] },
  { english: "platform", answer: "プラットホーム", choices: ["プラットホーム","コインロッカー","タクシーのりば","ばいてん"] },
  { english: "kiosk (station shop)", answer: "ばいてん", choices: ["ばいてん","コインロッカー","プラットホーム","きっぷうりば"] },
  { english: "coin locker", answer: "コインロッカー", choices: ["コインロッカー","プラットホーム","ばいてん","タクシーのりば"] },
  { english: "taxi rank, taxi stand", answer: "タクシーのりば", choices: ["タクシーのりば","バスターミナル","バスてい","コインロッカー"] },
  { english: "bus terminal", answer: "バスターミナル", choices: ["バスターミナル","タクシーのりば","バスてい","プラットホーム"] },
  { english: "bus stop", answer: "バスてい", choices: ["バスてい","バスターミナル","タクシーのりば","コインロッカー"] },

  /* ── Train types ── */
  { english: "super-express train", answer: "とっきゅう", choices: ["とっきゅう","きゅうこう","かいそく","ふつう"] },
  { english: "express train", answer: "きゅうこう", choices: ["きゅうこう","とっきゅう","かいそく","じゅんきゅう"] },
  { english: "rapid service train", answer: "かいそく", choices: ["かいそく","きゅうこう","じゅんきゅう","ふつう"] },
  { english: "semi-express train", answer: "じゅんきゅう", choices: ["じゅんきゅう","かいそく","きゅうこう","ふつう"] },
  { english: "local train (stops at every station)", answer: "ふつう", choices: ["ふつう","とっきゅう","じゅんきゅう","かいそく"] },

  /* ── Tickets / schedules ── */
  { english: "timetable", answer: "じこくひょう", choices: ["じこくひょう","ていきけん","かいすうけん","プラットホーム"] },
  { english: "season ticket, commuter pass", answer: "ていきけん", choices: ["ていきけん","かいすうけん","じこくひょう","かたみち"] },
  { english: "coupon ticket (book of tickets)", answer: "かいすうけん", choices: ["かいすうけん","ていきけん","かたみち","おうふく"] },
  { english: "one way", answer: "かたみち", choices: ["かたみち","おうふく","ていきけん","かいすうけん"] },
  { english: "return / round trip", answer: "おうふく", choices: ["おうふく","かたみち","ていきけん","かいすうけん"] },
];

let playerName = "";
let quiz = [];
let answers = {};
let currentQ = 0;
let submitted = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

emailjs.init("1oR0j0WDvUmSSYEpK");

const $nameScreen = document.getElementById("name-screen");
const $quizScreen = document.getElementById("quiz-screen");
const $nameInput  = document.getElementById("name-input");
const $btnStart   = document.getElementById("btn-start");
const $subtitle   = document.getElementById("quiz-subtitle");
const $scoreBanner= document.getElementById("score-banner");
const $scoreNum   = document.getElementById("score-number");
const $scoreLbl   = document.getElementById("score-label");
const $emailRow   = document.getElementById("email-row");
const $btnRetake  = document.getElementById("btn-retake");
const $progText   = document.getElementById("progress-text");
const $progFill   = document.getElementById("progress-fill");
const $navGrid    = document.getElementById("nav-grid");
const $qNumber    = document.getElementById("q-number");
const $qEnglish   = document.getElementById("q-english");
const $choicesGrid= document.getElementById("choices-grid");
const $btnPrev    = document.getElementById("btn-prev");
const $btnNext    = document.getElementById("btn-next");
const $btnSubmit  = document.getElementById("btn-submit");

$nameInput.addEventListener("input", () => { $btnStart.disabled = !$nameInput.value.trim(); });
$nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && $nameInput.value.trim()) startQuiz(); });
$btnStart.addEventListener("click", startQuiz);

function startQuiz() {
  playerName = $nameInput.value.trim();
  quiz = shuffle(QUESTIONS).map(q => ({ ...q, choices: shuffle(q.choices) }));
  answers = {}; currentQ = 0; submitted = false;
  $nameScreen.style.display = "none";
  $quizScreen.style.display = "block";
  $scoreBanner.style.display = "none";
  $subtitle.textContent = `${playerName}さん — choose the correct hiragana or katakana`;
  buildNavGrid(); renderQuestion(); updateProgress();
}

function buildNavGrid() {
  $navGrid.innerHTML = "";
  quiz.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot"; btn.textContent = i + 1;
    btn.addEventListener("click", () => { currentQ = i; renderQuestion(); });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    if (i === currentQ) dot.classList.add("active");
    if (!submitted && answers[i] !== undefined) dot.classList.add("answered");
    if (submitted && answers[i] === quiz[i].answer) dot.classList.add("correct");
    if (submitted && answers[i] !== undefined && answers[i] !== quiz[i].answer) dot.classList.add("wrong");
  });
}

function updateProgress() {
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${quiz.length} answered`;
  $progFill.style.width = `${(count / quiz.length) * 100}%`;
  $btnSubmit.disabled = count < quiz.length;
}

function renderQuestion() {
  const q = quiz[currentQ];
  $qNumber.textContent = `Question ${currentQ + 1}`;
  $qEnglish.textContent = q.english;
  $choicesGrid.innerHTML = "";
  q.choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    if (submitted) btn.classList.add("locked");
    btn.innerHTML = `<span>${c}</span>`;
    const selected = answers[currentQ] === c;
    const isCorrectChoice = c === q.answer;
    if (!submitted) {
      if (selected) btn.classList.add("selected");
      btn.addEventListener("click", () => { if (submitted) return; answers[currentQ] = c; renderQuestion(); updateNavGrid(); updateProgress(); });
    } else {
      if (isCorrectChoice) { btn.classList.add("correct-reveal"); btn.innerHTML += `<span class="mark ok">✓</span>`; }
      if (selected && !isCorrectChoice) { btn.classList.add("wrong-reveal"); btn.innerHTML += `<span class="mark no">✗</span>`; }
    }
    $choicesGrid.appendChild(btn);
  });
  updateNavGrid();
  const isLast = currentQ === quiz.length - 1;
  $btnPrev.disabled = currentQ === 0;
  if (isLast && !submitted) { $btnNext.classList.add("hidden"); $btnSubmit.classList.remove("hidden"); }
  else { $btnNext.classList.remove("hidden"); $btnSubmit.classList.add("hidden"); $btnNext.disabled = isLast; }
}

$btnPrev.addEventListener("click", () => { if (currentQ > 0) { currentQ--; renderQuestion(); } });
$btnNext.addEventListener("click", () => { if (currentQ < quiz.length - 1) { currentQ++; renderQuestion(); } });
$btnSubmit.addEventListener("click", submitQuiz);

async function submitQuiz() {
  let s = 0;
  quiz.forEach((q, i) => { if (answers[i] === q.answer) s++; });
  submitted = true;
  const total = quiz.length;
  const pct = Math.round((s / total) * 100);
  $scoreNum.textContent = `${s}/${total}`;
  if (s === total) $scoreLbl.textContent = "完璧！ Perfect!";
  else if (pct >= 90) $scoreLbl.textContent = "すごい！ Excellent!";
  else if (pct >= 70) $scoreLbl.textContent = "いいですね！ Good job!";
  else $scoreLbl.textContent = "もう一度！ Try again!";
  const gradient = pct >= 90 ? "linear-gradient(135deg,#2d6a4f,#40916c)" : pct >= 70 ? "linear-gradient(135deg,#b08d37,#d4a843)" : "linear-gradient(135deg,#9b2226,#ca6702)";
  $scoreBanner.style.background = gradient;
  $scoreBanner.style.display = "block";
  currentQ = 0; renderQuestion(); updateNavGrid();
  $btnSubmit.classList.add("hidden"); $btnNext.classList.remove("hidden"); $btnNext.disabled = false;

  const EMAILJS_SERVICE_ID  = "service_v7ifzdj";
  const EMAILJS_TEMPLATE_ID = "template_lb9c879";
  const now = new Date().toLocaleString("en-PH", { timeZone: "Asia/Manila", dateStyle: "full", timeStyle: "short" });
  const details = quiz.map((q, i) => `${i+1}. ${q.english} → Answer: ${answers[i] || "—"} | Correct: ${q.answer} ${answers[i] === q.answer ? "✓" : "✗"}`).join("\n");
  const emailParams = {
    name: playerName, email: "noreply@quiz.com",
    subject: `[${playerName}] みんなの日本語 Lesson 14 Quiz — ${pct}%`,
    message: `Minna no Nihongo - Lesson 14 Vocabulary Exam Results\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${s}/${total} (${pct}%)\n\n--- Detailed Results ---\n${details}\n\nがんばって！`,
    time: now
  };
  $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
  try {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailParams);
    $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
  } catch (err) {
    console.error("EmailJS error:", err);
    $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || 'Email failed'}</span>`;
  }
}

$btnRetake.addEventListener("click", () => {
  quiz = shuffle(QUESTIONS).map(q => ({ ...q, choices: shuffle(q.choices) }));
  answers = {}; currentQ = 0; submitted = false;
  $scoreBanner.style.display = "none";
  buildNavGrid(); renderQuestion(); updateProgress();
});
</script>
</body>
</html>
