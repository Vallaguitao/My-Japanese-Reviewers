<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 4 — Verb Tense Activity | Minna no Nihongo N5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  /* ═══════════════════════════════════════════════════════════════
     THEME — sky (custom for Lesson 4: Time & Verbs)
     Deep midnight base with sky-blue / cyan accents
     ═══════════════════════════════════════════════════════════════ */
  :root {
    /* Backgrounds */
    --bg-base: #0c1929;
    --bg-radial-1: rgba(2, 132, 199, 0.08);
    --bg-radial-2: rgba(14, 165, 233, 0.06);
    --bg-card: #132338;
    --bg-input: #19304a;
    --bg-button: #1e3d5f;
    --bg-button-hover: #244b72;
    --bg-feedback-correct: #0f3d2a;
    --bg-feedback-wrong: #3d1520;

    /* Text */
    --text-primary: #e0f0ff;
    --text-muted: #7da8cc;
    --text-on-accent: #0c1929;

    /* Borders */
    --border: #1e3d5f;
    --border-active: #3b82f6;

    /* Accent gradient (primary CTA, badge, progress fill) */
    --accent-start: #38bdf8;
    --accent-end: #0ea5e9;

    /* Status colors */
    --success: #166534;
    --success-bright: #22c55e;
    --success-text: #bbf7d0;
    --warning: #a16207;
    --warning-bright: #eab308;
    --error: #991b1b;
    --error-bright: #ef4444;
    --error-text: #fecaca;

    /* Lesson tag palette — single lesson quiz, but keeping structure */
    --tag-l1-bg: #1e3a5f; --tag-l1-fg: #93c5fd;
    --tag-l2-bg: #1e4a3a; --tag-l2-fg: #86efac;
    --tag-l3-bg: #5a3a1e; --tag-l3-fg: #fcd34d;
    --tag-l4-bg: #0c3a5f; --tag-l4-fg: #7dd3fc;
    --tag-l5-bg: #3a1e4a; --tag-l5-fg: #c4b5fd;
  }

  /* ── Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, var(--bg-radial-1) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, var(--bg-radial-2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 580px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* Inline Japanese helper — slightly larger, JP-first font stack */
  .jp {
    font-family: 'Noto Sans JP', 'Zen Kaku Gothic New', sans-serif;
    font-size: 1.08em;
    font-weight: 700;
  }
  .blank {
    display: inline-block;
    min-width: 28px;
    padding: 0 6px;
    margin: 0 2px;
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    color: var(--text-on-accent);
    border-radius: 6px;
    font-weight: 800;
    text-align: center;
  }
  ruby rt { font-size: 0.6em; color: var(--text-muted); }

  /* ── Name Screen ── */
  #name-screen { margin-top: 50px; }

  .card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 28px 20px;
    border: 1px solid var(--border);
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    color: var(--text-on-accent);
    font-weight: 700;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  .title {
    font-size: 22px;
    font-weight: 800;
    margin: 14px 0 4px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .scope-pills {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    margin: 16px 0 4px;
  }
  .scope-pill {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 10px;
  }

  .name-label {
    display: block;
    font-size: 13px;
    color: var(--text-muted);
    margin: 24px 0 8px;
    text-align: left;
  }

  .name-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--accent-start); }

  .btn-primary {
    width: 100%;
    margin-top: 16px;
    padding: 14px 0;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    border: none;
    color: var(--text-on-accent);
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:focus-visible { outline: 3px solid var(--accent-start); outline-offset: 3px; }
  .btn-primary:active:not(:disabled) { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.35; cursor: default; }

  /* ── Quiz Screen ── */
  #quiz-screen { display: none; }

  .header { text-align: center; margin-bottom: 22px; }
  .header .subtitle { margin-top: 2px; }

  /* ── Score Banner ── */
  .score-banner {
    display: none;
    border-radius: 16px;
    padding: 22px 16px;
    text-align: center;
    margin-bottom: 20px;
    animation: slideDown 0.4s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .score-number { font-size: 44px; font-weight: 800; letter-spacing: -1px; }
  .score-label { font-size: 16px; font-weight: 600; margin-top: 4px; }
  .lesson-breakdown {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px;
  }
  .lesson-stat {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(4px);
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
  }
  .email-row { margin-top: 12px; }
  .email-pill {
    display: inline-block;
    background: var(--bg-button);
    color: var(--text-primary);
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 12px;
  }
  .email-pill.sent { background: var(--success); color: var(--success-text); }
  .email-pill.error { background: var(--error); color: var(--error-text); }

  .end-actions {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px;
  }
  .btn-end {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-end:hover:not(:disabled) { background: rgba(255, 255, 255, 0.25); }
  .btn-end:disabled { opacity: 0.4; cursor: default; }
  .btn-end:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  /* ── Review Banner ── */
  .review-banner {
    display: none;
    background: linear-gradient(135deg, var(--warning), var(--warning-bright));
    color: #1a1525;
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
  }

  /* ── Progress ── */
  .progress-row { margin-bottom: 14px; }
  .progress-text { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* ── Nav Grid (adaptive — fits any question count) ── */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
    gap: 6px;
    margin-bottom: 20px;
  }
  .nav-dot {
    aspect-ratio: 1;
    border-radius: 8px;
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 11px;
    font-weight: 600;
    border: 2px solid transparent;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav-dot:hover { background: var(--bg-button-hover); }
  .nav-dot:focus-visible { outline: 2px solid var(--accent-start); outline-offset: 2px; }
  .nav-dot.answered { background: var(--bg-button); }
  .nav-dot.active { border-color: var(--accent-start); }
  .nav-dot.correct { background: var(--success); }
  .nav-dot.wrong { background: var(--error); }

  /* ── Question Card ── */
  .q-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 22px 18px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-meta {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .q-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 8px;
    letter-spacing: 0.3px;
  }
  .q-tag.lesson-4 { background: var(--tag-l4-bg); color: var(--tag-l4-fg); }
  .q-tag.type {
    background: var(--bg-button);
    color: var(--text-muted);
  }

  .q-number {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .q-stem {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 18px;
    line-height: 1.55;
  }

  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .choices-grid.long { grid-template-columns: 1fr; }

  .choice-btn {
    padding: 14px 12px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    text-align: center;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    position: relative;
    transition: all 0.15s;
  }
  .choices-grid.long .choice-btn { text-align: left; padding: 14px 16px; }
  .choice-btn:hover:not(:disabled) { border-color: var(--border-active); background: var(--bg-button-hover); }
  .choice-btn:focus-visible { outline: 2px solid var(--accent-start); outline-offset: 2px; }
  .choice-btn.selected { background: var(--border-active); border-color: var(--accent-start); }
  .choice-btn.correct-reveal { background: var(--success); border-color: var(--success-bright); }
  .choice-btn.wrong-reveal { background: var(--error); border-color: var(--error-bright); }
  .choice-btn:disabled { cursor: default; }
  .choice-btn .mark {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 14px;
    font-weight: 700;
  }
  .choice-btn .mark.ok { color: var(--success-text); }
  .choice-btn .mark.no { color: var(--error-text); }
  .choice-btn .key-hint {
    position: absolute;
    top: 6px; left: 8px;
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 700;
    opacity: 0.7;
  }

  /* ── Feedback Card ── */
  .feedback-card {
    display: none;
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 14px;
    border: 1px solid;
    font-size: 14px;
    line-height: 1.55;
    animation: fadeIn 0.3s ease;
  }
  .feedback-card.correct {
    background: var(--bg-feedback-correct);
    border-color: var(--success-bright);
  }
  .feedback-card.wrong {
    background: var(--bg-feedback-wrong);
    border-color: var(--error-bright);
  }
  .fb-header {
    font-weight: 700;
    margin-bottom: 6px;
    font-size: 13px;
    letter-spacing: 0.3px;
  }
  .feedback-card.correct .fb-header { color: var(--success-text); }
  .feedback-card.wrong .fb-header { color: var(--error-text); }
  .fb-block { margin-top: 8px; }
  .fb-block.connect { color: var(--text-muted); font-size: 13px; }
  .fb-block.warn {
    color: #fcd34d;
    background: rgba(252, 211, 77, 0.08);
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
  }

  /* ── Arrow Row ── */
  .arrow-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .btn-nav {
    flex: 1;
    padding: 12px 0;
    border-radius: 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .btn-nav:hover:not(:disabled) { background: var(--bg-button-hover); }
  .btn-nav:focus-visible { outline: 2px solid var(--accent-start); outline-offset: 2px; }
  .btn-nav:disabled { opacity: 0.3; cursor: default; }
  .btn-next-primary {
    background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    color: var(--text-on-accent);
    border: none;
  }

  .text-center { text-align: center; }
  .hidden { display: none !important; }

  /* ── Mobile tweaks ── */
  @media (max-width: 480px) {
    .container { padding: 16px 12px 50px; }
    .title { font-size: 20px; }
    .q-stem { font-size: 16px; }
    .choice-btn { font-size: 15px; padding: 12px 10px; }
    .lesson-breakdown { gap: 6px; }
    .lesson-stat { font-size: 11px; padding: 5px 9px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- ════ NAME SCREEN ════ -->
  <div id="name-screen">
    <div class="card text-center">
      <span class="badge" id="ns-badge"></span>
      <h1 class="title" id="ns-title"></h1>
      <p class="subtitle" id="ns-subtitle"></p>

      <div class="scope-pills" id="scope-pills"></div>

      <label class="name-label" for="name-input">おなまえは？ Enter your name</label>
      <input class="name-input" id="name-input" type="text" placeholder="Your name..." autocomplete="off" autofocus>
      <button class="btn-primary" id="btn-start" disabled>Start Activity →</button>
    </div>
  </div>

  <!-- ════ QUIZ SCREEN ════ -->
  <div id="quiz-screen">
    <header class="header">
      <span class="badge" id="qs-badge"></span>
      <h1 class="title" id="qs-title"></h1>
      <p class="subtitle" id="quiz-subtitle"></p>
    </header>

    <div class="score-banner" id="score-banner" aria-live="polite">
      <div class="score-number" id="score-number"></div>
      <div class="score-label" id="score-label"></div>
      <div class="lesson-breakdown" id="lesson-breakdown"></div>
      <div class="email-row" id="email-row"></div>
      <div class="end-actions">
        <button class="btn-end" id="btn-review" disabled>📝 Review wrong answers</button>
        <button class="btn-end" id="btn-retake">🔄 Retake activity</button>
      </div>
    </div>

    <div class="review-banner" id="review-banner">
      📝 Review mode — showing only the questions you got wrong
    </div>

    <div class="progress-row">
      <span class="progress-text" id="progress-text">0 / 0 answered</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="nav-grid" id="nav-grid"></div>

    <div class="q-card" id="q-card">
      <div class="q-meta">
        <span class="q-tag lesson-4" id="q-lesson-tag">📘 Lesson 4</span>
        <span class="q-tag type" id="q-type-tag">Verb form</span>
      </div>
      <div class="q-number" id="q-number"></div>
      <div class="q-stem" id="q-stem"></div>
      <div class="choices-grid" id="choices-grid"></div>
      <div class="feedback-card" id="feedback-card" aria-live="polite"></div>
    </div>

    <div class="arrow-row">
      <button class="btn-nav" id="btn-prev">← Previous</button>
      <button class="btn-nav btn-next-primary" id="btn-next">Next →</button>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   QUIZ_CONFIG
   ═══════════════════════════════════════════════════════════════ */
const QUIZ_CONFIG = {
  badge: "みんなの日本語 · Lesson 4",
  title: "Verb Tense Activity — ます Forms",
  titleShort: "L4 · Verb Tense Activity",
  subtitle: "40 questions · conjugation, translation & time particles",
  scopePills: [
    "⏰ Conjugation ×12",
    "🌐 Translation ×12",
    "📌 Time に ×8",
    "🕐 Tense Clues ×8"
  ],

  shuffleQuestions: true,
  shuffleChoices: true,

  scoreThresholds: {
    perfect:   { min: 100, label: "完璧（かんぺき）！ Perfect!",      gradient: "linear-gradient(135deg, var(--success), var(--success-bright))" },
    excellent: { min: 90,  label: "すごい！ Excellent!",               gradient: "linear-gradient(135deg, var(--success), var(--success-bright))" },
    good:      { min: 70,  label: "いいですね！ Good job!",            gradient: "linear-gradient(135deg, var(--warning), var(--warning-bright))" },
    fail:      { min: 0,   label: "もう<ruby>一<rt>いち</rt></ruby><ruby>度<rt>ど</rt></ruby>！ Try again!", gradient: "linear-gradient(135deg, var(--error), var(--error-bright))" }
  },

  emailjs: {
    publicKey:  "1oR0j0WDvUmSSYEpK",
    serviceId:  "service_v7ifzdj",
    templateId: "template_lb9c879",
    timezone:   "Asia/Manila",
    locale:     "en-PH"
  }
};

/* ═══════════════════════════════════════════════════════════════
   QUESTIONS — 40 total across 4 types
   ═══════════════════════════════════════════════════════════════ */
const QUESTIONS = [

  /* ──────────────────────────────────────────────────────────────
     SECTION A: CONJUGATION (12 questions)
     "What is the ___-form of this verb?"
     ────────────────────────────────────────────────────────────── */
  {
    lesson: 4, type: "Conjugation",
    stem: 'What is the <strong>past affirmative</strong> of <span class="jp"><ruby>起<rt>お</rt></ruby>きます</span>?',
    answer: "おきました",
    choices: ["おきます", "おきません", "おきました", "おきませんでした"],
    correctNote: '<span class="jp"><ruby>起<rt>お</rt></ruby>きました</span> = "woke up / got up" — past affirmative swaps <span class="jp">ます</span> → <span class="jp">ました</span>.',
    explain: 'The ます-stem stays the same; only the ending changes. This is one of the simplest conjugation patterns in Japanese.',
    connect: '🔗 This ます → ました pattern applies to every verb in L4–L25. Master it here and it never changes.',
    warn: '⚠️ Don\'t confuse ました (past ✓) with ません (non-past ✗) — they sound similar but have opposite meanings!'
  },
  {
    lesson: 4, type: "Conjugation",
    stem: 'What is the <strong>non-past negative</strong> of <span class="jp"><ruby>寝<rt>ね</rt></ruby>ます</span> (sleep)?',
    answer: "ねません",
    choices: ["ねます", "ねません", "ねました", "ねませんでした"],
    correctNote: '<span class="jp"><ruby>寝<rt>ね</rt></ruby>ません</span> = "do not sleep / will not sleep" — non-past negative.',
    explain: 'Non-past negative uses ません. It covers both present habit ("I don\'t sleep") and future intent ("I won\'t sleep").',
    connect: '🔗 In L1–3, you learned じゃ ありません for noun negation. Now L4 introduces ません for verb negation — same negative spirit, different grammar.'
  },
  {
    lesson: 4, type: "Conjugation",
    stem: 'What is the <strong>past negative</strong> of <span class="jp"><ruby>働<rt>はたら</rt></ruby>きます</span> (work)?',
    answer: "はたらきませんでした",
    choices: ["はたらきます", "はたらきません", "はたらきました", "はたらきませんでした"],
    correctNote: '<span class="jp"><ruby>働<rt>はたら</rt></ruby>きませんでした</span> = "did not work" — past negative.',
    explain: 'Past negative is the longest form: ませんでした. Think of it as ません (negative) + でした (past marker).',
    warn: '⚠️ This is the longest ます-form ending. Students often forget the でした part — don\'t drop it!'
  },
  {
    lesson: 4, type: "Conjugation",
    stem: 'What is the <strong>non-past affirmative</strong> of <span class="jp"><ruby>休<rt>やす</rt></ruby>みます</span> (rest)?',
    answer: "やすみます",
    choices: ["やすみます", "やすみません", "やすみました", "やすみませんでした"],

    lesson: 4, type: "Tense Clue",
    stem: '<span class="jp">きょう <ruby>働<rt>はたら</rt></ruby>き<span class="blank">?</span>。</span><br>(Context: "I do not work today.")',
    answer: "ません",
    choices: ["ます", "ません", "ました", "ませんでした"],
    correctNote: 'きょう (today) here describes a current state / plan → non-past. "Do not" = negative → ません.',
    explain: 'きょう, like けさ, can be past or non-past. "I don\'t work today" (plan/state) = ません. "I worked today" (completed) = ました. Context decides.'
  },
  {
    lesson: 4, type: "Tense Clue",
    stem: '<span class="jp">きのう しけんが <ruby>終<rt>お</rt></ruby>わり<span class="blank">?</span>。</span><br>(Context: "The test finished yesterday.")',
    answer: "ました",
    choices: ["ます", "ません", "ました", "ませんでした"],
    correctNote: 'きのう = past, "finished" = affirmative → おわりました.',
    explain: 'しけんが uses the subject particle が to mark what finished. You\'ll study が more deeply in L9–L10, but here it means "the test (as subject) finished."',
    connect: '🔗 が (subject marker) appears here as a preview. In L1–3 you used は (topic marker). が vs は is one of Japanese\'s trickiest distinctions — explored fully in L9+.'
  }
];

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let playerName = "";
let quiz = [];
let answers = {};
let currentQ = 0;
let submitted = false;
let reviewMode = false;
let reviewIndices = [];

/* ═══════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickScoreTier(pct) {
  const tiers = QUIZ_CONFIG.scoreThresholds;
  if (pct >= tiers.perfect.min)   return tiers.perfect;
  if (pct >= tiers.excellent.min) return tiers.excellent;
  if (pct >= tiers.good.min)      return tiers.good;
  return tiers.fail;
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
emailjs.init(QUIZ_CONFIG.emailjs.publicKey);

/* DOM refs */
const $nameScreen   = document.getElementById("name-screen");
const $quizScreen   = document.getElementById("quiz-screen");
const $nameInput    = document.getElementById("name-input");
const $btnStart     = document.getElementById("btn-start");
const $scopePills   = document.getElementById("scope-pills");
const $subtitle     = document.getElementById("quiz-subtitle");
const $scoreBanner  = document.getElementById("score-banner");
const $scoreNum     = document.getElementById("score-number");
const $scoreLbl     = document.getElementById("score-label");
const $lessonBreak  = document.getElementById("lesson-breakdown");
const $emailRow     = document.getElementById("email-row");
const $btnReview    = document.getElementById("btn-review");
const $btnRetake    = document.getElementById("btn-retake");
const $reviewBanner = document.getElementById("review-banner");
const $progText     = document.getElementById("progress-text");
const $progFill     = document.getElementById("progress-fill");
const $navGrid      = document.getElementById("nav-grid");
const $qLessonTag   = document.getElementById("q-lesson-tag");
const $qTypeTag     = document.getElementById("q-type-tag");
const $qNumber      = document.getElementById("q-number");
const $qStem        = document.getElementById("q-stem");
const $choicesGrid  = document.getElementById("choices-grid");
const $feedbackCard = document.getElementById("feedback-card");
const $btnPrev      = document.getElementById("btn-prev");
const $btnNext      = document.getElementById("btn-next");

/* Populate header text from CONFIG */
document.title = QUIZ_CONFIG.title;
document.getElementById("ns-badge").textContent = QUIZ_CONFIG.badge;
document.getElementById("ns-title").textContent = QUIZ_CONFIG.title;
document.getElementById("ns-subtitle").textContent = QUIZ_CONFIG.subtitle;
document.getElementById("qs-badge").textContent = QUIZ_CONFIG.badge;
document.getElementById("qs-title").textContent = QUIZ_CONFIG.titleShort;

/* Render scope pills from config */
QUIZ_CONFIG.scopePills.forEach(text => {
  const span = document.createElement("span");
  span.className = "scope-pill";
  span.textContent = text;
  $scopePills.appendChild(span);
});

/* ═══════════════════════════════════════════════════════════════
   NAME SCREEN
   ═══════════════════════════════════════════════════════════════ */
$nameInput.addEventListener("input", () => {
  $btnStart.disabled = !$nameInput.value.trim();
});
$nameInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && $nameInput.value.trim()) startQuiz();
});
$btnStart.addEventListener("click", startQuiz);

function startQuiz() {
  playerName = $nameInput.value.trim();
  const baseQuestions = QUIZ_CONFIG.shuffleQuestions ? shuffle(QUESTIONS) : [...QUESTIONS];
  quiz = baseQuestions.map(q => ({
    ...q,
    choices: QUIZ_CONFIG.shuffleChoices ? shuffle(q.choices) : [...q.choices]
  }));
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];

  $nameScreen.style.display = "none";
  $quizScreen.style.display = "block";
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  $subtitle.textContent = `${playerName}さん — choose the correct answer for each question`;

  buildNavGrid();
  renderQuestion();
  updateProgress();
}

/* ═══════════════════════════════════════════════════════════════
   NAV GRID
   ═══════════════════════════════════════════════════════════════ */
function buildNavGrid() {
  $navGrid.innerHTML = "";
  quiz.forEach((_, i) => {
    const btn = document.createElement("button");
    btn.className = "nav-dot";
    btn.textContent = i + 1;
    btn.setAttribute("aria-label", `Question ${i + 1}`);
    btn.addEventListener("click", () => {
      if (reviewMode) {
        const idx = reviewIndices.indexOf(i);
        if (idx === -1) return;
        currentQ = idx;
      } else {
        currentQ = i;
      }
      renderQuestion();
    });
    $navGrid.appendChild(btn);
  });
}

function updateNavGrid() {
  const dots = $navGrid.querySelectorAll(".nav-dot");
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  dots.forEach((dot, i) => {
    dot.className = "nav-dot";
    let label = `Question ${i + 1}`;
    if (i === realIdx) { dot.classList.add("active"); label += ", current"; }
    if (!submitted && answers[i] !== undefined) {
      dot.classList.add("answered"); label += ", answered";
    }
    if (submitted && answers[i] === quiz[i].answer) {
      dot.classList.add("correct"); label += ", correct";
    }
    if (submitted && answers[i] !== undefined && answers[i] !== quiz[i].answer) {
      dot.classList.add("wrong"); label += ", incorrect";
    }
    dot.setAttribute("aria-label", label);
  });
}

/* ═══════════════════════════════════════════════════════════════
   PROGRESS
   ═══════════════════════════════════════════════════════════════ */
function updateProgress() {
  if (reviewMode) {
    $progText.textContent = `Reviewing ${currentQ + 1} / ${reviewIndices.length}`;
    $progFill.style.width = `${((currentQ + 1) / reviewIndices.length) * 100}%`;
    return;
  }
  const count = Object.keys(answers).length;
  $progText.textContent = `${count} / ${quiz.length} answered`;
  $progFill.style.width = `${(count / quiz.length) * 100}%`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER QUESTION
   ═══════════════════════════════════════════════════════════════ */
function renderQuestion() {
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  const q = quiz[realIdx];

  /* Lesson + type tags */
  $qLessonTag.className = `q-tag lesson-${q.lesson}`;
  $qLessonTag.textContent = `📘 Lesson ${q.lesson}`;
  $qTypeTag.textContent = q.type;

  /* Number + stem */
  $qNumber.textContent = reviewMode
    ? `Review ${currentQ + 1} of ${reviewIndices.length}`
    : `Question ${realIdx + 1} of ${quiz.length}`;
  $qStem.innerHTML = q.stem;

  /* Choices */
  $choicesGrid.className = `choices-grid${q.longChoices ? " long" : ""}`;
  $choicesGrid.innerHTML = "";
  const isAnswered = answers[realIdx] !== undefined;

  q.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    const selected = answers[realIdx] === c;
    const isCorrectChoice = c === q.answer;

    btn.innerHTML = `<span class="key-hint">${i + 1}</span><span>${c}</span>`;
    btn.setAttribute("aria-pressed", selected ? "true" : "false");

    if (isAnswered) {
      btn.disabled = true;
      if (isCorrectChoice) {
        btn.classList.add("correct-reveal");
        btn.innerHTML += `<span class="mark ok">✓</span>`;
      }
      if (selected && !isCorrectChoice) {
        btn.classList.add("wrong-reveal");
        btn.innerHTML += `<span class="mark no">✗</span>`;
      }
    } else {
      btn.addEventListener("click", () => answerQuestion(c));
    }

    $choicesGrid.appendChild(btn);
  });

  /* Feedback card */
  if (isAnswered) {
    renderFeedback(q, answers[realIdx]);
  } else {
    $feedbackCard.style.display = "none";
    $feedbackCard.innerHTML = "";
  }

  updateNavGrid();
  updateProgress();
  updateNavButtons();
}

function renderFeedback(q, given) {
  const isCorrect = given === q.answer;
  $feedbackCard.className = `feedback-card ${isCorrect ? "correct" : "wrong"}`;
  $feedbackCard.style.display = "block";

  let html = `<div class="fb-header">${isCorrect ? "✓ Correct" : `✗ Not quite — answer: ${q.answer}`}</div>`;
  if (q.correctNote) html += `<div>${q.correctNote}</div>`;
  if (q.explain)     html += `<div class="fb-block">${q.explain}</div>`;
  if (q.connect)     html += `<div class="fb-block connect">${q.connect}</div>`;
  if (q.warn)        html += `<div class="fb-block warn">${q.warn}</div>`;

  $feedbackCard.innerHTML = html;
}

function answerQuestion(choice) {
  const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
  if (answers[realIdx] !== undefined) return;
  answers[realIdx] = choice;
  renderQuestion();

  /* If we just finished the last question of a fresh attempt, auto-submit */
  if (!submitted && !reviewMode && Object.keys(answers).length === quiz.length) {
    setTimeout(submitQuiz, 600);
  }
}

/* ═══════════════════════════════════════════════════════════════
   NAV BUTTONS
   ═══════════════════════════════════════════════════════════════ */
function updateNavButtons() {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  $btnPrev.disabled = currentQ === 0;
  if (currentQ === total - 1) {
    $btnNext.textContent = reviewMode ? "Done reviewing ✓" : "Finish →";
  } else {
    $btnNext.textContent = "Next →";
  }
  $btnNext.disabled = false;
}

$btnPrev.addEventListener("click", () => {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
});
$btnNext.addEventListener("click", () => {
  const total = reviewMode ? reviewIndices.length : quiz.length;
  if (currentQ < total - 1) {
    currentQ++; renderQuestion();
  } else if (reviewMode) {
    reviewMode = false;
    $reviewBanner.style.display = "none";
    $scoreBanner.style.display = "block";
    $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });
  }
});

/* ═══════════════════════════════════════════════════════════════
   KEYBOARD CONTROLS
   ═══════════════════════════════════════════════════════════════ */
document.addEventListener("keydown", (e) => {
  if (document.activeElement === $nameInput) return;
  if ($quizScreen.style.display !== "block") return;

  if (e.key === "ArrowRight") { $btnNext.click(); e.preventDefault(); return; }
  if (e.key === "ArrowLeft")  { $btnPrev.click(); e.preventDefault(); return; }

  if (/^[1-9]$/.test(e.key)) {
    const realIdx = reviewMode ? reviewIndices[currentQ] : currentQ;
    if (answers[realIdx] !== undefined) return;
    const idx = parseInt(e.key, 10) - 1;
    const q = quiz[realIdx];
    if (idx < q.choices.length) {
      answerQuestion(q.choices[idx]);
      e.preventDefault();
    }
  }
});

/* ═══════════════════════════════════════════════════════════════
   SUBMIT — score, render results, send email
   ═══════════════════════════════════════════════════════════════ */
async function submitQuiz() {
  let correct = 0;
  const typeStats = {};

  quiz.forEach((q, i) => {
    const isRight = answers[i] === q.answer;
    if (isRight) correct++;
    if (!typeStats[q.type]) typeStats[q.type] = { correct: 0, total: 0 };
    typeStats[q.type].total++;
    if (isRight) typeStats[q.type].correct++;
  });

  submitted = true;
  const pct = Math.round((correct / quiz.length) * 100);
  const tier = pickScoreTier(pct);

  $scoreNum.textContent = `${correct}/${quiz.length}`;
  $scoreLbl.textContent = tier.label;
  $scoreBanner.style.background = tier.gradient;
  $scoreBanner.style.display = "block";

  /* Per-type breakdown */
  $lessonBreak.innerHTML = "";
  Object.keys(typeStats).forEach(t => {
    const s = typeStats[t];
    const span = document.createElement("span");
    span.className = "lesson-stat";
    span.textContent = `${t}: ${s.correct}/${s.total}`;
    $lessonBreak.appendChild(span);
  });

  const wrongCount = quiz.length - correct;
  $btnReview.disabled = wrongCount === 0;
  $btnReview.textContent = wrongCount === 0
    ? "🎉 No mistakes!"
    : `📝 Review ${wrongCount} wrong answer${wrongCount > 1 ? "s" : ""}`;

  updateNavGrid();
  $scoreBanner.scrollIntoView({ behavior: "smooth", block: "start" });

  /* ── Send results via EmailJS ── */
  const cfg = QUIZ_CONFIG.emailjs;
  const now = new Date().toLocaleString(cfg.locale, {
    timeZone: cfg.timezone, dateStyle: "full", timeStyle: "short"
  });
  const details = quiz.map((q, i) => {
    const stripHtml = (s) => s.replace(/<[^>]*>/g, "").replace(/\s+/g, " ").trim();
    return `${i + 1}. [L${q.lesson} ${q.type}] ${stripHtml(q.stem)} → Answer: ${answers[i] || "—"} | Correct: ${q.answer} ${answers[i] === q.answer ? "✓" : "✗"}`;
  }).join("\n");

  const typeBreakdown = Object.keys(typeStats).map(t =>
    `${t}: ${typeStats[t].correct}/${typeStats[t].total}`
  ).join("\n");

  const emailParams = {
    name: playerName,
    email: "noreply@quiz.com",
    subject: `[${playerName}] ${QUIZ_CONFIG.title} — ${pct}%`,
    message: `${QUIZ_CONFIG.title}\n\nStudent: ${playerName}\nDate: ${now}\nScore: ${correct}/${quiz.length} (${pct}%)\n\n--- Per-type breakdown ---\n${typeBreakdown}\n\n--- Detailed results ---\n${details}\n\nがんばって！`,
    time: now
  };

  $emailRow.innerHTML = `<span class="email-pill">📧 Sending results…</span>`;
  try {
    await emailjs.send(cfg.serviceId, cfg.templateId, emailParams, cfg.publicKey);
    $emailRow.innerHTML = `<span class="email-pill sent">✓ Results emailed!</span>`;
  } catch (err) {
    console.error("EmailJS error:", err);
    $emailRow.innerHTML = `<span class="email-pill error">✗ ${err?.text || err?.message || "Email failed"}</span>`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   REVIEW + RETAKE
   ═══════════════════════════════════════════════════════════════ */
$btnReview.addEventListener("click", () => {
  reviewIndices = quiz
    .map((q, i) => ({ i, wrong: answers[i] !== q.answer }))
    .filter(x => x.wrong)
    .map(x => x.i);
  if (reviewIndices.length === 0) return;
  reviewMode = true;
  currentQ = 0;
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "block";
  renderQuestion();
});

$btnRetake.addEventListener("click", () => {
  const baseQuestions = QUIZ_CONFIG.shuffleQuestions ? shuffle(QUESTIONS) : [...QUESTIONS];
  quiz = baseQuestions.map(q => ({
    ...q,
    choices: QUIZ_CONFIG.shuffleChoices ? shuffle(q.choices) : [...q.choices]
  }));
  answers = {};
  currentQ = 0;
  submitted = false;
  reviewMode = false;
  reviewIndices = [];
  $scoreBanner.style.display = "none";
  $reviewBanner.style.display = "none";
  buildNavGrid();
  renderQuestion();
  updateProgress();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>
</body>
